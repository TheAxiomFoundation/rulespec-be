- name: study_allowance_dependent_person_count_fifth_dependent_code
  kind: parameter
  dtype: Count
  source: Internal selector code for the fifth-and-beyond dependent-person-count
    increment threshold shared by articles 2 and 4 section 2 of the French-Community
    study-allowance order of 21 September 2016
  versions:
  - effective_from: '2016-07-01'
    formula: '4'
- name: study_allowance_income_ceiling
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: French-Community study-allowance order of 21 September 2016, article 2
  versions:
  - effective_from: '2016-07-01'
    formula: "if study_allowance_is_higher_education:\n    if study_allowance_dependent_person_count\
      \ == 0:\n        study_allowance_higher_income_ceiling_0_dependents\n    else:\n\
      \        if study_allowance_dependent_person_count == 1:\n            study_allowance_higher_income_ceiling_1_dependent\n\
      \        else:\n            if study_allowance_dependent_person_count == 2:\n\
      \                study_allowance_higher_income_ceiling_2_dependents\n     \
      \       else:\n                if study_allowance_dependent_person_count ==\
      \ 3:\n                    study_allowance_higher_income_ceiling_3_dependents\n\
      \                else:\n                    if study_allowance_dependent_person_count\
      \ == study_allowance_dependent_person_count_fifth_dependent_code:\n       \
      \                 study_allowance_higher_income_ceiling_4_dependents\n\
      \                    else:\n                        study_allowance_higher_income_ceiling_4_dependents\
      \ + (study_allowance_dependent_person_count - study_allowance_dependent_person_count_fifth_dependent_code)\
      \ * study_allowance_higher_income_ceiling_increment\n\
      else:\n    if study_allowance_dependent_person_count == 0:\n        study_allowance_secondary_income_ceiling_0_dependents\n\
      \    else:\n        if study_allowance_dependent_person_count == 1:\n     \
      \       study_allowance_secondary_income_ceiling_1_dependent\n        else:\n\
      \            if study_allowance_dependent_person_count == 2:\n           \
      \     study_allowance_secondary_income_ceiling_2_dependents\n            else:\n\
      \                if study_allowance_dependent_person_count == 3:\n       \
      \             study_allowance_secondary_income_ceiling_3_dependents\n     \
      \           else:\n                    if study_allowance_dependent_person_count\
      \ == study_allowance_dependent_person_count_fifth_dependent_code:\n       \
      \                 study_allowance_secondary_income_ceiling_4_dependents\n\
      \                    else:\n                        study_allowance_secondary_income_ceiling_4_dependents\
      \ + (study_allowance_dependent_person_count - study_allowance_dependent_person_count_fifth_dependent_code)\
      \ * study_allowance_secondary_income_ceiling_increment"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-wal:statutes/education/study_allowance#study_allowance_dependent_person_count_fifth_dependent_code
          output: study_allowance_dependent_person_count_fifth_dependent_code
          hash: sha256:local
