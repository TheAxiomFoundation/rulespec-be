- name: study_allowance_max_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: French-Community study-allowance order of 21 September 2016, article 3
    section 1
  versions:
  - effective_from: '2016-07-01'
    formula: "if study_allowance_is_higher_education:\n    if study_allowance_is_intern:\n\
      \        if study_allowance_receives_child_benefits:\n            study_allowance_higher_intern_with_child_benefits_max_amount\n\
      \        else:\n            study_allowance_higher_intern_without_child_benefits_max_amount\n\
      \    else:\n        if study_allowance_receives_child_benefits:\n         \
      \   study_allowance_higher_extern_with_child_benefits_max_amount\n       \
      \ else:\n            study_allowance_higher_extern_without_child_benefits_max_amount\n\
      else:\n    if study_allowance_is_intern:\n        study_allowance_secondary_intern_max_amount\n\
      \    else:\n        study_allowance_secondary_extern_max_amount"
- name: study_allowance_special_threshold_increment
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: French-Community study-allowance order of 21 September 2016, article 4
    section 3
  versions:
  - effective_from: '2016-07-01'
    formula: "if study_allowance_dependent_person_count == 0:\n    0\nelse:\n   \
      \ if study_allowance_dependent_person_count == 1:\n        study_allowance_special_threshold_increment_1_dependent\n\
      \    else:\n        if study_allowance_dependent_person_count == 2:\n     \
