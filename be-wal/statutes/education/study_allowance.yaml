format: rulespec/v1
module:
  summary: 'French-Community (Federation Wallonie-Bruxelles) study-allowance decree
    of 18 November 2021 article 1er sets the covered secondary and higher-education
    levels and article 4 delegates the means-test amount and criteria to government
    order. The implementing order of 21 September 2016 article 2 sets the annual
    means-test resource ceilings by dependent-person count for secondary and
    higher education, article 3 sets the maximum allowance amounts by education
    level, boarding status, and orphan-allowance eligibility, and article 4 sets
    the factor-K proration rule, the minimum-threshold (plancher) amounts, and the
    special-allowance income thresholds and amounts. This module encodes those
    amount surfaces and the factor-K means-test selector for extern candidates
    (EUROMOD BE_2025 bed_be i_bed_fr_be), also encoding intern maximum amounts for
    completeness even though EUROMOD does not model interns. Eligibility beyond
    the means test, application procedure, property disqualification, distance
    supplement, rounding, and payment mechanics remain separate surfaces.'
  source_verification:
    corpus_citation_path: "be-wal/statute/decret/2021/11/18/2021022504/article/1er"
units:
- name: EUR
  kind: currency
  minor_units: 2
