  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 16
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_disability_tier == 1:\n    wallonia_family_benefits_disability_tier_1_monthly_amount\n\
      else:\n    if wallonia_family_benefits_disability_tier == 2:\n        wallonia_family_benefits_disability_tier_2_monthly_amount\n\
