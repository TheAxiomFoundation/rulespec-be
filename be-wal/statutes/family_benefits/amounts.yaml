      \                else:\n                    if wallonia_family_benefits_disability_tier\
      \ == wallonia_family_benefits_disability_supplement_monthly_amount_scalar_limit_3:\n\
      \                        wallonia_family_benefits_disability_tier_6_monthly_amount\n\
      \                    else:\n                        if wallonia_family_benefits_disability_tier\
      \ == wallonia_family_benefits_disability_supplement_monthly_amount_scalar_limit_4:\n\
      \                            wallonia_family_benefits_disability_tier_7_monthly_amount\n\
      \                        else:\n                            0"
