            corpus_citation_path: be-wal/statute/decret/2018/02/08/2018201006/article/9
            excerpt: "Art. 9. § 1er. Il est octroyé mensuellement à l'allocataire désigné conformément à l'article 22, en faveur de l'enfant bénéficiaire, une allocation de base dont le montant s'élève à :\n1° 155 euros jusqu'à la fin du mois au cours duquel il atteint l'âge de dix-huit ans;\n2° 165 euros à partir du premier jour du mois suivant celui de son 18\nème\nanniversaire et jusqu'au plus tard, en ce compris, le mois au cours duquel il atteint l'âge de vingt-cinq ans.\n§ 2. Par dérogation aux montants visés au paragraphe 1er, il est octroyé mensuellement à l'allocataire désigné conformément à l'article 22, en faveur de l'enfant bénéficiaire orphelin de ses deux parents, ou orphelin du seul parent à l'égard duquel sa filiation est établie, un montant de base de 350 euros.\nLa déclaration d'absence conforme aux dispositions du Code civil, est assimilée au décès.\nLe bénéfice du montant visé à l'alinéa 1erest"
