  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 9
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_double_orphan_or_only_parent_orphan:\n \
      \   wallonia_family_benefits_double_orphan_base_monthly_amount\nelse:\n    if\
      \ wallonia_family_benefits_child_age_years < wallonia_family_benefits_base_monthly_amount_scalar_limit:\n\
      \        wallonia_family_benefits_under_18_base_monthly_amount\n    else:\n\
      \        if wallonia_family_benefits_child_age_years < wallonia_family_benefits_base_monthly_amount_scalar_limit_2:\n\
      \            wallonia_family_benefits_18_to_24_base_monthly_amount\n       \
      \ else:\n            0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-wal:statutes/family_benefits/amounts#wallonia_family_benefits_base_monthly_amount_scalar_limit
          output: wallonia_family_benefits_base_monthly_amount_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be-wal:statutes/family_benefits/amounts#wallonia_family_benefits_base_monthly_amount_scalar_limit_2
          output: wallonia_family_benefits_base_monthly_amount_scalar_limit_2
