format: rulespec/v1
module:
  summary: |-
    Walloon decree of 8 February 2018 articles 7-19 set original statutory
    amount surfaces for family benefits. This module encodes those amount
    surfaces and simple selectors; delegated eligibility tests, indexation
    orders, and later amendment history remain separate surfaces.
