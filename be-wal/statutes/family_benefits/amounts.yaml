      \        wallonia_family_benefits_disability_tier_3_monthly_amount\n       \
      \ else:\n            if wallonia_family_benefits_disability_tier == wallonia_family_benefits_disability_supplement_monthly_amount_scalar_limit:\n\
      \                wallonia_family_benefits_disability_tier_4_monthly_amount\n\
      \            else:\n                if wallonia_family_benefits_disability_tier\
      \ == wallonia_family_benefits_disability_supplement_monthly_amount_scalar_limit_2:\n\
