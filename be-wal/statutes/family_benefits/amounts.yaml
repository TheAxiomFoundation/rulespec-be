  - name: wallonia_family_benefits_base_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 9
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_double_orphan_or_only_parent_orphan:
              wallonia_family_benefits_double_orphan_base_monthly_amount
          else:
              if wallonia_family_benefits_child_age_years < 18:
                  wallonia_family_benefits_under_18_base_monthly_amount
              else:
                  if wallonia_family_benefits_child_age_years < 25:
                      wallonia_family_benefits_18_to_24_base_monthly_amount
                  else:
                      0
  - name: wallonia_family_benefits_foster_care_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 10
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_in_qualifying_foster_care:
              wallonia_family_benefits_foster_care_monthly_amount
          else:
              0
  - name: wallonia_family_benefits_large_family_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 11
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_qualifying_children_in_household_count < 3:
              0
          else:
              if wallonia_family_benefits_household_annual_income < wallonia_family_benefits_income_low_threshold:
                  wallonia_family_benefits_large_family_low_income_monthly_amount
              else:
                  if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:
                      wallonia_family_benefits_large_family_middle_income_monthly_amount
                  else:
                      0
  - name: wallonia_family_benefits_single_parent_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 12
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_single_parent:
              if wallonia_family_benefits_household_annual_income < wallonia_family_benefits_income_low_threshold:
                  wallonia_family_benefits_single_parent_low_income_monthly_amount
              else:
                  if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:
                      wallonia_family_benefits_single_parent_middle_income_monthly_amount
                  else:
                      0
          else:
              0
  - name: wallonia_family_benefits_social_or_disabled_household_member_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, articles 13 and 14
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_disabled_household_member_supplement_applies:
              wallonia_family_benefits_disabled_household_member_monthly_amount
          else:
              if wallonia_family_benefits_household_annual_income < wallonia_family_benefits_income_low_threshold:
                  if wallonia_family_benefits_household_member_has_loss_capacity:
                      wallonia_family_benefits_social_low_income_monthly_amount + wallonia_family_benefits_loss_capacity_extra_monthly_amount
                  else:
                      wallonia_family_benefits_social_low_income_monthly_amount
              else:
                  if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:
                      wallonia_family_benefits_social_middle_income_monthly_amount
                  else:
                      0
  - name: wallonia_family_benefits_one_parent_orphan_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 15
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_one_parent_or_only_filiation_orphan:
              wallonia_family_benefits_base_monthly_amount * wallonia_family_benefits_one_parent_orphan_supplement_rate
          else:
              0
  - name: wallonia_family_benefits_disability_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 16
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_disability_tier == 1:
              wallonia_family_benefits_disability_tier_1_monthly_amount
          else:
              if wallonia_family_benefits_disability_tier == 2:
                  wallonia_family_benefits_disability_tier_2_monthly_amount
              else:
                  if wallonia_family_benefits_disability_tier == 3:
                      wallonia_family_benefits_disability_tier_3_monthly_amount
                  else:
                      if wallonia_family_benefits_disability_tier == 4:
                          wallonia_family_benefits_disability_tier_4_monthly_amount
                      else:
                          if wallonia_family_benefits_disability_tier == 5:
                              wallonia_family_benefits_disability_tier_5_monthly_amount
                          else:
                              if wallonia_family_benefits_disability_tier == 6:
                                  wallonia_family_benefits_disability_tier_6_monthly_amount
                              else:
                                  if wallonia_family_benefits_disability_tier == 7:
                                      wallonia_family_benefits_disability_tier_7_monthly_amount
                                  else:
                                      0
  - name: wallonia_family_benefits_age_supplement_annual_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, article 17
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_age_on_december_31_years < 0:
              0
          else:
              if wallonia_family_benefits_age_on_december_31_years < 5:
                  wallonia_family_benefits_age_supplement_under_5_annual_amount
              else:
                  if wallonia_family_benefits_age_on_december_31_years < 11:
                      wallonia_family_benefits_age_supplement_5_to_10_annual_amount
                  else:
                      if wallonia_family_benefits_age_on_december_31_years < 17:
                          wallonia_family_benefits_age_supplement_11_to_16_annual_amount
                      else:
                          wallonia_family_benefits_age_supplement_17_plus_annual_amount
  - name: wallonia_family_benefits_selected_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon decree of 8 February 2018 on management and payment of family benefits, articles 9 to 16
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          wallonia_family_benefits_base_monthly_amount + wallonia_family_benefits_foster_care_supplement_monthly_amount + wallonia_family_benefits_large_family_supplement_monthly_amount + wallonia_family_benefits_single_parent_supplement_monthly_amount + wallonia_family_benefits_social_or_disabled_household_member_supplement_monthly_amount + wallonia_family_benefits_one_parent_orphan_supplement_monthly_amount + wallonia_family_benefits_disability_supplement_monthly_amount
