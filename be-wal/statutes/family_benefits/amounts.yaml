- name: wallonia_family_benefits_foster_care_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 10
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_in_qualifying_foster_care:\n    wallonia_family_benefits_foster_care_monthly_amount\n\
      else:\n    0"
- name: wallonia_family_benefits_large_family_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 11
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_qualifying_children_in_household_count <\
      \ 3:\n    0\nelse:\n    if wallonia_family_benefits_household_annual_income\
      \ < wallonia_family_benefits_income_low_threshold:\n        wallonia_family_benefits_large_family_low_income_monthly_amount\n\
      \    else:\n        if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:\n\
      \            wallonia_family_benefits_large_family_middle_income_monthly_amount\n\
      \        else:\n            0"
- name: wallonia_family_benefits_single_parent_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 12
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_single_parent:\n    if wallonia_family_benefits_household_annual_income\
      \ < wallonia_family_benefits_income_low_threshold:\n        wallonia_family_benefits_single_parent_low_income_monthly_amount\n\
      \    else:\n        if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:\n\
      \            wallonia_family_benefits_single_parent_middle_income_monthly_amount\n\
      \        else:\n            0\nelse:\n    0"
- name: wallonia_family_benefits_social_or_disabled_household_member_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    articles 13 and 14
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_disabled_household_member_supplement_applies:\n\
      \    wallonia_family_benefits_disabled_household_member_monthly_amount\nelse:\n\
      \    if wallonia_family_benefits_household_annual_income < wallonia_family_benefits_income_low_threshold:\n\
      \        if wallonia_family_benefits_household_member_has_loss_capacity:\n \
      \           wallonia_family_benefits_social_low_income_monthly_amount + wallonia_family_benefits_loss_capacity_extra_monthly_amount\n\
      \        else:\n            wallonia_family_benefits_social_low_income_monthly_amount\n\
      \    else:\n        if wallonia_family_benefits_household_annual_income <= wallonia_family_benefits_income_middle_threshold:\n\
      \            wallonia_family_benefits_social_middle_income_monthly_amount\n\
      \        else:\n            0"
- name: wallonia_family_benefits_one_parent_orphan_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Walloon decree of 8 February 2018 on management and payment of family benefits,
    article 15
  versions:
  - effective_from: '2020-01-01'
    formula: "if wallonia_family_benefits_one_parent_or_only_filiation_orphan:\n \
      \   wallonia_family_benefits_base_monthly_amount * wallonia_family_benefits_one_parent_orphan_supplement_rate\n\
      else:\n    0"
