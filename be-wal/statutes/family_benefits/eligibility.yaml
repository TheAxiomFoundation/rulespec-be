format: rulespec/v1
imports:
  - be-wal:statutes/family_benefits/amounts#wallonia_family_benefits_selected_monthly_amount
module:
  summary: |-
    Walloon family-benefits decree articles 4, 5, and 6 define the core child
    entitlement gate: residence in the French-language region or applicable
    supranational/economic-activity connection, Belgian nationality or a valid
    residence-title basis, exclusion for third-country students, age/status
    windows through 18, 21, or 25, and a disappeared-child maintenance rule.
    Delegated obstacles, education proof, individual derogations, and payment
    procedures remain supplied inputs.
  source_verification:
    corpus_citation_paths:
      - be-wal/statute/decret/2018/02/08/2018201006/article/4
      - be-wal/statute/decret/2018/02/08/2018201006/article/5
      - be-wal/statute/decret/2018/02/08/2018201006/article/6
    values:
      wallonia_family_benefits_unconditional_age_years: 18
      wallonia_family_benefits_intermediate_age_years: 21
      wallonia_family_benefits_extended_age_years: 25
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: wallonia_family_benefits_unconditional_age_years
    kind: parameter
    dtype: Count
    source: Walloon family-benefits decree article 5 section 1
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          18
  - name: wallonia_family_benefits_intermediate_age_years
    kind: parameter
    dtype: Count
    source: Walloon family-benefits decree article 5 sections 2 and 3
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          21
  - name: wallonia_family_benefits_extended_age_years
    kind: parameter
    dtype: Count
    source: Walloon family-benefits decree article 5 section 4
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          25
  - name: wallonia_family_benefits_article_4_residence_and_status_condition_met
    kind: derived
    entity: Child
    dtype: Count
    period: Month
    source: Walloon family-benefits decree article 4 residence, status, and supranational conditions
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_parents_eu_or_reg883_and_economic_activity_in_french_region or wallonia_family_benefits_supranational_family_member_right_applies:
              1
          else:
              if wallonia_family_benefits_child_legal_domicile_in_french_language_region or wallonia_family_benefits_child_without_legal_domicile_effectively_resides_in_french_language_region:
                  if wallonia_family_benefits_child_has_belgian_nationality or (wallonia_family_benefits_child_has_residence_title and not wallonia_family_benefits_child_has_registration_attestation_only) or wallonia_family_benefits_child_parents_are_stateless:
                      1
                  else:
                      0
              else:
                  0
  - name: wallonia_family_benefits_article_4_temporary_student_exclusion_applies
    kind: derived
    entity: Child
    dtype: Count
    period: Month
    source: Walloon family-benefits decree article 4 third-country student exclusion
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_child_is_third_country_student_authorized_to_stay_for_studies:
              1
          else:
              0
  - name: wallonia_family_benefits_article_5_age_or_status_condition_met
    kind: derived
    entity: Child
    dtype: Count
    period: Month
    source: Walloon family-benefits decree article 5 age and status windows
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_child_age_on_august_31_years < wallonia_family_benefits_unconditional_age_years:
              1
          else:
              if wallonia_family_benefits_child_has_disability_supplement_condition and (wallonia_family_benefits_child_age_years < wallonia_family_benefits_intermediate_age_years or wallonia_family_benefits_child_in_month_turning_21):
                  1
              else:
                  if wallonia_family_benefits_child_age_years < wallonia_family_benefits_intermediate_age_years and wallonia_family_benefits_no_government_obstacle_applies:
                      1
                  else:
                      if wallonia_family_benefits_child_age_years < wallonia_family_benefits_extended_age_years and (wallonia_family_benefits_child_is_apprentice or wallonia_family_benefits_child_in_qualifying_courses_or_stage or wallonia_family_benefits_child_in_qualifying_diploma_training or wallonia_family_benefits_child_registered_jobseeker_after_studies_or_apprenticeship or wallonia_family_benefits_government_derogation_applies):
                          1
                      else:
                          0
  - name: wallonia_family_benefits_article_6_disappeared_child_condition_met
    kind: derived
    entity: Child
    dtype: Count
    period: Month
    source: Walloon family-benefits decree article 6 disappeared-child maintenance rule
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_child_disappeared and wallonia_family_benefits_child_was_beneficiary_at_disappearance and wallonia_family_benefits_no_other_belgian_foreign_or_international_family_benefit_right and wallonia_family_benefits_child_age_years < wallonia_family_benefits_unconditional_age_years and not wallonia_family_benefits_disappeared_child_found:
              1
          else:
              0
  - name: wallonia_family_benefits_child_entitlement
    kind: derived
    entity: Child
    dtype: Count
    period: Month
    source: Walloon family-benefits decree articles 4, 5, and 6 child entitlement gate
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_article_6_disappeared_child_condition_met == 1:
              1
          else:
              if wallonia_family_benefits_article_4_residence_and_status_condition_met == 1 and wallonia_family_benefits_article_4_temporary_student_exclusion_applies == 0 and wallonia_family_benefits_article_5_age_or_status_condition_met == 1:
                  1
              else:
                  0
  - name: wallonia_family_benefits_eligible_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon family-benefits decree articles 4 and 5 gate applied to encoded amount surfaces
    versions:
      - effective_from: '2020-01-01'
        formula: |-
          if wallonia_family_benefits_child_entitlement == 1:
              wallonia_family_benefits_selected_monthly_amount
          else:
              0
