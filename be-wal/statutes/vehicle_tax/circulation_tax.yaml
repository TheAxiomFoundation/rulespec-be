  - name: wallonia_circulation_tax_passenger_base_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: SPW Finances annual circulation-tax table, passenger cars
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if wallonia_circulation_tax_fiscal_power_cv <= 4:
              wallonia_circulation_tax_cv_0_to_4_amount
          else:
              if wallonia_circulation_tax_fiscal_power_cv == 5:
                  wallonia_circulation_tax_cv_5_amount
              else:
                  if wallonia_circulation_tax_fiscal_power_cv == 6:
                      wallonia_circulation_tax_cv_6_amount
                  else:
                      if wallonia_circulation_tax_fiscal_power_cv == 7:
                          wallonia_circulation_tax_cv_7_amount
                      else:
                          if wallonia_circulation_tax_fiscal_power_cv == 8:
                              wallonia_circulation_tax_cv_8_amount
                          else:
                              if wallonia_circulation_tax_fiscal_power_cv == 9:
                                  wallonia_circulation_tax_cv_9_amount
                              else:
                                  if wallonia_circulation_tax_fiscal_power_cv == 10:
                                      wallonia_circulation_tax_cv_10_amount
                                  else:
                                      if wallonia_circulation_tax_fiscal_power_cv == 11:
                                          wallonia_circulation_tax_cv_11_amount
                                      else:
                                          if wallonia_circulation_tax_fiscal_power_cv == 12:
                                              wallonia_circulation_tax_cv_12_amount
                                          else:
                                              if wallonia_circulation_tax_fiscal_power_cv == 13:
                                                  wallonia_circulation_tax_cv_13_amount
                                              else:
                                                  if wallonia_circulation_tax_fiscal_power_cv == 14:
                                                      wallonia_circulation_tax_cv_14_amount
                                                  else:
                                                      if wallonia_circulation_tax_fiscal_power_cv == 15:
                                                          wallonia_circulation_tax_cv_15_amount
                                                      else:
                                                          if wallonia_circulation_tax_fiscal_power_cv == 16:
                                                              wallonia_circulation_tax_cv_16_amount
                                                          else:
                                                              if wallonia_circulation_tax_fiscal_power_cv == 17:
                                                                  wallonia_circulation_tax_cv_17_amount
                                                              else:
                                                                  if wallonia_circulation_tax_fiscal_power_cv == 18:
                                                                      wallonia_circulation_tax_cv_18_amount
                                                                  else:
                                                                      if wallonia_circulation_tax_fiscal_power_cv == 19:
                                                                          wallonia_circulation_tax_cv_19_amount
                                                                      else:
                                                                          if wallonia_circulation_tax_fiscal_power_cv == 20:
                                                                              wallonia_circulation_tax_cv_20_amount
                                                                          else:
                                                                              wallonia_circulation_tax_cv_20_amount + (wallonia_circulation_tax_fiscal_power_cv - 20) * wallonia_circulation_tax_above_20_increment
  - name: wallonia_circulation_tax_lpg_low_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: SPW Finances annual circulation-tax table, LPG additional tax, not higher than 7 CV
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          89.16
  - name: wallonia_circulation_tax_lpg_middle_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: SPW Finances annual circulation-tax table, LPG additional tax, 8 to 13 CV
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          148.68
  - name: wallonia_circulation_tax_lpg_high_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: SPW Finances annual circulation-tax table, LPG additional tax, at least 14 CV
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          208.20
  - name: wallonia_circulation_tax_additional_lpg_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: SPW Finances annual circulation-tax table, LPG additional tax not indexed and not subject to additional decime
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if wallonia_circulation_tax_is_lpg:
              if wallonia_circulation_tax_fiscal_power_cv <= 7:
                  wallonia_circulation_tax_lpg_low_power_amount
              else:
                  if wallonia_circulation_tax_fiscal_power_cv <= 13:
                      wallonia_circulation_tax_lpg_middle_power_amount
                  else:
                      wallonia_circulation_tax_lpg_high_power_amount
          else:
              0
  - name: wallonia_circulation_tax_oldtimer_or_minimum_forfait_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: SPW Finances annual circulation-tax table, oldtimer and article 10 CTA minimum forfait
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          48.61
  - name: wallonia_circulation_tax_passenger_car_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: SPW Finances annual circulation-tax table, passenger cars plus LPG additional tax
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if wallonia_circulation_tax_is_oldtimer_or_minimum_forfait_vehicle:
              wallonia_circulation_tax_oldtimer_or_minimum_forfait_amount
          else:
              wallonia_circulation_tax_passenger_base_amount + wallonia_circulation_tax_additional_lpg_amount
