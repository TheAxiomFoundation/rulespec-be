- name: wallonia_circulation_tax_passenger_base_amount
  kind: derived
  entity: Vehicle
  dtype: Money
  period: Year
  unit: EUR
  source: SPW Finances annual circulation-tax table, passenger cars
  versions:
  - effective_from: '2026-07-01'
    formula: "if wallonia_circulation_tax_fiscal_power_cv <= wallonia_circulation_tax_passenger_base_amount_scalar_limit:\n\
      \    wallonia_circulation_tax_cv_0_to_4_amount\nelse:\n    if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_2:\n      \
      \  wallonia_circulation_tax_cv_5_amount\n    else:\n        if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_3:\n      \
      \      wallonia_circulation_tax_cv_6_amount\n        else:\n            if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_4:\n      \
      \          wallonia_circulation_tax_cv_7_amount\n            else:\n       \
      \         if wallonia_circulation_tax_fiscal_power_cv == wallonia_circulation_tax_passenger_base_amount_scalar_limit_5:\n\
      \                    wallonia_circulation_tax_cv_8_amount\n                else:\n\
      \                    if wallonia_circulation_tax_fiscal_power_cv == wallonia_circulation_tax_passenger_base_amount_scalar_limit_6:\n\
      \                        wallonia_circulation_tax_cv_9_amount\n            \
      \        else:\n                        if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_7:\n      \
      \                      wallonia_circulation_tax_cv_10_amount\n             \
      \           else:\n                            if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_8:\n      \
      \                          wallonia_circulation_tax_cv_11_amount\n         \
      \                   else:\n                                if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_9:\n      \
      \                              wallonia_circulation_tax_cv_12_amount\n     \
      \                           else:\n                                    if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_10:\n     \
      \                                   wallonia_circulation_tax_cv_13_amount\n\
      \                                    else:\n                               \
      \         if wallonia_circulation_tax_fiscal_power_cv == wallonia_circulation_tax_passenger_base_amount_scalar_limit_11:\n\
      \                                            wallonia_circulation_tax_cv_14_amount\n\
      \                                        else:\n                           \
      \                 if wallonia_circulation_tax_fiscal_power_cv == wallonia_circulation_tax_passenger_base_amount_scalar_limit_12:\n\
      \                                                wallonia_circulation_tax_cv_15_amount\n\
      \                                            else:\n                       \
      \                         if wallonia_circulation_tax_fiscal_power_cv == wallonia_circulation_tax_passenger_base_amount_scalar_limit_13:\n\
      \                                                    wallonia_circulation_tax_cv_16_amount\n\
      \                                                else:\n                   \
      \                                 if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_14:\n     \
      \                                                   wallonia_circulation_tax_cv_17_amount\n\
      \                                                    else:\n               \
      \                                         if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_15:\n     \
      \                                                       wallonia_circulation_tax_cv_18_amount\n\
      \                                                        else:\n           \
      \                                                 if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_16:\n     \
      \                                                           wallonia_circulation_tax_cv_19_amount\n\
      \                                                            else:\n       \
      \                                                         if wallonia_circulation_tax_fiscal_power_cv\
      \ == wallonia_circulation_tax_passenger_base_amount_scalar_limit_17:\n     \
      \                                                               wallonia_circulation_tax_cv_20_amount\n\
      \                                                                else:\n   \
      \                                                                 wallonia_circulation_tax_cv_20_amount\
      \ + (wallonia_circulation_tax_fiscal_power_cv - wallonia_circulation_tax_passenger_base_amount_scalar_limit_17)\
      \ * wallonia_circulation_tax_above_20_increment"
