format: rulespec/v1
module:
  summary: 'SPW Finances publishes the Walloon annual circulation-tax table for

    1 July 2026 through 30 June 2027 after the Code des taxes assimilees

    vehicle-tax locator is checked. This module encodes the current

    passenger-car fiscal-horsepower table, the amount per fiscal

    horsepower above 20 CV, the additional LPG circulation tax, and the

    oldtimer/minimum forfait amount. It excludes motorhomes, motorcycles,

    utility vehicles, heavy vehicles, trailers, buses, exemptions, and

    administrative collection rules.'
  source_verification:
    corpus_citation_path: "be-wal/statute/wallex/code-taxes-assimilees/vehicle-tax-current/block-1"
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
- name: wallonia_circulation_tax_cv_0_to_4_amount
  kind: parameter
  dtype: Money
  unit: EUR
  source: SPW Finances annual circulation-tax table, passenger cars, 4 fiscal horsepower
    and less
  metadata:
    proof:
      atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be-wal/statute/spw-finances/vehicle-tax/circulation-tax-2026-2027/page-1
            excerpt: "107,18 €"
  versions:
