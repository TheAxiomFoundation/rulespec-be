- name: wallonia_tmc_energy_coefficient
  kind: derived
  entity: Vehicle
  dtype: Rate
  period: Year
  source: Walloon decree of 30 May 2025, article 1, fuel/energy coefficient table
  versions:
  - effective_from: '2025-07-01'
    formula: "if wallonia_tmc_is_electric_or_hydrogen:\n    if wallonia_tmc_engine_power_kw\
      \ <= wallonia_tmc_energy_coefficient_scalar_limit:\n        wallonia_tmc_electric_power_120_kw_or_less_coefficient\n\
      \    else:\n        if wallonia_tmc_engine_power_kw <= wallonia_tmc_energy_coefficient_scalar_limit_2:\n\
      \            wallonia_tmc_electric_power_121_to_155_kw_coefficient\n       \
      \ else:\n            if wallonia_tmc_engine_power_kw <= wallonia_tmc_energy_coefficient_scalar_limit_3:\n\
      \                wallonia_tmc_electric_power_156_to_249_kw_coefficient\n   \
      \         else:\n                wallonia_tmc_electric_power_250_kw_or_more_coefficient\n\
      else:\n    if wallonia_tmc_is_hybrid:\n        wallonia_tmc_hybrid_coefficient\n\
      \    else:\n        wallonia_tmc_other_fuel_coefficient"
