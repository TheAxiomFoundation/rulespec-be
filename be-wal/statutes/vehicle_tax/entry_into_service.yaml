  unit: EUR
  source: Walloon Code des taxes assimilees article 98 paragraph 2 A and SPW Finances
    indexed table
  versions:
  - effective_from: '2026-07-01'
    formula: "if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit:\n\
      \    wallonia_tmc_base_amount_kw_0_to_70\nelse:\n    if wallonia_tmc_engine_power_kw\
      \ <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_2:\n        wallonia_tmc_base_amount_kw_71_to_85\n\
      \    else:\n        if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_3:\n\
      \            wallonia_tmc_base_amount_kw_86_to_100\n        else:\n        \
      \    if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_4:\n\
      \                wallonia_tmc_base_amount_kw_101_to_110\n            else:\n\
      \                if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_5:\n\
      \                    wallonia_tmc_base_amount_kw_111_to_120\n              \
      \  else:\n                    if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_6:\n\
      \                        wallonia_tmc_base_amount_kw_121_to_155\n          \
      \          else:\n                        wallonia_tmc_base_amount_kw_above_155"
