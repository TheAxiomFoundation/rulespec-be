      \  else:\n                    if wallonia_tmc_engine_power_kw <= wallonia_tmc_base_amount_by_engine_power_scalar_limit_6:\n\
      \                        wallonia_tmc_base_amount_kw_121_to_155\n          \
      \          else:\n                        wallonia_tmc_base_amount_kw_above_155"
