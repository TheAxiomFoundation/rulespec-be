    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 future 2028 table II uncle/aunt and nephew/niece column
    versions:
      - effective_from: '2028-01-01'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.13
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  1625 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.15
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 75000:
                      3500 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.20
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 175000:
                          13500 + (wallonia_inheritance_tax_taxable_acquisition - 75000) * 0.28
                      else:
                          41500 + (wallonia_inheritance_tax_taxable_acquisition - 175000) * 0.35
  - name: wallonia_inheritance_tax_2028_other_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 future 2028 table III other-person column
    versions:
      - effective_from: '2028-01-01'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.15
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  1875 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.18
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 75000:
                      4125 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.30
                  else:
