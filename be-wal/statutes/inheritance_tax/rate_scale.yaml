- name: wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax
  kind: derived
  entity: EstateBeneficiary
  dtype: Money
  period: Year
  unit: EUR
  source: Walloon succession-duty code article 48 current table I
  versions:
  - effective_from: '2009-12-23'
    formula: "if wallonia_inheritance_tax_taxable_acquisition <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit:\n\
      \    wallonia_inheritance_tax_taxable_acquisition * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_2\n\
      else:\n    if wallonia_inheritance_tax_taxable_acquisition <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_3:\n\
      \        wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_5\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_4\n\
      \    else:\n        if wallonia_inheritance_tax_taxable_acquisition <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_6:\n\
      \            wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_8\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_3)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_7\n\
      \        else:\n            if wallonia_inheritance_tax_taxable_acquisition\
      \ <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_9:\n\
      \                wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_11\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_6)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_10\n\
      \            else:\n                if wallonia_inheritance_tax_taxable_acquisition\
      \ <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_12:\n\
      \                    wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_14\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_9)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_13\n\
      \                else:\n                    if wallonia_inheritance_tax_taxable_acquisition\
      \ <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_15:\n\
      \                        wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_17\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_12)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_16\n\
      \                    else:\n                        if wallonia_inheritance_tax_taxable_acquisition\
      \ <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_18:\n\
      \                            wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_20\
      \ + (wallonia_inheritance_tax_taxable_acquisition - wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_15)\
      \ * wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_19\n\
      \                        else:\n                            if wallonia_inheritance_tax_taxable_acquisition\
      \ <= wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_21:\n\
      \                                wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax_scalar_limit_23\
