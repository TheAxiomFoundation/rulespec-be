format: rulespec/v1
module:
  summary: |-
    Walloon Code des droits de succession article 48 contains current
    inheritance-tax rate tables and future 2028 tables. This module encodes the
    current table applicable for 2026 and the future table applying to deaths
    from 1 January 2028: direct-line/spouse/legal-cohabitant, siblings,
    uncle-aunt/nephew-niece, and all other beneficiaries. It does not model
    abatements, exemptions, reduced rates, article-54 interactions, filing, or
    debt deductibility.
  source_verification:
    corpus_citation_paths:
      - be-wal/statute/fisconetplus/succession-code/article-48/guid-ca2f583c-67d6-4b0a-80fe-9d718adf1a1f/block-1
    values:
      wallonia_inheritance_tax_direct_first_threshold: 12500
      wallonia_inheritance_tax_direct_top_threshold: 500000
      wallonia_inheritance_tax_direct_first_rate: "0.03"
      wallonia_inheritance_tax_direct_top_rate: "0.30"
      wallonia_inheritance_tax_sibling_first_rate: "0.20"
      wallonia_inheritance_tax_sibling_top_rate: "0.65"
      wallonia_inheritance_tax_uncle_aunt_nephew_niece_top_rate: "0.70"
      wallonia_inheritance_tax_other_top_rate: "0.80"
      wallonia_inheritance_tax_2028_direct_top_rate: "0.15"
      wallonia_inheritance_tax_2028_sibling_top_rate: "0.33"
      wallonia_inheritance_tax_2028_uncle_aunt_nephew_niece_top_rate: "0.35"
      wallonia_inheritance_tax_2028_other_top_rate: "0.40"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: wallonia_inheritance_tax_relationship_direct_spouse_or_legal_cohabitant
    kind: parameter
    dtype: Count
    source: Structural selector for Walloon succession-duty code article 48 table I
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          0
  - name: wallonia_inheritance_tax_relationship_sibling
    kind: parameter
    dtype: Count
    source: Structural selector for Walloon succession-duty code article 48 table II siblings
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          1
  - name: wallonia_inheritance_tax_relationship_uncle_aunt_nephew_niece
    kind: parameter
    dtype: Count
    source: Structural selector for Walloon succession-duty code article 48 table II uncle/aunt column
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          2
  - name: wallonia_inheritance_tax_relationship_other
    kind: parameter
    dtype: Count
    source: Structural selector for Walloon succession-duty code article 48 table II other-person column
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          3
  - name: wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 current table I
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.03
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  375 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.04
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 50000:
                      875 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.05
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 100000:
                          2125 + (wallonia_inheritance_tax_taxable_acquisition - 50000) * 0.07
                      else:
                          if wallonia_inheritance_tax_taxable_acquisition <= 150000:
                              5625 + (wallonia_inheritance_tax_taxable_acquisition - 100000) * 0.10
                          else:
                              if wallonia_inheritance_tax_taxable_acquisition <= 200000:
                                  10625 + (wallonia_inheritance_tax_taxable_acquisition - 150000) * 0.14
                              else:
                                  if wallonia_inheritance_tax_taxable_acquisition <= 250000:
                                      17625 + (wallonia_inheritance_tax_taxable_acquisition - 200000) * 0.18
                                  else:
                                      if wallonia_inheritance_tax_taxable_acquisition <= 500000:
                                          26625 + (wallonia_inheritance_tax_taxable_acquisition - 250000) * 0.24
                                      else:
                                          86625 + (wallonia_inheritance_tax_taxable_acquisition - 500000) * 0.30
  - name: wallonia_inheritance_tax_sibling_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 current table II sibling column
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.20
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  2500 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.25
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 75000:
                      5625 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.35
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 175000:
                          23125 + (wallonia_inheritance_tax_taxable_acquisition - 75000) * 0.50
                      else:
                          73125 + (wallonia_inheritance_tax_taxable_acquisition - 175000) * 0.65
  - name: wallonia_inheritance_tax_uncle_aunt_nephew_niece_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 current table II uncle/aunt and nephew/niece column
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.25
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  3125 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.30
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 75000:
                      6875 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.40
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 175000:
                          26875 + (wallonia_inheritance_tax_taxable_acquisition - 75000) * 0.55
                      else:
                          81875 + (wallonia_inheritance_tax_taxable_acquisition - 175000) * 0.70
  - name: wallonia_inheritance_tax_other_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 current table II other-person column
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.30
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  3750 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.35
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 75000:
                      8125 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.60
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 175000:
                          38125 + (wallonia_inheritance_tax_taxable_acquisition - 75000) * 0.80
                      else:
                          118125 + (wallonia_inheritance_tax_taxable_acquisition - 175000) * 0.80
  - name: wallonia_inheritance_tax_article_48_current_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 current table
    versions:
      - effective_from: '2009-12-23'
        formula: |-
          if wallonia_inheritance_tax_relationship_class == wallonia_inheritance_tax_relationship_direct_spouse_or_legal_cohabitant:
              wallonia_inheritance_tax_direct_spouse_or_legal_cohabitant_tax
          else:
              if wallonia_inheritance_tax_relationship_class == wallonia_inheritance_tax_relationship_sibling:
                  wallonia_inheritance_tax_sibling_tax
              else:
                  if wallonia_inheritance_tax_relationship_class == wallonia_inheritance_tax_relationship_uncle_aunt_nephew_niece:
                      wallonia_inheritance_tax_uncle_aunt_nephew_niece_tax
                  else:
                      wallonia_inheritance_tax_other_tax
  - name: wallonia_inheritance_tax_2028_direct_spouse_or_legal_cohabitant_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon succession-duty code article 48 future 2028 table I
    versions:
      - effective_from: '2028-01-01'
        formula: |-
          if wallonia_inheritance_tax_taxable_acquisition <= 12500:
              wallonia_inheritance_tax_taxable_acquisition * 0.03
          else:
              if wallonia_inheritance_tax_taxable_acquisition <= 25000:
                  375 + (wallonia_inheritance_tax_taxable_acquisition - 12500) * 0.04
              else:
                  if wallonia_inheritance_tax_taxable_acquisition <= 150000:
                      875 + (wallonia_inheritance_tax_taxable_acquisition - 25000) * 0.05
                  else:
                      if wallonia_inheritance_tax_taxable_acquisition <= 200000:
                          7125 + (wallonia_inheritance_tax_taxable_acquisition - 150000) * 0.07
                      else:
                          if wallonia_inheritance_tax_taxable_acquisition <= 250000:
                              10625 + (wallonia_inheritance_tax_taxable_acquisition - 200000) * 0.09
                          else:
                              if wallonia_inheritance_tax_taxable_acquisition <= 500000:
                                  15125 + (wallonia_inheritance_tax_taxable_acquisition - 250000) * 0.12
                              else:
                                  45125 + (wallonia_inheritance_tax_taxable_acquisition - 500000) * 0.15
  - name: wallonia_inheritance_tax_2028_sibling_tax
