format: rulespec/v1
module:
  summary: 'Walloon Code des droits de succession article 48 contains current

    inheritance-tax rate tables and future 2028 tables. This module encodes the

    current table applicable for 2026 and the future table applying to deaths

    from 1 January 2028: direct-line/spouse/legal-cohabitant, siblings,

    uncle-aunt/nephew-niece, and all other beneficiaries. It does not model

    abatements, exemptions, reduced rates, article-54 interactions, filing, or

    debt deductibility.'
  source_verification:
    corpus_citation_paths:
    - be-wal/statute/fisconetplus/succession-code/article-48/guid-ca2f583c-67d6-4b0a-80fe-9d718adf1a1f/block-1
units:
- name: EUR
  kind: currency
  minor_units: 2
