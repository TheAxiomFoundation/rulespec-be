          excerpt: "inclus a b 0,01 EUR 12.500,00 EUR 15 % - 12.500,01 EUR 25.000,00 EUR 18 % 1.875,00 EUR 25.000,01 EUR 75.000,00 EUR 30 % 4.125,00 EUR Au-delà de 75.000 EUR 40 % 19.125,00 EUR ----- CHAPITRE VI - Tarif des droits Section première - Tarif général Article 48 (applicable à partir du 23.12.2009) (modifié par l’art 46 du décret du 10.12.2009 (M.B., 23.12.2009). Texte applicable à partir du 23.12.2009 (art. 48)) Les droits de succession et de mutation par décès sont perçus sur la part nette de chacun des ayants droit d’après le tarif indiqué dans les tableaux ci ‑ après."
