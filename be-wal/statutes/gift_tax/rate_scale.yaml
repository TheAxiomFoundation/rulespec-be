          excerpt: "Article 131 du Code des droits d'enregistrement - Région wallonne DROIT FUTUR (à partir du 01.01.2028) Section XII - Donations Sous-section première - Dispositions générales Article 131 (applicable à partir du 01.01.2028 ) (remplacé par l’art. 21 du décret du 05.12.2024 (M.B., 13.12.2024). Texte applicable aux actes authentiques passés à partir du 01.01.2028 (art. 30)) Pour les donations entre vifs de biens immeubles, il est perçu un droit proportionnel sur l'émolument brut de chacun des donataires d'après le tarif indiqué dans le tableau ci-après. Celui-ci mentionne : - sous la lettre a : le pourcentage applicable à la tranche correspondante ; - sous la lettre b : le montant total de l'impôt sur les tranches précédentes. Tranche de la donation Ligne directe, entre époux et entre cohabitants légaux Entre autres personnes De à inclus a b a b 0,01 EUR 150.000,00 EUR 3 % - 9 % - 150.000,01 EUR 250.000,00 EUR 6 % 4.500,00 EUR 12 % 13.500,00 EUR 250.000,01 450.000,00 EUR 10 % 10.500,00 EUR 16 % 25.500,00 EUR Au-delà de 450.000,00 EUR 14 % 30.500,00 EUR 20 % 57.500,00 EUR Pour l'application de la présente section, on entend par : - époux ou conjoint : la personne qui, au moment de la donation, était dans une relation de mariage avec le donateur conformément aux dispositions du Livre premier, Titre V, du Code civil, ainsi que la personne qui, au moment de la donation, était dans une"
