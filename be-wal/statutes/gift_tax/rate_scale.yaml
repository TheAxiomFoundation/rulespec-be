format: rulespec/v1
module:
  summary: 'Walloon Code des droits d''enregistrement articles 131 and 131bis set
    the

    current and future gift-tax rates for immovable gifts, and article 131bis

    sets movable-gift rates. This module encodes the 2026 current immovable

    rate table, the future immovable-gift table applying from 1 January 2028,

    and movable-gift rates from article 131bis, with article-131bis exclusions

    for donor-death suspensive conditions or terms assimilated to succession

    duty. It excludes business donations, exemptions, notarial procedure, and

    anti-avoidance rules.'
  source_verification:
    corpus_citation_path: "be-wal/statute/fisconetplus/registration-code/article-131/guid-28aaa269-5a52-4081-b97d-b9a0bb83c305/block-1"
units:
- name: EUR
  kind: currency
  minor_units: 2
