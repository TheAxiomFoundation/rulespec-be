- name: wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit
  kind: parameter
  dtype: Count
  source: Walloon registration-duty code article 131 current direct/spouse/legal-cohabitant
    column
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be-wal/statute/fisconetplus/registration-code/article-131/guid-28aaa269-5a52-4081-b97d-b9a0bb83c305/block-1
          excerpt: "Tranche de la donation Ligne directe, entre époux et entre cohabitants légaux Entre autres personnes De à inclus a b a b 0,01 EUR 150.000,00 EUR 3 % - 9 % - 150.000,01 EUR 250.000,00 EUR 6 % 4.500,00 EUR 12 % 13.500,00 EUR 250.000,01 450.000,00 EUR 10 % 10.500,00 EUR 16 % 25.500,00 EUR Au-delà de 450.000,00 EUR 14 % 30.500,00 EUR 20 % 57.500,00 EUR Pour l'application de la présente section, on entend par : - époux ou conjoint : la personne qui, au moment de la donation, était dans une relation de mariage avec le donateur conformément aux dispositions du Livre premier, Titre V, du Code civil, ainsi que la personne qui, au moment de la donation, était dans une relation de mariage avec le donateur conformément au chapitre III du Code de droit international privé ; - cohabitant légal : la personne qui, au moment de la donation, était domiciliée avec le donateur et était avec lui dans une relation de cohabitation légale conformément aux dispositions du Livre III, Titre V bis , du Code civil, ainsi que la personne qui, au moment de la donation, était domiciliée ou avait sa résidence habituelle avec le donateur, au sens de l'article 4 du Code de Droit international privé, et était avec lui dans une relation de vie commune conformément au Chapitre IV du même Code. ----- Section XII - Donations Sous-section première - Dispositions générales Article 131 ( applicable à partir du 03.09.2018) (remplacé par l’art."
  versions:
  - effective_from: '2022-01-01'
    formula: '150000'
