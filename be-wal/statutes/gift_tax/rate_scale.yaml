  period: Year
  unit: EUR
  source: Walloon registration-duty code article 131 current direct/spouse/legal-cohabitant
    column
  versions:
  - effective_from: '2022-01-01'
    formula: "if wallonia_gift_tax_taxable_amount <= wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit:\n\
      \    wallonia_gift_tax_taxable_amount * wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_2\n\
      else:\n    if wallonia_gift_tax_taxable_amount <= wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_3:\n\
      \        wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_5\
      \ + (wallonia_gift_tax_taxable_amount - wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit)\
      \ * wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_4\n\
      \    else:\n        if wallonia_gift_tax_taxable_amount <= wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_6:\n\
      \            wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_8\
      \ + (wallonia_gift_tax_taxable_amount - wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_3)\
      \ * wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_7\n\
      \        else:\n            wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_10\
      \ + (wallonia_gift_tax_taxable_amount - wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_6)\
      \ * wallonia_gift_tax_immovable_direct_spouse_or_legal_cohabitant_tax_scalar_limit_9"
