      \ and (brussels_housing_relocation_applicant_age_years >= brussels_housing_relocation_applicant_conditions_met_scalar_limit\
      \ or brussels_housing_relocation_applicant_emancipated or brussels_housing_relocation_applicant_minor_in_autonomy)\
      \ and brussels_housing_relocation_registered_and_domiciled_at_new_dwelling and\
      \ brussels_housing_relocation_months_since_new_housing_start <= brussels_housing_relocation_recent_move_window_months\
      \ and brussels_housing_relocation_registered_social_housing_candidate and brussels_housing_relocation_qualifying_trigger_met\
      \ == 1 and not brussels_housing_household_receives_incompatible_article_11_165_or_166_rent_intervention\
      \ and not brussels_housing_relocation_prior_period_exhausted:\n    1\nelse:\n\
      \    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-bru:regulations/housing/rent_and_relocation_allowances#brussels_housing_relocation_applicant_conditions_met_scalar_limit
          output: brussels_housing_relocation_applicant_conditions_met_scalar_limit
          hash: sha256:local
- name: brussels_housing_relocation_housing_conditions_met
  kind: derived
