- name: brussels_housing_rent_allowance_priority_condition_met
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 3 section 2 items 5 and 6
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_rent_allowance_single_parent_applicant:\n    if\
      \ brussels_housing_rent_allowance_priority_title_count >= brussels_housing_rent_allowance_single_parent_priority_titles_min:\n\
      \        1\n    else:\n        0\nelse:\n    if brussels_housing_rent_allowance_priority_title_count\
      \ >= brussels_housing_rent_allowance_standard_priority_titles_min:\n       \
      \ 1\n    else:\n        0"
- name: brussels_housing_rent_allowance_applicant_conditions_met_scalar_limit
