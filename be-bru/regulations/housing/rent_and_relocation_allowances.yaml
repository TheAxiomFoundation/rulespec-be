    formula: "if brussels_housing_rent_allowance_single_parent_applicant and not brussels_housing_household_income_at_or_below_social_integration_category_3_threshold:\n\
      \    brussels_housing_rent_allowance_lower_single_parent_base_monthly_amount\n\
      else:\n    brussels_housing_rent_allowance_standard_base_monthly_amount"
- name: brussels_housing_rent_allowance_child_increment_monthly_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: EUR
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 4 section 3
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_rent_allowance_single_parent_applicant:\n    brussels_housing_rent_allowance_single_parent_child_monthly_increment\
      \ * brussels_housing_child_count\nelse:\n    brussels_housing_rent_allowance_child_monthly_increment\
      \ * brussels_housing_child_count"
- name: brussels_housing_rent_allowance_uncapped_indexed_monthly_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: EUR
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 4 with article 29 indexation
  versions:
  - effective_from: '2021-10-11'
    formula: (brussels_housing_rent_allowance_base_monthly_amount + brussels_housing_rent_allowance_child_increment_monthly_amount)
      * brussels_housing_rent_allowance_current_index_factor
- name: brussels_housing_rent_allowance_monthly_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: EUR
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    articles 2, 3, 4, and 29
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_rent_allowance_eligibility == 1:\n    min(brussels_housing_monthly_rent_at_lease_start,\
      \ brussels_housing_rent_allowance_uncapped_indexed_monthly_amount)\nelse:\n\
      \    0"
- name: brussels_housing_relocation_qualifying_trigger_met
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: Brussels Government order of 13 October 2022 on relocation accompaniment
    allowance, article 3 section 2 item 6
