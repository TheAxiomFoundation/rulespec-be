    formula: "if (brussels_housing_principal_residence_lease or brussels_housing_transit_housing_occupancy_agreement)\
      \ and brussels_housing_rented_dwelling_in_brussels and (brussels_housing_transit_housing_occupancy_agreement\
      \ or (not brussels_housing_dwelling_managed_by_public_social_housing_or_social_rental_agency\
      \ and not brussels_housing_dwelling_has_socialized_public_housing_rent)) and\
      \ not brussels_housing_dwelling_owned_by_close_relative:\n    1\nelse:\n   \
