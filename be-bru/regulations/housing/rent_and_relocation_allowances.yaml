  - effective_from: '2023-02-01'
    formula: "if brussels_housing_relocation_had_cpas_installation_premium_or_homeless_assistance\
      \ or brussels_housing_relocation_had_domestic_violence_or_youth_service_pathway\
      \ or brussels_housing_relocation_left_banned_or_uninhabitable_brussels_dwelling:\n\
