format: rulespec/v1
module:
  summary: 'The Brussels Housing Code authorizes household housing aids, including
    rent

    and moving/rent support, while the Brussels Government orders of 15 July

    2021 and 13 October 2022 set the current rent allowance and relocation

    accompaniment allowance gates. This module encodes the household-facing

    eligibility gates, statutory/regulatory base amounts, child increments,

    rent caps, ordinary durations, and one-time moving grant surface. It leaves

    social-integration and increased-intervention income-threshold euro tables,

    index-factor calculation, source-data matching, documentary proof, appeal,

    recovery, and other Brussels housing aids to separate surfaces.'
  source_verification:
    corpus_citation_path: "be-bru/statute/ordonnance/2003/07/17/2013A31614/article/165"
units:
- name: EUR
  kind: currency
  minor_units: 2
