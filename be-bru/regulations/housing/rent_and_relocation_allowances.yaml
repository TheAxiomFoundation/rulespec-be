    article 3 section 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be-bru/regulation/arrete/2021/07/15/2021032702/article/3
          excerpt: "le demandeur doit être âgé de 18 ans au moins, être émancipé ou mineur mis en autonomie"
  versions:
  - effective_from: '2021-10-11'
    formula: '18'
- name: brussels_housing_rent_allowance_applicant_conditions_met
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 3 section 2
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_rent_allowance_household_income_at_or_below_applicable_threshold\
      \ and (brussels_housing_rent_allowance_applicant_age_years >= brussels_housing_rent_allowance_applicant_conditions_met_scalar_limit\
      \ or brussels_housing_rent_allowance_applicant_emancipated or brussels_housing_rent_allowance_applicant_minor_in_autonomy)\
      \ and not brussels_housing_household_has_disqualifying_property_right and brussels_housing_rent_allowance_registered_and_domiciled_at_rented_dwelling\
      \ and brussels_housing_rent_allowance_priority_condition_met == 1 and not brussels_housing_rent_allowance_prior_periods_exhausted\
      \ and not brussels_housing_household_receives_incompatible_article_11_165_or_166_rent_intervention:\n\
      \    1\nelse:\n    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-bru:regulations/housing/rent_and_relocation_allowances#brussels_housing_rent_allowance_applicant_conditions_met_scalar_limit
          output: brussels_housing_rent_allowance_applicant_conditions_met_scalar_limit
          hash: sha256:local
- name: brussels_housing_rent_allowance_housing_conditions_met
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 3 section 3
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_principal_residence_lease and brussels_housing_rented_dwelling_in_brussels\
      \ and not brussels_housing_dwelling_managed_by_public_social_housing_or_social_rental_agency\
      \ and not brussels_housing_dwelling_owned_by_close_relative and not brussels_housing_dwelling_has_socialized_public_housing_rent:\n\
      \    1\nelse:\n    0"
- name: brussels_housing_rent_allowance_eligibility
  kind: derived
  entity: Household
  dtype: Count
  period: Month
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    articles 2 and 3
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_rent_allowance_applicant_conditions_met == 1 and\
      \ brussels_housing_rent_allowance_housing_conditions_met == 1:\n    1\nelse:\n\
      \    0"
- name: brussels_housing_rent_allowance_regular_maximum_benefit_years
  kind: derived
  entity: Household
  dtype: Count
  period: Year
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 5 sections 1 and 2
  versions:
  - effective_from: '2021-10-11'
    formula: brussels_housing_rent_allowance_benefit_period_years * (1 + brussels_housing_rent_allowance_regular_renewal_count)
- name: brussels_housing_rent_allowance_indefinite_renewal_allowed
  kind: derived
  entity: Household
  dtype: Count
  period: Year
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 5 section 2 second paragraph
  versions:
  - effective_from: '2021-10-11'
    formula: "if brussels_housing_household_has_member_age_65_or_older or brussels_housing_household_has_disabled_member:\n\
      \    1\nelse:\n    0"
- name: brussels_housing_rent_allowance_base_monthly_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Month
  unit: EUR
  source: Brussels Government order of 15 July 2021 establishing a rent allowance,
    article 4 section 2
  versions:
