format: rulespec/v1
module:
  summary: 'The Brussels-Capital Region Government order of 26 September 1996

    organizes rental of dwellings managed by the Brussels Regional Housing

    Company or public-service real-estate companies. This module encodes

    household-facing social-housing rental surfaces from the consolidated

    order: social, moderate, and medium admission income bands; priority-title

    arithmetic; adapted-bedroom comparison and mutation eligibility; rental

    guarantee bounds; the annual social-rent formula through Article 61 floors

    and caps; over-adapted and energy rent complements; selected lease-duration

    protections; and the Article 57 adapted-move rent reduction. It leaves

    documentary proof, register administration, exact child-room pairing from

    person-level sex/age arrays, SLRB circular parameters, ministerial

    definitions, sanctions, and procedure to separate surfaces.'
  source_verification:
    corpus_citation_paths:
