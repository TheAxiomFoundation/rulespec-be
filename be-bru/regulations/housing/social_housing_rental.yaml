- name: brussels_social_housing_admission_base_annual_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels-Capital Region Government order of 26 September 1996 on social-housing
    rental, article 31 first to third paragraphs
  versions:
  - effective_from: '2016-12-08'
    formula: "if brussels_social_housing_household_member_count <= 1:\n    brussels_social_housing_single_admission_base_annual_amount\n\
      else:\n    if brussels_social_housing_household_income_count <= 1:\n       \
      \ brussels_social_housing_multi_one_income_admission_base_annual_amount\n  \
      \  else:\n        brussels_social_housing_multi_two_or_more_income_admission_base_annual_amount"
- name: brussels_social_housing_admission_increment_annual_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels-Capital Region Government order of 26 September 1996 on social-housing
    rental, article 31 fourth paragraph and article 2 items 9 and 10
  versions:
  - effective_from: '2016-12-08'
    formula: brussels_social_housing_dependent_child_admission_increment * brussels_social_housing_weighted_dependent_child_count
      + brussels_social_housing_adult_disabled_person_admission_increment * brussels_social_housing_adult_disabled_person_count
- name: brussels_social_housing_admission_ceiling_annual_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels-Capital Region Government order of 26 September 1996 on social-housing
    rental, article 31 with article 30 indexation
  versions:
  - effective_from: '2016-12-08'
    formula: (brussels_social_housing_admission_base_annual_amount + brussels_social_housing_admission_increment_annual_amount)
      * brussels_social_housing_current_article_30_index_factor
- name: brussels_social_housing_selected_admission_income_annual_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels-Capital Region Government order of 26 September 1996 on social-housing
    rental, article 31 fifth paragraph
  versions:
  - effective_from: '2016-12-08'
    formula: "if brussels_social_housing_reference_admission_income_annual_amount\
      \ > brussels_social_housing_admission_ceiling_annual_amount and brussels_social_housing_current_income_reduced_at_application:\n\
      \    brussels_social_housing_current_admission_income_annual_amount\nelse:\n\
      \    brussels_social_housing_reference_admission_income_annual_amount"
- name: brussels_social_housing_admission_eligibility
