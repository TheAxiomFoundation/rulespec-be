format: rulespec/v1
module:
  summary: 'Brussels-Capital Code des droits de succession article 48 sets the current

    inheritance-tax rate scale. This module encodes the main rate tables for

    direct-line/partner beneficiaries, siblings, uncle-aunt/nephew-niece

    beneficiaries, and all other beneficiaries. It does not model exemptions,

    reduced rates, partner-home rules, filing, debt deductibility, or grouping

    beyond the relationship-class selector.'
  source_verification:
    corpus_citation_path: "be-bru/statute/fisconetplus/succession-code/article-48/guid-d54670a2-10a7-456e-9d68-5fd1d991fb05/block-1"
units:
- name: EUR
  kind: currency
  minor_units: 2
