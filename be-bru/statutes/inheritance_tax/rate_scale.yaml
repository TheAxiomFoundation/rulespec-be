          excerpt: "Article 48 du Code des droits de succession - Région de Bruxelles-Capitale CHAPITRE VI - Tarif des droits Section première - Tarif général Article 48 ( applicable à partir du 01.01.2024 ) (modifié par l’art. 4 de l’ordonnance du 06.07.2023 (M.B., 27.09.2023) . Texte applicable à partir du 01.01.2024 et aux successions ouvertes à partir de cette date (art. 18)) Les droits de succession et de mutation par décès sont perçus d'après le tarif indiqué dans les tableaux ci-après. Le tableau I contient le tarif applicable en ligne directe, et entre partenaires . Ce tarif est appliqué par ayant droit sur sa part dans la valeur des biens imposables. Le tableau II contient le tarif applicable entre les frères et sœurs. Ce tarif est appliqué par ayant droit sur sa part dans la valeur imposable des biens. Le tableau III contient le tarif applicable entre les oncles ou tantes et neveux ou nièces. Ce"
