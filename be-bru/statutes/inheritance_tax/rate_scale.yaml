- name: brussels_inheritance_tax_direct_or_partner_tax
  kind: derived
  entity: EstateBeneficiary
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels succession-duty code article 48 table I
  versions:
  - effective_from: '2024-01-01'
    formula: "if brussels_inheritance_tax_taxable_acquisition <= brussels_inheritance_tax_direct_or_partner_tax_scalar_limit:\n\
      \    brussels_inheritance_tax_taxable_acquisition * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_2\n\
      else:\n    if brussels_inheritance_tax_taxable_acquisition <= brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_3:\n\
      \        brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_5 + (brussels_inheritance_tax_taxable_acquisition\
      \ - brussels_inheritance_tax_direct_or_partner_tax_scalar_limit) * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_4\n\
      \    else:\n        if brussels_inheritance_tax_taxable_acquisition <= brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_6:\n\
      \            brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_8 +\
      \ (brussels_inheritance_tax_taxable_acquisition - brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_3)\
      \ * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_7\n        else:\n\
      \            if brussels_inheritance_tax_taxable_acquisition <= brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_9:\n\
      \                brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_11\
      \ + (brussels_inheritance_tax_taxable_acquisition - brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_6)\
      \ * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_10\n       \
      \     else:\n                if brussels_inheritance_tax_taxable_acquisition\
      \ <= brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_12:\n     \
      \               brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_14\
      \ + (brussels_inheritance_tax_taxable_acquisition - brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_9)\
      \ * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_13\n       \
      \         else:\n                    brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_16\
      \ + (brussels_inheritance_tax_taxable_acquisition - brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_12)\
      \ * brussels_inheritance_tax_direct_or_partner_tax_scalar_limit_15"
