  versions:
  - effective_from: '2024-01-01'
    formula: "if brussels_gift_tax_taxable_amount <= brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit:\n\
      \    brussels_gift_tax_taxable_amount * brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_2\n\
      else:\n    if brussels_gift_tax_taxable_amount <= brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_3:\n\
      \        brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_5 +\
      \ (brussels_gift_tax_taxable_amount - brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit)\
      \ * brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_4\n    else:\n\
      \        if brussels_gift_tax_taxable_amount <= brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_6:\n\
      \            brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_8\
      \ + (brussels_gift_tax_taxable_amount - brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_3)\
      \ * brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_7\n     \
      \   else:\n            brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_10\
      \ + (brussels_gift_tax_taxable_amount - brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_6)\
      \ * brussels_gift_tax_immovable_direct_or_partner_tax_scalar_limit_9"
