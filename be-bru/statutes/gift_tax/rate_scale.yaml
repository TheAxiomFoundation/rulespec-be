format: rulespec/v1
module:
  summary: 'Brussels-Capital Code des droits d''enregistrement article 131 sets current

    gift-tax rates for immovable and movable gifts, and article 131bis exempts

    qualifying prior movable gifts mentioned in a successoral pact or Civil

    Code article 4.84 agreement. This module encodes the main

    direct-line/partner and other-person rate tables, the article-131 movable

    gift exclusion for donor-death suspensive conditions assimilated to

    succession duty, and the article-131bis movable-gift exemption gate. It

    excludes notarial procedure, business transfer regimes, anti-avoidance

    rules, and special reduced rates.'
  source_verification:
    corpus_citation_path: "be-bru/statute/fisconetplus/registration-code/article-131/guid-1f30bae2-f6ab-441f-85c4-9f7bb2d0ae72/block-1"
