- name: brussels_gift_tax_article_131_tax
  kind: derived
  entity: Gift
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels registration-duty code article 131
  versions:
  - effective_from: '2024-01-01'
    formula: "if brussels_gift_tax_is_movable_property:\n    brussels_gift_tax_movable_tax\n\
      else:\n    if brussels_gift_tax_relationship_class == brussels_gift_tax_relationship_direct_or_partner:\n\
      \        brussels_gift_tax_immovable_direct_or_partner_tax\n    else:\n    \
      \    brussels_gift_tax_immovable_other_tax"
- name: brussels_gift_tax_article_131bis_successoral_pact_movable_gift_exemption_applies
  kind: derived
  entity: Gift
  dtype: Count
  period: Year
  source: Brussels registration-duty code article 131bis
  versions:
  - effective_from: '2022-07-01'
    formula: "if brussels_gift_tax_is_movable_property and brussels_gift_tax_movable_gift_mentioned_in_successoral_pact_or_article_484_agreement\
      \ and brussels_gift_tax_parties_declare_donation_prior_to_pact_or_agreement\
      \ and not brussels_gift_tax_parties_declare_mention_seeks_donation_title:\n\
      \    1\nelse:\n    0"
- name: brussels_gift_tax_article_131_movable_death_condition_exclusion_applies
  kind: derived
  entity: Gift
  dtype: Count
  period: Year
  source: Brussels registration-duty code article 131 paragraph 2 exclusion for movable
    gifts assimilated to succession duty
  versions:
  - effective_from: '2024-01-01'
    formula: "if brussels_gift_tax_is_movable_property and brussels_gift_tax_movable_gift_suspensive_condition_realized_by_donor_death_assimilated_to_legacy:\n\
      \    1\nelse:\n    0"
- name: brussels_gift_tax_articles_131_131bis_tax
  kind: derived
  entity: Gift
  dtype: Money
  period: Year
  unit: EUR
  source: Brussels registration-duty code articles 131 and 131bis
  versions:
  - effective_from: '2024-01-01'
    formula: "if brussels_gift_tax_is_movable_property:\n    if brussels_gift_tax_article_131_movable_death_condition_exclusion_applies\
      \ == 1 or brussels_gift_tax_article_131bis_successoral_pact_movable_gift_exemption_applies\
      \ == 1:\n        0\n    else:\n        brussels_gift_tax_article_131_tax\nelse:\n\
      \    brussels_gift_tax_article_131_tax"
