  - name: brussels_family_benefits_article_9_social_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Brussels ordinance of 25 April 2019 regulating family benefits, article 9
    versions:
      - effective_from: '2021-09-01'
        formula: |-
          if brussels_family_benefits_social_supplement_cadastral_income_cap_exceeded:
              0
          else:
              if brussels_family_benefits_social_supplement_child_age_years > brussels_family_benefits_social_supplement_age_24_years:
                  0
              else:
                  if brussels_family_benefits_social_supplement_household_annual_income < brussels_family_benefits_social_supplement_low_income_upper_bound:
                      if brussels_family_benefits_social_supplement_beneficiary_child_count == brussels_family_benefits_social_supplement_one_child_family_size:
                          if brussels_family_benefits_social_supplement_child_age_years < brussels_family_benefits_social_supplement_age_12_years:
                              brussels_family_benefits_social_supplement_low_income_one_child_under_12_amount
                          else:
                              brussels_family_benefits_social_supplement_low_income_one_child_12_to_24_amount
                      else:
                          if brussels_family_benefits_social_supplement_beneficiary_child_count == brussels_family_benefits_social_supplement_two_child_family_size:
                              if brussels_family_benefits_social_supplement_child_age_years < brussels_family_benefits_social_supplement_age_12_years:
                                  if brussels_family_benefits_social_supplement_child_in_single_parent_family:
                                      brussels_family_benefits_social_supplement_low_income_two_child_single_parent_under_12_amount
                                  else:
                                      brussels_family_benefits_social_supplement_low_income_two_child_other_under_12_amount
                              else:
                                  if brussels_family_benefits_social_supplement_child_in_single_parent_family:
                                      brussels_family_benefits_social_supplement_low_income_two_child_single_parent_12_to_24_amount
                                  else:
                                      brussels_family_benefits_social_supplement_low_income_two_child_other_12_to_24_amount
                          else:
                              if brussels_family_benefits_social_supplement_child_age_years < brussels_family_benefits_social_supplement_age_12_years:
                                  if brussels_family_benefits_social_supplement_child_in_single_parent_family:
                                      brussels_family_benefits_social_supplement_low_income_three_plus_single_parent_under_12_amount
                                  else:
                                      brussels_family_benefits_social_supplement_low_income_three_plus_other_under_12_amount
                              else:
                                  if brussels_family_benefits_social_supplement_child_in_single_parent_family:
                                      brussels_family_benefits_social_supplement_low_income_three_plus_single_parent_12_to_24_amount
                                  else:
                                      brussels_family_benefits_social_supplement_low_income_three_plus_other_12_to_24_amount
                  else:
                      if brussels_family_benefits_social_supplement_household_annual_income < brussels_family_benefits_social_supplement_middle_income_upper_bound:
                          if brussels_family_benefits_social_supplement_beneficiary_child_count == brussels_family_benefits_social_supplement_two_child_family_size:
                              brussels_family_benefits_social_supplement_middle_income_two_child_amount
                          else:
                              if brussels_family_benefits_social_supplement_beneficiary_child_count >= brussels_family_benefits_social_supplement_three_child_family_size:
                                  brussels_family_benefits_social_supplement_middle_income_three_plus_amount
                              else:
                                  0
                      else:
                          0
