format: rulespec/v1
module:
  summary: |-
    Brussels family benefits ordinance article 9 sets monthly social
    supplements to the article 7(b) base family benefit. This module encodes
    the article 9 social supplement amount by household income band, beneficiary
    child count, child age band, single-parent status, and the cadastral-income
    exclusion.
  source_verification:
    corpus_citation_paths:
      - be-bru/statute/ordonnance/2019/04/25/2019012118/article/9
    values:
      brussels_family_benefits_social_supplement_age_12_years: "12"
      brussels_family_benefits_social_supplement_age_24_years: "24"
      brussels_family_benefits_social_supplement_one_child_family_size: "1"
      brussels_family_benefits_social_supplement_two_child_family_size: "2"
      brussels_family_benefits_social_supplement_three_child_family_size: "3"
      brussels_family_benefits_social_supplement_low_income_one_child_under_12_amount: "40"
      brussels_family_benefits_social_supplement_low_income_one_child_12_to_24_amount: "50"
      brussels_family_benefits_social_supplement_low_income_two_child_single_parent_under_12_amount: "80"
      brussels_family_benefits_social_supplement_low_income_two_child_other_under_12_amount: "70"
      brussels_family_benefits_social_supplement_low_income_two_child_single_parent_12_to_24_amount: "90"
      brussels_family_benefits_social_supplement_low_income_two_child_other_12_to_24_amount: "80"
      brussels_family_benefits_social_supplement_low_income_three_plus_single_parent_under_12_amount: "130"
      brussels_family_benefits_social_supplement_low_income_three_plus_other_under_12_amount: "110"
      brussels_family_benefits_social_supplement_low_income_three_plus_single_parent_12_to_24_amount: "140"
      brussels_family_benefits_social_supplement_low_income_three_plus_other_12_to_24_amount: "120"
      brussels_family_benefits_social_supplement_middle_income_two_child_amount: "25"
      brussels_family_benefits_social_supplement_middle_income_three_plus_amount: "72"
units:
  - name: EUR
    kind: currency
    minor_units: 2
