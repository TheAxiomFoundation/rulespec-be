  - name: brussels_circulation_tax_passenger_car_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Code des taxes assimilees aux impots sur les revenus articles 9 and 10, with Brussels Fiscality 2026 tariff sheet for current indexed amounts
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if brussels_vehicle_fiscal_power_cv <= brussels_circulation_tax_cv_0_to_4_max_fiscal_power:
              brussels_circulation_tax_cv_0_to_4_amount
          else:
              if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_5_fiscal_power:
                  brussels_circulation_tax_cv_5_amount
              else:
                  if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_6_fiscal_power:
                      brussels_circulation_tax_cv_6_amount
                  else:
                      if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_7_fiscal_power:
                          brussels_circulation_tax_cv_7_amount
                      else:
                          if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_8_fiscal_power:
                              brussels_circulation_tax_cv_8_amount
                          else:
                              if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_9_fiscal_power:
                                  brussels_circulation_tax_cv_9_amount
                              else:
                                  if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_10_fiscal_power:
                                      brussels_circulation_tax_cv_10_amount
                                  else:
                                      if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_11_fiscal_power:
                                          brussels_circulation_tax_cv_11_amount
                                      else:
                                          if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_12_fiscal_power:
                                              brussels_circulation_tax_cv_12_amount
                                          else:
                                              if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_13_fiscal_power:
                                                  brussels_circulation_tax_cv_13_amount
                                              else:
                                                  if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_14_fiscal_power:
                                                      brussels_circulation_tax_cv_14_amount
                                                  else:
                                                      if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_15_fiscal_power:
                                                          brussels_circulation_tax_cv_15_amount
                                                      else:
                                                          if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_16_fiscal_power:
                                                              brussels_circulation_tax_cv_16_amount
                                                          else:
                                                              if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_17_fiscal_power:
                                                                  brussels_circulation_tax_cv_17_amount
                                                              else:
                                                                  if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_18_fiscal_power:
                                                                      brussels_circulation_tax_cv_18_amount
                                                                  else:
                                                                      if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_19_fiscal_power:
                                                                          brussels_circulation_tax_cv_19_amount
                                                                      else:
                                                                          if brussels_vehicle_fiscal_power_cv == brussels_circulation_tax_cv_20_fiscal_power:
                                                                              brussels_circulation_tax_cv_20_amount
                                                                          else:
