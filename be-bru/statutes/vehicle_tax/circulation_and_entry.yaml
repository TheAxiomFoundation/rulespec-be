format: rulespec/v1
module:
  summary: |-
    Brussels vehicle-tax parameters for the annual circulation tax and public
    entry-into-service tax guardrails. This module covers the fiscal-power
    circulation-tax curve for passenger cars, mixed-use cars, and
    minibuses through 20 CV, plus the public motorcycle and TMC amounts from
    the Brussels Fiscality 2026 sheets. Detailed MyTax car and motorcycle TMC
    brackets are encoded in the companion entry_into_service_detailed module.
  source_verification:
    corpus_citation_path: "be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-1"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: brussels_vehicle_tax_zero_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Brussels Fiscality circulation-tax sheet, motorcycles up to 250 cc owe no circulation tax
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-7
            excerpt: "Exception : pour les motos pourvues d'un moteur d'une cylindrée de maximum 250 cm³, vous ne devez pas payer de taxe de circulation."
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          0
