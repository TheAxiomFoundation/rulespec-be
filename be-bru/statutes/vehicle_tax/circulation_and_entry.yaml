format: rulespec/v1
module:
  summary: |-
    Brussels vehicle-tax parameters for the annual circulation tax and public
    entry-into-service tax guardrails. This module covers the fiscal-power
    circulation-tax curve for passenger cars, mixed-use cars, and
    minibuses through 20 CV, plus the public motorcycle and TMC amounts from
    the Brussels Fiscality 2026 sheets. Detailed MyTax car and motorcycle TMC
    brackets are encoded in the companion entry_into_service_detailed module.
  source_verification:
    corpus_citation_paths:
      - be/statute/justel/code-taxes-assimilees/1965112350
      - be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-1
      - be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-5
      - be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-6
      - be-bru/guidance/brussels-fiscality/vehicle-tax/circulation-tax-2026/page-7
      - be-bru/guidance/brussels-fiscality/vehicle-tax/entry-into-service-tax-2026/page-1
      - be-bru/guidance/brussels-fiscality/vehicle-tax/entry-into-service-tax-2026/page-4
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - be/statute/justel/code-taxes-assimilees/1965112350
      rationale: |-
        The Code des taxes assimilees aux impots sur les revenus is the
        upstream legal framework and Justel records the Brussels amendments.
        The current Brussels Fiscality sheets are the official public source
        for indexed 2026 Brussels amounts after that Code locator is checked.
    values:
      brussels_circulation_tax_cv_0_to_4_amount: 107.18
      brussels_circulation_tax_cv_5_amount: 134.11
      brussels_circulation_tax_cv_6_amount: 193.91
      brussels_circulation_tax_cv_7_amount: 253.31
      brussels_circulation_tax_cv_8_amount: 313.24
      brussels_circulation_tax_cv_9_amount: 373.16
      brussels_circulation_tax_cv_10_amount: 432.30
      brussels_circulation_tax_cv_11_amount: 561.00
      brussels_circulation_tax_cv_12_amount: 689.70
      brussels_circulation_tax_cv_13_amount: 818.14
      brussels_circulation_tax_cv_14_amount: 946.84
      brussels_circulation_tax_cv_15_amount: 1075.54
      brussels_circulation_tax_cv_16_amount: 1408.70
      brussels_circulation_tax_cv_17_amount: 1742.14
      brussels_circulation_tax_cv_18_amount: 2075.57
      brussels_circulation_tax_cv_19_amount: 2408.34
