              else:
                  if brussels_entry_into_service_tax_thermal_power_kw <= brussels_entry_into_service_tax_thermal_power_band_max_kw[2]:
                      brussels_entry_into_service_tax_power_band_id[2]
                  else:
                      if brussels_entry_into_service_tax_thermal_power_kw <= brussels_entry_into_service_tax_thermal_power_band_max_kw[3]:
                          brussels_entry_into_service_tax_power_band_id[3]
                      else:
                          if brussels_entry_into_service_tax_thermal_power_kw <= brussels_entry_into_service_tax_thermal_power_band_max_kw[4]:
                              brussels_entry_into_service_tax_power_band_id[4]
                          else:
                              if brussels_entry_into_service_tax_thermal_power_kw <= brussels_entry_into_service_tax_thermal_power_band_max_kw[5]:
                                  brussels_entry_into_service_tax_power_band_id[5]
                              else:
                                  brussels_entry_into_service_tax_power_band_id[6]
  - name: brussels_entry_into_service_tax_power_band
    kind: derived
    entity: Vehicle
    dtype: Count
    period: Year
    source: Brussels Fiscality MyTax rule that the higher of fiscal-power and thermal-power table amounts applies
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          max(brussels_entry_into_service_tax_power_band_by_fiscal_power, brussels_entry_into_service_tax_power_band_by_thermal_power)
  - name: brussels_entry_into_service_tax_age_band
    kind: derived
    entity: Vehicle
    dtype: Count
    period: Year
    source: Brussels Fiscality MyTax TMC table age bands based on years since first registration
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if brussels_entry_into_service_tax_vehicle_age_years <= brussels_entry_into_service_tax_age_band_max_years[0]:
              brussels_entry_into_service_tax_age_band_id[0]
          else:
              if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[1]:
                  brussels_entry_into_service_tax_age_band_id[1]
              else:
                  if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[2]:
                      brussels_entry_into_service_tax_age_band_id[2]
                  else:
                      if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[3]:
                          brussels_entry_into_service_tax_age_band_id[3]
                      else:
                          if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[4]:
                              brussels_entry_into_service_tax_age_band_id[4]
                          else:
                              if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[5]:
                                  brussels_entry_into_service_tax_age_band_id[5]
                              else:
                                  if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[6]:
                                      brussels_entry_into_service_tax_age_band_id[6]
                                  else:
                                      if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[7]:
                                          brussels_entry_into_service_tax_age_band_id[7]
                                      else:
                                          if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[8]:
                                              brussels_entry_into_service_tax_age_band_id[8]
                                          else:
                                              if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[9]:
                                                  brussels_entry_into_service_tax_age_band_id[9]
                                              else:
                                                  if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[10]:
                                                      brussels_entry_into_service_tax_age_band_id[10]
                                                  else:
                                                      if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[11]:
                                                          brussels_entry_into_service_tax_age_band_id[11]
                                                      else:
                                                          if brussels_entry_into_service_tax_vehicle_age_years == brussels_entry_into_service_tax_age_band_max_years[12]:
                                                              brussels_entry_into_service_tax_age_band_id[12]
                                                          else:
