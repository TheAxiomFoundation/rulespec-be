format: rulespec/v1
module:
  summary: |-
    Brussels tax-on-entry-into-service detailed car and motorcycle table
    from the MyTax tariff page retrieved on 1 July 2026. The
    upstream Code locator is checked first; this module uses the official
    Brussels Fiscality MyTax tariff page for the sourceable public table
    that the 2026 Brussels Fiscality TMC PDF refers users to.
  source_verification:
    corpus_citation_paths:
      - be/statute/justel/code-taxes-assimilees/1965112350
      - be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01/block-1
      - be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01/block-6
      - be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01/block-7
      - be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01/block-14
      - be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01/block-15
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - be/statute/justel/code-taxes-assimilees/1965112350
      rationale: |-
        The Code des taxes assimilees aux impots sur les revenus is the
        upstream legal framework and Justel records the Brussels amendments.
        Brussels Fiscality MyTax is used only for the official public
        current 1 July 2026 rate table after that Code locator is checked.
units:
  - name: EUR
    kind: currency
    minor_units: 2
