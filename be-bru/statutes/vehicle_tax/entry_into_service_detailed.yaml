  - name: brussels_entry_into_service_tax_power_band_by_fiscal_power
    kind: derived
    entity: Vehicle
    dtype: Count
    period: Year
    source: Brussels Fiscality MyTax TMC table fiscal-power bands for cars and motorcycles
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[0]:
              brussels_entry_into_service_tax_power_band_id[0]
          else:
              if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[1]:
                  brussels_entry_into_service_tax_power_band_id[1]
              else:
                  if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[2]:
                      brussels_entry_into_service_tax_power_band_id[2]
                  else:
                      if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[3]:
                          brussels_entry_into_service_tax_power_band_id[3]
                      else:
                          if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[4]:
                              brussels_entry_into_service_tax_power_band_id[4]
                          else:
                              if brussels_entry_into_service_tax_fiscal_power_cv <= brussels_entry_into_service_tax_fiscal_power_band_max_cv[5]:
                                  brussels_entry_into_service_tax_power_band_id[5]
                              else:
                                  brussels_entry_into_service_tax_power_band_id[6]
  - name: brussels_entry_into_service_tax_power_band_by_thermal_power
    kind: derived
    entity: Vehicle
    dtype: Count
    period: Year
    source: Brussels Fiscality MyTax TMC table thermal-power bands for cars and motorcycles
    versions:
      - effective_from: '2026-07-01'
        formula: |-
          if brussels_entry_into_service_tax_thermal_power_kw <= brussels_entry_into_service_tax_thermal_power_band_max_kw[0]:
              brussels_entry_into_service_tax_power_band_id[0]
          else:
