module:
  summary: 'The Brussels Common Community Commission ordinance of 10 December 2020

    creates the allowance for assistance to elderly people, and the 28 January

    2021 implementing order defines autonomy categories, income treatment,

    category-based income exemptions, indexation, payment, residence assimilation,

    and suspension. This module encodes the person-facing annual and monthly

    award calculation: residence and incompatibility gates, the age bridge to

    the federal disability-allowance boundary, autonomy category selection,

    statutory base annual amounts, supplied index-factor bridges, category-based

    exemptions, selected pension/property/capital/deemed-transfer income

    mechanics, the minimum annual payment, and detention/social-defense payment

    suspension. It leaves medical-guide evidence scoring, application,

    notification, recovery, appeal, and other administrative procedure to

    separate surfaces.'
