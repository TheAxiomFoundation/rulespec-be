      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/regulation/arrete/1997/10/29/1997012760/article/2
              excerpt: la durée maximale de la période de congé parental dépend de la forme d'interruption choisie.
    versions:
      - effective_from: '2012-06-01'
        formula: |-
          if belgium_parental_leave_form == belgium_parental_leave_form_full_time:
              belgium_parental_leave_full_time_months
          else:
