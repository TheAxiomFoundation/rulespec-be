    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree of 2 January 1991, articles 6 and 8, statutory base amount uprated by the supplied indexation coefficient
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/regulation/arrete/1991/01/02/1991013073/article/8
              excerpt: le montant mensuel de l'allocation d'interruption est lié à l'indice pivot et adapté conformément à la loi du 2 août 1971.
    versions:
      - effective_from: '2012-06-01'
        formula: |-
          belgium_parental_leave_selected_monthly_base_amount * belgium_parental_leave_indexation_coefficient
  - name: belgium_parental_leave_months_taken
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: Royal Decree of 29 October 1997, article 2 section 1, number of leave months taken capped at the selected maximum
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/regulation/arrete/1997/10/29/1997012760/article/2
              excerpt: le travailleur prend un nombre de mois de congé parental dans la limite de la durée maximale de la forme choisie.
    versions:
      - effective_from: '2012-06-01'
        formula: |-
          min(belgium_parental_leave_requested_months, belgium_parental_leave_selected_maximum_months)
  - name: belgium_parental_leave_allowance_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 29 October 1997 article 2 and Royal Decree of 2 January 1991 articles 6 and 8
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/regulation/arrete/1991/01/02/1991013073/article/6
              excerpt: le montant de l'allocation d'interruption est octroyé par mois de congé parental pris par le travailleur éligible.
    versions:
      - effective_from: '2012-06-01'
        formula: |-
          if belgium_parental_leave_eligible_parent:
              belgium_parental_leave_selected_monthly_amount * belgium_parental_leave_months_taken
          else:
              0
