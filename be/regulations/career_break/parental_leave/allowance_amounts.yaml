  - name: belgium_parental_leave_selected_monthly_base_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree of 2 January 1991, articles 6 and 8, selected by the leave form of Royal Decree of 29 October 1997 article 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/regulation/arrete/1991/01/02/1991013073/article/8
              excerpt: le montant mensuel de l'allocation d'interruption est fixé comme suit selon la forme de réduction des prestations de travail.
    versions:
      - effective_from: '2012-06-01'
        formula: |-
          if belgium_parental_leave_form == belgium_parental_leave_form_full_time:
              belgium_parental_leave_full_time_monthly_base_amount
          else:
              if belgium_parental_leave_form == belgium_parental_leave_form_half_time:
                  belgium_parental_leave_half_time_monthly_base_amount
              else:
                  if belgium_parental_leave_form == belgium_parental_leave_form_one_fifth:
                      belgium_parental_leave_one_fifth_monthly_base_amount
                  else:
                      belgium_parental_leave_one_tenth_monthly_base_amount
  - name: belgium_parental_leave_selected_maximum_months
    kind: derived
    entity: Person
    dtype: Integer
    period: Month
    source: Royal Decree of 29 October 1997, article 2 section 1, maximum duration selected by the leave form
