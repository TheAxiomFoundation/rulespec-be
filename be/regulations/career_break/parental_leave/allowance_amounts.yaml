format: rulespec/v1
module:
  summary: |-
    The Royal Decree of 29 October 1997 gives an eligible worker a right to
    parental leave within a career-break interruption. Article 2 sets the four
    leave forms and their maximum durations: full suspension for four months,
    half-time reduction for eight months, one-fifth reduction for twenty months,
    and one-tenth reduction for forty months. The monthly interruption allowance
    that funds the leave is granted under the Royal Decree of 2 January 1991:
    Article 6 section 3 sets the full-suspension monthly amount and Article 8
    sets the partial-reduction monthly amounts (one-fifth, one-tenth, and half).
    This module encodes the household-level annual allowance interface from the
    supplied eligible-parent flag, the selected leave form, the selected number
    of leave months, and a supplied indexation coefficient applied to the
    statutory base amounts. It leaves the age-of-child eligibility proof, the
    lone-parent and age-fifty amount increases, the fractioning rules, the
    sector variations, and the withholding tax to separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1997/10/29/1997012760/article/2
      - be/regulation/arrete/1991/01/02/1991013073/article/6
      - be/regulation/arrete/1991/01/02/1991013073/article/8
    values:
      belgium_parental_leave_full_time_months: "4"
      belgium_parental_leave_half_time_months: "8"
      belgium_parental_leave_one_fifth_months: "20"
      belgium_parental_leave_one_tenth_months: "40"
      belgium_parental_leave_full_time_monthly_base_amount: "508.92"
      belgium_parental_leave_half_time_monthly_base_amount: "254.46"
      belgium_parental_leave_one_fifth_monthly_base_amount: "86.32"
      belgium_parental_leave_one_tenth_monthly_base_amount: "43.16"
units:
  - name: EUR
    kind: currency
    minor_units: 2
