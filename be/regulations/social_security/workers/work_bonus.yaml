  - name: belgium_worker_work_bonus_b_monthly_maximum
    kind: parameter
    dtype: Money
    unit: EUR
    source: ONSS DMFA 2025/2 work-bonus employee table, volet B maximum monthly reduction applicable from 1 February 2025
