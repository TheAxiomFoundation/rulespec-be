        formula: |-
          0.2442
  - name: belgium_worker_work_bonus_january_2025_alpha_b
    kind: parameter
    dtype: Decimal
    source: ONSS DMFA 2025/2 work-bonus employee table, volet B alpha coefficient applicable in January 2025
