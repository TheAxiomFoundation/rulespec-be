  - name: belgium_worker_work_bonus_january_2025_a_monthly_maximum
    kind: parameter
    dtype: Money
    unit: EUR
    source: ONSS DMFA 2025/2 work-bonus employee table, volet A maximum monthly reduction applicable in January 2025
