          3271.48
  - name: belgium_worker_work_bonus_a_monthly_maximum
    kind: parameter
    dtype: Money
    unit: EUR
    source: ONSS DMFA 2025/2 work-bonus employee table, volet A maximum monthly reduction applicable from 1 February 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
