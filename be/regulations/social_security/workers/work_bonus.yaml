  - name: belgium_worker_work_bonus_alpha_b
    kind: parameter
    dtype: Decimal
    source: ONSS DMFA 2025/2 work-bonus employee table, volet B alpha coefficient applicable from 1 February 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.2699
  - name: belgium_worker_work_bonus_full_year_equal_monthly_a_before_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1, R(pA) for the full-time complete monthly formula using the ONSS table applicable from 1 February 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_s1bis_threshold:
              belgium_worker_work_bonus_a_monthly_maximum
          else:
              if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_s2_threshold:
                  max(0, floor(((belgium_worker_work_bonus_a_monthly_maximum - belgium_worker_work_bonus_alpha_a * (belgium_worker_work_bonus_full_year_equal_monthly_remuneration - belgium_worker_work_bonus_s1bis_threshold)) / belgium_worker_work_bonus_cent_rounding_multiple) + 0.5) * belgium_worker_work_bonus_cent_rounding_multiple)
              else:
                  0
  - name: belgium_worker_work_bonus_full_year_equal_monthly_b_before_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1, R(pB) for the full-time complete monthly formula using the ONSS table applicable from 1 February 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_s1_threshold:
              belgium_worker_work_bonus_b_monthly_maximum
          else:
              if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_s1bis_threshold:
                  max(0, floor(((belgium_worker_work_bonus_b_monthly_maximum - belgium_worker_work_bonus_alpha_b * (belgium_worker_work_bonus_full_year_equal_monthly_remuneration - belgium_worker_work_bonus_s1_threshold)) / belgium_worker_work_bonus_cent_rounding_multiple) + 0.5) * belgium_worker_work_bonus_cent_rounding_multiple)
              else:
                  0
  - name: belgium_worker_work_bonus_full_year_equal_monthly_january_2025_a_before_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1, R(pA) for the full-time complete monthly formula using the ONSS January 2025 employee table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_january_2025_s1bis_threshold:
              belgium_worker_work_bonus_january_2025_a_monthly_maximum
          else:
              if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_january_2025_s2_threshold:
                  max(0, floor(((belgium_worker_work_bonus_january_2025_a_monthly_maximum - belgium_worker_work_bonus_january_2025_alpha_a * (belgium_worker_work_bonus_full_year_equal_monthly_remuneration - belgium_worker_work_bonus_january_2025_s1bis_threshold)) / belgium_worker_work_bonus_cent_rounding_multiple) + 0.5) * belgium_worker_work_bonus_cent_rounding_multiple)
              else:
                  0
  - name: belgium_worker_work_bonus_full_year_equal_monthly_january_2025_b_before_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1, R(pB) for the full-time complete monthly formula using the ONSS January 2025 employee table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_january_2025_s1_threshold:
              belgium_worker_work_bonus_january_2025_b_monthly_maximum
          else:
              if belgium_worker_work_bonus_full_year_equal_monthly_remuneration <= belgium_worker_work_bonus_january_2025_s1bis_threshold:
                  max(0, floor(((belgium_worker_work_bonus_january_2025_b_monthly_maximum - belgium_worker_work_bonus_january_2025_alpha_b * (belgium_worker_work_bonus_full_year_equal_monthly_remuneration - belgium_worker_work_bonus_january_2025_s1_threshold)) / belgium_worker_work_bonus_cent_rounding_multiple) + 0.5) * belgium_worker_work_bonus_cent_rounding_multiple)
              else:
                  0
  - name: belgium_worker_work_bonus_full_year_equal_monthly_january_2025_b_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, January 2025 work-bonus volet B limited first by personal contributions due
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(belgium_worker_work_bonus_full_year_equal_monthly_january_2025_b_before_cap, belgium_worker_work_bonus_full_year_equal_monthly_contribution_before_work_bonus) * belgium_worker_work_bonus_january_2025_months_in_year
  - name: belgium_worker_work_bonus_full_year_equal_monthly_january_2025_a_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, January 2025 work-bonus volet A limited after volet B by remaining personal contributions due
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(belgium_worker_work_bonus_full_year_equal_monthly_january_2025_a_before_cap, max(0, belgium_worker_work_bonus_full_year_equal_monthly_contribution_before_work_bonus - belgium_worker_work_bonus_full_year_equal_monthly_january_2025_b_amount / belgium_worker_work_bonus_january_2025_months_in_year)) * belgium_worker_work_bonus_january_2025_months_in_year
  - name: belgium_worker_work_bonus_full_year_equal_monthly_february_to_december_2025_b_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, February through December 2025 work-bonus volet B limited first by personal contributions due
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(belgium_worker_work_bonus_full_year_equal_monthly_b_before_cap, belgium_worker_work_bonus_full_year_equal_monthly_contribution_before_work_bonus) * belgium_worker_work_bonus_february_to_december_2025_months_in_year
  - name: belgium_worker_work_bonus_full_year_equal_monthly_february_to_december_2025_a_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, February through December 2025 work-bonus volet A limited after volet B by remaining personal contributions due
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(belgium_worker_work_bonus_full_year_equal_monthly_a_before_cap, max(0, belgium_worker_work_bonus_full_year_equal_monthly_contribution_before_work_bonus - belgium_worker_work_bonus_full_year_equal_monthly_b_before_cap)) * belgium_worker_work_bonus_february_to_december_2025_months_in_year
  - name: belgium_worker_work_bonus_full_year_equal_monthly_b_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, 2025 work-bonus volet B annualized for the full-year equal-month worker slice
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_worker_work_bonus_full_year_equal_monthly_january_2025_b_amount + belgium_worker_work_bonus_full_year_equal_monthly_february_to_december_2025_b_amount
  - name: belgium_worker_work_bonus_full_year_equal_monthly_a_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1 section 4, 2025 work-bonus volet A annualized for the full-year equal-month worker slice
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_worker_work_bonus_full_year_equal_monthly_january_2025_a_amount + belgium_worker_work_bonus_full_year_equal_monthly_february_to_december_2025_a_amount
  - name: belgium_worker_work_bonus_full_year_equal_monthly_total_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 17 January 2000, article 1, P equals PA plus PB, annualized for the 2025 full-year equal-month worker slice
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_worker_work_bonus_full_year_equal_monthly_a_amount + belgium_worker_work_bonus_full_year_equal_monthly_b_amount
