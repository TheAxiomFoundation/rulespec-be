format: rulespec/v1
module:
  summary: |-
    The 28 November 1969 implementing royal decree article 19 defines selected
    inclusions and exclusions for the worker social-security remuneration base.
    This module encodes narrow, source-grounded Article 19 mechanics for ONVA
    holiday pay, old fixed mobility indemnity caps, bicycle/kilometric annual
    excesses, gifts and gift vouchers, employee product or service discounts,
    and copyright/right-neighbouring compensation. It does not encode every
    Article 19 exclusion, ONSS administrative safe harbours, quarterly
    declarations, reductions, or current effective contribution tables.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1969/11/28/1969112813/article/19
    values:
      belgium_social_security_article_19_onva_holiday_pay_rate: "0.08"
      belgium_social_security_article_19_old_mobility_indemnity_per_km_cap: "0.1929"
      belgium_social_security_article_19_gift_worker_holiday_cap: "40"
      belgium_social_security_article_19_gift_dependent_child_holiday_cap: "40"
      belgium_social_security_article_19_gift_honorific_cap: "120"
      belgium_social_security_article_19_gift_retirement_cap_per_service_year: "40"
      belgium_social_security_article_19_gift_retirement_minimum_total: "120"
      belgium_social_security_article_19_gift_retirement_maximum_total: "1000"
      belgium_social_security_article_19_gift_marriage_or_legal_cohabitation_cap: "245"
      belgium_social_security_article_19_employee_discount_exempt_rate: "0.30"
      belgium_social_security_article_19_bicycle_indemnity_annual_cap: "1795"
      belgium_social_security_article_19_copyright_compensation_cap_rate: "0.30"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_social_security_article_19_onva_holiday_pay_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1969/11/28/1969112813/article/19
              span: Est forfaitairement fixée à 8 p.c. des autres sommes et avantages constituant la rémunération
    versions:
      - effective_from: '1975-03-28'
        formula: |-
          0.08
  - name: belgium_social_security_article_19_old_mobility_indemnity_per_km_cap
    kind: parameter
    dtype: Money
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 4(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1969/11/28/1969112813/article/19
              span: Le montant de l'indemnité ne peut excéder la somme de 0,1929 euro par kilomètre
    versions:
      - effective_from: '2024-07-01'
        formula: |-
