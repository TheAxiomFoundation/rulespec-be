  - name: belgium_social_security_article_19_employee_discount_exempt_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1969/11/28/1969112813/article/19
              span: Lorsque la réduction de prix dépasse 30 % du montant du prix normal
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          0.30
  - name: belgium_social_security_article_19_bicycle_indemnity_annual_cap
    kind: parameter
    dtype: Money
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 16
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1969/11/28/1969112813/article/19
              span: La partie de l'indemnité kilométrique qui dépasse le montant de 1.795 euros par année civile
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          1795
  - name: belgium_social_security_article_19_copyright_compensation_cap_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 26(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
