    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1969/11/28/1969112813/article/19
              span: Leur montant total est d'au moins 120 EUR et de maximum 1000 EUR
    versions:
      - effective_from: '2017-01-01'
