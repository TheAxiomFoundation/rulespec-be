              span: S'élève à maximum 30 p.c. de la somme
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.30
  - name: belgium_social_security_article_19_onva_holiday_pay_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 1
    versions:
      - effective_from: '1975-03-28'
        formula: |-
          belgium_social_security_article_19_other_remuneration_for_onva_holiday_pay * belgium_social_security_article_19_onva_holiday_pay_rate
  - name: belgium_social_security_article_19_old_mobility_indemnity_excluded_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 4(c)
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          belgium_social_security_article_19_old_mobility_round_trip_km * belgium_social_security_article_19_old_mobility_work_days * belgium_social_security_article_19_old_mobility_indemnity_per_km_cap
  - name: belgium_social_security_article_19_old_mobility_indemnity_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 4(c)
    versions:
      - effective_from: '2024-07-01'
        formula: |-
          max(0, belgium_social_security_article_19_old_mobility_indemnity_amount - belgium_social_security_article_19_old_mobility_indemnity_excluded_amount)
  - name: belgium_social_security_article_19_bicycle_indemnity_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 16
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if belgium_social_security_article_19_bicycle_indemnity_replaces_remuneration:
              belgium_social_security_article_19_bicycle_indemnity_amount
          else:
              max(0, belgium_social_security_article_19_bicycle_indemnity_amount - belgium_social_security_article_19_bicycle_indemnity_annual_cap)
  - name: belgium_social_security_article_19_holiday_gift_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14(a)
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          belgium_social_security_article_19_gift_worker_holiday_cap + belgium_social_security_article_19_dependent_child_count_for_holiday_gifts * belgium_social_security_article_19_gift_dependent_child_holiday_cap
  - name: belgium_social_security_article_19_retirement_gift_service_year_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14(c)
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          belgium_social_security_article_19_gift_complete_service_years * belgium_social_security_article_19_gift_retirement_cap_per_service_year
  - name: belgium_social_security_article_19_retirement_gift_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14(c)
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          if belgium_social_security_article_19_retirement_gift_service_year_cap < belgium_social_security_article_19_gift_retirement_minimum_total:
              0
          else:
              min(belgium_social_security_article_19_retirement_gift_service_year_cap, belgium_social_security_article_19_gift_retirement_maximum_total)
  - name: belgium_social_security_article_19_selected_gift_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          if belgium_social_security_article_19_gift_event_code == belgium_social_security_article_19_gift_saint_nicolas_christmas_new_year:
              belgium_social_security_article_19_holiday_gift_cap
          else:
              if belgium_social_security_article_19_gift_event_code == belgium_social_security_article_19_gift_honorific_distinction:
                  belgium_social_security_article_19_gift_honorific_cap
              else:
                  if belgium_social_security_article_19_gift_event_code == belgium_social_security_article_19_gift_retirement:
                      belgium_social_security_article_19_retirement_gift_cap
                  else:
                      if belgium_social_security_article_19_gift_event_code == belgium_social_security_article_19_gift_marriage_or_legal_cohabitation:
                          belgium_social_security_article_19_gift_marriage_or_legal_cohabitation_cap
                      else:
                          0
  - name: belgium_social_security_article_19_gift_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 14
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          max(0, belgium_social_security_article_19_gift_amount - belgium_social_security_article_19_selected_gift_cap)
  - name: belgium_social_security_article_19_employee_product_discount_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          max(0, belgium_social_security_article_19_employee_product_normal_price - belgium_social_security_article_19_employee_product_worker_price)
  - name: belgium_social_security_article_19_employee_product_discount_exempt_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          belgium_social_security_article_19_employee_product_normal_price * belgium_social_security_article_19_employee_discount_exempt_rate
  - name: belgium_social_security_article_19_employee_product_discount_excess
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          max(0, belgium_social_security_article_19_employee_product_discount_amount - belgium_social_security_article_19_employee_product_discount_exempt_amount)
  - name: belgium_social_security_article_19_employee_product_below_cost_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          max(0, belgium_social_security_article_19_employee_product_cost_price - belgium_social_security_article_19_employee_product_worker_price)
  - name: belgium_social_security_article_19_employee_product_discount_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 19
    versions:
      - effective_from: '2002-04-01'
        formula: |-
          max(belgium_social_security_article_19_employee_product_discount_excess, belgium_social_security_article_19_employee_product_below_cost_amount)
  - name: belgium_social_security_article_19_copyright_compensation_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 26(a)
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          (belgium_social_security_article_19_social_security_subject_remuneration + belgium_social_security_article_19_copyright_compensation) * belgium_social_security_article_19_copyright_compensation_cap_rate
  - name: belgium_social_security_article_19_copyright_compensation_remuneration
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree of 28 November 1969 implementing the social-security workers law, article 19 section 2 item 26
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          if belgium_social_security_article_19_copyright_compensation_replaces_remuneration:
              belgium_social_security_article_19_copyright_compensation
          else:
              max(0, belgium_social_security_article_19_copyright_compensation - belgium_social_security_article_19_copyright_compensation_cap)
