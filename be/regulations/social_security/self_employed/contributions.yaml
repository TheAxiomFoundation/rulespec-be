    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1 paragraph 2
    versions:
      - effective_from: '2003-01-10'
        formula: |-
          max(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_main_minimum_income_indexed)
  - name: belgium_self_employed_article_12_section_1_main_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          min(belgium_self_employed_article_12_section_1_main_adjusted_income, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_first_rate + max(0, min(belgium_self_employed_article_12_section_1_main_adjusted_income, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_12_section_1bis_starter_adjusted_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1bis
    versions:
      - effective_from: '2018-04-01'
        formula: |-
          max(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_starter_minimum_income_indexed)
  - name: belgium_self_employed_article_12_section_1bis_starter_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1bis
    versions:
      - effective_from: '2018-04-01'
        formula: |-
          min(belgium_self_employed_article_12_section_1bis_starter_adjusted_income, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_first_rate + max(0, min(belgium_self_employed_article_12_section_1bis_starter_adjusted_income, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_12_section_1bis_first_quarter_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Quarter
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, articles 12 section 1bis and 14
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          belgium_self_employed_article_12_starter_first_quarter_reduction_base * belgium_self_employed_article_14_index_factor
  - name: belgium_self_employed_article_12_section_1ter_spouse_helper_adjusted_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1ter
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          max(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_spouse_helper_minimum_income_indexed)
  - name: belgium_self_employed_article_12_section_1ter_spouse_helper_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 1ter
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          min(belgium_self_employed_article_12_section_1ter_spouse_helper_adjusted_income, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_first_rate + max(0, min(belgium_self_employed_article_12_section_1ter_spouse_helper_adjusted_income, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_12_section_2_secondary_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12 section 2
    versions:
      - effective_from: '2018-01-01'
        formula: |-
          if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_12_secondary_exemption_threshold_indexed:
              0
          else:
              min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_first_rate + max(0, min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_12bis_student_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 12bis
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_12_main_minimum_income_indexed / 2:
              0
          else:
              if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_12_main_minimum_income_indexed:
                  (belgium_self_employed_article_11_professional_income_base - belgium_self_employed_article_12_main_minimum_income_indexed / 2) * belgium_self_employed_article_12_first_rate
              else:
                  belgium_self_employed_article_12_section_1_main_annual_contribution
  - name: belgium_self_employed_article_13_section_1_post_pension_with_pension_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 13 section 1
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_13_post_pension_exemption_threshold_indexed:
              0
          else:
              min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_13_post_pension_first_rate + max(0, min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_13_section_2_pension_age_without_retirement_pension_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 13 section 2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          belgium_self_employed_article_12_section_1_main_annual_contribution
  - name: belgium_self_employed_article_13_section_3_suspended_early_retirement_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 13 section 3
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_13_post_pension_exemption_threshold_indexed:
              0
          else:
              min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_first_rate + max(0, min(belgium_self_employed_article_11_professional_income_base, belgium_self_employed_article_12_second_threshold_indexed) - belgium_self_employed_article_12_first_threshold_indexed) * belgium_self_employed_article_12_second_rate
  - name: belgium_self_employed_article_13bis_starting_provisional_annual_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 13bis section 2
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if belgium_self_employed_starting_category_post_pension_with_pension:
              belgium_self_employed_article_13_post_pension_exemption_threshold_indexed * belgium_self_employed_article_13_post_pension_first_rate
          else:
              if belgium_self_employed_starting_category_secondary_or_student:
                  belgium_self_employed_article_12_secondary_exemption_threshold_indexed * belgium_self_employed_article_12_first_rate
              else:
                  if belgium_self_employed_starting_category_spouse_helper:
                      belgium_self_employed_article_12_spouse_helper_minimum_income_indexed * belgium_self_employed_article_12_first_rate
                  else:
                      if belgium_self_employed_starting_category_main_starter:
                          belgium_self_employed_article_12_starter_minimum_income_indexed * belgium_self_employed_article_12_first_rate
                      else:
                          belgium_self_employed_article_12_main_minimum_income_indexed * belgium_self_employed_article_12_first_rate
  - name: belgium_self_employed_selected_annual_social_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, articles 12, 12bis, and 13
    versions:
      - effective_from: '2025-10-01'
        formula: |-
          if belgium_self_employed_early_retirement_pension_suspended_for_income_ceiling:
              belgium_self_employed_article_13_section_3_suspended_early_retirement_annual_contribution
          else:
              if belgium_self_employed_is_student:
                  belgium_self_employed_article_12bis_student_annual_contribution
              else:
                  if belgium_self_employed_is_secondary_activity:
                      belgium_self_employed_article_12_section_2_secondary_annual_contribution
                  else:
                      if belgium_self_employed_has_reached_pension_age:
                          if belgium_self_employed_receives_retirement_or_survivor_pension:
                              belgium_self_employed_article_13_section_1_post_pension_with_pension_annual_contribution
                          else:
                              belgium_self_employed_article_13_section_2_pension_age_without_retirement_pension_annual_contribution
                      else:
                          if belgium_self_employed_is_spouse_helper:
                              belgium_self_employed_article_12_section_1ter_spouse_helper_annual_contribution
                          else:
                              if belgium_self_employed_is_starter_main_activity:
                                  belgium_self_employed_article_12_section_1bis_starter_annual_contribution
                              else:
                                  belgium_self_employed_article_12_section_1_main_annual_contribution
