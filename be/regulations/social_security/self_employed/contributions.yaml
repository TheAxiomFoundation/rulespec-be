            kind: formula
            source:
              corpus_citation_path: "be/regulation/arrete/1967/07/27/1967072702/article/12bis"
              excerpt: "Lorsque l'étudiant-indépendant recueille des revenus professionnels qui atteignent le montant du revenu visé à l'article 12, § 1er, alinéa 2, pour l'année concernée, il est redevable des cotisations en application de l'article 12, § 1er."
    versions:
