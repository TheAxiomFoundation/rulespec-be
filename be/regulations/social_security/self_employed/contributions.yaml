    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 11 section 2
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          if belgium_spouse_helper_only_indemnity_sector:
              belgium_spouse_helper_fiscally_attributed_professional_income
          else:
              0
  - name: belgium_self_employed_article_11_professional_income_base
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 11 section 2
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          max(0, belgium_self_employed_gross_professional_income - belgium_self_employed_professional_expenses - belgium_self_employed_professional_losses + belgium_self_employed_prior_activity_income_taxed_current_year - belgium_self_employed_article_11_excluded_cessation_income + belgium_self_employed_article_11_spouse_helper_added_income)
  - name: belgium_self_employed_article_12_first_threshold_indexed
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, articles 12 and 14
    versions:
      - effective_from: '2008-01-01'
        formula: |-
          belgium_self_employed_article_12_first_threshold_base * belgium_self_employed_article_14_index_factor
  - name: belgium_self_employed_article_12_second_threshold_indexed
    kind: derived
