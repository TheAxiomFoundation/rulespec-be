format: rulespec/v1
module:
  summary: |-
    Royal Decree No. 38 of 27 July 1967 organizes the social status of
    self-employed workers. This module encodes the source-backed core
    contribution surface for self-employed social-security scope:
    Article 11 professional-income construction, Article 12 pre-pension
    contribution categories, Article 12bis student-independents, Article 13
    pension-age categories, Article 13bis starting provisional contributions,
    and Article 14 indexation through a supplied yearly index factor. It leaves
    caisse administration, waiver decisions, objective-evidence provisional
    reductions, late-payment sanctions, detailed pension entitlement tests, and
    runnable household-oracle parity as separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1967/07/27/1967072702/article/11
      - be/regulation/arrete/1967/07/27/1967072702/article/12
      - be/regulation/arrete/1967/07/27/1967072702/article/12bis
      - be/regulation/arrete/1967/07/27/1967072702/article/13
      - be/regulation/arrete/1967/07/27/1967072702/article/13bis
      - be/regulation/arrete/1967/07/27/1967072702/article/14
    values:
      belgium_self_employed_article_12_first_rate: "0.205"
      belgium_self_employed_article_12_second_rate: "0.1416"
      belgium_self_employed_article_12_first_threshold_base: "15831.12"
      belgium_self_employed_article_12_second_threshold_base: "23330.06"
      belgium_self_employed_article_12_main_minimum_income_base: "3666.15"
      belgium_self_employed_article_12_starter_minimum_income_base: "1893.22"
      belgium_self_employed_article_12_spouse_helper_reference_income_base: "3221.08"
      belgium_self_employed_article_12_secondary_exemption_threshold_base: "405.60"
      belgium_self_employed_article_13_post_pension_exemption_threshold_base: "811.20"
      belgium_self_employed_article_13_post_pension_first_rate: "0.147"
      belgium_self_employed_article_12_starter_first_quarter_reduction_base: "25.01"
      belgium_self_employed_article_14_index_base: "142.75"
