    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, article 11 section 2
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          if belgium_self_employed_article_28_exclusion_condition_met:
              belgium_self_employed_article_28_cessation_income
          else:
              0
  - name: belgium_self_employed_article_11_spouse_helper_added_income
    kind: derived
