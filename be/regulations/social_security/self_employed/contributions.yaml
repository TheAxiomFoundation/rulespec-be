              excerpt: "2° lorsqu'il s'agit d'aidants visés à l'article 7bis assujettis volontairement ou non au statut social des indépendants et appartenant au groupe général des cotisants visé à l'article 12, § 1er : des cotisations, calculées de la manière suivante :"
    versions:
      - effective_from: '2018-04-01'
        formula: |-
          if belgium_self_employed_starting_category_post_pension_with_pension:
              belgium_self_employed_article_13_post_pension_exemption_threshold_indexed * belgium_self_employed_article_13_post_pension_first_rate
          else:
              if belgium_self_employed_starting_category_secondary_or_student:
                  belgium_self_employed_article_12_secondary_exemption_threshold_indexed * belgium_self_employed_article_12_first_rate
              else:
                  if belgium_self_employed_starting_category_spouse_helper:
                      belgium_self_employed_article_12_spouse_helper_minimum_income_indexed * belgium_self_employed_article_12_first_rate
                  else:
                      if belgium_self_employed_starting_category_main_starter:
                          belgium_self_employed_article_12_starter_minimum_income_indexed * belgium_self_employed_article_12_first_rate
                      else:
                          belgium_self_employed_article_12_main_minimum_income_indexed * belgium_self_employed_article_12_first_rate
  - name: belgium_self_employed_selected_annual_social_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Royal Decree No. 38 of 27 July 1967 organizing self-employed social status, articles 12, 12bis, and 13
    versions:
      - effective_from: '2018-04-01'
        formula: |-
          if belgium_self_employed_early_retirement_pension_suspended_for_income_ceiling:
              belgium_self_employed_article_13_section_3_suspended_early_retirement_annual_contribution
          else:
              if belgium_self_employed_is_student:
                  belgium_self_employed_article_12bis_student_annual_contribution
              else:
                  if belgium_self_employed_is_secondary_activity:
                      belgium_self_employed_article_12_section_2_secondary_annual_contribution
                  else:
                      if belgium_self_employed_has_reached_pension_age:
                          if belgium_self_employed_receives_retirement_or_survivor_pension:
                              belgium_self_employed_article_13_section_1_post_pension_with_pension_annual_contribution
                          else:
