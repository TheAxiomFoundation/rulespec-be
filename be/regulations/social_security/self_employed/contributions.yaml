              if belgium_self_employed_article_11_professional_income_base < belgium_self_employed_article_12_main_minimum_income_indexed:
                  (belgium_self_employed_article_11_professional_income_base - belgium_self_employed_article_12_main_minimum_income_indexed / 2) * belgium_self_employed_article_12_first_rate
              else:
                  belgium_self_employed_article_12_section_1_main_annual_contribution
