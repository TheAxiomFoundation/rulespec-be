format: rulespec/v1
module:
  summary: 'Royal Decree No. 50 article 7 identifies the worker-pension remuneration

    base, while the Royal Decree of 23 December 1996 articles 2, 4, 5, 7,

    7bis, and 8 set the current worker retirement age, early-retirement

    thresholds, 60 percent and 75 percent retirement-pension fractions, survivor

    pension, transition allowance, and minimum right per career year. This

    module encodes those household-level calculation interfaces from supplied

    career and remuneration inputs after statutory career-proof, revaluation,

    wage-cap, and least-advantageous-day selection. It leaves mixed-regime

    career proof, mineworker/mariner legacy denominators, foreign pension

    coordination, detailed article-8 eligibility proof, and administration to

    separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/regulation/arrete/1967/10/24/1967102410/article/7
    - be/regulation/arrete/1996/12/23/1997022010/article/2
    - be/regulation/arrete/1996/12/23/1997022010/article/4
    - be/regulation/arrete/1996/12/23/1997022010/article/5
    - be/regulation/arrete/1996/12/23/1997022010/article/7
    - be/regulation/arrete/1996/12/23/1997022010/article/7bis
    - be/regulation/arrete/1996/12/23/1997022010/article/8
    values:
      belgium_worker_pension_household_rate: '0.75'
      belgium_worker_pension_isolated_rate: '0.60'
      belgium_worker_pension_standard_denominator_years: '45'
      belgium_worker_pension_working_days_per_year: '312'
      belgium_worker_pension_survivor_rate: '0.80'
      belgium_worker_pension_article_8_minimum_annual_remuneration: '18819.12'
      belgium_worker_pension_article_8_family_cap: '16441.83'
      belgium_worker_pension_article_8_isolated_cap: '13153.46'
units:
