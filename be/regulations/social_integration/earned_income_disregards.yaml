- name: belgium_social_integration_article_35_monthly_earned_income_disregard
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: EUR
  source: Royal Decree of 11 July 2002 on the general regulation for social integration,
    article 35
  versions:
  - effective_from: '2024-01-01'
    formula: "if belgium_social_integration_income_from_shortage_profession:\n   \
      \ min(belgium_social_integration_monthly_net_earned_income, belgium_social_integration_shortage_profession_monthly_disregard)\n\
      else:\n    if belgium_social_integration_income_from_irregular_artistic_activity:\n\
      \        min(belgium_social_integration_monthly_net_earned_income, belgium_social_integration_irregular_artistic_activity_monthly_equivalent_disregard)\n\
      \    else:\n        min(belgium_social_integration_monthly_net_earned_income,\
      \ belgium_social_integration_standard_earned_income_monthly_disregard)"
