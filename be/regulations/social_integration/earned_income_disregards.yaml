format: rulespec/v1
module:
  summary: 'Federal social-integration implementing decree article 35 sets earned-income

    disregards for revenu d''integration resource calculations. This module

    encodes the standard monthly disregard, the annual disregard for irregular

    artistic activity, the shortage-profession monthly disregard, and a monthly

    selector. Eligibility periods, suspension rules, regional shortage attestations,

    and the full resource test remain separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/regulation/arrete/2002/07/11/2002022564/article/35
    values:
      belgium_social_integration_standard_earned_income_monthly_disregard: '177.76'
      belgium_social_integration_irregular_artistic_activity_annual_disregard: '2133.12'
      belgium_social_integration_shortage_profession_monthly_disregard: '254.75'
      belgium_social_integration_earned_income_disregard_total_years: '3'
      belgium_social_integration_earned_income_disregard_outer_limit_years: '6'
units:
