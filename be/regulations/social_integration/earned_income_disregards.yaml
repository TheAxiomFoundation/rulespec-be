      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/2002/07/11/2002022564/article/35
          excerpt: "les revenus nets qui en résultent sont pris en considération sous déduction d'un montant maximal de 177,76 EUR par mois"
