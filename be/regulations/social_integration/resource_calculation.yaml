format: rulespec/v1
module:
  summary: 'The 11 July 2002 royal decree implementing the right to social integration

    defines resources excluded from the revenu d''integration resource

    calculation. Article 22 lists excluded resource categories, caps excluded

    ALE cheque remuneration at EUR 6 per non-invalidated cheque, and grants a

    supplemental annual exemption by article-14 beneficiary category when

    countable resources are below the revenu d''integration amount. This module

    encodes those Article 22 mechanics, a simple Article 23/35 countable

    earned-income calculation, the Article 24 business-transfer treatment, the

    Article 25 to 27 valuation rules for built immovable property, unbuilt

    immovable property, rented immovable property, and movable capital, and the

    Article 28 to 34 transfer-of-assets, in-kind housing support, and cohabitant

    resource-attribution mechanics. It still leaves CPAS equity decisions and

    end-to-end eligibility and payable-amount integration as upstream inputs or

    separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/regulation/arrete/2002/07/11/2002022564/article/22
    - be/regulation/arrete/2002/07/11/2002022564/article/23
    - be/regulation/arrete/2002/07/11/2002022564/article/24
    - be/regulation/arrete/2002/07/11/2002022564/article/25
    - be/regulation/arrete/2002/07/11/2002022564/article/26
    - be/regulation/arrete/2002/07/11/2002022564/article/27
    - be/regulation/arrete/2002/07/11/2002022564/article/28
    - be/regulation/arrete/2002/07/11/2002022564/article/29
    - be/regulation/arrete/2002/07/11/2002022564/article/30
    - be/regulation/arrete/2002/07/11/2002022564/article/31
    - be/regulation/arrete/2002/07/11/2002022564/article/32
    - be/regulation/arrete/2002/07/11/2002022564/article/33
    - be/regulation/arrete/2002/07/11/2002022564/article/34
    - be/regulation/arrete/2002/07/11/2002022564/article/35
    values:
      belgium_social_integration_article_22_ale_cheque_exclusion_cap: 6
      belgium_social_integration_article_22_category_1_supplemental_exemption: 155
      belgium_social_integration_article_22_category_2_supplemental_exemption: 250
      belgium_social_integration_article_22_category_3_supplemental_exemption: 280
      belgium_social_integration_article_22_category_4_supplemental_exemption: 310
      belgium_social_integration_article_25_built_property_base_exemption: 750
      belgium_social_integration_article_25_built_property_child_increment: 125
      belgium_social_integration_article_25_unbuilt_property_base_exemption: 30
      belgium_social_integration_article_25_cadastral_income_multiplier: 3
      belgium_social_integration_article_27_movable_capital_first_threshold: 6200
      belgium_social_integration_article_27_movable_capital_second_threshold: 12500
      belgium_social_integration_article_27_movable_capital_first_rate: 0.06
      belgium_social_integration_article_27_movable_capital_top_rate: 0.1
      belgium_social_integration_article_28_usufruct_value_fraction: 0.4
      belgium_social_integration_article_29_transfer_exempt_tranche: 37200
