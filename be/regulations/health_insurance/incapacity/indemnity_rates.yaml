format: rulespec/v1
imports:
  - be:statutes/health_insurance/insured_status#belgium_health_article_86_item_1c_holder
module:
  summary: |-
    Articles 87 and 93 of the coordinated 14 July 1994 health-insurance law
    create primary-incapacity and invalidity indemnities and delegate the rates,
    maxima, and minima to the King. The Royal Decree of 3 July 1996 articles
    211 through 214 set the current primary-incapacity 60 percent rate,
    unemployment-alignment interface, daily remuneration cap, invalidity
    65/55/40 percent rates, and minimum daily amounts. This module encodes
    those household-level amount interfaces from supplied remuneration,
    household-status, unemployment, regular-worker, and compensable-day inputs
    after medical recognition and wage-history proof have been established. It
    imports the Article 86 item 1 c holder bridge for controlled-unemployment
    alignment while keeping the supplied status override.
  source_verification:
    corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/86"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_health_primary_incapacity_replacement_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 3 July 1996, article 211 section 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/211
              excerpt: "Le taux de l'indemnité d'incapacité primaire est fixé à 60 p.c. de la rémunération perdue visée à l'article 87, alinéa 1er, de la loi coordonnée."
    versions:
      - effective_from: '2009-01-01'
        formula: |-
          0.60
  - name: belgium_health_incapacity_daily_remuneration_cap
    kind: parameter
    dtype: Money
    unit: EUR
    source: Royal Decree of 3 July 1996, article 212, cap for incapacity or invalidity beginning from 1 January 2024
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/212
              excerpt: "Pour le titulaire dont l'incapacité primaire ou l'invalidité prend cours à partir du 1er janvier 2024, le montant maximum de la rémunération est fixé à 105,1873 euros."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          105.1873
  - name: belgium_health_primary_incapacity_alignment_max_months
    kind: parameter
    dtype: Count
    source: Royal Decree of 3 July 1996, article 211 section 2
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          6
  - name: belgium_health_invalidity_dependent_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 3 July 1996, article 213, worker with person at charge
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/213
              excerpt: "Le taux de l'indemnité d'invalidité est fixé à 65 p.c. de la rémunération perdue visée à l'article 87, alinéa 1er, de la loi coordonnée."
    versions:
      - effective_from: '1996-10-06'
        formula: |-
          0.65
  - name: belgium_health_invalidity_article_226_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 3 July 1996, article 213, no dependant and article 226 status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/213
              excerpt: "Pour les titulaires qui ne sont pas considérés comme travailleurs avec personne à charge, ce taux est réduit à [\n1\n55]\n1\nou 40 p.c. de la même rémunération, selon qu'il s'agit ou non de titulaires visés à l'article 226."
    versions:
      - effective_from: '2009-05-01'
        formula: |-
          0.55
  - name: belgium_health_invalidity_other_no_dependant_rate
    kind: parameter
    dtype: Rate
    source: Royal Decree of 3 July 1996, article 213, no dependant and not article 226 status
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/213
              excerpt: "Pour les titulaires qui ne sont pas considérés comme travailleurs avec personne à charge, ce taux est réduit à [\n1\n55]\n1\nou 40 p.c. de la même rémunération, selon qu'il s'agit ou non de titulaires visés à l'article 226."
    versions:
      - effective_from: '1996-10-06'
        formula: |-
          0.40
  - name: belgium_health_regular_worker_minimum_with_dependant_daily_amount
    kind: parameter
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 214 section 1 item 1, current amount from 1 July 2023
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/214
              excerpt: "pour les titulaires qui sont considérés comme travailleur avec personne à charge, le montant journalier minimum est égal [\n5\nà [\n7\n45,6685]\n7\neuros]\n5"
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          45.6685
  - name: belgium_health_regular_worker_minimum_article_226_daily_amount
    kind: parameter
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 214 section 1 item 2 a, current amount from 1 July 2023
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/214
              excerpt: "pour les titulaires visés à l'article 226 ou 226bis, [\n5\nà [\n7\n36,1906]\n7\neuros]\n5"
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          36.1906
  - name: belgium_health_regular_worker_minimum_other_no_dependant_daily_amount
    kind: parameter
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 214 section 1 item 2 b, current amount from 1 July 2023
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/214
              excerpt: "pour les titulaires non visés à l'article 226 ou 226bis, à [\n7\n31,0307]\n7\neuros."
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          31.0307
  - name: belgium_health_minimum_starts_month_number
    kind: parameter
    dtype: Count
    source: Royal Decree of 3 July 1996, article 214 section 3
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          7
  - name: belgium_health_incapacity_daily_remuneration_after_article_212_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Coordinated health-insurance law article 87 and Royal Decree of 3 July 1996 article 212
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          min(belgium_health_incapacity_uncapped_lost_daily_remuneration, belgium_health_incapacity_daily_remuneration_cap)
  - name: belgium_health_primary_incapacity_statutory_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 211 section 1
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          belgium_health_incapacity_daily_remuneration_after_article_212_cap * belgium_health_primary_incapacity_replacement_rate
  - name: belgium_health_primary_incapacity_unemployment_alignment_applies
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Coordinated health-insurance law article 87 and Royal Decree of 3 July 1996 article 211 section 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/87"
              excerpt: "La rémunération perdue est déterminée conformément aux dispositions de l'arrêté royal du 10 juin 2001 établissant la notion uniforme de \" rémunération journalière moyenne \" en application de l'article 39 de la loi du 26 juillet 1996 portant modernisation de la sécurité sociale et assurant la viabilité des régimes légaux des pensions et harmonisant certaines dispositions légales, et sur base des modalités de calcul fixées par le règlement visé à l'["
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          if belgium_health_primary_incapacity_temporary_unemployment:
              0
          else:
              if belgium_health_primary_incapacity_alignment_elapsed_months < belgium_health_primary_incapacity_alignment_max_months:
                  1
              else:
                  0
  - name: belgium_health_primary_incapacity_controlled_unemployment_selected_applies
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Royal Decree of 3 July 1996, article 211 section 2, using Article 86 section 1 item 1 c holder status or supplied override
    versions:
      - effective_from: '2016-01-01'
        formula: |-
          if belgium_health_primary_incapacity_controlled_unemployment or belgium_health_article_86_item_1c_holder == 1:
              1
          else:
              0
  - name: belgium_health_primary_incapacity_daily_amount_before_minimum
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 211 sections 1 and 2
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          if belgium_health_primary_incapacity_controlled_unemployment_selected_applies == 1 and belgium_health_primary_incapacity_unemployment_alignment_applies == 1:
              min(belgium_health_primary_incapacity_unemployment_daily_allowance, belgium_health_primary_incapacity_statutory_daily_amount)
          else:
              belgium_health_primary_incapacity_statutory_daily_amount
  - name: belgium_health_regular_worker_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 214 section 1
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          if belgium_health_worker_has_dependant:
              belgium_health_regular_worker_minimum_with_dependant_daily_amount
          else:
              if belgium_health_invalidity_article_226_status:
                  belgium_health_regular_worker_minimum_article_226_daily_amount
              else:
                  belgium_health_regular_worker_minimum_other_no_dependant_daily_amount
  - name: belgium_health_incapacity_selected_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 214 sections 1 and 2
    versions:
      - effective_from: '2023-07-01'
        formula: |-
          if belgium_health_regular_worker_status:
              belgium_health_regular_worker_minimum_daily_amount
          else:
              belgium_health_nonregular_worker_social_integration_daily_amount
  - name: belgium_health_incapacity_minimum_applies
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Royal Decree of 3 July 1996, article 214 section 3
    versions:
      - effective_from: '2003-01-01'
        formula: |-
          if belgium_health_incapacity_month_number >= belgium_health_minimum_starts_month_number:
              1
          else:
              0
  - name: belgium_health_primary_incapacity_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, articles 211 and 214
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if belgium_health_incapacity_minimum_applies == 1:
              max(belgium_health_primary_incapacity_daily_amount_before_minimum, belgium_health_incapacity_selected_minimum_daily_amount)
          else:
              belgium_health_primary_incapacity_daily_amount_before_minimum
  - name: belgium_health_primary_incapacity_monthly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Monthly bridge from Royal Decree of 3 July 1996 articles 211 and 214 daily amounts
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          belgium_health_primary_incapacity_daily_amount * belgium_health_incapacity_compensable_days
  - name: belgium_health_invalidity_selected_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Day
    source: Royal Decree of 3 July 1996, article 213
    versions:
      - effective_from: '2009-05-01'
        formula: |-
          if belgium_health_worker_has_dependant:
              belgium_health_invalidity_dependent_rate
          else:
              if belgium_health_invalidity_article_226_status:
                  belgium_health_invalidity_article_226_rate
              else:
                  belgium_health_invalidity_other_no_dependant_rate
  - name: belgium_health_invalidity_daily_amount_before_minimum
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, article 213
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          belgium_health_incapacity_daily_remuneration_after_article_212_cap * belgium_health_invalidity_selected_rate
  - name: belgium_health_invalidity_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 3 July 1996, articles 213 and 214
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if belgium_health_incapacity_minimum_applies == 1:
              max(belgium_health_invalidity_daily_amount_before_minimum, belgium_health_incapacity_selected_minimum_daily_amount)
          else:
              belgium_health_invalidity_daily_amount_before_minimum
  - name: belgium_health_invalidity_monthly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Monthly bridge from Royal Decree of 3 July 1996 articles 213 and 214 daily amounts
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/93"
              excerpt: "Le Roi fixe le taux et le montant maximum de l'indemnité d'invalidité, ainsi que le montant minimum de l'indemnité d'invalidité qui, dans les conditions déterminées par Lui, peut être accordée à certaines catégories de travailleurs réguliers."
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          belgium_health_invalidity_daily_amount * belgium_health_incapacity_compensable_days
