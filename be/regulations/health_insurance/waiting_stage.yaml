              excerpt: "2° fournir la preuve, dans les conditions déterminées par le Roi, que par rapport à cette même période, les cotisations pour le secteur des indemnités ont été effectivement payées, ces cotisations doivent atteindre un montant minimum fixé par le Roi ou doivent, dans les conditions fixées par Lui, être complétées par des cotisations personnelles."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/regulation/arrete/1996/07/03/1996022344/article/207-2"
              excerpt: "il y a lieu d'entendre par jours et heures de travail, les jours et heures de travail effectif normal et de prestations supplémentaires sans repos compensatoire."
    versions:
