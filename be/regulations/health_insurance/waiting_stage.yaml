              excerpt: "Les titulaires visés à l'article précédent peuvent continuer à bénéficier des prestations prévues au titre IV à la condition que, pour les deuxième et troisième trimestres précédant celui au cours duquel ils y font appel, ils fournissent la preuve dans les conditions déterminées par le Roi:"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/regulation/arrete/1996/07/03/1996022344/article/207"
              excerpt: "Par dérogation à l'alinéa premier, les travailleurs saisonniers, les travailleurs intermittents et les travailleurs à temps partiel maintiennent leur droit aux indemnités d'incapacité de travail à condition que, pour les deuxième et troisième trimestres précédant celui au cours duquel ils sollicitent les prestations, d'une part, ils aient totalisé quatre cents heures de travail ou assimilées visées à l'article 203, alinéa 4, et, d'autre part, ils aient satisfait aux conditions déterminées à l'article 130, alinéa 1er, 2°, de la loi coordonnée."
