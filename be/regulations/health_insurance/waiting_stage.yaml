              excerpt: "Toutefois, ils accomplissent leur stage d'attente s'ils ont accompli, au cours d'une période de trois mois, soixante-sept heures de travail ou assimilées, à condition qu'ils se trouvent dans l'impossibilité d'accomplir deux cents heures de travail durant ces trois mois en raison de leur régime de travail."
