  - name: belgium_health_incapacity_standard_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 128 and Royal Decree of 3 July 1996 article 203
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_seasonal_intermittent_or_part_time_worker:
              if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_incapacity_waiting_part_time_hours and (belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_reference_months or (belgium_health_waiting_stage_extended_reference_allowed and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_part_time_max_reference_months)):
                  1
              else:
                  0
          else:
              if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_incapacity_waiting_work_days and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_reference_months:
                  1
              else:
                  0
  - name: belgium_health_maternity_standard_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 113 and Royal Decree of 3 July 1996 article 203/1
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_seasonal_intermittent_or_part_time_worker:
              if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_maternity_waiting_part_time_hours and belgium_health_waiting_stage_reference_months <= belgium_health_maternity_waiting_reference_months:
                  1
              else:
                  if belgium_health_waiting_stage_impossible_to_reach_regular_hours and belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_maternity_waiting_part_time_impossible_hours and belgium_health_waiting_stage_reference_months <= belgium_health_maternity_waiting_reference_months:
                      1
                  else:
                      0
          else:
              if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_maternity_waiting_work_days and belgium_health_waiting_stage_reference_months <= belgium_health_maternity_waiting_reference_months:
                  1
              else:
                  0
  - name: belgium_health_incapacity_self_employed_transfer_reduced_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Royal Decree of 3 July 1996, article 206
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_self_employed_transfer_within_30_days and belgium_health_self_employed_prior_waiting_stage_completed_or_dispensed:
              if belgium_health_seasonal_intermittent_or_part_time_worker:
                  if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_incapacity_self_employed_transfer_part_time_hours and (belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_self_employed_transfer_reference_months or (belgium_health_waiting_stage_extended_reference_allowed and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_self_employed_transfer_part_time_max_reference_months)):
                      1
                  else:
                      0
              else:
                  if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_incapacity_self_employed_transfer_work_days and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_self_employed_transfer_reference_months:
                      1
                  else:
                      0
          else:
              0
  - name: belgium_health_maternity_self_employed_transfer_waiting_stage_exempt
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Royal Decree of 3 July 1996, article 206/1
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_self_employed_transfer_within_30_days and belgium_health_self_employed_prior_waiting_stage_completed_or_dispensed:
              1
          else:
              0
  - name: belgium_health_maternity_reentry_one_month_reduced_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Royal Decree of 3 July 1996, article 205/1 section 2
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_maternity_reentry_childcare_reduced_stage_condition:
              if belgium_health_seasonal_intermittent_or_part_time_worker:
                  if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_maternity_reentry_one_month_part_time_hours and belgium_health_waiting_stage_reference_months <= belgium_health_maternity_reentry_one_month_part_time_max_reference_months:
                      1
                  else:
                      0
              else:
                  if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_maternity_reentry_one_month_work_days and belgium_health_waiting_stage_reference_months <= 1:
                      1
                  else:
                      0
          else:
              0
  - name: belgium_health_maternity_reentry_three_month_reduced_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Royal Decree of 3 July 1996, article 205/1 section 3
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_maternity_reentry_mutuality_membership_condition:
              if belgium_health_seasonal_intermittent_or_part_time_worker:
                  if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_maternity_reentry_three_month_part_time_hours and belgium_health_waiting_stage_reference_months <= 3:
                      1
                  else:
                      if belgium_health_waiting_stage_impossible_to_reach_regular_hours and belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_maternity_reentry_three_month_part_time_impossible_hours and belgium_health_waiting_stage_reference_months <= 3:
                          1
                      else:
                          0
              else:
                  if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_maternity_reentry_three_month_work_days and belgium_health_waiting_stage_reference_months <= 3:
                      1
                  else:
                      0
          else:
              0
  - name: belgium_health_incapacity_waiting_stage_satisfied
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 128 and Royal Decree of 3 July 1996 articles 203, 205, and 206
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_incapacity_waiting_stage_dispensed:
              1
          else:
              if belgium_health_incapacity_standard_waiting_stage_met == 1 or belgium_health_incapacity_self_employed_transfer_reduced_waiting_stage_met == 1:
                  1
              else:
                  0
  - name: belgium_health_maternity_waiting_stage_satisfied
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 113 and Royal Decree of 3 July 1996 articles 203/1, 205/1, and 206/1
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_maternity_waiting_stage_dispensed:
              1
          else:
              if belgium_health_maternity_standard_waiting_stage_met == 1 or belgium_health_maternity_self_employed_transfer_waiting_stage_exempt == 1 or belgium_health_maternity_reentry_one_month_reduced_waiting_stage_met == 1 or belgium_health_maternity_reentry_three_month_reduced_waiting_stage_met == 1:
                  1
              else:
                  0
  - name: belgium_health_incapacity_continuing_entitlement_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 130 and Royal Decree of 3 July 1996 article 207
    versions:
      - effective_from: '2017-05-01'
        formula: |-
          if belgium_health_currently_indemnified_at_quarter_end:
              1
          else:
              if belgium_health_continuing_entitlement_contributions_condition_met:
                  if belgium_health_seasonal_intermittent_or_part_time_worker:
                      if belgium_health_continuing_entitlement_assimilated_work_hours_second_third_quarters >= belgium_health_entitlement_maintenance_part_time_hours:
                          1
                      else:
                          if belgium_health_continuing_entitlement_longest_titular_interruption_days <= belgium_health_entitlement_maintenance_max_interruption_days:
                              1
                          else:
                              0
                  else:
                      if belgium_health_continuing_entitlement_titular_work_days_second_third_quarters >= belgium_health_entitlement_maintenance_work_days:
                          1
                      else:
                          0
              else:
                  0
  - name: belgium_health_maternity_continuing_entitlement_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Royal Decree of 3 July 1996, article 207/1
    versions:
      - effective_from: '2017-05-01'
        formula: |-
          if belgium_health_currently_indemnified_at_quarter_end:
              1
          else:
              if belgium_health_continuing_entitlement_contributions_condition_met:
                  if belgium_health_continuing_entitlement_assimilated_work_hours_second_third_quarters >= belgium_health_entitlement_maintenance_part_time_hours:
                      1
                  else:
                      if belgium_health_continuing_entitlement_longest_titular_interruption_days <= belgium_health_entitlement_maintenance_max_interruption_days:
                          1
                      else:
                          0
              else:
                  0
