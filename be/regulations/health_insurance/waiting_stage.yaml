              corpus_citation_path: "be/regulation/arrete/1996/07/03/1996022344/article/206-1"
              excerpt: "Pour l'octroi de l'indemnité de maternité visée à l'article 113 de la loi coordonnée, une dispense de stage d'attente est d'application pour la personne qui acquiert la qualité de titulaire au sens de l'article 86, § 1er, 1°, de la loi coordonnée, à condition qu'elle acquière la qualité précitée au plus tard le trentième jour après avoir perdu la qualité de titulaire visée à l'article 3 de l'arrêté royal du 20 juillet 1971 instituant une assurance indemnités et une assurance maternité en faveur des travailleurs indépendants et des conjoints aidants et qu'elle ait accompli le stage d'attente prévu dans ledit régime ou en ait été dispensée."
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_self_employed_transfer_within_30_days and belgium_health_self_employed_prior_waiting_stage_completed_or_dispensed:
              1
          else:
              0
  - name: belgium_health_maternity_reentry_one_month_reduced_waiting_stage_met
    kind: derived
