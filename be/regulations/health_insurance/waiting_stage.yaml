format: rulespec/v1
module:
  summary: |-
    Articles 128 and 130 of the coordinated 14 July 1994 health-insurance law
    require waiting-stage and continuing-entitlement proof for incapacity
    indemnities, while article 113 and the maternity provisions use parallel
    delegated waiting-stage rules. The Royal Decree of 3 July 1996 articles
    203, 203/1, 205/1, 206, 206/1, 207, 207/1, and 207/2 set the current
    day/hour/month interfaces for ordinary and reduced waiting stages and
    continuing entitlement. This module encodes those numeric interfaces from
    supplied worker-status, contribution, transfer, and interruption predicates.
    It leaves article-86/article-112 category proof, contribution minimums,
    assimilated-day classification, medical recognition, and documentary proof
    to separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1994/07/14/1994071451/article/113
      - be/statute/loi/1994/07/14/1994071451/article/128
      - be/statute/loi/1994/07/14/1994071451/article/130
      - be/regulation/arrete/1996/07/03/1996022344/article/203
      - be/regulation/arrete/1996/07/03/1996022344/article/203-1
      - be/regulation/arrete/1996/07/03/1996022344/article/205-1
      - be/regulation/arrete/1996/07/03/1996022344/article/206
      - be/regulation/arrete/1996/07/03/1996022344/article/206-1
      - be/regulation/arrete/1996/07/03/1996022344/article/207
      - be/regulation/arrete/1996/07/03/1996022344/article/207-1
      - be/regulation/arrete/1996/07/03/1996022344/article/207-2
    values:
      belgium_health_incapacity_waiting_reference_months: "12"
      belgium_health_incapacity_waiting_work_days: "180"
      belgium_health_incapacity_waiting_part_time_hours: "800"
      belgium_health_incapacity_waiting_part_time_max_reference_months: "36"
      belgium_health_maternity_waiting_reference_months: "6"
      belgium_health_maternity_waiting_work_days: "120"
      belgium_health_maternity_waiting_part_time_hours: "400"
      belgium_health_maternity_waiting_part_time_impossible_hours: "133"
      belgium_health_incapacity_self_employed_transfer_reference_months: "6"
      belgium_health_incapacity_self_employed_transfer_work_days: "90"
      belgium_health_incapacity_self_employed_transfer_part_time_hours: "400"
      belgium_health_incapacity_self_employed_transfer_part_time_max_reference_months: "18"
      belgium_health_maternity_reentry_one_month_work_days: "20"
      belgium_health_maternity_reentry_one_month_part_time_hours: "67"
      belgium_health_maternity_reentry_one_month_part_time_max_reference_months: "3"
      belgium_health_maternity_reentry_three_month_work_days: "60"
      belgium_health_maternity_reentry_three_month_part_time_hours: "200"
      belgium_health_maternity_reentry_three_month_part_time_impossible_hours: "67"
      belgium_health_entitlement_maintenance_work_days: "120"
      belgium_health_entitlement_maintenance_part_time_hours: "400"
      belgium_health_entitlement_maintenance_max_interruption_days: "30"
