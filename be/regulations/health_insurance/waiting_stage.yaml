  - name: belgium_health_incapacity_standard_waiting_stage_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law article 128 and Royal Decree of 3 July 1996 article 203
    versions:
      - effective_from: '2022-08-02'
        formula: |-
          if belgium_health_seasonal_intermittent_or_part_time_worker:
              if belgium_health_waiting_stage_assimilated_work_hours >= belgium_health_incapacity_waiting_part_time_hours and (belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_reference_months or (belgium_health_waiting_stage_extended_reference_allowed and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_part_time_max_reference_months)):
                  1
              else:
                  0
          else:
              if belgium_health_waiting_stage_assimilated_work_days >= belgium_health_incapacity_waiting_work_days and belgium_health_waiting_stage_reference_months <= belgium_health_incapacity_waiting_reference_months:
                  1
              else:
                  0
