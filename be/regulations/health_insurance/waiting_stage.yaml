format: rulespec/v1
module:
  summary: |-
    Articles 128 and 130 of the coordinated 14 July 1994 health-insurance law
    require waiting-stage and continuing-entitlement proof for incapacity
    indemnities, while article 113 and the maternity provisions use parallel
    delegated waiting-stage rules. The Royal Decree of 3 July 1996 articles
    203, 203/1, 205/1, 206, 206/1, 207, 207/1, and 207/2 set the current
    day/hour/month interfaces for ordinary and reduced waiting stages and
    continuing entitlement. This module encodes those numeric interfaces from
    supplied worker-status, contribution, transfer, and interruption predicates.
    It leaves article-86/article-112 category proof, contribution minimums,
    assimilated-day classification, medical recognition, and documentary proof
    to separate surfaces.
  source_verification:
    corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/113"
