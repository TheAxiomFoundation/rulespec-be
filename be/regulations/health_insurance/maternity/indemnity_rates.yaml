  dtype: Rate
  period: Day
  source: Royal Decree of 3 July 1996, article 219bis sections 1 and 2
  versions:
  - effective_from: '2010-01-01'
    formula: "if belgium_maternity_article_219bis_pregnancy_suspension_applies:\n\
      \    belgium_maternity_article_219bis_pregnancy_suspension_rate\nelse:\n   \
      \ belgium_maternity_article_219bis_postpartum_breastfeeding_rate"
- name: belgium_maternity_article_219bis_daily_amount
  kind: derived
  entity: Person
  dtype: Money
