      \    belgium_maternity_article_222_converted_leave_employed_daily_amount"
- name: belgium_maternity_article_222_converted_leave_daily_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: EUR
  source: Royal Decree of 3 July 1996, article 222 section 3
  versions:
  - effective_from: '2023-01-01'
    formula: "if belgium_maternity_article_222_converted_leave_incapacity_floor_applies:\n\
      \    max(belgium_maternity_article_222_converted_leave_base_daily_amount, belgium_maternity_converted_leave_incapacity_daily_amount)\n\
      else:\n    belgium_maternity_article_222_converted_leave_base_daily_amount"
