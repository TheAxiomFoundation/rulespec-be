format: rulespec/v1
imports:
- be:statutes/health_insurance/insured_status#belgium_health_article_86_item_1a_or_1b_holder
module:
  summary: 'Article 113 of the coordinated 14 July 1994 health-insurance law delegates

    maternity-indemnity rates to the King. The Royal Decree of 3 July 1996

    articles 216, 217, 219bis, and 222 set the current rate interfaces for

    ordinary maternity rest, controlled full unemployment, pregnancy and

    postpartum/breastfeeding work suspension, and converted maternity leave.

    This module encodes those household-level daily and period amount

    interfaces from supplied lost-remuneration, unemployment-allowance, and

    status inputs after the article-113 or article-87 remuneration cap has been

    applied where required. It imports the Article 86 item 1 a/b holder bridge

    for the first-30-day uncapped worker rate while keeping the supplied

    category override. It leaves the detailed

    average-daily-wage calculation, indexed daily maxima, unemployment-phase

    routing, payment procedure, and eligibility proof to separate surfaces.'
  source_verification:
    corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/86"
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
- name: belgium_maternity_article_216_first_30_days_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 216, ordinary maternity indemnity for
    the first thirty days
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/216
          excerpt: "Le taux de l'indemnité de maternité est fixé à 79,5 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée, pendant les trente premiers jours de la période de repos de maternité telle qu'elle est définie aux articles 114 et 115 de la loi coordonnée, et à 75 p.c. de la même rémunération, à partir du trente et unième jour de cette période."
  versions:
  - effective_from: '1996-10-06'
    formula: '0.795'
- name: belgium_maternity_article_216_after_30_days_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 216, ordinary maternity indemnity from
    the thirty-first day
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/216
          excerpt: "Le taux de l'indemnité de maternité est fixé à 79,5 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée, pendant les trente premiers jours de la période de repos de maternité telle qu'elle est définie aux articles 114 et 115 de la loi coordonnée, et à 75 p.c. de la même rémunération, à partir du trente et unième jour de cette période."
  versions:
  - effective_from: '1996-10-06'
    formula: '0.75'
- name: belgium_maternity_article_216_first_30_days_uncapped_worker_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 216, article-86 section-1 item-1 a
    and b workers during the first thirty days
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/216
          excerpt: "Toutefois, pendant les trente premiers jours de la période de (protection de la maternité), les titulaires visées à l'article 86, § 1er, 1°, a) et b), de la loi coordonnée, bénéficient d'une indemnité de maternité s'élevant à 82 p.c. de la rémunération perdue susvisée sans qu'il y ait lieu d'appliquer la limitation de la rémunération prévue à l'article 113, alinéa 3, susvisé."
  versions:
  - effective_from: '1996-10-06'
    formula: '0.82'
- name: belgium_maternity_article_217_unemployment_base_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 217, controlled full unemployment base
    indemnity
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/217
          excerpt: "ont droit à une indemnité de base s'élevant à 60 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée"
  versions:
  - effective_from: '1996-10-06'
    formula: '0.60'
- name: belgium_maternity_article_217_first_30_days_supplement_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 217, unemployment supplementary indemnity
    for the first thirty days
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/217
          excerpt: "Les titulaires visées à l'alinéa 1er ont droit en outre, à une indemnité complémentaire s'élevant à 19,5 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée, pendant les trente premiers jours de la période de (protection de la maternité) et à 15 p.c. de la même rémunération, à partir du trente et unième jour de cette période."
  versions:
  - effective_from: '1996-10-06'
    formula: '0.195'
- name: belgium_maternity_article_217_after_30_days_supplement_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 217, unemployment supplementary indemnity
    from the thirty-first day
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/217
          excerpt: "Les titulaires visées à l'alinéa 1er ont droit en outre, à une indemnité complémentaire s'élevant à 19,5 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée, pendant les trente premiers jours de la période de (protection de la maternité) et à 15 p.c. de la même rémunération, à partir du trente et unième jour de cette période."
  versions:
  - effective_from: '1996-10-06'
    formula: '0.15'
- name: belgium_maternity_article_217_alignment_max_months
  kind: parameter
  dtype: Count
  source: Royal Decree of 3 July 1996, article 217, unemployment-allowance alignment
    ceases once six months have elapsed
  versions:
  - effective_from: '2003-01-01'
    formula: '6'
- name: belgium_maternity_article_219bis_pregnancy_suspension_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 219bis section 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/219bis
          excerpt: "La titulaire enceinte dont l'exécution du contrat de travail est suspendue ou qui est dispensée du travail en application des articles 42, § 1er, alinéa 1er, 3° ou 43, § 1er, alinéa 2, 2° de la loi du 16 mars 1971 sur le travail peut prétendre à une indemnité de maternité dont le montant est fixé à 78,237 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée."
  versions:
  - effective_from: '2010-01-01'
    formula: '0.78237'
- name: belgium_maternity_article_219bis_postpartum_breastfeeding_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 219bis section 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/219bis
          excerpt: "La titulaire accouchée ou allaitante dont l'exécution du contrat de travail est suspendue ou qui est dispensée du travail en application des articles 42, § 1er, alinéa 1er, 3°, 43, § 1er, alinéa 2, 2° et 43bis, alinéa 2, de la loi du 16 mars 1971 sur le travail peut prétendre à une indemnité de maternité dont le montant est fixé à 60 p.c. de la rémunération perdue visée à l'article 113, alinéa 3, de la loi coordonnée."
  versions:
  - effective_from: '2010-01-01'
    formula: '0.60'
- name: belgium_maternity_article_219bis_breastfeeding_max_months_after_birth
  kind: parameter
  dtype: Count
  source: Royal Decree of 3 July 1996, article 219bis section 2
  versions:
  - effective_from: '2010-01-01'
    formula: '5'
- name: belgium_maternity_article_222_converted_leave_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree of 3 July 1996, article 222 section 3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/222
          excerpt: "Le titulaire bénéficie, pour chaque jour ouvrable de la période de congé de maternité converti visé au § 1er et pour chaque jour de cette même période assimilé à un jour ouvrable par un règlement du Comité de gestion du Service des indemnités, d'une indemnité dont le taux est fixé à 60 p.c. de la rémunération perdue visée à l'article 87, alinéa 1er, de la loi coordonnée."
  versions:
  - effective_from: '2014-07-28'
    formula: '0.60'
- name: belgium_maternity_article_216_uncapped_worker_first_30_days_selected_applies
  kind: derived
  entity: Person
  dtype: Count
  period: Day
  source: Royal Decree of 3 July 1996, article 216, using Article 86 section 1 item
    1 a/b holder status or supplied override
  versions:
  - effective_from: '2016-01-01'
    formula: "if belgium_maternity_article_216_uncapped_worker_first_30_days_applies\
      \ or belgium_health_article_86_item_1a_or_1b_holder == 1:\n    1\nelse:\n  \
      \  0"
