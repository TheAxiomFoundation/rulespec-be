- name: belgium_maternity_article_217_unemployment_alignment_applies
  kind: derived
  entity: Person
  dtype: Count
  period: Day
  source: Royal Decree of 3 July 1996, article 217, temporary-unemployment exclusion
    and six-month alignment limit
  versions:
  - effective_from: '2026-04-06'
    formula: "if belgium_maternity_article_217_temporary_unemployment:\n    0\nelse:\n\
      \    if belgium_maternity_article_217_alignment_elapsed_months < belgium_maternity_article_217_alignment_max_months:\n\
      \        1\n    else:\n        0"
- name: belgium_maternity_article_217_unemployment_base_daily_amount
