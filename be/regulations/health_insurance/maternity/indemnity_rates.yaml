    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1996/07/03/1996022344/article/216
          excerpt: "pendant les trente premiers jours de la période de repos de maternité telle qu'elle est définie aux articles 114 et 115 de la loi coordonnée"
  versions:
  - effective_from: '1996-10-06'
    formula: '30'
- name: belgium_maternity_article_216_selected_daily_amount
  kind: derived
  entity: Person
