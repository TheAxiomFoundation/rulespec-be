format: rulespec/v1
module:
  summary: |-
    Article 30 of the 3 July 1978 employment-contracts law gives an eligible
    worker birth leave of twenty days for births from 1 January 2023, with the
    first three days paid by the employer. Article 223bis of the 3 July 1996
    health-insurance implementing decree gives the worker a health-insurance
    indemnity for the last seventeen days of birth leave at 82 percent of lost
    remuneration, subject to the Article 87 daily-remuneration maximum. This
    module encodes the household-level annual amount interface from supplied
    eligibility, uncapped lost daily remuneration, and post-cap lost daily
    remuneration. It leaves filiation/cohabitation proof, ordinary workday
    scheduling, average-daily-wage construction, the indexed Article 87 maximum,
    and payment procedure to separate surfaces.
  source_verification:
    corpus_citation_path: "be/statute/loi/1978/07/03/1978070303/article/30"
units:
  - name: EUR
    kind: currency
    minor_units: 2
