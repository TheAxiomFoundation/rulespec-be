format: rulespec/v1
module:
  summary: |-
    Federal unemployment royal decree articles 30 and 33 define admission to
    unemployment benefits for full-time workers and voluntary part-time
    workers. This module encodes the statutory stage thresholds, reference
    period extension selectors, and voluntary part-time weekly-hours gate from
    supplied history aggregates. Workday and half-day inputs are assumed to
    already exclude days before any prior admission under articles 30 or 33.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1991/11/25/1991013192/article/30
      - be/regulation/arrete/1991/11/25/1991013192/article/33
    values:
      belgium_unemployment_article_30_required_work_days: 312
      belgium_unemployment_article_30_reference_period_months: 36
      belgium_unemployment_article_30_non_ui_profession_extension_min_uninterrupted_months: 3
      belgium_unemployment_article_30_non_ui_profession_extension_max_months: 180
      belgium_unemployment_article_33_min_weekly_hours: 12
      belgium_unemployment_article_33_reference_person_weekly_fraction_denominator: 3
rules:
  - name: belgium_unemployment_article_30_required_work_days
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          312
  - name: belgium_unemployment_article_30_reference_period_months
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          36
  - name: belgium_unemployment_article_30_non_ui_profession_extension_min_uninterrupted_months
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 3 item 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          3
  - name: belgium_unemployment_article_30_non_ui_profession_extension_max_months
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 3 item 2 maximum of fifteen years
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          180
  - name: belgium_unemployment_article_33_min_weekly_hours
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 33 item 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          12
  - name: belgium_unemployment_article_33_reference_person_weekly_fraction_denominator
    kind: parameter
    dtype: Count
    source: Unemployment royal decree of 25 November 1991, article 33 item 1 one-third reference-person weekly hours test
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          3
  - name: belgium_unemployment_article_30_non_ui_profession_reference_extension_months
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 3 item 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_30_non_ui_profession_uninterrupted_months >= belgium_unemployment_article_30_non_ui_profession_extension_min_uninterrupted_months:
              if belgium_unemployment_article_30_non_ui_profession_no_allowance_granted and belgium_unemployment_article_30_non_ui_profession_days_not_countable_as_work_or_assimilated:
                  min(belgium_unemployment_article_30_non_ui_profession_extension_months, belgium_unemployment_article_30_non_ui_profession_extension_max_months)
              else:
                  0
          else:
              0
  - name: belgium_unemployment_article_30_total_reference_extension_months
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 30 paragraph 3
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_30_incapacity_or_invalidity_extension_months + belgium_unemployment_article_30_non_ui_profession_reference_extension_months + belgium_unemployment_article_30_career_interruption_allowance_extension_months + belgium_unemployment_article_30_detention_or_deprivation_extension_months
  - name: belgium_unemployment_article_30_extended_reference_period_months
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 30 paragraphs 1 and 3
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_30_reference_period_months + belgium_unemployment_article_30_total_reference_extension_months
  - name: belgium_unemployment_article_30_full_time_stage_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 30 paragraphs 1 and 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_30_countable_work_days_since_prior_admission_in_extended_reference_period >= belgium_unemployment_article_30_required_work_days:
              1
          else:
              0
  - name: belgium_unemployment_article_30_full_time_admission_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 30
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_30_worker_is_full_time and belgium_unemployment_article_30_full_time_stage_condition_met == 1:
              1
          else:
              0
  - name: belgium_unemployment_article_33_weekly_hours_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 33 item 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_33_average_weekly_hours >= belgium_unemployment_article_33_min_weekly_hours:
              1
          else:
              if belgium_unemployment_article_33_average_weekly_hours * belgium_unemployment_article_33_reference_person_weekly_fraction_denominator >= belgium_unemployment_article_33_reference_person_average_weekly_hours:
                  1
              else:
                  0
  - name: belgium_unemployment_article_33_required_work_half_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 33 item 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_30_required_work_days
  - name: belgium_unemployment_article_33_voluntary_part_time_stage_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 33 item 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_33_countable_work_half_days_since_prior_admission >= belgium_unemployment_article_33_required_work_half_days:
              1
          else:
              0
  - name: belgium_unemployment_article_33_voluntary_part_time_admission_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 33
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_33_worker_is_voluntary_part_time:
              if belgium_unemployment_article_33_weekly_hours_condition_met == 1 and belgium_unemployment_article_33_voluntary_part_time_stage_condition_met == 1:
                  1
              else:
                  0
          else:
              0
  - name: belgium_unemployment_articles_30_or_33_admission_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, articles 30 and 33
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_30_full_time_admission_condition_met == 1:
              1
          else:
              belgium_unemployment_article_33_voluntary_part_time_admission_condition_met
