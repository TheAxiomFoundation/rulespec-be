  - name: belgium_unemployment_article_114_required_professional_past_years
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_114_admissibility_year >= 2030:
              belgium_unemployment_article_114_required_professional_past_years_2030
          else:
              if belgium_unemployment_article_114_admissibility_year == 2029:
                  belgium_unemployment_article_114_required_professional_past_years_2029
              else:
                  if belgium_unemployment_article_114_admissibility_year == 2028:
                      belgium_unemployment_article_114_required_professional_past_years_2028
                  else:
                      if belgium_unemployment_article_114_admissibility_year == 2027:
                          belgium_unemployment_article_114_required_professional_past_years_2027
                      else:
                          belgium_unemployment_article_114_required_professional_past_years_2026
  - name: belgium_unemployment_article_114_sufficient_professional_past_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_114_professional_past_years >= belgium_unemployment_article_114_required_professional_past_years:
              1
          else:
              0
  - name: belgium_unemployment_article_114_unlimited_time_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_114_worker_is_article_28_3:
              1
          else:
              if belgium_unemployment_article_114_age_years_at_claim >= 55 and belgium_unemployment_article_114_sufficient_professional_past_condition_met == 1:
                  1
              else:
                  if belgium_unemployment_article_114_receives_company_supplement:
                      1
                  else:
                      if belgium_unemployment_article_114_receives_article_78_non_market_allowance:
                          1
                      else:
                          if belgium_unemployment_article_114_safeguard_allowance_maintained:
                              1
                          else:
                              if belgium_unemployment_article_114_arts_work_allowance_maintained:
                                  1
                              else:
                                  if belgium_unemployment_article_114_arts_work_ended_and_article_114bis_flat_rate:
                                      1
                                  else:
                                      0
  - name: belgium_unemployment_article_114_second_period_extension_months
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 1
    versions:
