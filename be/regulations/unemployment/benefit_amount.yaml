format: rulespec/v1
imports:
  - be:regulations/unemployment/admission#belgium_unemployment_articles_30_or_33_admission_condition_met
module:
  summary: |-
    The unemployment royal decree of 25 November 1991 article 111 sets capped
    average daily-wage limits used in unemployment-benefit calculations,
    articles 30 and 33 define full-time and voluntary part-time admission
    gates,
    article 114 sets ordinary unemployment duration, degressivity, and
    temporary-unemployment replacement-rate rules, article 116 sets
    non-running and extension events for that Article 114 duration, and article
    131ter sets the youth and senior holiday allowance at 65 percent of the
    capped average daily wage with a minimum daily amount. This module encodes
    those wage caps, article-114 rate and duration selectors, selected
    article-30/33 admission fallback for article-116 readmission, article-116
    extension and continuation gates, and the article-131ter daily amount. It
    does not encode sanctions, regional activation, calendar-date
    recomputation, full employment-history reconstruction, or the article-131ter
    monthly day-count formula.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1991/11/25/1991013192/article/30
      - be/regulation/arrete/1991/11/25/1991013192/article/33
      - be/regulation/arrete/1991/11/25/1991013192/article/111
      - be/regulation/arrete/1991/11/25/1991013192/article/114
      - be/regulation/arrete/1991/11/25/1991013192/article/116
      - be/regulation/arrete/1991/11/25/1991013192/article/131ter
