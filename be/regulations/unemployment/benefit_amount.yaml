  - name: belgium_unemployment_article_114_total_limited_entitlement_months
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 1 and article 116 extensions
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_114_first_period_months + belgium_unemployment_article_114_second_period_extension_months + belgium_unemployment_article_116_extension_month_equivalents
  - name: belgium_unemployment_article_116_non_ui_profession_pause_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 1 item 6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_116_non_ui_profession_uninterrupted_months >= belgium_unemployment_article_116_non_ui_profession_min_uninterrupted_months:
              if belgium_unemployment_article_116_non_ui_profession_no_allowance_granted:
                  belgium_unemployment_article_116_non_ui_profession_days
              else:
                  0
          else:
              0
  - name: belgium_unemployment_article_116_period_not_running_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_116_full_time_work_days + belgium_unemployment_article_116_part_time_maintained_rights_without_income_guarantee_days + belgium_unemployment_article_116_voluntary_part_time_article_33_without_allowance_days + belgium_unemployment_article_116_article_37_work_days_without_supplemental_allowance + belgium_unemployment_article_116_maternity_paternity_adoption_days + belgium_unemployment_article_116_non_ui_profession_pause_days
  - name: belgium_unemployment_article_116_incapacity_extension_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          max(belgium_unemployment_article_116_incapacity_or_invalidity_benefit_days - belgium_unemployment_article_116_incapacity_excluded_maternity_days - belgium_unemployment_article_116_incapacity_simultaneous_unemployment_days, 0)
  - name: belgium_unemployment_article_116_total_extension_days
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 sections 1 and 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_116_period_not_running_days + belgium_unemployment_article_116_incapacity_extension_days
  - name: belgium_unemployment_article_116_income_guarantee_can_continue_after_expiry
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 3
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_116_receives_income_guarantee_allowance_at_expiry:
              if belgium_unemployment_article_116_part_time_weekly_hours >= belgium_unemployment_article_116_income_guarantee_min_weekly_hours:
                  1
              else:
                  if belgium_unemployment_article_116_part_time_weekly_hours >= belgium_unemployment_article_116_reference_person_half_weekly_hours:
                      1
                  else:
                      0
          else:
              0
  - name: belgium_unemployment_article_116_articles_30_or_33_admissibility_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 4 with articles 30 and 33 admission
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_116_meets_articles_30_or_33_admissibility:
              1
          else:
              belgium_unemployment_articles_30_or_33_admission_condition_met
  - name: belgium_unemployment_article_116_readmitted_to_new_article_114_period
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 116 section 4
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_116_interruption_under_article_138_1_3 and belgium_unemployment_article_116_articles_30_or_33_admissibility_condition_met == 1:
              if belgium_unemployment_article_116_part_time_same_enterprise_or_group_within_12_months:
                  0
              else:
                  1
          else:
              0
  - name: belgium_unemployment_article_114_first_period_applies
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 sections 1 and 3
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_114_first_period_months:
              1
          else:
              0
  - name: belgium_unemployment_article_114_second_period_applies
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 sections 1 and 4
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_indemnification_month_number > belgium_unemployment_article_114_first_period_months:
              if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_114_total_limited_entitlement_months:
                  1
              else:
                  0
          else:
              0
  - name: belgium_unemployment_article_114_limited_entitlement_in_force
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 sections 1 and 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_114_unlimited_time_condition_met == 1:
              1
          else:
              if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_114_total_limited_entitlement_months:
                  1
              else:
                  0
  - name: belgium_unemployment_article_114_ordinary_replacement_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 sections 3 and 4
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_114_first_period_applies == 1:
              if belgium_unemployment_indemnification_month_number <= 3:
                  belgium_unemployment_article_114_first_three_months_replacement_rate
              else:
                  belgium_unemployment_article_114_later_first_period_replacement_rate
          else:
              0
  - name: belgium_unemployment_article_114_selected_average_daily_wage_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 114 section 3 and article 111
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_indemnification_month_number <= 3:
              belgium_unemployment_article_111_wage_cap_a1
          else:
              if belgium_unemployment_indemnification_month_number <= 6:
                  belgium_unemployment_article_111_wage_cap_a2
              else:
                  if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_114_first_period_months:
                      belgium_unemployment_article_111_wage_cap_b
                  else:
                      0
  - name: belgium_unemployment_article_114_capped_average_daily_wage
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 114 section 3 and article 111
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          min(belgium_unemployment_average_daily_wage, belgium_unemployment_article_114_selected_average_daily_wage_cap)
  - name: belgium_unemployment_article_114_ordinary_daily_amount_before_minimum
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 114 sections 3 and 4
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_114_capped_average_daily_wage * belgium_unemployment_article_114_ordinary_replacement_rate
  - name: belgium_unemployment_article_114_temporary_replacement_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Day
    source: Unemployment royal decree of 25 November 1991, article 114 section 6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_temporary_force_majeure:
              belgium_unemployment_article_114_temporary_force_majeure_replacement_rate
          else:
              belgium_unemployment_article_114_temporary_other_reason_replacement_rate
  - name: belgium_unemployment_article_114_temporary_capped_average_daily_wage
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 114 section 6 and article 111 cap C
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          min(belgium_unemployment_average_daily_wage, belgium_unemployment_article_111_wage_cap_c)
  - name: belgium_unemployment_article_114_temporary_daily_amount_before_minimum
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 114 section 6
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_article_114_temporary_capped_average_daily_wage * belgium_unemployment_article_114_temporary_replacement_rate
  - name: belgium_unemployment_article_111_selected_average_daily_wage_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Unemployment royal decree of 25 November 1991, article 111
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_111_wage_cap_selector == belgium_unemployment_article_111_wage_cap_selector_a1:
