- name: belgium_unemployment_article_115_ordinary_minimum_daily_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Day
  unit: EUR
  source: Royal Decree of 25 November 1991 on unemployment regulation, article 115
    section 1
  versions:
  - effective_from: '2026-03-01'
    formula: "if belgium_unemployment_article_115_household_status_code == 1:\n  \
      \  if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit:\n\
      \        belgium_unemployment_minimum_family_charge_first_six_months_daily_amount\n\
      \    else:\n        belgium_unemployment_minimum_family_charge_later_daily_amount\n\
      else:\n    if belgium_unemployment_article_115_household_status_code == 2:\n\
      \        if belgium_unemployment_indemnification_month_number <= belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit:\n\
      \            belgium_unemployment_minimum_isolated_first_six_months_daily_amount\n\
      \        else:\n            belgium_unemployment_minimum_isolated_later_daily_amount\n\
      \    else:\n        if belgium_unemployment_article_115_household_status_code\
      \ == 3:\n            if belgium_unemployment_indemnification_month_number <=\
      \ 3:\n                belgium_unemployment_minimum_cohabiting_first_three_months_daily_amount\n\
      \            else:\n                if belgium_unemployment_indemnification_month_number\
      \ <= belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit:\n\
      \                    belgium_unemployment_minimum_cohabiting_months_four_to_six_daily_amount\n\
      \                else:\n                    if belgium_unemployment_indemnification_month_number\
      \ <= belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit_2:\n\
      \                        belgium_unemployment_minimum_cohabiting_months_seven_to_twelve_daily_amount\n\
      \                    else:\n                        if belgium_unemployment_article_114_4_1_condition_met:\n\
      \                            belgium_unemployment_minimum_cohabiting_second_period_condition_met_daily_amount\n\
      \                        else:\n                            if belgium_unemployment_two_spouses_only_receive_lowest_minimum:\n\
      \                                belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount\
      \ + belgium_unemployment_minimum_two_spouse_increment_daily_amount\n       \
      \                     else:\n                                belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount\n\
      \        else:\n            0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:regulations/unemployment/minimum_daily_amounts#belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit
          output: belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:regulations/unemployment/minimum_daily_amounts#belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit_2
          output: belgium_unemployment_article_115_ordinary_minimum_daily_amount_scalar_limit_2
          hash: sha256:local
