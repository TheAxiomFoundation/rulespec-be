        source:
          corpus_citation_path: be/regulation/arrete/1991/11/25/1991013192/article/115
          span: '§ 2. Le montant journalier minimum de l''allocation de chômage pour
            le travailleur qui bénéficie du régime de chômage avec complément d''entreprise
            ou qui bénéficie de l''indemnité complémentaire pour les travailleurs
            frontaliers âgés licenciés, est fixé à: 1° 37,89 euros pour le travailleur
            ayant charge de famille; 2° 30,71 euros pour le travailleur isolé; 3°
            27,29 euros pour le travailleur cohabitant.'
