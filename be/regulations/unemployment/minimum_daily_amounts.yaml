  - name: belgium_unemployment_article_115_household_status_code
    kind: derived
    entity: Person
    dtype: Count
    source: Royal Decree of 25 November 1991 on unemployment regulation, articles 110 and 115
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_household_status_code > 0:
              belgium_unemployment_household_status_code
          else:
              belgium_unemployment_article_110_household_status_code
  - name: belgium_unemployment_article_115_ordinary_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 25 November 1991 on unemployment regulation, article 115 section 1
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_115_household_status_code == 1:
              if belgium_unemployment_indemnification_month_number <= 6:
                  belgium_unemployment_minimum_family_charge_first_six_months_daily_amount
              else:
                  belgium_unemployment_minimum_family_charge_later_daily_amount
          else:
              if belgium_unemployment_article_115_household_status_code == 2:
                  if belgium_unemployment_indemnification_month_number <= 6:
                      belgium_unemployment_minimum_isolated_first_six_months_daily_amount
                  else:
                      belgium_unemployment_minimum_isolated_later_daily_amount
              else:
                  if belgium_unemployment_article_115_household_status_code == 3:
                      if belgium_unemployment_indemnification_month_number <= 3:
                          belgium_unemployment_minimum_cohabiting_first_three_months_daily_amount
                      else:
                          if belgium_unemployment_indemnification_month_number <= 6:
                              belgium_unemployment_minimum_cohabiting_months_four_to_six_daily_amount
                          else:
                              if belgium_unemployment_indemnification_month_number <= 12:
                                  belgium_unemployment_minimum_cohabiting_months_seven_to_twelve_daily_amount
                              else:
                                  if belgium_unemployment_article_114_4_1_condition_met:
                                      belgium_unemployment_minimum_cohabiting_second_period_condition_met_daily_amount
                                  else:
                                      if belgium_unemployment_two_spouses_only_receive_lowest_minimum:
                                          belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount + belgium_unemployment_minimum_two_spouse_increment_daily_amount
                                      else:
                                          belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount
                  else:
                      0
  - name: belgium_unemployment_article_115_company_supplement_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 25 November 1991 on unemployment regulation, article 115 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_article_115_household_status_code == 1:
              belgium_unemployment_company_supplement_family_charge_daily_amount
          else:
              if belgium_unemployment_article_115_household_status_code == 2:
                  belgium_unemployment_company_supplement_isolated_daily_amount
              else:
                  if belgium_unemployment_article_115_household_status_code == 3:
                      belgium_unemployment_company_supplement_cohabiting_daily_amount
                  else:
                      0
  - name: belgium_unemployment_article_28_3_complete_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 25 November 1991 on unemployment regulation, article 115 section 3
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_unemployment_minimum_family_charge_later_daily_amount
  - name: belgium_unemployment_article_115_temporary_minimum_daily_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: EUR
    source: Royal Decree of 25 November 1991 on unemployment regulation, article 115 section 4
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_unemployment_temporary_force_majeure:
              belgium_unemployment_temporary_force_majeure_daily_amount
          else:
              belgium_unemployment_temporary_other_reason_daily_amount
