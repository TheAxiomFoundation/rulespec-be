      belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount: '16.48'
      belgium_unemployment_minimum_two_spouse_increment_daily_amount: '3.12'
      belgium_unemployment_company_supplement_family_charge_daily_amount: '37.89'
