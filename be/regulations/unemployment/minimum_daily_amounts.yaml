format: rulespec/v1
imports:
- be:regulations/unemployment/household_status#belgium_unemployment_article_110_household_status_code
module:
  summary: 'Federal unemployment royal decree article 115 sets minimum daily unemployment

    allowance amounts by household status, indemnification period, unemployment

    with company supplement, article 28(3) complete-unemployment cases, and

    temporary-unemployment reason. This module encodes article 115 minimum

    amount selectors and uses article 110 household-status classification when

    no positive household-status override is supplied; admission, benefit-base

    calculation, degressivity outside the minimum schedule, and sanctions remain

    separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/regulation/arrete/1991/11/25/1991013192/article/115
    values:
      belgium_unemployment_minimum_family_charge_first_six_months_daily_amount: '43.11'
      belgium_unemployment_minimum_family_charge_later_daily_amount: '39.19'
      belgium_unemployment_minimum_isolated_first_six_months_daily_amount: '34.94'
