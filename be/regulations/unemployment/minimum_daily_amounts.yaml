format: rulespec/v1
imports:
  - be:regulations/unemployment/household_status#belgium_unemployment_article_110_household_status_code
module:
  summary: |-
    Federal unemployment royal decree article 115 sets minimum daily unemployment
    allowance amounts by household status, indemnification period, unemployment
    with company supplement, article 28(3) complete-unemployment cases, and
    temporary-unemployment reason. This module encodes article 115 minimum
    amount selectors and uses article 110 household-status classification when
    no positive household-status override is supplied; admission, benefit-base
    calculation, degressivity outside the minimum schedule, and sanctions remain
    separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/regulation/arrete/1991/11/25/1991013192/article/110
      - be/regulation/arrete/1991/11/25/1991013192/article/114
      - be/regulation/arrete/1991/11/25/1991013192/article/115
    values:
      belgium_unemployment_article_110_family_charge_status_code: 1
      belgium_unemployment_article_110_isolated_status_code: 2
      belgium_unemployment_article_110_cohabiting_status_code: 3
      belgium_unemployment_minimum_family_charge_first_six_months_daily_amount: "43.11"
      belgium_unemployment_minimum_family_charge_later_daily_amount: "39.19"
      belgium_unemployment_minimum_isolated_first_six_months_daily_amount: "34.94"
      belgium_unemployment_minimum_isolated_later_daily_amount: "31.76"
      belgium_unemployment_minimum_cohabiting_first_three_months_daily_amount: "33.63"
      belgium_unemployment_minimum_cohabiting_months_four_to_six_daily_amount: "31.04"
      belgium_unemployment_minimum_cohabiting_months_seven_to_twelve_daily_amount: "28.22"
      belgium_unemployment_minimum_cohabiting_second_period_condition_met_daily_amount: "23.39"
      belgium_unemployment_minimum_cohabiting_second_period_condition_not_met_daily_amount: "16.48"
      belgium_unemployment_minimum_two_spouse_increment_daily_amount: "3.12"
      belgium_unemployment_company_supplement_family_charge_daily_amount: "37.89"
      belgium_unemployment_company_supplement_isolated_daily_amount: "30.71"
      belgium_unemployment_company_supplement_cohabiting_daily_amount: "27.29"
      belgium_unemployment_temporary_force_majeure_daily_amount: "38.72"
      belgium_unemployment_temporary_other_reason_daily_amount: "35.74"
units:
  - name: EUR
    kind: currency
    minor_units: 2
