- name: belgium_unemployment_temporary_force_majeure_daily_amount
  kind: parameter
  dtype: Money
  unit: EUR
  source: Royal Decree of 25 November 1991 on unemployment regulation, article 115
    section 4 item 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/arrete/1991/11/25/1991013192/article/115
          span: '§ 4. Par dérogation aux paragraphes précédents, le montant journalier
            minimum de l''allocation de chômage du chômeur temporaire visé à l''article
            114, § 6, peu importe sa situation familiale, est fixé à: 1° 38,72 euros
            si le contrat de travail du travailleur est suspendu pour cause de force
            majeure au sens de l''article 26 de la loi du 3 juillet 1978 relative
            aux contrats de travail; 2° 35,74 euros si le contrat de travail du travailleur
            est suspendu pour un autre motif.'
