format: rulespec/v1
module:
  summary: 'Royal Decree No. 20 article 1 sets Belgium''s normal VAT rate and reduced

    rates by annex table. This module encodes the headline rates and VAT amount

    calculations when the applicable rate category is supplied. It also encodes

    a small household consumption-category mapper for common Table A, Table B,

    and Table C categories. It also provides a supplied-predicate exemption

    override for VAT Code article 41 or article 44 exempt transactions.

    Detailed table classification, exemption classification, reverse charge,

    and special temporary measures remain separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/regulation/arrete/1970/07/20/1970072012/document
    - be/regulation/fisconetplus/vat/royal-decree-20/Article 1
    - be/regulation/fisconetplus/vat/royal-decree-20/TABLEAU A
    - be/regulation/fisconetplus/vat/royal-decree-20/TABLEAU B
    - be/regulation/fisconetplus/vat/royal-decree-20/TABLEAU C
    - be/statute/fisconetplus/vat-code/Article 41
    - be/statute/fisconetplus/vat-code/Article 44
    values:
      belgium_vat_standard_rate: 0.21
      belgium_vat_reduced_rate: 0.12
      belgium_vat_super_reduced_rate: 0.06
      belgium_vat_zero_rate: 0
      belgium_vat_household_consumption_category_food: 1
      belgium_vat_household_consumption_category_residential_energy: 3
      belgium_vat_household_consumption_category_restaurant_catering: 5
      belgium_vat_household_consumption_category_periodic_publications: 6
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
- name: belgium_vat_standard_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree No. 20 of 20 July 1970, article 1, first paragraph
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "Le taux normal de la taxe sur la valeur ajoutée applicable aux biens et services visés par le Code est fixé à 21 p.c."
  versions:
  - effective_from: '2012-01-01'
    formula: '0.21'
- name: belgium_vat_reduced_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree No. 20 of 20 July 1970, article 1, second paragraph b
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "b) 12 p.c. en ce qui concerne les biens et services énumérés au tableau B de l'annexe au présent arrêté."
  versions:
  - effective_from: '2012-01-01'
    formula: '0.12'
- name: belgium_vat_super_reduced_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree No. 20 of 20 July 1970, article 1, second paragraph a
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "a) 6 p.c. en ce qui concerne les biens et services énumérés au tableau A de l'annexe au présent arrêté."
  versions:
  - effective_from: '2012-01-01'
    formula: '0.06'
- name: belgium_vat_zero_rate
  kind: parameter
  dtype: Rate
  source: Royal Decree No. 20 of 20 July 1970, article 1, second paragraph c
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "c) 0 p.c. en ce qui concerne les biens et services énumérés au tableau C de l'annexe au présent arrêté."
  versions:
  - effective_from: '2019-04-01'
    formula: '0'
- name: belgium_vat_exempt_transaction_rate
  kind: derived
  entity: Household
  dtype: Rate
  period: Year
  source: VAT Code articles 41 and 44 exempt transaction treatment, represented by
    the Royal Decree No. 20 article 1 zero rate
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:regulations/vat/rates#belgium_vat_zero_rate
          output: belgium_vat_zero_rate
          hash: sha256:local
  versions:
  - effective_from: '2019-04-01'
    formula: belgium_vat_zero_rate
- name: belgium_vat_household_consumption_category_standard
  kind: parameter
  dtype: Count
  source: Structural selector for household consumption outside mapped Royal Decree
    No. 20 annex categories
  versions:
  - effective_from: '2019-04-01'
    formula: '0'
- name: belgium_vat_household_consumption_category_food
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table A, goods I through X, food-related reduced-rate
    categories
  versions:
  - effective_from: '2019-04-01'
    formula: '1'
- name: belgium_vat_household_consumption_category_water_distribution
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table A, heading XIII
  versions:
  - effective_from: '2019-04-01'
    formula: '2'
- name: belgium_vat_household_consumption_category_residential_energy
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table A, heading XIV
  versions:
  - effective_from: '2023-07-01'
    formula: '3'
- name: belgium_vat_household_consumption_category_medicines_and_medical_devices
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table A, heading XVII
  versions:
  - effective_from: '2019-04-01'
    formula: '4'
- name: belgium_vat_household_consumption_category_restaurant_catering
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table B, heading I
  versions:
  - effective_from: '2010-01-01'
    formula: '5'
- name: belgium_vat_household_consumption_category_periodic_publications
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20, Table C, heading I
  versions:
  - effective_from: '2019-04-01'
    formula: '6'
- name: belgium_vat_selected_rate_scalar_limit
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20 of 20 July 1970, article 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "a) 6 p.c. en ce qui concerne les biens et services énumérés au tableau A de l'annexe au présent arrêté."
  versions:
  - effective_from: '2019-04-01'
    formula: '6'
- name: belgium_vat_selected_rate_scalar_limit_2
  kind: parameter
  dtype: Count
  source: Royal Decree No. 20 of 20 July 1970, article 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/regulation/fisconetplus/vat/royal-decree-20/Article 1
          span: "b) 12 p.c. en ce qui concerne les biens et services énumérés au tableau B de l'annexe au présent arrêté."
  versions:
  - effective_from: '2019-04-01'
    formula: '12'
- name: belgium_vat_selected_rate
  kind: derived
  entity: Household
  dtype: Rate
  period: Year
  source: Royal Decree No. 20 of 20 July 1970, article 1
  versions:
  - effective_from: '2019-04-01'
    formula: "if belgium_vat_rate_category_code == 0:\n    belgium_vat_zero_rate\n\
      else:\n    if belgium_vat_rate_category_code == belgium_vat_selected_rate_scalar_limit:\n\
      \        belgium_vat_super_reduced_rate\n    else:\n        if belgium_vat_rate_category_code\
      \ == belgium_vat_selected_rate_scalar_limit_2:\n            belgium_vat_reduced_rate\n\
      \        else:\n            belgium_vat_standard_rate"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:regulations/vat/rates#belgium_vat_selected_rate_scalar_limit
          output: belgium_vat_selected_rate_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:regulations/vat/rates#belgium_vat_selected_rate_scalar_limit_2
          output: belgium_vat_selected_rate_scalar_limit_2
          hash: sha256:local
- name: belgium_vat_amount_on_tax_exclusive_consumption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Royal Decree No. 20 of 20 July 1970, article 1
  versions:
  - effective_from: '2019-04-01'
    formula: belgium_vat_tax_exclusive_consumption_amount * belgium_vat_selected_rate
- name: belgium_vat_amount_in_tax_inclusive_consumption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Royal Decree No. 20 of 20 July 1970, article 1
  versions:
  - effective_from: '2019-04-01'
    formula: belgium_vat_tax_inclusive_consumption_amount * belgium_vat_selected_rate
      / (1 + belgium_vat_selected_rate)
- name: belgium_vat_selected_rate_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Rate
  period: Year
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 rates when
    not exempt
  versions:
  - effective_from: '2019-04-01'
    formula: "if belgium_vat_article_41_or_44_exemption_applies:\n    belgium_vat_exempt_transaction_rate\n\
      else:\n    belgium_vat_selected_rate"
- name: belgium_vat_amount_on_tax_exclusive_consumption_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 rates when
    not exempt
  versions:
  - effective_from: '2019-04-01'
    formula: belgium_vat_tax_exclusive_consumption_amount * belgium_vat_selected_rate_after_article_41_44_exemption
- name: belgium_vat_amount_in_tax_inclusive_consumption_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 rates when
    not exempt
  versions:
  - effective_from: '2019-04-01'
    formula: belgium_vat_tax_inclusive_consumption_amount * belgium_vat_selected_rate_after_article_41_44_exemption
      / (1 + belgium_vat_selected_rate_after_article_41_44_exemption)
- name: belgium_vat_selected_rate_from_household_consumption_category
  kind: derived
  entity: Household
  dtype: Rate
  period: Year
  source: Royal Decree No. 20, article 1 and annex Tables A, B, and C
  versions:
  - effective_from: '2023-07-01'
    formula: "if belgium_vat_household_consumption_category_code == belgium_vat_household_consumption_category_periodic_publications:\n\
      \    belgium_vat_zero_rate\nelse:\n    if belgium_vat_household_consumption_category_code\
      \ == belgium_vat_household_consumption_category_restaurant_catering:\n     \
      \   belgium_vat_reduced_rate\n    else:\n        if belgium_vat_household_consumption_category_code\
      \ == belgium_vat_household_consumption_category_food:\n            belgium_vat_super_reduced_rate\n\
      \        else:\n            if belgium_vat_household_consumption_category_code\
      \ == belgium_vat_household_consumption_category_water_distribution:\n      \
      \          belgium_vat_super_reduced_rate\n            else:\n             \
      \   if belgium_vat_household_consumption_category_code == belgium_vat_household_consumption_category_residential_energy:\n\
      \                    belgium_vat_super_reduced_rate\n                else:\n\
      \                    if belgium_vat_household_consumption_category_code == belgium_vat_household_consumption_category_medicines_and_medical_devices:\n\
      \                        belgium_vat_super_reduced_rate\n                  \
      \  else:\n                        belgium_vat_standard_rate"
- name: belgium_vat_amount_on_tax_exclusive_household_consumption_category
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Royal Decree No. 20, article 1 and annex Tables A, B, and C
  versions:
  - effective_from: '2023-07-01'
    formula: belgium_vat_tax_exclusive_household_consumption_category_amount * belgium_vat_selected_rate_from_household_consumption_category
- name: belgium_vat_amount_in_tax_inclusive_household_consumption_category
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Royal Decree No. 20, article 1 and annex Tables A, B, and C
  versions:
  - effective_from: '2023-07-01'
    formula: belgium_vat_tax_inclusive_household_consumption_category_amount * belgium_vat_selected_rate_from_household_consumption_category
      / (1 + belgium_vat_selected_rate_from_household_consumption_category)
- name: belgium_vat_selected_household_consumption_category_rate_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Rate
  period: Year
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 and annex
    Tables A, B, and C when not exempt
  versions:
  - effective_from: '2023-07-01'
    formula: "if belgium_vat_article_41_or_44_exemption_applies:\n    belgium_vat_exempt_transaction_rate\n\
      else:\n    belgium_vat_selected_rate_from_household_consumption_category"
- name: belgium_vat_amount_on_tax_exclusive_household_consumption_category_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 and annex
    Tables A, B, and C when not exempt
  versions:
  - effective_from: '2023-07-01'
    formula: belgium_vat_tax_exclusive_household_consumption_category_amount * belgium_vat_selected_household_consumption_category_rate_after_article_41_44_exemption
- name: belgium_vat_amount_in_tax_inclusive_household_consumption_category_after_article_41_44_exemption
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: VAT Code articles 41 and 44, with Royal Decree No. 20 article 1 and annex
    Tables A, B, and C when not exempt
  versions:
  - effective_from: '2023-07-01'
    formula: belgium_vat_tax_inclusive_household_consumption_category_amount * belgium_vat_selected_household_consumption_category_rate_after_article_41_44_exemption
      / (1 + belgium_vat_selected_household_consumption_category_rate_after_article_41_44_exemption)
