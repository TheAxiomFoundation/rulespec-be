        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
          excerpt: "Cette réduction est égale à 20 % pour un grand invalide et à 10 % pour une personne handicapée"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.20'
- name: belgium_immovable_withholding_disability_reduction
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 257 item 2
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_war_invalid_count > 0 or belgium_immovable_withholding_disabled_person_count\
      \ > 0:\n    belgium_immovable_withholding_article_258_reduction_base_tax * (belgium_immovable_withholding_disability_reduction_scalar_limit_2\
      \ * belgium_immovable_withholding_war_invalid_count + belgium_immovable_withholding_disability_reduction_scalar_limit\
      \ * belgium_immovable_withholding_disabled_person_count)\nelse:\n    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_disability_reduction_scalar_limit
          output: belgium_immovable_withholding_disability_reduction_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_disability_reduction_scalar_limit_2
