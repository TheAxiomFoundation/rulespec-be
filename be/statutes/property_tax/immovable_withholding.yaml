    formula: '0.008'
- name: belgium_immovable_withholding_selected_rate_scalar_limit_2
  kind: parameter
  dtype: Count
  source: CIR 1992 article 255
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-446
          excerpt: "Le précompte immobilier s'élève à 1,25 % du revenu cadastral"
  versions:
  - effective_from: '2025-01-01'
