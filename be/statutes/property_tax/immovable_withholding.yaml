          excerpt: "Cette réduction est égale à 10 % pour chaque enfant à charge non handicapé et à 20 % pour chaque personne à charge handicapée"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.10'
- name: belgium_immovable_withholding_family_reduction_scalar_limit_2
  kind: parameter
  dtype: Count
  source: CIR 1992 article 257 item 3
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
          excerpt: "Cette réduction est égale à 10 % pour chaque enfant à charge non handicapé et à 20 % pour chaque personne à charge handicapée"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.20'
- name: belgium_immovable_withholding_family_reduction
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 257 item 3
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_family_reduction_eligible:\n    belgium_immovable_withholding_article_258_reduction_base_tax\
      \ * (belgium_immovable_withholding_family_reduction_scalar_limit * belgium_immovable_withholding_non_disabled_child_count\
      \ + belgium_immovable_withholding_family_reduction_scalar_limit_2 * belgium_immovable_withholding_disabled_dependent_count)\n\
      else:\n    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_family_reduction_scalar_limit
          output: belgium_immovable_withholding_family_reduction_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_family_reduction_scalar_limit_2
          output: belgium_immovable_withholding_family_reduction_scalar_limit_2
          hash: sha256:local
- name: belgium_immovable_withholding_article_257_core_reductions
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 257
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_immovable_withholding_modest_or_new_dwelling_reduction + belgium_immovable_withholding_disability_reduction
      + belgium_immovable_withholding_family_reduction
- name: belgium_immovable_withholding_article_257_items_2_3_reductions
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 257 items 2 and 3 reductions subject to article 259 rent
    deduction
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_immovable_withholding_disability_reduction + belgium_immovable_withholding_family_reduction
- name: belgium_immovable_withholding_article_259_household_occupied_share
  kind: derived
  entity: Property
  dtype: Rate
  period: Year
  source: CIR 1992 article 259, exclusion for the part occupied by persons outside
    the interested household
  versions:
  - effective_from: '2026-01-01'
    formula: max(0, min(1, 1 - belgium_immovable_withholding_article_259_non_household_occupied_share))
- name: belgium_immovable_withholding_article_259_rent_deductible_reduction
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 259, article-257 items 2 and 3 reductions deductible from
    rent
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_article_259_property_is_rented_to_reduction_beneficiary_household:\n\
      \    belgium_immovable_withholding_article_257_items_2_3_reductions * belgium_immovable_withholding_article_259_household_occupied_share\n\
      else:\n    0"
- name: belgium_immovable_withholding_tax_after_article_257_core_reductions
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 articles 255, 257, and 258
  versions:
  - effective_from: '2026-01-01'
    formula: max(0, belgium_immovable_withholding_gross_tax - belgium_immovable_withholding_article_257_core_reductions)
