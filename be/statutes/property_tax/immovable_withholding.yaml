- name: belgium_immovable_withholding_selected_rate
  kind: derived
  entity: Property
  dtype: Rate
  period: Year
  source: CIR 1992 article 255
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_rate_category == belgium_immovable_withholding_rate_category_social_housing:\n\
      \    belgium_immovable_withholding_selected_rate_scalar_limit\nelse:\n    belgium_immovable_withholding_selected_rate_scalar_limit_2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_selected_rate_scalar_limit
          output: belgium_immovable_withholding_selected_rate_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_selected_rate_scalar_limit_2
          output: belgium_immovable_withholding_selected_rate_scalar_limit_2
          hash: sha256:local
- name: belgium_immovable_withholding_gross_tax
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 255
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_immovable_withholding_taxable_cadastral_income * belgium_immovable_withholding_selected_rate
- name: belgium_immovable_withholding_ordinary_gross_tax
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 255 ordinary rate
  versions:
  - effective_from: '2025-01-01'
    formula: belgium_immovable_withholding_taxable_cadastral_income * belgium_immovable_withholding_selected_rate_scalar_limit_2
- name: belgium_immovable_withholding_article_258_professional_use_threshold_rate
  kind: parameter
  dtype: Rate
  source: CIR 1992 article 258, professional-use cadastral-income quarter threshold
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-448
          excerpt: "quand la quotité du revenu qui s'y rapporte dépasse le quart du revenu cadastral de l'habitation entière"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.25'
- name: belgium_immovable_withholding_article_258_reduction_base_tax
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 258, single designated dwelling and professional-use apportionment
    for article-257 reductions
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_article_257_258_reductions_designated_dwelling:\n\
      \    if belgium_immovable_withholding_professional_use_cadastral_income > belgium_immovable_withholding_whole_dwelling_cadastral_income\
      \ * belgium_immovable_withholding_article_258_professional_use_threshold_rate:\n\
      \        if belgium_immovable_withholding_taxable_cadastral_income > 0:\n  \
      \          belgium_immovable_withholding_gross_tax * max(0, belgium_immovable_withholding_taxable_cadastral_income\
      \ - belgium_immovable_withholding_professional_use_cadastral_income) / belgium_immovable_withholding_taxable_cadastral_income\n\
      \        else:\n            0\n    else:\n        belgium_immovable_withholding_gross_tax\n\
      else:\n    0"
- name: belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit
  kind: parameter
  dtype: Count
  source: CIR 1992 article 257 item 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
          excerpt: "Cette réduction est portée à 50 % pour une période de 5 ans"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.50'
- name: belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit_2
  kind: parameter
  dtype: Count
  source: CIR 1992 article 257 item 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
          excerpt: "une réduction d'un quart du précompte immobilier afférent à l'habitation entièrement occupée par le contribuable"
  versions:
  - effective_from: '2026-01-01'
    formula: '0.25'
- name: belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate
  kind: derived
  entity: Property
  dtype: Rate
  period: Year
  source: CIR 1992 article 257 item 1
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_new_dwelling_five_year_reduction_applies:\n\
      \    belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit\n\
      else:\n    belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit_2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit
          output: belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit
          hash: sha256:local
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit_2
          output: belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate_scalar_limit_2
          hash: sha256:local
- name: belgium_immovable_withholding_modest_or_new_dwelling_reduction_scalar_limit
  kind: parameter
  dtype: Count
  source: CIR 1992 article 257 item 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
          excerpt: "le revenu cadastral de l'ensemble de ses biens immobiliers sis en Belgique ne dépasse pas 745 euros"
  versions:
  - effective_from: '2026-01-01'
    formula: '745'
- name: belgium_immovable_withholding_modest_or_new_dwelling_reduction
  kind: derived
  entity: Property
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 257 item 1
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_immovable_withholding_is_fully_owner_occupied_home and belgium_immovable_withholding_total_belgian_cadastral_income\
      \ <= belgium_immovable_withholding_modest_or_new_dwelling_reduction_scalar_limit:\n\
      \    belgium_immovable_withholding_article_258_reduction_base_tax * belgium_immovable_withholding_modest_or_new_dwelling_reduction_rate\n\
      else:\n    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/property_tax/immovable_withholding#belgium_immovable_withholding_modest_or_new_dwelling_reduction_scalar_limit
          output: belgium_immovable_withholding_modest_or_new_dwelling_reduction_scalar_limit
          hash: sha256:local
- name: belgium_immovable_withholding_disability_reduction_scalar_limit
  kind: parameter
  dtype: Count
  source: CIR 1992 article 257 item 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-447
