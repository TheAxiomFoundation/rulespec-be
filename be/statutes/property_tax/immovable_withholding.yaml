format: rulespec/v1
module:
  summary: 'CIR 1992 articles 255, 257, and 258 set the current non-Flemish

    immovable-withholding-tax base rates and core reductions used for the

    Brussels/Walloon base layer. This module encodes the ordinary and social

    housing rates, the modest-dwelling and new-dwelling reductions, the

    disability/family percentage reductions, the article-258 professional-use

    apportionment and designated-dwelling gate for those reductions, and the

    article-259 rent deduction pass-through for disability and family

    reductions. It excludes provincial and municipal surcharges, article-15

    remission mechanics, application procedure, and Flanders, which is encoded

    separately under the Flemish Fiscal Code.'
  source_verification:
    corpus_citation_path: "be/statute/fisconetplus/cir92/revenus-2025/page-446"
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
- name: belgium_immovable_withholding_rate_category_ordinary
  kind: parameter
  dtype: Count
  source: Structural selector for CIR 1992 article 255 ordinary rate
  versions:
  - effective_from: '2026-01-01'
    formula: '0'
- name: belgium_immovable_withholding_rate_category_social_housing
  kind: parameter
  dtype: Count
  source: Structural selector for CIR 1992 article 255 social-housing rate
  versions:
  - effective_from: '2026-01-01'
    formula: '1'
- name: belgium_immovable_withholding_selected_rate_scalar_limit
  kind: parameter
  dtype: Count
  source: CIR 1992 article 255
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-446
