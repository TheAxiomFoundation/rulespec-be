      rationale: |-
        The Brussels ordinance and Walloon decree establish the base child
        benefit, social-supplement, annual age-supplement, and pre-2020
        transition structures. Walloon Article 120 keeps LGAF amounts and
        supplements for pre-2020 children, Article 123 ties the old LGAF
        social supplement to the first Article 13 ceiling, and Article 128
        bars cumulation of LGAF supplements with decree supplements. The 2025
        Iriscare and AVIQ amount tables are official administrative
        publications used only to ground the indexed amounts in force for the
        BE_2025 oracle slice after checking those statutory sources. The
        Flemish Groeipakket decree
        establishes the current-system base amount, universal participation
        supplement, old-system rank amounts, and old-system age supplements;
        the official GPedia 1 September 2024 amount schedule grounds the
        indexed values EUROMOD BE_2025 applies before the September 2025
        indexation. The German-speaking Community decree provides the
        statutory base amount and entitlement boundaries, and the 2025
        programme-decree amendment freezes indexation for 2025 and sets the
        2025 annual supplement.
