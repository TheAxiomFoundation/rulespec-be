        formula: |-
          24.87
  - name: belgium_child_benefit_brussels_2025_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: EUR
    source: Brussels family-benefits ordinance articles 7 and 35, BE_2025 one-child ordinary monthly amount
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_6_years:
              belgium_child_benefit_brussels_article_7_unique_or_under_12_2025_monthly_amount
          else:
              if belgium_family_benefits_child_benefit_household_child_count == belgium_family_benefits_child_benefit_one_child_count:
                  belgium_child_benefit_brussels_article_7_unique_or_under_12_2025_monthly_amount - belgium_child_benefit_brussels_article_35_pre_2019_2025_monthly_deduction
              else:
                  if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_12_years:
                      belgium_child_benefit_brussels_article_7_unique_or_under_12_2025_monthly_amount - belgium_child_benefit_brussels_article_35_pre_2019_2025_monthly_deduction
                  else:
                      if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_18_years:
                          belgium_child_benefit_brussels_article_7_12_to_17_or_18_to_24_other_2025_monthly_amount - belgium_child_benefit_brussels_article_35_pre_2019_2025_monthly_deduction
                      else:
                          if belgium_family_benefits_child_benefit_child_enrolled_in_higher_education:
                              belgium_child_benefit_brussels_article_7_18_to_24_higher_education_2025_monthly_amount - belgium_child_benefit_brussels_article_35_pre_2019_2025_monthly_deduction
                          else:
                              0
  - name: belgium_child_benefit_brussels_2025_annual_age_supplement
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: Brussels family-benefits ordinance article 15, BE_2025 ordinary annual age supplement
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_6_years:
              belgium_child_benefit_brussels_article_15_under_6_2025_annual_amount
          else:
              if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_12_years:
                  belgium_child_benefit_brussels_article_15_6_to_11_2025_annual_amount
              else:
                  if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_18_years:
                      belgium_child_benefit_brussels_article_15_12_to_17_ordinary_2025_annual_amount
                  else:
                      if belgium_family_benefits_child_benefit_child_enrolled_in_higher_education:
                          belgium_child_benefit_brussels_article_15_18_to_24_higher_education_2025_annual_amount
                      else:
                          0
  - name: belgium_child_benefit_wallonia_2025_monthly_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Month
    unit: EUR
    source: Walloon family-benefits decree articles 9 and 19, BE_2025 one-child ordinary monthly amount
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_6_years:
              belgium_child_benefit_wallonia_new_under_18_2025_monthly_amount
          else:
              if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_12_years:
                  belgium_child_benefit_wallonia_pre_2020_first_child_2025_base_monthly_amount + belgium_child_benefit_wallonia_pre_2020_first_child_6_to_11_2025_monthly_age_supplement
              else:
                  if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_18_years:
                      belgium_child_benefit_wallonia_pre_2020_first_child_2025_base_monthly_amount + belgium_child_benefit_wallonia_pre_2020_first_child_12_to_17_2025_monthly_age_supplement
                  else:
                      if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_25_years:
                          belgium_child_benefit_wallonia_pre_2020_first_child_2025_base_monthly_amount + belgium_child_benefit_wallonia_pre_2020_first_child_18_to_24_2025_monthly_age_supplement
                      else:
                          0
  - name: belgium_child_benefit_wallonia_2025_annual_age_supplement
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: Walloon family-benefits decree articles 9 and 19, BE_2025 ordinary annual age supplement
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_5_years:
              belgium_child_benefit_wallonia_new_0_to_4_2025_annual_amount
          else:
              if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_6_years:
                  belgium_child_benefit_wallonia_new_0_to_4_2025_annual_amount
              else:
                  if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_12_years:
                      belgium_child_benefit_wallonia_pre_2020_6_to_11_2025_annual_age_supplement
                  else:
                      if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_18_years:
                          belgium_child_benefit_wallonia_pre_2020_12_to_17_2025_annual_age_supplement
                      else:
                          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_25_years:
                              belgium_child_benefit_wallonia_pre_2020_18_to_24_2025_annual_age_supplement
                          else:
                              0
  - name: belgium_family_benefits_child_benefit_base_2025_annual_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: Brussels and Walloon 2025 one-child base child benefit for BE_2025 bch_s oracle comparisons
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_25_years:
              if belgium_family_benefits_child_benefit_region == belgium_family_benefits_child_benefit_region_brussels:
                  if belgium_family_benefits_child_benefit_child_age_years < belgium_family_benefits_child_benefit_age_18_years or belgium_family_benefits_child_benefit_child_enrolled_in_higher_education:
                      belgium_child_benefit_brussels_2025_monthly_amount * belgium_family_benefits_child_benefit_months_in_year + belgium_child_benefit_brussels_2025_annual_age_supplement
                  else:
                      0
              else:
                  if belgium_family_benefits_child_benefit_region == belgium_family_benefits_child_benefit_region_wallonia:
                      belgium_child_benefit_wallonia_2025_monthly_amount * belgium_family_benefits_child_benefit_months_in_year + belgium_child_benefit_wallonia_2025_annual_age_supplement
                  else:
                      0
          else:
              0
