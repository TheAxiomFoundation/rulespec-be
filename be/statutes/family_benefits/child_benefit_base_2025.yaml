format: rulespec/v1
module:
  summary: |-
    This module provides a Belgian-facing, household-level 2025 child-benefit
    base surface for the BE_2025 bch_s oracle slice. It covers the
    high-income one-child Brussels, Flemish, and Walloon cases where EUROMOD
    pays the ordinary monthly child benefit plus the annual age supplement,
    the Brussels one-child Article 9 social supplement branch, a same-age
    Brussels Article 9 multi-child household aggregate branch, the Walloon
    Article 13 new-system one-child social supplement branch, the Walloon
    pre-2020 one-child LGAF low-income social supplement branch, and the
    statutory German-speaking Community base branch. Mixed-age multi-child
    composition, orphan and disability supplements, payment-recipient rules,
    and multi-child rank interactions remain separate surfaces. EUROMOD
    BE_2025 currently returns zero for German-speaking Community cases, so
    that branch is encoded from statute rather than matched to the live oracle.
  source_verification:
    corpus_citation_path: "be-bru/statute/ordonnance/2019/04/25/2019012118/article/7"
units:
  - name: EUR
    kind: currency
    minor_units: 2
