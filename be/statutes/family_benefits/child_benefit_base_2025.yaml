format: rulespec/v1
module:
  summary: |-
    This module provides a Belgian-facing, household-level 2025 child-benefit
    base surface for the BE_2025 bch_s oracle slice. It covers the
    high-income one-child Brussels, Flemish, and Walloon cases where EUROMOD
    pays the ordinary monthly child benefit plus the annual age supplement,
    and the statutory German-speaking Community base branch. Social
    supplements, orphan and disability supplements, payment-recipient rules,
    and multi-child rank interactions remain separate surfaces. EUROMOD
    BE_2025 currently returns zero for German-speaking Community cases, so
    that branch is encoded from statute rather than matched to the live oracle.
  source_verification:
    corpus_citation_paths:
      - be-bru/statute/ordonnance/2019/04/25/2019012118/article/7
      - be-bru/statute/ordonnance/2019/04/25/2019012118/article/15
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-2
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-3
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-12
      - be-wal/statute/decret/2018/02/08/2018201006/article/9
      - be-wal/statute/decret/2018/02/08/2018201006/article/19
      - be-wal/guidance/aviq/family-benefits/amount-scale-2025-02/page-1
      - be-wal/guidance/aviq/family-benefits/amount-scale-2025-02/page-4
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/13
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/19
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/20
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/21
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/22
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/210
      - be-vlg/statute/decreet/2018/04/27/2018040369/article/212
      - be-vlg/guidance/gpedia/family-benefits/amount-scale-2024-09/schedule-1
      - be-vlg/guidance/gpedia/family-benefits/amount-scale-2024-09/schedule-3
      - be-vlg/guidance/gpedia/family-benefits/amount-scale-2024-09/schedule-4
