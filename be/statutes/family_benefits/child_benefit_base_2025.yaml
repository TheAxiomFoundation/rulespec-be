format: rulespec/v1
module:
  summary: |-
    This module provides a Belgian-facing, household-level 2025 child-benefit
    base surface for the BE_2025 bch_s oracle slice. It covers the
    high-income one-child Brussels and Walloon cases where EUROMOD pays the
    ordinary monthly child benefit plus the annual age supplement. Flanders,
    the German-speaking Community, social supplements, orphan and disability
    supplements, payment-recipient rules, and multi-child rank interactions
    remain separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be-bru/statute/ordonnance/2019/04/25/2019012118/article/7
      - be-bru/statute/ordonnance/2019/04/25/2019012118/article/15
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-2
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-3
      - be-bru/guidance/iriscare/family-benefits/amount-scale-2025-02/block-12
      - be-wal/statute/decret/2018/02/08/2018201006/article/9
      - be-wal/statute/decret/2018/02/08/2018201006/article/19
      - be-wal/guidance/aviq/family-benefits/amount-scale-2025-02/page-1
      - be-wal/guidance/aviq/family-benefits/amount-scale-2025-02/page-4
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - be-bru/statute/ordonnance/2019/04/25/2019012118/article/7
        - be-bru/statute/ordonnance/2019/04/25/2019012118/article/15
        - be-wal/statute/decret/2018/02/08/2018201006/article/9
        - be-wal/statute/decret/2018/02/08/2018201006/article/19
      rationale: |-
        The Brussels ordinance and Walloon decree establish the base child
        benefit and annual age-supplement structures. The 2025 Iriscare and
        AVIQ amount tables are official administrative publications used only
        to ground the indexed amounts in force for the BE_2025 oracle slice
        after checking those statutory sources.
    values:
      belgium_family_benefits_child_benefit_region_brussels: 1
      belgium_family_benefits_child_benefit_region_wallonia: 3
      belgium_family_benefits_child_benefit_months_in_year: 12
      belgium_family_benefits_child_benefit_age_5_years: 5
      belgium_family_benefits_child_benefit_age_6_years: 6
      belgium_family_benefits_child_benefit_age_11_years: 11
      belgium_family_benefits_child_benefit_age_12_years: 12
      belgium_family_benefits_child_benefit_age_18_years: 18
