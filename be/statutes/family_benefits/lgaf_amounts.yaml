- name: belgium_lgaf_article_42_multiple_allocataire_grouping_condition_met
  kind: derived
  entity: Child
  dtype: Count
  period: Month
  source: LGAF article 42 section 1
  versions:
  - effective_from: '2000-08-31'
    formula: "if belgium_lgaf_single_allocataire_for_rank_group:\n    1\nelse:\n \
      \   if belgium_lgaf_allocataires_same_principal_residence and belgium_lgaf_allocataires_qualifying_relationship_or_de_facto_household:\n\
      \        1\n    else:\n        0"
- name: belgium_lgaf_article_42_effective_child_rank
  kind: derived
  entity: Child
  dtype: Count
  period: Month
  source: LGAF article 42
  versions:
  - effective_from: '2000-08-31'
    formula: "if belgium_lgaf_child_is_article_50bis_orphan:\n    0\nelse:\n    belgium_lgaf_supplied_child_rank_for_amounts"
- name: belgium_lgaf_article_40_base_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: LGAF articles 40 and 42
  versions:
  - effective_from: '2002-01-01'
    formula: "if belgium_lgaf_article_42_effective_child_rank <= 0:\n    0\nelse:\n\
      \    if belgium_lgaf_article_42_effective_child_rank == 1:\n        belgium_lgaf_article_40_first_child_monthly_base_amount\n\
      \    else:\n        if belgium_lgaf_article_42_effective_child_rank == 2:\n\
      \            belgium_lgaf_article_40_second_child_monthly_base_amount\n    \
      \    else:\n            belgium_lgaf_article_40_third_and_later_child_monthly_base_amount"
- name: belgium_lgaf_article_41_single_parent_supplement_base_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: LGAF article 41
  versions:
  - effective_from: '2008-10-01'
    formula: "if not belgium_lgaf_article_41_single_parent_supplement_conditions_met:\n\
      \    0\nelse:\n    if belgium_lgaf_article_42_effective_child_rank == 1:\n \
      \       belgium_lgaf_article_41_first_child_single_parent_supplement_base_amount\n\
      \    else:\n        if belgium_lgaf_article_42_effective_child_rank == 2:\n\
      \            belgium_lgaf_article_41_second_child_single_parent_supplement_base_amount\n\
      \        else:\n            belgium_lgaf_article_41_third_and_later_child_single_parent_supplement_base_amount"
- name: belgium_lgaf_article_42bis_social_supplement_base_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: LGAF article 42bis section 2
  versions:
  - effective_from: '2007-05-01'
    formula: "if not belgium_lgaf_article_42bis_social_supplement_conditions_met:\n\
      \    0\nelse:\n    if belgium_lgaf_article_42_effective_child_rank == 1:\n \
      \       belgium_lgaf_article_42bis_first_child_social_supplement_base_amount\n\
      \    else:\n        if belgium_lgaf_article_42_effective_child_rank == 2:\n\
      \            belgium_lgaf_article_42bis_second_child_social_supplement_base_amount\n\
      \        else:\n            if belgium_lgaf_article_42bis_third_or_later_allocataire_meets_article_41_first_two_conditions:\n\
      \                belgium_lgaf_article_42bis_third_and_later_article_41_allocataire_social_supplement_base_amount\n\
      \            else:\n                belgium_lgaf_article_42bis_third_and_later_child_social_supplement_base_amount"
