format: rulespec/v1
module:
  summary: 'The 19 December 1939 Loi generale relative aux allocations familiales

    (LGAF) contains the coordinated-law amount schedule referenced by the

    federal guaranteed-family-benefits implementation decree. This module

    encodes the current consolidated amount articles for rank-based monthly

    family allowances, selected supplements, age supplements, orphan amount,

    first and second birth allowances, adoption premium, and Article 76bis

    indexation interfaces. It does not replace regional post-transfer systems,

    eligibility predicates, child-status proof, or the third-and-later birth

    grant BEF-to-EUR conversion, which remains supplied until an upstream

    conversion source is ingested.'
  source_verification:
    corpus_citation_paths:
    - be/statute/loi/1939/12/19/1939121901/article/40
