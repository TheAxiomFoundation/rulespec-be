module:
  summary: 'Federal guaranteed family benefits law of 20 July 1971 and its 25 October

    1971 implementing royal decree define a pre-2019 national guarantee layer:

    principal maintenance by a Belgium resident, child residence and

    other-benefit conditions, resource-test exemptions and ceilings, claim

    windows, placement exceptions, advances, and delegated amount interfaces.

    This module encodes those eligibility and payment-gating mechanics and

    imports the LGAF coordinated-law amount schedule when no supplied override

    is present. It leaves full Article 51/62 child-status predicates,

    ministerial equity decisions, third-and-later birth-grant BEF conversion,

    and regional post-transfer systems to separate surfaces or supplied inputs.'
  source_verification:
    corpus_citation_path: "be/statute/loi/1971/07/20/1971072007/article/1"
units:
- name: EUR
  kind: currency
  minor_units: 2
