format: rulespec/v1
module:
  summary: 'Federal disability-allowances law articles 2, 6, and 12 set age thresholds,

    income-replacement annual amounts, integration-allowance autonomy categories,

    elderly-care autonomy categories, and the institutional-payment suspension

    percentage. This module encodes those statutory amount and category surfaces

    only; resource tests, medical assessment, delegated category definitions, and

    regional elderly-care competence remain separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/statute/loi/1987/02/27/1987022077/article/2
    - be/statute/loi/1987/02/27/1987022077/article/6
    - be/statute/loi/1987/02/27/1987022077/article/12
    values:
      belgium_disability_working_age_allowance_min_age_years: '18'
      belgium_disability_elderly_care_allowance_min_age_years: '65'
      belgium_disability_income_replacement_category_a_annual_amount: '6191.01'
      belgium_disability_income_replacement_category_b_annual_amount: '9472.26'
      belgium_disability_income_replacement_category_c_annual_amount: '12550.16'
      belgium_disability_integration_category_1_annual_amount: '908.33'
      belgium_disability_integration_category_2_annual_amount: '3004.40'
      belgium_disability_integration_category_3_annual_amount: '4778.10'
      belgium_disability_integration_category_4_annual_amount: '6943.85'
      belgium_disability_integration_category_5_annual_amount: '7872.29'
      belgium_disability_elderly_care_category_1_annual_amount: '743.98'
      belgium_disability_elderly_care_category_2_annual_amount: '2839.94'
      belgium_disability_elderly_care_category_3_annual_amount: '3452.91'
      belgium_disability_elderly_care_category_4_annual_amount: '4065.70'
      belgium_disability_elderly_care_category_5_annual_amount: '4994.14'
      belgium_disability_integration_institution_suspension_rate: '0.28'
units:
- name: EUR
  kind: currency
  minor_units: 2
