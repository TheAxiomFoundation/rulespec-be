format: rulespec/v1
module:
  summary: 'Federal disability-allowances law articles 2, 6, and 12 set age thresholds,

    income-replacement annual amounts, integration-allowance autonomy categories,

    elderly-care autonomy categories, and the institutional-payment suspension

    percentage. This module encodes those statutory amount and category surfaces

    only; resource tests, medical assessment, delegated category definitions, and

    regional elderly-care competence remain separate surfaces.'
  source_verification:
    corpus_citation_path: "be/statute/loi/1987/02/27/1987022077/article/2"
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
