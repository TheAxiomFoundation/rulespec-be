  - name: belgium_worker_article_17_uncapped_component_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: Federal law of 27 June 1969 revising the social security decree-law for workers, article 17 section 1
    versions:
      - effective_from: '1977-03-09'
        formula: |-
          if belgium_social_security_worker_is_manual:
              belgium_worker_manual_pension_rate + belgium_worker_manual_indemnities_rate + belgium_worker_manual_unemployment_rate + belgium_worker_manual_health_care_rate
          else:
              belgium_worker_intellectual_pension_rate + belgium_worker_intellectual_indemnities_rate + belgium_worker_intellectual_unemployment_rate + belgium_worker_intellectual_health_care_rate
  - name: belgium_employer_article_17_uncapped_component_rate
