              belgium_employer_manual_pension_rate + belgium_employer_manual_indemnities_rate + belgium_employer_manual_unemployment_rate + belgium_employer_manual_health_care_rate + belgium_employer_manual_family_allowances_rate + belgium_employer_manual_annual_vacation_rate
          else:
              belgium_employer_intellectual_pension_rate + belgium_employer_intellectual_indemnities_rate + belgium_employer_intellectual_unemployment_rate + belgium_employer_intellectual_health_care_rate + belgium_employer_intellectual_family_allowances_rate
  - name: belgium_worker_article_17_uncapped_component_contribution
    kind: derived
