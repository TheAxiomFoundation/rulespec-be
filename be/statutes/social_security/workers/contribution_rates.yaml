format: rulespec/v1
module:
  summary: |-
    Federal social-security law article 17 sets component contribution rates
    for worker and employer contributions by manual and intellectual worker
    categories. This module encodes those statutory component rates, total
    uncapped component selectors, and uncapped worker/employer contribution
    amounts from a supplied Article 17 contribution base. Wage caps, later ONSS
    administrative current-rate tables, reductions, student/flexi-job
    categories, and self-employed rules remain separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1969/06/27/1969062710/article/17
    values:
      belgium_worker_manual_pension_rate: "0.06"
      belgium_worker_manual_indemnities_rate: "0.011"
      belgium_worker_manual_unemployment_rate: "0.012"
      belgium_worker_manual_health_care_rate: "0.018"
      belgium_worker_intellectual_pension_rate: "0.06"
      belgium_worker_intellectual_indemnities_rate: "0.007"
      belgium_worker_intellectual_unemployment_rate: "0.012"
      belgium_worker_intellectual_health_care_rate: "0.018"
      belgium_employer_manual_pension_rate: "0.08"
      belgium_employer_manual_indemnities_rate: "0.018"
      belgium_employer_manual_unemployment_rate: "0.017"
      belgium_employer_manual_health_care_rate: "0.0375"
      belgium_employer_manual_family_allowances_rate: "0.0775"
      belgium_employer_manual_annual_vacation_rate: "0.1475"
      belgium_employer_intellectual_pension_rate: "0.08"
      belgium_employer_intellectual_indemnities_rate: "0.018"
      belgium_employer_intellectual_unemployment_rate: "0.017"
      belgium_employer_intellectual_health_care_rate: "0.0375"
      belgium_employer_intellectual_family_allowances_rate: "0.0772"
units:
