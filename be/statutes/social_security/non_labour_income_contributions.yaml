        formula: |-
          if belgium_pension_solidarity_beneficiary_has_family_charge:
              belgium_pension_solidarity_article_68_family_third_threshold_base * belgium_pension_solidarity_article_68_index_factor
          else:
              belgium_pension_solidarity_article_68_isolated_third_threshold_base * belgium_pension_solidarity_article_68_index_factor
  - name: belgium_pension_solidarity_article_68_selected_fourth_threshold
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_beneficiary_has_family_charge:
              belgium_pension_solidarity_article_68_family_fourth_threshold_base * belgium_pension_solidarity_article_68_index_factor
          else:
              belgium_pension_solidarity_article_68_isolated_fourth_threshold_base * belgium_pension_solidarity_article_68_index_factor
  - name: belgium_pension_solidarity_article_68_selected_transition_base_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_beneficiary_has_family_charge:
              belgium_pension_solidarity_article_68_family_transition_base_amount * belgium_pension_solidarity_article_68_index_factor
          else:
              belgium_pension_solidarity_article_68_isolated_transition_base_amount * belgium_pension_solidarity_article_68_index_factor
  - name: belgium_pension_solidarity_article_68_monthly_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_first_threshold:
              0
          else:
              if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_second_threshold:
                  (belgium_pension_solidarity_article_68_total_monthly_gross_pensions - belgium_pension_solidarity_article_68_selected_first_threshold) * belgium_pension_solidarity_article_68_phase_in_rate
              else:
                  if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_third_threshold:
                      belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_pension_solidarity_article_68_mid_rate
                  else:
                      if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_fourth_threshold:
                          belgium_pension_solidarity_article_68_selected_transition_base_amount + (belgium_pension_solidarity_article_68_total_monthly_gross_pensions - belgium_pension_solidarity_article_68_selected_third_threshold) * belgium_pension_solidarity_article_68_phase_in_rate
                      else:
                          belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_pension_solidarity_article_68_top_rate
  - name: belgium_pension_solidarity_article_68_complementary_capital_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 5
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          belgium_complementary_pension_capital_paid_after_1996 * belgium_pension_solidarity_article_68_capital_withholding_rate
  - name: belgium_health_insurance_article_191_monthly_pension_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law on compulsory health-care and indemnity insurance coordinated on 14 July 1994, article 191, 7
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_health_insurance_article_191_pension_withholding_rate
  - name: belgium_rd33_selected_monthly_floor
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          if belgium_rd33_beneficiary_has_family_charge:
              (belgium_rd33_base_monthly_floor_without_family_charge + belgium_rd33_family_charge_monthly_floor_increment) * belgium_rd33_floor_revaluation_factor
          else:
              belgium_rd33_base_monthly_floor_without_family_charge * belgium_rd33_floor_revaluation_factor
  - name: belgium_rd33_invalidity_floor_for_paid_days
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1 and Royal Decree of 24 September 1982, article 3
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          belgium_rd33_selected_monthly_floor / belgium_rd33_invalidity_daily_floor_divisor * belgium_rd33_invalidity_paid_days
  - name: belgium_rd33_invalidity_monthly_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1 and Royal Decree of 24 September 1982, articles 3 and 10
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          min(belgium_rd33_monthly_invalidity_indemnities * belgium_rd33_invalidity_prepension_withholding_rate, max(0, belgium_rd33_monthly_invalidity_indemnities - belgium_rd33_invalidity_floor_for_paid_days))
  - name: belgium_rd33_prepension_floor
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          belgium_rd33_selected_monthly_floor * belgium_rd33_prepension_floor_fraction
  - name: belgium_rd33_prepension_monthly_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1 and Royal Decree of 24 September 1982, article 10
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          min(belgium_rd33_monthly_prepension_and_complementary_indemnity * belgium_rd33_invalidity_prepension_withholding_rate, max(0, belgium_rd33_monthly_prepension_and_complementary_indemnity - belgium_rd33_prepension_floor))
  - name: belgium_rd33_total_monthly_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          belgium_rd33_invalidity_monthly_withholding + belgium_rd33_prepension_monthly_withholding
  - name: belgium_pensioner_health_and_solidarity_months_in_year
    kind: parameter
    dtype: Integer
    source: Annual bridge from the monthly article 68 solidarity and article 191 health-insurance pension withholdings
    versions:
      - effective_from: '1994-03-30'
        formula: |-
          12
  - name: belgium_pensioner_total_annual_health_and_solidarity_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: EUR
    source: Annual total of the Law of 14 July 1994 article 191 health-insurance pension withholding and the Law of 30 March 1994 article 68 pension solidarity withholding. Composed to face EUROMOD BE_2025 tscpe_s, which accumulates both instruments into a single pensioner social-insurance-contribution output; it excludes the Royal Decree No. 33 invalidity/prepension withholding, which EUROMOD carries as a separate instrument.
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          (belgium_health_insurance_article_191_monthly_pension_withholding + belgium_pension_solidarity_article_68_monthly_withholding) * belgium_pensioner_health_and_solidarity_months_in_year
