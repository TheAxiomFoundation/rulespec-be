format: rulespec/v1
module:
  summary: |-
    The 30 March 1994 social provisions law article 68 establishes a pension
    solidarity withholding on the total monthly gross amount of legal and
    complementary pensions, with different tables for isolated beneficiaries
    and beneficiaries with family charge. The 14 July 1994 coordinated
    health-insurance law article 191 separately assigns a 3.55 percent
    withholding on legal and complementary pensions to insurance resources.
    Royal Decree No. 33 of 30 March 1982 establishes a 3.5 percent
    pension-sector withholding on invalidity indemnities and prepensions,
    limited so the benefit is not reduced below the indexed statutory floor.
    This module encodes the article 68 table, the article 68 indexation
    interface through a supplied pension-index factor, the article 68 section 5
    two percent withholding on complementary-pension capital paid after 1996,
    the article 191 pension health-insurance withholding, and the RD No. 33
    invalidity/prepension floor-limited withholding. It leaves foreign and
    international pension allocation, priority ordering across payers, DB2P and
    Sigedis communication, fictive-rent conversion tables, refunds, penalties,
    current delegated floor revaluation factors, and post-2027 supplementary
    capital-withholding procedures to separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1994/03/30/1994021117/article/68
      - be/statute/loi/1994/03/30/1994021117/article/68ter
      - be/statute/loi/1994/03/30/1994021117/article/68quinquies
      - be/statute/loi/1994/07/14/1994071451/article/191
      - be/regulation/arrete/1982/03/30/1982000477/article/1
      - be/regulation/arrete/1982/09/24/1982001524/article/3
      - be/regulation/arrete/1982/09/24/1982001524/article/10
      - be/guidance/sfp/pension-withholding/2025/ami-and-solidarity-contribution/block-4
      - be/guidance/sfp/pension-withholding/2025/ami-and-solidarity-contribution/block-5
      - be/guidance/sfp/pension-withholding/2025/ami-and-solidarity-contribution/block-11
      - be/guidance/sfp/pension-withholding/2025/ami-and-solidarity-contribution/block-12
