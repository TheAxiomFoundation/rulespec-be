      belgium_pension_solidarity_article_68_family_second_threshold_base: "2040.15"
      belgium_pension_solidarity_article_68_family_third_threshold_base: "2168.84"
      belgium_pension_solidarity_article_68_family_fourth_threshold_base: "2191.43"
