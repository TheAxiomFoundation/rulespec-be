    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          belgium_pension_solidarity_monthly_gross_legal_pensions + belgium_pension_solidarity_monthly_gross_complementary_pensions + belgium_pension_solidarity_nonmonthly_periodic_pensions_monthly_equivalent + belgium_pension_solidarity_capital_pensions_fictive_monthly_rent
  - name: belgium_pension_solidarity_article_68_selected_first_threshold
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_beneficiary_has_family_charge:
              belgium_pension_solidarity_article_68_family_first_threshold_base * belgium_pension_solidarity_article_68_index_factor
          else:
              belgium_pension_solidarity_article_68_isolated_first_threshold_base * belgium_pension_solidarity_article_68_index_factor
  - name: belgium_pension_solidarity_article_68_selected_second_threshold
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_beneficiary_has_family_charge:
              belgium_pension_solidarity_article_68_family_second_threshold_base * belgium_pension_solidarity_article_68_index_factor
          else:
              belgium_pension_solidarity_article_68_isolated_second_threshold_base * belgium_pension_solidarity_article_68_index_factor
  - name: belgium_pension_solidarity_article_68_selected_third_threshold
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
