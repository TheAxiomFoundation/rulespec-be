  - name: belgium_pension_solidarity_article_68_selected_transition_base_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2. The third-bracket transition constant equals the second-bracket rate applied to the third threshold (the statutory table writes it out as 28.44 for the isolated base and 32.53 for the family base, each being the third threshold times 1.5 percent); deriving it from the selected third threshold keeps it consistent under indexation, so the same rule reproduces both the 2019 statutory base constants and the indexed 2025 amounts published by the Service federal des Pensions.
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          belgium_pension_solidarity_article_68_selected_third_threshold * belgium_pension_solidarity_article_68_mid_rate
  - name: belgium_pension_solidarity_article_68_monthly_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 68 section 2
    versions:
      - effective_from: '2019-03-01'
        formula: |-
          if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_first_threshold:
              0
          else:
              if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_second_threshold:
                  (belgium_pension_solidarity_article_68_total_monthly_gross_pensions - belgium_pension_solidarity_article_68_selected_first_threshold) * belgium_pension_solidarity_article_68_phase_in_rate
              else:
                  if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_third_threshold:
                      belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_pension_solidarity_article_68_mid_rate
                  else:
                      if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_pension_solidarity_article_68_selected_fourth_threshold:
                          belgium_pension_solidarity_article_68_selected_transition_base_amount + (belgium_pension_solidarity_article_68_total_monthly_gross_pensions - belgium_pension_solidarity_article_68_selected_third_threshold) * belgium_pension_solidarity_article_68_phase_in_rate
                      else:
                          belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_pension_solidarity_article_68_top_rate
