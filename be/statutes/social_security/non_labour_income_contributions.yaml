  - name: belgium_health_insurance_article_191_monthly_pension_withholding
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Law on compulsory health-care and indemnity insurance coordinated on 14 July 1994, article 191, 7, as executed by the Royal Decree of 8 December 2013. The 3.55% withholding does not apply to low pensions. Pensions at or below the indexed monthly floor owe nothing, pensions in the phase-in band above the floor owe only the excess over the floor (so the withholding cannot push the pension below the protected floor), and only pensions above the phase-in ceiling owe the full 3.55%. Effective from 2025 with the indexed 2025 thresholds from the Service federal des Pensions tables.
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_health_insurance_article_191_selected_health_floor_lower_monthly:
              0
          else:
              if belgium_pension_solidarity_article_68_total_monthly_gross_pensions <= belgium_health_insurance_article_191_selected_health_floor_upper_monthly:
                  belgium_pension_solidarity_article_68_total_monthly_gross_pensions - belgium_health_insurance_article_191_selected_health_floor_lower_monthly
              else:
                  belgium_pension_solidarity_article_68_total_monthly_gross_pensions * belgium_health_insurance_article_191_pension_withholding_rate
  - name: belgium_rd33_selected_monthly_floor
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: EUR
    source: Royal Decree No. 33 of 30 March 1982, article 1
    versions:
      - effective_from: '2006-04-01'
        formula: |-
          if belgium_rd33_beneficiary_has_family_charge:
              (belgium_rd33_base_monthly_floor_without_family_charge + belgium_rd33_family_charge_monthly_floor_increment) * belgium_rd33_floor_revaluation_factor
          else:
              belgium_rd33_base_monthly_floor_without_family_charge * belgium_rd33_floor_revaluation_factor
