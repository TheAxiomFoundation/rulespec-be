      belgium_pension_solidarity_article_68_family_second_threshold_base: "3844.66"
      belgium_pension_solidarity_article_68_family_third_threshold_base: "4087.18"
      belgium_pension_solidarity_article_68_family_fourth_threshold_base: "4129.76"
      belgium_pension_solidarity_article_68_phase_in_rate: "0.50"
      belgium_pension_solidarity_article_68_mid_rate: "0.015"
      belgium_pension_solidarity_article_68_top_rate: "0.02"
      belgium_pension_solidarity_article_68_isolated_transition_base_amount: "28.44"
      belgium_pension_solidarity_article_68_family_transition_base_amount: "32.53"
      belgium_pension_solidarity_article_68_capital_withholding_rate: "0.02"
      belgium_health_insurance_article_191_pension_withholding_rate: "0.0355"
      belgium_health_insurance_article_191_isolated_health_floor_lower_monthly: "2037.73"
      belgium_health_insurance_article_191_isolated_health_floor_upper_monthly: "2112.71"
      belgium_health_insurance_article_191_family_health_floor_lower_monthly: "2414.98"
      belgium_health_insurance_article_191_family_health_floor_upper_monthly: "2503.85"
      belgium_rd33_invalidity_prepension_withholding_rate: "0.035"
      belgium_rd33_base_monthly_floor_without_family_charge: "938.50"
      belgium_rd33_family_charge_monthly_floor_increment: "191.94"
      belgium_rd33_invalidity_daily_floor_divisor: "26"
    upstream_source_check:
      status: delegated_parameter_source
      checked_paths:
        - be/statute/loi/1994/07/14/1994071451/article/191
        - be/statute/loi/1994/03/30/1994021117/article/68
        - be/regulation/arrete/2013/12/08/2013022585/article/1
      rationale: |-
        The statutes and executing royal decree are cited and encoded directly
        for the withholding mechanics, the base tables, and the 3.55 percent
        health rate. Article 191, 7 of the coordinated Law of 14 July 1994 fixes
        the health rate and, as executed by the Royal Decree of 8 December 2013,
        protects low pensions with an exemption floor and phase-in band; article
        68 section 2 of the Law of 30 March 1994 fixes the solidarity table on a
        pivot-index base (114.89). Neither primary source states the indexed
        monetary thresholds in force in 2025: those amounts are produced by the
        statutory indexation mechanism and published only in administrative
        tables. The Service federal des Pensions 2025 withholding tables are the
        official parameter source for the indexed 2025 thresholds, so the 2025
        floor and threshold values are grounded there while the mechanics, rates,
        and base tables remain grounded in the statutes and the royal decree.
