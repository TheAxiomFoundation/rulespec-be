  - name: belgium_special_social_security_article_108_annual_contribution
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 108
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          if not belgium_special_social_security_household_has_article_106_person:
              0
          else:
              if belgium_special_social_security_joint_assessment:
                  if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_first_threshold:
                      0
                  else:
                      if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_second_threshold:
                          (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_first_threshold) * belgium_special_social_security_article_108_first_rate
                      else:
                          if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_single_top_threshold:
                              belgium_special_social_security_article_108_second_base_amount + (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_second_threshold) * belgium_special_social_security_article_108_second_rate
                          else:
                              if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_joint_plateau_upper_threshold:
                                  belgium_special_social_security_article_108_joint_plateau_amount
                              else:
                                  if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_joint_top_threshold:
                                      belgium_special_social_security_article_108_joint_plateau_amount + (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_joint_plateau_upper_threshold) * belgium_special_social_security_article_108_joint_top_rate
                                  else:
                                      belgium_special_social_security_article_108_maximum_contribution
              else:
                  if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_first_threshold:
                      0
                  else:
                      if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_second_threshold:
                          (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_first_threshold) * belgium_special_social_security_article_108_first_rate
                      else:
                          if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_single_third_threshold:
                              belgium_special_social_security_article_108_second_base_amount + (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_second_threshold) * belgium_special_social_security_article_108_second_rate
                          else:
                              if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_single_fourth_threshold:
                                  belgium_special_social_security_article_108_single_third_base_amount + (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_single_third_threshold) * belgium_special_social_security_article_108_single_third_rate
                              else:
                                  if belgium_special_social_security_article_107_household_income <= belgium_special_social_security_article_108_single_top_threshold:
                                      belgium_special_social_security_article_108_single_fourth_base_amount + (belgium_special_social_security_article_107_household_income - belgium_special_social_security_article_108_single_fourth_threshold) * belgium_special_social_security_article_108_single_fourth_rate
                                  else:
                                      belgium_special_social_security_article_108_maximum_contribution
  - name: belgium_special_social_security_article_110_balance_before_minimum_assessment
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 110 section 1
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          max(0, belgium_special_social_security_article_108_annual_contribution - belgium_special_social_security_article_110_retained_or_supplement_paid)
  - name: belgium_special_social_security_article_110_balance_collected
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 110 section 1
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          if belgium_special_social_security_article_110_balance_before_minimum_assessment < belgium_special_social_security_article_110_minimum_assessment_or_refund:
              0
          else:
              belgium_special_social_security_article_110_balance_before_minimum_assessment
  - name: belgium_special_social_security_article_110_overpayment_before_minimum_refund
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 110 section 2
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          max(0, belgium_special_social_security_article_110_retained_or_supplement_paid - belgium_special_social_security_article_108_annual_contribution)
  - name: belgium_special_social_security_article_110_refund_amount
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 110 section 2
    versions:
      - effective_from: '2002-01-01'
        formula: |-
          if belgium_special_social_security_article_110_overpayment_before_minimum_refund < belgium_special_social_security_article_110_minimum_assessment_or_refund:
              0
          else:
              belgium_special_social_security_article_110_overpayment_before_minimum_refund
  - name: belgium_special_social_security_article_109_adjusted_monthly_wage
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 109 section 1
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          if belgium_special_social_security_article_109_apply_108_percent_wage_base:
              belgium_special_social_security_article_109_monthly_wage * 1.08
          else:
              belgium_special_social_security_article_109_monthly_wage
  - name: belgium_special_social_security_article_109_adjusted_quarterly_wage
    kind: derived
    entity: Person
    dtype: Money
    period: Quarter
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 109 section 1
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          if belgium_special_social_security_article_109_apply_108_percent_wage_base:
              belgium_special_social_security_article_109_quarterly_wage * 1.08
          else:
              belgium_special_social_security_article_109_quarterly_wage
  - name: belgium_special_social_security_article_109_regular_monthly_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 109 section 1 paragraph 2
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_first_threshold:
              0
          else:
              if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_second_threshold:
                  max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_first_threshold) * belgium_special_social_security_article_109_regular_first_rate
              else:
                  if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_third_threshold:
                      belgium_special_social_security_article_109_regular_second_base_amount + max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_second_threshold) * belgium_special_social_security_article_109_regular_second_rate
                  else:
                      if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_fourth_threshold:
                          belgium_special_social_security_article_109_regular_third_base_amount + max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_third_threshold) * belgium_special_social_security_article_109_regular_third_rate
                      else:
                          if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_top_threshold:
                              belgium_special_social_security_article_109_regular_fourth_base_amount + max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_fourth_threshold) * belgium_special_social_security_article_109_regular_second_rate
                          else:
                              belgium_special_social_security_article_109_monthly_max_withholding
  - name: belgium_special_social_security_article_109_joint_two_earner_monthly_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 109 section 1 paragraph 3
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_spouse_professional_income_floor:
              0
          else:
              if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_first_threshold:
                  belgium_special_social_security_article_109_joint_two_earner_minimum
              else:
                  if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_second_threshold:
                      max(belgium_special_social_security_article_109_joint_two_earner_minimum, max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_first_threshold) * belgium_special_social_security_article_109_joint_first_rate)
                  else:
                      min(belgium_special_social_security_article_109_joint_two_earner_cap, belgium_special_social_security_article_109_joint_second_base_amount + max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_second_threshold) * belgium_special_social_security_article_109_regular_second_rate)
  - name: belgium_special_social_security_article_109_joint_one_earner_monthly_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Law of 30 March 1994 on social provisions, article 109 section 1 paragraph 3
    versions:
      - effective_from: '2022-04-01'
        formula: |-
          if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_first_threshold:
              0
          else:
              if belgium_special_social_security_article_109_adjusted_quarterly_wage <= belgium_special_social_security_article_109_quarterly_second_threshold:
                  max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_first_threshold) * belgium_special_social_security_article_109_joint_first_rate
              else:
                  min(belgium_special_social_security_article_109_monthly_max_withholding, belgium_special_social_security_article_109_joint_second_base_amount + max(0, belgium_special_social_security_article_109_adjusted_monthly_wage - belgium_special_social_security_article_109_monthly_second_threshold) * belgium_special_social_security_article_109_regular_second_rate)
  - name: belgium_special_social_security_article_109_monthly_withholding
