format: rulespec/v1
module:
  summary: |-
    The 30 March 1994 social provisions law articles 106 to 110 establish the
    special social-security contribution. This module encodes the article 108
    annual household contribution scale, the article 109 monthly payroll
    withholding schedule for supplied wages and household flags, and the article
    110 settlement/refund minimum threshold. It leaves detailed household
    membership, Article 107 income construction from PIT variables, social
    treaty exclusions, employer remittance administration, and special worker
    categories as separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1994/03/30/1994021117/article/106
      - be/statute/loi/1994/03/30/1994021117/article/107
      - be/statute/loi/1994/03/30/1994021117/article/108
      - be/statute/loi/1994/03/30/1994021117/article/109
      - be/statute/loi/1994/03/30/1994021117/article/110
    values:
      belgium_special_social_security_article_108_first_threshold: "18592.02"
      belgium_special_social_security_article_108_second_threshold: "21070.96"
      belgium_special_social_security_article_108_single_third_threshold: "37344.00"
      belgium_special_social_security_article_108_single_fourth_threshold: "40997.26"
      belgium_special_social_security_article_108_single_top_threshold: "60181.95"
      belgium_special_social_security_article_108_joint_plateau_upper_threshold: "74688.00"
      belgium_special_social_security_article_108_joint_top_threshold: "81944.00"
      belgium_special_social_security_article_108_maximum_contribution: "731.28"
      belgium_special_social_security_article_109_monthly_max_withholding: "60.94"
      belgium_special_social_security_article_110_minimum_assessment_or_refund: "2.50"
units:
  - name: EUR
    kind: currency
    minor_units: 2
