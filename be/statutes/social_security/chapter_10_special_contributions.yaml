format: rulespec/v1
module:
  summary: |-
    The 29 June 1981 social-security principles law article 38, article 39,
    article 39ter, and article 39quater encode several Chapter 10 special
    contribution surfaces. This module covers the article 39 private-sector
    double-holiday-pay withholding, the article 39ter/39quater public-sector
    vacation/Copernic/restructuring withholding, the article 38 section 3septies
    profit-premium solidarity contribution, the section 3ter second-pillar
    pension contribution, the section 3terdecies Wijninckx contribution, the
    section 3quater company-car solidarity contribution, the section 3sexies
    economic-unemployment contribution, and the section 3novies non-recurring
    result-benefit contributions. The local/provincial public-sector union
    premium is exposed as a supplied amount because the corpus has the ONSS
    collection hook but not the article 4 rate text from the 1980 union-premium
    law. The module leaves administration, declarations, exemptions requiring
    external certification, delegated index factors, and household integration
    to separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1981/06/29/1981001048/article/38
      - be/statute/loi/1981/06/29/1981001048/article/39
      - be/statute/loi/1981/06/29/1981001048/article/39ter
      - be/statute/loi/1981/06/29/1981001048/article/39quater
      - be/statute/loi/1969/06/27/1969062710/article/5-2
      - be/statute/loi/1980/09/01/1980090102/document
    values:
      belgium_article_38_section_3ter_second_pillar_rate: "0.0886"
      belgium_article_38_section_3septies_profit_premium_rate: "0.1307"
      belgium_article_38_section_3novies_nonrecurring_employer_rate: "0.33"
      belgium_article_38_section_3novies_nonrecurring_worker_rate: "0.1307"
