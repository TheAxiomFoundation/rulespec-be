          else:
              max(belgium_article_38_section_3quater_base_calculated_monthly_amount * belgium_company_car_solidarity_health_index_factor * belgium_article_38_section_3quater_new_vehicle_multiplier_2026, belgium_article_38_section_3quater_new_vehicle_minimum_2026)
