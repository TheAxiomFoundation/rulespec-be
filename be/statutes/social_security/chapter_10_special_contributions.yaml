  - name: belgium_article_38_section_3sexies_economic_unemployment_rate_factor
    kind: derived
    entity: Person
    dtype: Money
    period: Quarter
    unit: EUR
    source: Law of 29 June 1981 establishing general principles of employee social security, article 38 section 3sexies
    versions:
      - effective_from: '2017-01-01'
        formula: |-
          if belgium_economic_unemployment_days_four_quarter_sum <= belgium_article_38_section_3sexies_economic_unemployment_first_threshold_days:
              0
          else:
              if belgium_economic_unemployment_days_four_quarter_sum <= belgium_article_38_section_3sexies_economic_unemployment_second_threshold_days:
                  belgium_article_38_section_3sexies_economic_unemployment_first_rate
              else:
                  if belgium_economic_unemployment_days_four_quarter_sum <= belgium_article_38_section_3sexies_economic_unemployment_third_threshold_days:
                      belgium_article_38_section_3sexies_economic_unemployment_second_rate
                  else:
                      if belgium_economic_unemployment_days_four_quarter_sum <= belgium_article_38_section_3sexies_economic_unemployment_fourth_threshold_days:
                          belgium_article_38_section_3sexies_economic_unemployment_third_rate
                      else:
                          if belgium_economic_unemployment_days_four_quarter_sum <= belgium_article_38_section_3sexies_economic_unemployment_fifth_threshold_days:
                              belgium_article_38_section_3sexies_economic_unemployment_fourth_rate
                          else:
                              belgium_article_38_section_3sexies_economic_unemployment_fifth_rate
