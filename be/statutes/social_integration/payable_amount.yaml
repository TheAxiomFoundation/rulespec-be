- be:regulations/social_integration/resource_calculation#belgium_social_integration_article_34_cohabitant_resources
module:
  summary: 'This module bridges the federal social-integration law''s Article 3/4

    eligibility conditions, Article 14/15 selected revenu d''integration amount,

    and Article 14 section 2 resource offset into annual and monthly payable

    revenu d''integration amounts. It prefers a supplied aggregate Chapter II

    resource amount when present, otherwise it uses the encoded itemized

    resource-calculation surfaces as a fallback subtotal. CPAS equity,

    procedure, payment timing, recovery, and proof decisions remain separate

    surfaces or upstream inputs.'
  source_verification:
    corpus_citation_paths:
    - be/statute/loi/2002/05/26/2002022559/article/3
    - be/statute/loi/2002/05/26/2002022559/article/4
    - be/statute/loi/2002/05/26/2002022559/article/7
    - be/statute/loi/2002/05/26/2002022559/article/14
    - be/statute/loi/2002/05/26/2002022559/article/15
    - be/regulation/arrete/2002/07/11/2002022564/article/22
    - be/regulation/arrete/2002/07/11/2002022564/article/23
    - be/regulation/arrete/2002/07/11/2002022564/article/24
    - be/regulation/arrete/2002/07/11/2002022564/article/25
    - be/regulation/arrete/2002/07/11/2002022564/article/26
    - be/regulation/arrete/2002/07/11/2002022564/article/27
    - be/regulation/arrete/2002/07/11/2002022564/article/28
    - be/regulation/arrete/2002/07/11/2002022564/article/29
    - be/regulation/arrete/2002/07/11/2002022564/article/30
    - be/regulation/arrete/2002/07/11/2002022564/article/31
    - be/regulation/arrete/2002/07/11/2002022564/article/32
    - be/regulation/arrete/2002/07/11/2002022564/article/33
    - be/regulation/arrete/2002/07/11/2002022564/article/34
    - be/regulation/arrete/2002/07/11/2002022564/article/35
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
- name: belgium_social_integration_chapter_2_itemized_monthly_income_months_in_year
  kind: parameter
  dtype: Count
  source: Structural months-in-year multiplier for annualizing monthly earned income
    in the Chapter II itemized resource fallback subtotal
  versions:
  - effective_from: '2024-05-31'
    formula: '12'
- name: belgium_social_integration_chapter_2_itemized_annual_resources
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: Itemized fallback subtotal from the 11 July 2002 implementing royal decree,
    articles 22 to 35
  versions:
  - effective_from: '2024-05-31'
    formula: belgium_social_integration_article_22_countable_resources + belgium_social_integration_article_23_35_monthly_countable_earned_income
      * belgium_social_integration_chapter_2_itemized_monthly_income_months_in_year
      + belgium_social_integration_article_26_rented_property_resource + belgium_social_integration_article_27_movable_capital_resource
      + belgium_social_integration_article_28_32_transfer_resource + belgium_social_integration_article_33_in_kind_housing_income
      + belgium_social_integration_article_34_cohabitant_resources
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/social_integration/payable_amount#belgium_social_integration_chapter_2_itemized_monthly_income_months_in_year
          output: belgium_social_integration_chapter_2_itemized_monthly_income_months_in_year
          hash: sha256:local
- name: belgium_social_integration_article_14_resource_reduction
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: Federal law of 26 May 2002 concerning the right to social integration, article
    14 section 2
  versions:
  - effective_from: '2024-05-31'
    formula: "if belgium_social_integration_use_supplied_chapter_2_countable_annual_resources:\n\
      \    belgium_social_integration_supplied_chapter_2_countable_annual_resources\n\
      else:\n    belgium_social_integration_chapter_2_itemized_annual_resources"
- name: belgium_social_integration_article_14_payable_annual_amount_before_eligibility
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: Federal law of 26 May 2002 concerning the right to social integration, article
    14 sections 1 and 2
  versions:
  - effective_from: '2024-05-31'
    formula: max(0, belgium_social_integration_selected_annual_amount -
      belgium_social_integration_article_14_resource_reduction)
- name: belgium_social_integration_article_14_payable_annual_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: Federal law of 26 May 2002 concerning the right to social integration, articles
    3, 4, 7, and 14
  versions:
  - effective_from: '2024-05-31'
    formula: "if belgium_social_integration_article_3_4_general_eligibility_condition_met\
      \ == 1:\n    belgium_social_integration_article_14_payable_annual_amount_before_eligibility\n\
      else:\n    0"
- name: belgium_social_integration_article_14_payable_months_in_year
  kind: parameter
  dtype: Count
  source: Structural months-in-year denominator for the monthly bridge from Article
    14 annual revenu d'integration after eligibility
    and resource offset
  versions:
  - effective_from: '2024-05-31'
    formula: '12'
- name: belgium_social_integration_article_14_payable_monthly_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: EUR
  source: Monthly bridge from Article 14 annual revenu d'integration after eligibility
    and resource offset
  versions:
  - effective_from: '2024-05-31'
    formula: belgium_social_integration_article_14_payable_annual_amount / belgium_social_integration_article_14_payable_months_in_year
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/social_integration/payable_amount#belgium_social_integration_article_14_payable_months_in_year
          output: belgium_social_integration_article_14_payable_months_in_year
          hash: sha256:local
- name: belgium_social_integration_income_support_cent_rounding_denominator
  kind: parameter
  dtype: Decimal
  source: Structural euro-cent rounding denominator for the monthly revenu d'integration
    amount
  versions:
  - effective_from: '2024-05-31'
    formula: '100'
- name: belgium_social_integration_income_support_monthly_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Month
  unit: EUR
  source: Monthly revenu d'integration amount after eligibility, resource offset,
    and euro-cent presentation
  versions:
  - effective_from: '2024-05-31'
    formula: floor((belgium_social_integration_article_14_payable_monthly_amount
      * belgium_social_integration_income_support_cent_rounding_denominator) + 0.5)
      / belgium_social_integration_income_support_cent_rounding_denominator
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/social_integration/payable_amount#belgium_social_integration_income_support_cent_rounding_denominator
          output: belgium_social_integration_income_support_cent_rounding_denominator
          hash: sha256:local
- name: belgium_social_integration_income_support_annual_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: Federal law of 26 May 2002 concerning the right to social integration,
    articles 3, 4, 7, 14, and 15
  versions:
  - effective_from: '2024-05-31'
    formula: belgium_social_integration_income_support_monthly_amount * belgium_social_integration_article_14_payable_months_in_year
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/social_integration/payable_amount#belgium_social_integration_income_support_monthly_amount
          output: belgium_social_integration_income_support_monthly_amount
          hash: sha256:local
