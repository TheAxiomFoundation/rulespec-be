format: rulespec/v1
imports:
  - be:statutes/social_integration/eligibility#belgium_social_integration_article_3_4_general_eligibility_condition_met
  - be:statutes/social_integration/minimum_income_amounts#belgium_social_integration_article_15_indexed_annual_amount
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_22_countable_resources
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_23_35_monthly_countable_earned_income
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_26_rented_property_resource
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_27_movable_capital_resource
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_28_32_transfer_resource
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_33_in_kind_housing_income
  - be:regulations/social_integration/resource_calculation#belgium_social_integration_article_34_cohabitant_resources
module:
  summary: |-
    This module bridges the federal social-integration law's Article 3/4
    eligibility conditions, Article 14/15 indexed revenu d'integration amount,
    and Article 14 section 2 resource offset into annual and monthly payable
    revenu d'integration amounts. It prefers a supplied aggregate Chapter II
    resource amount when present, otherwise it uses the encoded itemized
    resource-calculation surfaces as a fallback subtotal. CPAS equity,
    procedure, payment timing, recovery, and proof decisions remain separate
    surfaces or upstream inputs.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/2002/05/26/2002022559/article/3
      - be/statute/loi/2002/05/26/2002022559/article/4
      - be/statute/loi/2002/05/26/2002022559/article/7
      - be/statute/loi/2002/05/26/2002022559/article/14
      - be/statute/loi/2002/05/26/2002022559/article/15
      - be/regulation/arrete/2002/07/11/2002022564/article/22
      - be/regulation/arrete/2002/07/11/2002022564/article/23
      - be/regulation/arrete/2002/07/11/2002022564/article/24
      - be/regulation/arrete/2002/07/11/2002022564/article/25
      - be/regulation/arrete/2002/07/11/2002022564/article/26
      - be/regulation/arrete/2002/07/11/2002022564/article/27
      - be/regulation/arrete/2002/07/11/2002022564/article/28
      - be/regulation/arrete/2002/07/11/2002022564/article/29
      - be/regulation/arrete/2002/07/11/2002022564/article/30
      - be/regulation/arrete/2002/07/11/2002022564/article/31
      - be/regulation/arrete/2002/07/11/2002022564/article/32
      - be/regulation/arrete/2002/07/11/2002022564/article/33
      - be/regulation/arrete/2002/07/11/2002022564/article/34
      - be/regulation/arrete/2002/07/11/2002022564/article/35
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_social_integration_chapter_2_itemized_annual_resources
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Itemized fallback subtotal from the 11 July 2002 implementing royal decree, articles 22 to 35
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_social_integration_article_22_countable_resources + belgium_social_integration_article_23_35_monthly_countable_earned_income * 12 + belgium_social_integration_article_26_rented_property_resource + belgium_social_integration_article_27_movable_capital_resource + belgium_social_integration_article_28_32_transfer_resource + belgium_social_integration_article_33_in_kind_housing_income + belgium_social_integration_article_34_cohabitant_resources
  - name: belgium_social_integration_article_14_resource_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Federal law of 26 May 2002 concerning the right to social integration, article 14 section 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_social_integration_supplied_chapter_2_countable_annual_resources > 0:
              belgium_social_integration_supplied_chapter_2_countable_annual_resources
          else:
              belgium_social_integration_chapter_2_itemized_annual_resources
  - name: belgium_social_integration_article_14_payable_annual_amount_before_eligibility
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Federal law of 26 May 2002 concerning the right to social integration, article 14 sections 1 and 2
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          max(0, belgium_social_integration_article_15_indexed_annual_amount - belgium_social_integration_article_14_resource_reduction)
  - name: belgium_social_integration_article_14_payable_annual_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Federal law of 26 May 2002 concerning the right to social integration, articles 3, 4, 7, and 14
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          if belgium_social_integration_article_3_4_general_eligibility_condition_met == 1:
              belgium_social_integration_article_14_payable_annual_amount_before_eligibility
          else:
              0
  - name: belgium_social_integration_article_14_payable_monthly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: EUR
    source: Monthly bridge from Article 14 annual revenu d'integration after eligibility and resource offset
    versions:
      - effective_from: '2026-03-01'
        formula: |-
          belgium_social_integration_article_14_payable_annual_amount / 12
