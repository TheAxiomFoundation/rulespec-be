- name: belgium_social_integration_article_14_base_annual_amount
  kind: derived
  entity: Household
  dtype: Money
  period: Year
  unit: EUR
  source: Federal law of 26 May 2002 concerning the right to social integration, article
    14 section 1
  versions:
  - effective_from: '2002-10-01'
    formula: "if has_dependent_family:\n    belgium_social_integration_dependent_family_base_annual_amount\n\
      else:\n    if is_cohabiting:\n        belgium_social_integration_cohabitant_base_annual_amount\n\
      \    else:\n        belgium_social_integration_isolated_base_annual_amount"
