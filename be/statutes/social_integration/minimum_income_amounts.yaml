format: rulespec/v1
module:
  summary: 'Federal social-integration law article 14 sets annual base amounts for
    the

    revenu d''integration by household category. Article 15 attaches those

    amounts to the 103.14 consumer-price index applicable on 1 June 1999 and

    links them to the 2 August 1971 indexation regime. This module encodes the

    statutory base amounts, household category selector, and an indexed amount

    bridge using a supplied current index factor. It also exposes an optional

    supplied current monthly amount bridge for official SPP/POD Social

    Integration amount tables when a current category amount is available

    directly. Chapter II resource

    calculations remain separate surfaces.'
  source_verification:
    corpus_citation_paths:
    - be/statute/loi/2002/05/26/2002022559/article/14
    - be/statute/loi/2002/05/26/2002022559/article/15
    - be/statute/loi/2002/05/26/2002022559/article/60
    values:
      belgium_social_integration_cohabitant_base_annual_amount: '4400'
      belgium_social_integration_isolated_base_annual_amount: '6600'
      belgium_social_integration_dependent_family_base_annual_amount: '8800'
      belgium_social_integration_article_15_base_consumer_price_index: '103.14'
units:
- name: EUR
  kind: currency
  minor_units: 2
