format: rulespec/v1
module:
  summary: |-
    Federal social-integration law article 3 sets the general eligibility
    conditions for the right to social integration, article 4 covers asserted
    maintenance rights when imposed by the CPAS, article 7 assimilates selected
    minors to adults, and the implementing royal decree article 2 defines
    effective residence in Belgium. This module encodes those top-level
    eligibility predicates from supplied residence, status, resource, work, and
    maintenance-right facts. It does not decide CPAS equity, proof, PIIS
    contract contents, or payable revenu d'integration amounts.
  source_verification:
    corpus_citation_path: "be/statute/loi/2002/05/26/2002022559/article/3"
rules:
  - name: belgium_social_integration_adult_age_years
    kind: parameter
    dtype: Count
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 2, and Civil Code article 488
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: "be/statute/loi/1804/03/21/1804032150/article/488"
              excerpt: "La majorite est fixee a dix-huit ans accomplis"
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          18
  - name: belgium_social_integration_eu_residence_first_months_excluded
    kind: parameter
    dtype: Count
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 3
    versions:
      - effective_from: '2013-07-11'
        formula: |-
          3
  - name: belgium_social_integration_effective_residence_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Royal Decree of 11 July 2002 on the general regulation for social integration, article 2, implementing law article 3 item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/regulation/arrete/2002/07/11/2002022564/article/2"
              excerpt: "Est considéré comme ayant sa résidence effective en Belgique au sens de l'article 3, 1°, de la loi, celui qui séjourne habituellement et en permanence sur le territoire du Royaume, même s'il ne dispose pas d'un logement ou s'il n'est pas inscrit dans les registres de la population visés à l'article 1, § 1, 1°, de la loi du 19 juillet 1991 relative aux registres de la population, pour autant qu'il soit autorisé au séjour sur le territoire du Royaume."
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_habitually_and_permanently_stays_in_belgium and belgium_social_integration_authorized_to_stay_in_belgium:
              1
          else:
              0
  - name: belgium_social_integration_minor_assimilated_to_adult_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 7
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_minor_emancipated_by_marriage:
              1
          else:
              if belgium_social_integration_minor_has_dependent_child:
                  1
              else:
                  if belgium_social_integration_minor_is_pregnant:
                      1
                  else:
                      0
  - name: belgium_social_integration_adult_or_assimilated_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 2 and article 7
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/2002/05/26/2002022559/article/7"
              excerpt: "Est assimilée à une personne majeure, la personne mineure d'âge qui soit est émancipée par mariage, soit a un ou plusieurs enfants à sa charge, soit prouve qu'elle est enceinte."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1804/03/21/1804032150/article/488"
              excerpt: "La majorite est fixee a dix-huit ans accomplis; a cet age, on est capable de tous les actes de la vie civile."
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_age_years >= belgium_social_integration_adult_age_years:
              1
          else:
              belgium_social_integration_minor_assimilated_to_adult_condition_met
  - name: belgium_social_integration_qualifying_status_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/2002/05/26/2002022559/article/3"
              excerpt: "soit bénéficier de la protection subsidiaire au sens de l'article 49/2 de la loi du 15 décembre 1980 sur l'accès au territoire, le séjour, l'établissement et l'éloignement des étrangers;"
    versions:
      - effective_from: '2016-12-01'
        formula: |-
          if belgium_social_integration_person_has_belgian_nationality:
              1
          else:
              if belgium_social_integration_eu_citizen_or_family_with_residence_over_three_months and belgium_social_integration_eu_residence_months_completed > belgium_social_integration_eu_residence_first_months_excluded:
                  1
              else:
                  if belgium_social_integration_registered_foreigner_in_population_register:
                      1
                  else:
                      if belgium_social_integration_stateless_under_1954_convention:
                          1
                      else:
                          if belgium_social_integration_refugee_under_1980_law:
                              1
                          else:
                              if belgium_social_integration_subsidiary_protection_under_1980_law:
                                  1
                              else:
                                  0
  - name: belgium_social_integration_resource_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 4
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_has_sufficient_resources:
              0
          else:
              if belgium_social_integration_can_claim_sufficient_resources:
                  0
              else:
                  if belgium_social_integration_can_procure_sufficient_resources_by_efforts_or_other_means:
                      0
                  else:
                      1
  - name: belgium_social_integration_work_disposition_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 3 item 5
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_disposed_to_work:
              1
          else:
              if belgium_social_integration_health_or_equity_prevents_work:
                  1
              else:
                  0
  - name: belgium_social_integration_maintenance_rights_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, article 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/2002/05/26/2002022559/article/4"
              excerpt: "Il peut être imposé à l'intéressé de faire valoir ses droits à l'égard des personnes qui lui doivent des aliments, ces dernières étant limitées à : son conjoint ou, le cas échéant, son ex-conjoint;"
    versions:
      - effective_from: '2002-10-01'
        formula: |-
          if belgium_social_integration_cpas_requires_maintenance_rights_against_listed_debtor:
              if belgium_social_integration_maintenance_rights_against_listed_debtor_asserted:
                  1
              else:
                  0
          else:
              1
  - name: belgium_social_integration_article_3_4_general_eligibility_condition_met
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: Federal law of 26 May 2002 concerning the right to social integration, articles 3 and 4
    versions:
      - effective_from: '2016-12-01'
        formula: |-
          if belgium_social_integration_effective_residence_condition_met == 1:
              if belgium_social_integration_adult_or_assimilated_condition_met == 1:
                  if belgium_social_integration_qualifying_status_condition_met == 1:
                      if belgium_social_integration_resource_condition_met == 1:
                          if belgium_social_integration_work_disposition_condition_met == 1:
                              if belgium_social_integration_social_benefit_rights_asserted:
                                  belgium_social_integration_maintenance_rights_condition_met
                              else:
                                  0
                          else:
                              0
                      else:
                          0
                  else:
                      0
              else:
                  0
          else:
              0
