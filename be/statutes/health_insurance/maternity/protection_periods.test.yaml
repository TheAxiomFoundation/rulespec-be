- name: single_birth_prenatal_and_base_postnatal_period
  period:
    period_kind: custom
    name: calendar_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    be:statutes/health_insurance/maternity/protection_periods#input.belgium_maternity_expected_multiple_birth: false
    be:statutes/health_insurance/maternity/protection_periods#input.belgium_maternity_actual_multiple_birth: false
    be:statutes/health_insurance/maternity/protection_periods#input.belgium_maternity_multiple_birth_requested_extension_days: 0
    be:statutes/health_insurance/maternity/protection_periods#input.belgium_maternity_newborn_hospitalization_days_after_birth: 0
  output:
    be:statutes/health_insurance/maternity/protection_periods#belgium_maternity_prenatal_earliest_start_days_before_birth: 42
    be:statutes/health_insurance/maternity/protection_periods#belgium_maternity_article_114_postnatal_rest_days: 63

