format: rulespec/v1
module:
  summary: |-
    The coordinated 14 July 1994 health-insurance law defines maternity
    protection periods and delegates benefit rates to the King. This module
    encodes the source-stated timing mechanics: prenatal earliest start,
    postnatal base duration, optional multiple-birth extension, stillbirth
    gestation threshold, newborn-hospitalization extension, and working-day
    maternity-indemnity surface. Delegated indemnity rates are encoded in the
    1996 health-insurance implementing-decree regulation module.
  source_verification:
    corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/113"
rules:
  - name: belgium_maternity_prenatal_single_birth_earliest_start_days_before_birth
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, prenatal rest for single birth
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "Le repos prénatal débute, à la demande de la titulaire, au plus tôt à partir de la sixième semaine qui précède la date présumée de l'accouchement"
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          42
  - name: belgium_maternity_prenatal_multiple_birth_earliest_start_days_before_birth
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, prenatal rest for expected multiple birth
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "Le repos prénatal débute, à la demande de la titulaire, au plus tôt à partir de la sixième semaine qui précède la date présumée de l'accouchement ou de la huitième semaine, lorsqu'une naissance multiple est prévue."
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          56
  - name: belgium_maternity_postnatal_base_rest_days
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, postnatal rest period of nine weeks
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "Le repos postnatal s'étend à une période de neuf semaines qui prend cours le jour de l'accouchement."
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          63
  - name: belgium_maternity_multiple_birth_extension_max_days
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, optional multiple-birth postnatal extension of at most two weeks
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "En cas de naissance multiple, la période de repos postnatal de neuf semaines, éventuellement prolongée conformément aux dispositions de l'alinéa précédent, peut, à la demande de la titulaire, être prolongée d'une période de deux semaines au maximum."
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          14
  - name: belgium_maternity_stillbirth_minimum_gestation_days
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, stillbirth rule for pregnancies lasting at least 180 days from conception
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "Lorsque la titulaire accouche d'un enfant sans vie, les alinéas 1er à 3 s'appliquent, pour autant que la grossesse ait duré un minimum de cent-quatre-vingts jours à dater de la conception."
    versions:
      - effective_from: '2019-03-31'
        formula: |-
          180
  - name: belgium_maternity_newborn_hospitalization_initial_days_without_extension
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, newborn hospitalization first seven days
    versions:
      - effective_from: '2006-09-01'
        formula: |-
          7
  - name: belgium_maternity_newborn_hospitalization_extension_max_days
    kind: parameter
    dtype: Count
    source: Coordinated health-insurance law of 14 July 1994, article 114, newborn hospitalization extension capped at twenty-four weeks
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/114
              excerpt: "La durée de cette prolongation ne peut dépasser vingt-quatre semaines."
    versions:
      - effective_from: '2006-09-01'
        formula: |-
          168
  - name: belgium_maternity_prenatal_earliest_start_days_before_birth
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 114
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          if belgium_maternity_expected_multiple_birth:
              belgium_maternity_prenatal_multiple_birth_earliest_start_days_before_birth
          else:
              belgium_maternity_prenatal_single_birth_earliest_start_days_before_birth
  - name: belgium_maternity_multiple_birth_selected_extension_days
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 114
    versions:
      - effective_from: '2004-07-01'
        formula: |-
          if belgium_maternity_actual_multiple_birth:
              min(belgium_maternity_multiple_birth_requested_extension_days, belgium_maternity_multiple_birth_extension_max_days)
          else:
              0
  - name: belgium_maternity_newborn_hospitalization_extension_days
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 114
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/114"
              excerpt: "En cas de naissance multiple, la période de repos postnatal de neuf semaines, éventuellement prolongée conformément aux dispositions de l'alinéa précédent, peut, à la demande de la titulaire, être prolongée d'une période de deux semaines au maximum."
    versions:
      - effective_from: '2006-09-01'
        formula: |-
          min(max(0, belgium_maternity_newborn_hospitalization_days_after_birth - belgium_maternity_newborn_hospitalization_initial_days_without_extension), belgium_maternity_newborn_hospitalization_extension_max_days)
  - name: belgium_maternity_article_114_postnatal_rest_days
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 114
    versions:
      - effective_from: '2006-09-01'
        formula: |-
          belgium_maternity_postnatal_base_rest_days + belgium_maternity_multiple_birth_selected_extension_days + belgium_maternity_newborn_hospitalization_extension_days
  - name: belgium_maternity_stillbirth_minimum_gestation_threshold_met
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 114
    versions:
      - effective_from: '2019-03-31'
        formula: |-
          if belgium_maternity_gestation_days_from_conception >= belgium_maternity_stillbirth_minimum_gestation_days:
              1
          else:
              0
  - name: belgium_maternity_indemnity_due_days_in_protection_period
    kind: derived
    entity: Person
    dtype: Count
    period: Year
    source: Coordinated health-insurance law of 14 July 1994, article 113, maternity indemnity paid for working days in article 114 and 114bis protection periods
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/113"
              excerpt: "(La titulaire visée à l'article 112 reçoit, pour chaque jour ouvrable des périodes de protection de la maternité visées aux articles 114 et 114bis et pour chaque jour de ces mêmes périodes assimilé à un jour ouvrable par un règlement du comité de gestion du Service des indemnités, une prestation dite \" indemnité de maternité\"."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: "be/statute/loi/1994/07/14/1994071451/article/114bis"
              excerpt: "Constitue également une période de protection de la maternité, la période pendant laquelle la travailleuse enceinte, accouchée ou allaitante bénéficie d'une mesure visée aux articles 42, § 1, 43 ou 43bis de la loi du 16 mars 1971 sur le travail."
    versions:
      - effective_from: '1996-10-06'
        formula: |-
          belgium_maternity_article_114_working_days_in_protection_period + belgium_maternity_article_114bis_assimilated_working_days_in_protection_period
