format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/93bis
  summary: "Le montant journalier de l'indemnit\xE9 d'invalidit\xE9 minimum des travailleurs\
    \ non r\xE9guliers ayant des personnes \xE0 charge ne peut \xEAtre inf\xE9rieur\
    \ au revenu d'int\xE9gration \xE9valu\xE9 en jours ouvrables octroy\xE9 \xE0 deux\
    \ personnes cohabitantes; pour les titulaires sans personne \xE0 charge, ce montant\
    \ correspond au revenu d'int\xE9gration \xE9valu\xE9 en jours ouvrables octroy\xE9\
    \ \xE0 une personne isol\xE9e. Le Roi peut augmenter ces montants et d\xE9termine\
    \ les travailleurs non r\xE9guliers."
rules:
- name: minimum_daily_invalidity_indemnity_for_non_regular_worker_with_dependents
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  source: Art. 93bis, phrase 1
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/93bis
          excerpt: "En vigueur :\n29-09-1995> (Le montant journalier de l'indemnité d'invalidité minimum qui est octroyé aux travailleurs non réguliers ayant des personnes à charge ne peut en aucun cas être inférieur au montant du revenu d'intégration, évalué en jours ouvrables, octroyé en vertu de la loi du 26 mai 2002 concernant le droit à l'intégration sociale, à deux personnes qui cohabitent.) <L 2002-12-24/31, art. 252, 077;"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/93bis
          excerpt: "d\xE9termine ce qu'il y a lieu d'entendre par \"travailleurs non\
            \ r\xE9guliers\""
  versions:
  - effective_from: '2002-10-01'
    formula: 'if worker_is_non_regular_as_determined_by_king and worker_has_persons_at_charge:
      max(invalidity_minimum_daily_amount_before_article_93bis, daily_revenu_integration_for_two_cohabiting_persons_evaluated_in_working_days)
      else: 0'
- name: minimum_daily_invalidity_indemnity_for_holder_without_dependents
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  source: Art. 93bis, phrase 2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: be/statute/loi/1994/07/14/1994071451/article/93bis
          excerpt: "(Pour les titulaires n'ayant pas de personne à charge, ce montant correspond au montant du revenu d'intégration, évalué en jours ouvrables, octroyé en vertu de la même loi à une personne isolée.) <L 2002-12-24/31, art."
  versions:
  - effective_from: '2002-10-01'
    formula: 'if holder_has_no_person_at_charge: daily_revenu_integration_for_isolated_person_evaluated_in_working_days
      else: 0'
