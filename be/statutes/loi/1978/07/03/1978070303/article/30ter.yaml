          - path: versions[1].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "de deux semaines à partir du 1er janvier 2021"
          - path: versions[2].formula
            kind: parameter
