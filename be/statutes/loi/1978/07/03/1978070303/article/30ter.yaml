            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "commence deux mois avant la prise de cours"
    versions:
      - effective_from: '2004-07-25'
        formula: |-
          2

  - name: dismissal_protection_months_after_leave_end
    kind: parameter
    dtype: Count
    source: "Art. 30ter, § 4, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "finit un mois après la fin de celui-ci"
    versions:
