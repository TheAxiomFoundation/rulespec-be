    kind: parameter
    dtype: Count
    source: "Art. 30ter, § 1er, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "maximum 6 semaines"
    versions:
      - effective_from: '2004-07-25'
        formula: |-
          6

  - name: minimum_adoption_leave_weeks_when_not_taking_maximum
    kind: parameter
    dtype: Count
    source: "Art. 30ter, § 1er, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "au moins d'une semaine ou d'un multiple d'une semaine"
    versions:
