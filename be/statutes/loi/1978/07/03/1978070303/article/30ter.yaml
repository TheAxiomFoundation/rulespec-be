          - path: versions[4].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "de cinq semaines à partir du 1er janvier 2027"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          1
      - effective_from: '2021-01-01'
        formula: |-
          2
      - effective_from: '2023-01-01'
        formula: |-
          3
      - effective_from: '2025-01-01'
        formula: |-
          4
      - effective_from: '2027-01-01'
        formula: |-
          5

  - name: multiple_minor_children_adoption_leave_extra_weeks_per_adoptive_parent
    kind: parameter
