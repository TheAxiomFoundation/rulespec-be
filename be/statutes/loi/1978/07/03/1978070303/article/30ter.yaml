          1

  - name: unlawful_dismissal_indemnity_months_brute_remuneration
    kind: parameter
    dtype: Count
    source: "Art. 30ter, § 4, alinéa 3"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "6\nbrute de six mois]"
    versions:
      - effective_from: '2022-11-10'
        formula: |-
          6

  - name: unlawful_nonrenewal_indemnity_months_brute_remuneration
    kind: parameter
    dtype: Count
    source: "Art. 30ter, § 5, alinéa 3"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "rémunération brute de trois mois"
    versions:
      - effective_from: '2022-11-10'
        formula: |-
          3

  - name: worker_qualifies_for_adoption_leave
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 1er, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "Le travailleur qui, dans le cadre d'une adoption, accueille un enfant [\n3\nmineur]\n3\ndans sa famille, a droit, pour prendre soin de cet enfant, à un congé d'adoption pendant une période ininterrompue de maximum 6 semaines ["
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          worker_in_adoption_context_welcomes_child_into_family
          and child_is_minor

  - name: worker_adoption_leave_may_start
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 1er/1, alinéas 1er et 2"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "dans les deux mois qui suivent l'inscription de l'enfant"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "en cas d'adoption internationale, le congé d'adoption peut déjà prendre cours dès le lendemain de l'approbation"
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          leave_starts_within_required_months_after_child_household_registration
          or international_adoption_leave_starts_after_community_central_authority_approval_to_collect_child

  - name: adoption_leave_notice_requirement_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 3, alinéas 1er à 3"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "avertir par écrit son employeur au moins un mois à l'avance"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "Ce délai peut être réduit d'un commun accord"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "par lettre recommandée ou par la remise d'un écrit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "mentionne la date de début et de fin"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "Le travailleur fournit à l'employeur, au plus tard au moment où le congé d'adoption prend cours, les documents attestant l'évènement qui ouvre le droit au congé d'adoption."
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          employer_was_warned_in_writing_of_adoption_leave
          and (notice_given_at_least_required_month_in_advance or employer_and_worker_agreed_to_reduce_notice_period)
          and (notice_sent_by_registered_letter or written_notice_delivered_with_employer_signed_receipt_copy)
          and notice_mentions_start_and_end_dates_of_adoption_leave
          and worker_provides_documents_attesting_event_opening_adoption_leave_no_later_than_leave_start

  - name: maximum_adoption_leave_weeks_per_worker
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: "Art. 30ter, § 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "maximum 6 semaines"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "Le congé d'adoption de six semaines par parent adoptif est allongé de la manière suivante pour le parent adoptif ou pour les deux parents adoptifs ensemble :"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "La durée maximale du congé d'adoption est doublée lorsque l'enfant est atteint d'une incapacité physique ou mentale de 66 % au moins ou d'une affection qui a pour conséquence qu'au moins 4 points sont octroyés dans le pilier 1 de l'échelle médico-sociale, au sens de la réglementation relative aux allocations familiales ["
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "allongée de deux semaines par parent adoptif"
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#base_adoption_leave_weeks_per_adoptive_parent
              output: base_adoption_leave_weeks_per_adoptive_parent
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#multiple_minor_children_adoption_leave_extra_weeks_per_adoptive_parent
              output: multiple_minor_children_adoption_leave_extra_weeks_per_adoptive_parent
              hash: sha256:local
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          (base_adoption_leave_weeks_per_adoptive_parent + adoption_leave_additional_weeks_allocated_to_this_worker) * (if child_has_disability_or_affection_for_adoption_leave_doubling: 2 else: 1) + (if simultaneous_adoption_of_multiple_minor_children: multiple_minor_children_adoption_leave_extra_weeks_per_adoptive_parent else: 0)

  - name: requested_adoption_leave_duration_valid
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 1er, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "au moins d'une semaine ou d'un multiple d'une semaine"
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#minimum_adoption_leave_weeks_when_not_taking_maximum
              output: minimum_adoption_leave_weeks_when_not_taking_maximum
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#maximum_adoption_leave_weeks_per_worker
              output: maximum_adoption_leave_weeks_per_worker
              hash: sha256:local
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          requested_adoption_leave_weeks >= minimum_adoption_leave_weeks_when_not_taking_maximum
          and requested_adoption_leave_weeks <= maximum_adoption_leave_weeks_per_worker
          and requested_adoption_leave_duration_is_whole_week_or_multiple_of_week

  - name: adoption_leave_entitlement_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 1er, § 1er/1 et § 3"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "dans sa famille, a droit, pour prendre soin de cet enfant, à un congé d'adoption pendant une période ininterrompue de maximum 6 semaines ["
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#worker_qualifies_for_adoption_leave
              output: worker_qualifies_for_adoption_leave
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#worker_adoption_leave_may_start
              output: worker_adoption_leave_may_start
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#requested_adoption_leave_duration_valid
              output: requested_adoption_leave_duration_valid
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#adoption_leave_notice_requirement_satisfied
              output: adoption_leave_notice_requirement_satisfied
              hash: sha256:local
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          worker_qualifies_for_adoption_leave
          and worker_adoption_leave_may_start
          and requested_adoption_leave_duration_valid
          and adoption_leave_is_taken_as_uninterrupted_period_or_authorized_international_adoption_derogation_applies
          and adoption_leave_notice_requirement_satisfied

  - name: unlawful_dismissal_during_adoption_leave_protection
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 4, alinéas 1er et 2"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "ne peut faire un acte tendant à mettre fin unilatéralement"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "sauf pour des motifs étrangers à la prise de ce congé d'adoption"
    versions:
      - effective_from: '2004-07-25'
        formula: |-
          employer_made_unilateral_act_to_end_contract
          and worker_used_adoption_leave_right
          and act_occurs_during_adoption_leave_dismissal_protection_period
          and not employer_proves_reasons_unrelated_to_adoption_leave

  - name: unlawful_dismissal_for_adoption_leave_indemnity_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    source: "Art. 30ter, § 4, alinéas 3 et 4"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "Si le motif invoqué à l'appui du licenciement ne répond pas aux prescriptions de l'alinéa 1er ou à défaut de motif, l'employeur est tenu de payer une indemnité forfaitaire égale à la rémunération [\n6\nbrute de six mois]"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "ne peut être cumulée avec d'autres indemnités"
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#unlawful_dismissal_during_adoption_leave_protection
              output: unlawful_dismissal_during_adoption_leave_protection
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#unlawful_dismissal_indemnity_months_brute_remuneration
              output: unlawful_dismissal_indemnity_months_brute_remuneration
              hash: sha256:local
    versions:
      - effective_from: '2022-11-10'
        formula: |-
          if unlawful_dismissal_during_adoption_leave_protection and not other_special_dismissal_protection_indemnity_is_cumulated: monthly_brute_remuneration * unlawful_dismissal_indemnity_months_brute_remuneration else: 0

  - name: nonrenewal_presumed_linked_to_adoption_leave
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: "Art. 30ter, § 5, alinéa 1er"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "en cas de rupture du contrat de travail.\nCette indemnité ne peut être cumulée avec d'autres indemnités qui sont prévues dans le cadre d'une procédure de protection particulière contre le licenciement.\n[\n6\n§ 5. Lorsque le travailleur qui a averti son employeur de la prise du congé d'adoption conformément au paragraphe 3, alinéas 1er et 2, voit son contrat de travail pour l'exécution d'un travail temporaire ou son contrat de travail à durée déterminée non renouvelé, ce non-renouvellement"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "présumé être lié à la prise du congé d'adoption"
    versions:
      - effective_from: '2022-11-10'
        formula: |-
          worker_warned_employer_of_adoption_leave_under_paragraph_3_first_two_alineas
          and (contract_is_for_temporary_work or contract_is_fixed_term)
          and contract_not_renewed

  - name: unlawful_nonrenewal_for_adoption_leave_indemnity_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    source: "Art. 30ter, § 5, alinéas 2 et 3"
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
              excerpt: "indemnité forfaitaire égale à la rémunération brute de trois mois"
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#nonrenewal_presumed_linked_to_adoption_leave
              output: nonrenewal_presumed_linked_to_adoption_leave
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: be:statutes/loi/1978/07/03/1978070303/article/30ter#unlawful_nonrenewal_indemnity_months_brute_remuneration
              output: unlawful_nonrenewal_indemnity_months_brute_remuneration
              hash: sha256:local
    versions:
      - effective_from: '2022-11-10'
        formula: |-
          if nonrenewal_presumed_linked_to_adoption_leave and not employer_proves_nonrenewal_reason_unrelated_to_adoption_leave: monthly_brute_remuneration * unlawful_nonrenewal_indemnity_months_brute_remuneration else: 0
