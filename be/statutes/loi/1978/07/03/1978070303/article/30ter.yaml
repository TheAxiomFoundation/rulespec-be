format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/30ter
  summary: |-
    Art. 30ter: le travailleur qui, dans le cadre d'une adoption, accueille un enfant mineur dans sa famille a droit à un congé d'adoption pour une période ininterrompue de maximum six semaines; les semaines supplémentaires sont allongées par dates, réparties entre deux parents adoptifs, la durée maximale est doublée en cas d'incapacité ou affection de l'enfant, et allongée de deux semaines par parent adoptif en cas d'adoption simultanée de plusieurs enfants mineurs. Le congé doit prendre cours dans les deux mois de l'inscription de l'enfant au ménage, avec une règle spéciale pour l'adoption internationale. Le travailleur doit avertir l'employeur par écrit au moins un mois à l'avance, sauf réduction d'un commun accord; l'employeur ne peut licencier durant la période protégée sauf motifs étrangers au congé, avec indemnité brute de six mois, et le non-renouvellement de certains contrats est présumé lié au congé avec indemnité brute de trois mois si le motif n'est pas étranger.
rules:
