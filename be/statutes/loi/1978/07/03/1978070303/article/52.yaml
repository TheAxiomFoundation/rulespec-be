- name: qualifying_non_work_incapacity
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: "Art. 52, \xA7 1er, alin\xE9a 1er"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/52
          excerpt: "Art.\n52\n.§ 1er. (En cas d'incapacité de travail résultant d'une maladie autre qu'une maladie professionnelle, ou d'un accident autre qu'un accident du travail ou qu'un accident survenu sur le chemin du travail, l'ouvrier a droit, à charge de son employeur, à sa rémunération normale pendant une période de sept jours et pendant les sept jours suivants à 60 p.c. de la partie de cette rémunération qui ne dépasse pas le plafond pris en considération pour le calcul des prestations de l'assurance maladie-invalidité). <AR465 1986-10-01/30, art. 1, a, 013> <note : les dispositions de cet arrêté ne s'appliquent qu'aux travailleurs dont l'incapacité de travail est survenue après son entrée en vigueur : 01-11-1986>\n[\n1\nalinéa 2 abrogé]\n1\n[\n1\nalinéa 3 abrogé]\n1\n[\n1\nalinéa 4 abrogé, en ce compris l'ancien alinéa 4 déjà abrogé]\n1\nLe droit à la rémunération est subordonné à la condition que l'ouvrier"
  versions:
  - effective_from: '1986-11-01'
    formula: 'worker_has_work_incapacity

      and (incapacity_results_from_non_professional_disease or incapacity_results_from_non_work_accident)

      and not incapacity_results_from_professional_disease

      and not incapacity_results_from_work_accident

      and not incapacity_results_from_commuting_accident'
- name: worker_has_required_service
  kind: derived
