        kind: condition
        source:
          corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/52
          excerpt: "demeur\xE9 sans interruption au service de la m\xEAme entreprise\
            \ pendant au moins un mois"
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/loi/1978/07/03/1978070303/article/52#required_uninterrupted_service_months
          output: required_uninterrupted_service_months
          hash: sha256:local
  versions:
  - effective_from: '1986-11-01'
    formula: uninterrupted_service_months >= required_uninterrupted_service_months
- name: recurrence_blocks_new_full_guaranteed_wage
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: "Art. 52, \xA7 2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/52
          excerpt: "§ 1er n'est pas due une nouvelle fois lorsqu'une nouvelle incapacité de travail survient dans les [\n7\nhuit premières semaines]"
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/loi/1978/07/03/1978070303/article/52#recurrence_lookback_weeks
          output: recurrence_lookback_weeks
          hash: sha256:local
  versions:
  - effective_from: '2026-01-01'
    formula: 'new_work_incapacity_occurs_after_prior_paid_incapacity

      and weeks_since_end_of_prior_paid_incapacity <= recurrence_lookback_weeks

      and not prior_paid_incapacity_used_less_than_total_guaranteed_wage_days

      and not medical_certificate_establishes_other_disease_or_accident'
- name: disqualifying_sporting_accident
  kind: derived
