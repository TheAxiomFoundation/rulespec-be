format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/52
  summary: "Art. 52: en cas d'incapacit\xE9 de travail d'un ouvrier r\xE9sultant d'une\
    \ maladie autre qu'une maladie professionnelle ou d'un accident autre qu'un accident\
    \ du travail ou sur le chemin du travail, l'ouvrier a droit \xE0 charge de l'employeur\
    \ \xE0 sa r\xE9mun\xE9ration normale pendant sept jours puis, pendant les sept\
    \ jours suivants, \xE0 60 p.c. de la partie de cette r\xE9mun\xE9ration ne d\xE9\
    passant pas le plafond AMI. Le droit est subordonn\xE9 \xE0 un mois de service\
    \ ininterrompu; en cas de nouvelle incapacit\xE9 dans les huit premi\xE8res semaines,\
    \ la r\xE9mun\xE9ration n'est pas due \xE0 nouveau sauf solde des quatorze jours\
    \ ou autre maladie/accident; exclusions et d\xE9rogations sont pr\xE9vues."
rules:
- name: initial_guaranteed_wage_days
  kind: parameter
  dtype: Count
  source: "Art. 52, \xA7 1er, alin\xE9a 1er"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/loi/1978/07/03/1978070303/article/52
          excerpt: "\xE0 sa r\xE9mun\xE9ration normale pendant une p\xE9riode de sept\
            \ jours"
  versions:
  - effective_from: '1986-11-01'
    formula: '7'
- name: subsequent_guaranteed_wage_days
