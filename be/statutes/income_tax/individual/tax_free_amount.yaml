format: rulespec/v1
module:
  summary: |-
    CIR 1992 articles 131 and 132 set the indexed tax-free amount and dependant
    increments for income year 2025 / assessment year 2026. This module encodes
    the statutory parameter surface and a mechanical total before shared-custody,
    childcare-reduction, resource, and household-composition limitations.
  source_verification:
    corpus_citation_paths:
      - be/statute/fisconetplus/cir92/revenus-2025/page-181
      - be/statute/fisconetplus/cir92/revenus-2025/page-182
    values:
      belgium_pit_base_tax_free_amount: 10910
      belgium_pit_taxpayer_disability_tax_free_increase: 1980
      belgium_pit_one_child_tax_free_increase: 1980
      belgium_pit_two_children_tax_free_increase: 5110
      belgium_pit_three_children_tax_free_increase: 11440
      belgium_pit_four_children_tax_free_increase: 18510
      belgium_pit_article_132_first_additional_child_count: 4
      belgium_pit_additional_child_after_four_tax_free_increase: 7070
      belgium_pit_child_under_3_tax_free_increase: 740
      belgium_pit_dependent_elderly_tax_free_increase: 5950
      belgium_pit_other_dependent_tax_free_increase: 1980
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_pit_base_tax_free_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 131, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-181
            span: 'Pour le calcul de l''impôt, un montant de base de 10.910 euros (montant indexé) est exempté d''impôt.'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          10910
  - name: belgium_pit_taxpayer_disability_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 131, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-181
            span: 'Ce montant est majoré de 1.980 euros (montant indexé) lorsque le contribuable est atteint d''un handicap.'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1980
  - name: belgium_pit_one_child_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: 'Le montant de base fixé conformément à l''article 131 est majoré des suppléments suivants pour personnes à charge: 1° pour un enfant: 1.980 euros (montant indexé); 2° pour deux enfants: 5.110 euros (montant indexé); 3° pour trois enfants: 11.440 euros (montant indexé); 4° pour quatre enfants: 18.510 euros (montant indexé); 5° pour plus de quatre enfants: 18.510 euros (montant indexé) majorés de 7.070 euros (montant indexé) par enfant au-delà du quatrième; 6° un montant supplémentaire de 740 euros (montant indexé) pour chaque enfant n''ayant pas atteint l''âge de 3 ans'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1980
  - name: belgium_pit_two_children_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: 'Le montant de base fixé conformément à l''article 131 est majoré des suppléments suivants pour personnes à charge: 1° pour un enfant: 1.980 euros (montant indexé); 2° pour deux enfants: 5.110 euros (montant indexé); 3° pour trois enfants: 11.440 euros (montant indexé); 4° pour quatre enfants: 18.510 euros (montant indexé); 5° pour plus de quatre enfants: 18.510 euros (montant indexé) majorés de 7.070 euros (montant indexé) par enfant au-delà du quatrième; 6° un montant supplémentaire de 740 euros (montant indexé) pour chaque enfant n''ayant pas atteint l''âge de 3 ans'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          5110
  - name: belgium_pit_three_children_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: 'Le montant de base fixé conformément à l''article 131 est majoré des suppléments suivants pour personnes à charge: 1° pour un enfant: 1.980 euros (montant indexé); 2° pour deux enfants: 5.110 euros (montant indexé); 3° pour trois enfants: 11.440 euros (montant indexé); 4° pour quatre enfants: 18.510 euros (montant indexé); 5° pour plus de quatre enfants: 18.510 euros (montant indexé) majorés de 7.070 euros (montant indexé) par enfant au-delà du quatrième; 6° un montant supplémentaire de 740 euros (montant indexé) pour chaque enfant n''ayant pas atteint l''âge de 3 ans'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          11440
  - name: belgium_pit_four_children_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: 'Le montant de base fixé conformément à l''article 131 est majoré des suppléments suivants pour personnes à charge: 1° pour un enfant: 1.980 euros (montant indexé); 2° pour deux enfants: 5.110 euros (montant indexé); 3° pour trois enfants: 11.440 euros (montant indexé); 4° pour quatre enfants: 18.510 euros (montant indexé); 5° pour plus de quatre enfants: 18.510 euros (montant indexé) majorés de 7.070 euros (montant indexé) par enfant au-delà du quatrième; 6° un montant supplémentaire de 740 euros (montant indexé) pour chaque enfant n''ayant pas atteint l''âge de 3 ans'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          18510
  - name: belgium_pit_additional_child_after_four_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: '5° pour plus de quatre enfants: 18.510 euros (montant indexé) majorés de 7.070 euros (montant indexé) par enfant au-delà du quatrième;'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          7070
  - name: belgium_pit_article_132_first_additional_child_count
    kind: parameter
    dtype: Count
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          4
  - name: belgium_pit_child_under_3_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: '6° un montant supplémentaire de 740 euros (montant indexé) pour chaque enfant n''ayant pas atteint l''âge de 3 ans au 1er janvier de l''exercice d''imposition'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          740
  - name: belgium_pit_dependent_elderly_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: '7° pour chaque personne à charge visée à l''article 136, 2° et 3°, qui est dans une situation de dépendance et qui a atteint l''âge de 66 ans: 5.950 euros (montant indexé);'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          5950
  - name: belgium_pit_other_dependent_tax_free_increase
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-182
            span: '8° pour chaque autre personne à charge: 1.980 euros (montant indexé).'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1980
  - name: belgium_pit_article_132_child_tax_free_increase
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 132, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_132_child_count <= 0:
              0
          else:
              if belgium_pit_article_132_child_count == 1:
                  belgium_pit_one_child_tax_free_increase
              else:
                  if belgium_pit_article_132_child_count == 2:
                      belgium_pit_two_children_tax_free_increase
                  else:
                      if belgium_pit_article_132_child_count == 3:
                          belgium_pit_three_children_tax_free_increase
                      else:
                          belgium_pit_four_children_tax_free_increase + max(0, belgium_pit_article_132_child_count - belgium_pit_article_132_first_additional_child_count) * belgium_pit_additional_child_after_four_tax_free_increase
  - name: belgium_pit_articles_131_132_tax_free_amount_before_limitations
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 articles 131 and 132, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_base_tax_free_amount + belgium_pit_taxpayer_disability_tax_free_increase * belgium_pit_taxpayer_disability_count + belgium_pit_article_132_child_tax_free_increase + belgium_pit_child_under_3_tax_free_increase * belgium_pit_children_under_3_without_childcare_reduction_count + belgium_pit_dependent_elderly_tax_free_increase * belgium_pit_dependent_elderly_count + belgium_pit_other_dependent_tax_free_increase * belgium_pit_other_dependent_count
