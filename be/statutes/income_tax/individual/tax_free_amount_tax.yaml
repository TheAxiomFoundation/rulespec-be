  - name: belgium_pit_article_134_tax_on_tax_free_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 2, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_tax_free_amount <= belgium_pit_article_134_first_tax_free_amount_threshold:
              belgium_pit_article_134_tax_free_amount * belgium_pit_article_134_first_tax_free_amount_rate
          else:
              if belgium_pit_article_134_tax_free_amount <= belgium_pit_article_134_second_tax_free_amount_threshold:
                  belgium_pit_article_134_first_tax_free_amount_threshold * belgium_pit_article_134_first_tax_free_amount_rate + (belgium_pit_article_134_tax_free_amount - belgium_pit_article_134_first_tax_free_amount_threshold) * belgium_pit_article_134_second_tax_free_amount_rate
              else:
                  if belgium_pit_article_134_tax_free_amount <= belgium_pit_article_134_third_tax_free_amount_threshold:
                      belgium_pit_article_134_first_tax_free_amount_threshold * belgium_pit_article_134_first_tax_free_amount_rate + (belgium_pit_article_134_second_tax_free_amount_threshold - belgium_pit_article_134_first_tax_free_amount_threshold) * belgium_pit_article_134_second_tax_free_amount_rate + (belgium_pit_article_134_tax_free_amount - belgium_pit_article_134_second_tax_free_amount_threshold) * belgium_pit_article_134_third_tax_free_amount_rate
                  else:
                      if belgium_pit_article_134_tax_free_amount <= belgium_pit_article_134_fourth_tax_free_amount_threshold:
                          belgium_pit_article_134_first_tax_free_amount_threshold * belgium_pit_article_134_first_tax_free_amount_rate + (belgium_pit_article_134_second_tax_free_amount_threshold - belgium_pit_article_134_first_tax_free_amount_threshold) * belgium_pit_article_134_second_tax_free_amount_rate + (belgium_pit_article_134_third_tax_free_amount_threshold - belgium_pit_article_134_second_tax_free_amount_threshold) * belgium_pit_article_134_third_tax_free_amount_rate + (belgium_pit_article_134_tax_free_amount - belgium_pit_article_134_third_tax_free_amount_threshold) * belgium_pit_article_134_fourth_tax_free_amount_rate
                      else:
                          belgium_pit_article_134_first_tax_free_amount_threshold * belgium_pit_article_134_first_tax_free_amount_rate + (belgium_pit_article_134_second_tax_free_amount_threshold - belgium_pit_article_134_first_tax_free_amount_threshold) * belgium_pit_article_134_second_tax_free_amount_rate + (belgium_pit_article_134_third_tax_free_amount_threshold - belgium_pit_article_134_second_tax_free_amount_threshold) * belgium_pit_article_134_third_tax_free_amount_rate + (belgium_pit_article_134_fourth_tax_free_amount_threshold - belgium_pit_article_134_third_tax_free_amount_threshold) * belgium_pit_article_134_fourth_tax_free_amount_rate + (belgium_pit_article_134_tax_free_amount - belgium_pit_article_134_fourth_tax_free_amount_threshold) * belgium_pit_article_134_top_tax_free_amount_rate
  - name: belgium_pit_article_134_tax_after_tax_free_amount_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 2, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_article_134_base_tax_before_tax_free_amount_reduction - belgium_pit_article_134_tax_on_tax_free_amount)
  - name: belgium_pit_article_134_child_tax_credit_cap
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 3, income year 2025, assessment year 2026
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_article_134_child_tax_credit_cap_per_child * (belgium_pit_article_134_child_credit_equivalent_count_without_article_132bis + belgium_pit_article_134_shared_custody_child_tax_credit_multiplier * belgium_pit_article_134_child_credit_equivalent_count_with_article_132bis)
  - name: belgium_pit_article_134_joint_article_132_supplements_assigned_to_spouse_a
    kind: derived
    entity: Household
    dtype: Count
    period: Year
    source: CIR 1992 article 134 paragraph 4 item 2 and final paragraph, spouse receiving Article 132 supplements
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_joint_assessment_established:
              if belgium_pit_article_134_joint_lower_income_spouse_supplement_assignment_reduces_joint_state_tax:
                  if belgium_pit_spouse_a_taxable_income < belgium_pit_spouse_b_taxable_income:
                      1
                  else:
                      0
              else:
                  if belgium_pit_spouse_a_taxable_income >= belgium_pit_spouse_b_taxable_income:
                      1
                  else:
                      0
          else:
              0
  - name: belgium_pit_article_134_joint_spouse_a_initial_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 1 and 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_joint_assessment_established:
              if belgium_pit_article_134_joint_article_132_supplements_assigned_to_spouse_a == 1:
                  belgium_pit_spouse_a_base_tax_free_amount + belgium_pit_joint_article_132_supplements_tax_free_amount
              else:
                  belgium_pit_spouse_a_base_tax_free_amount
          else:
              0
  - name: belgium_pit_article_134_joint_spouse_b_initial_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 1 and 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_joint_assessment_established:
              if belgium_pit_article_134_joint_article_132_supplements_assigned_to_spouse_a == 1:
                  belgium_pit_spouse_b_base_tax_free_amount
              else:
                  belgium_pit_spouse_b_base_tax_free_amount + belgium_pit_joint_article_132_supplements_tax_free_amount
          else:
              0
  - name: belgium_pit_article_134_joint_spouse_a_excess_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 3 and 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_article_134_joint_spouse_a_initial_tax_free_amount - belgium_pit_spouse_a_taxable_income)
  - name: belgium_pit_article_134_joint_spouse_b_excess_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 3 and 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_article_134_joint_spouse_b_initial_tax_free_amount - belgium_pit_spouse_b_taxable_income)
  - name: belgium_pit_article_134_joint_spouse_a_capacity_for_transferred_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 item 3, other spouse positive taxable-income difference
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_spouse_a_taxable_income - belgium_pit_article_134_joint_spouse_a_initial_tax_free_amount)
  - name: belgium_pit_article_134_joint_spouse_b_capacity_for_transferred_tax_free_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 item 3, other spouse positive taxable-income difference
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_spouse_b_taxable_income - belgium_pit_article_134_joint_spouse_b_initial_tax_free_amount)
  - name: belgium_pit_article_134_joint_spouse_a_tax_free_amount_transferred_to_spouse_b
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 3 and 4, spouse A excess transferred to spouse B
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_joint_article_132_supplements_assigned_to_spouse_a == 1:
              min(belgium_pit_article_134_joint_spouse_a_excess_tax_free_amount, belgium_pit_article_134_joint_spouse_b_capacity_for_transferred_tax_free_amount)
          else:
              belgium_pit_article_134_joint_spouse_a_excess_tax_free_amount
  - name: belgium_pit_article_134_joint_spouse_b_tax_free_amount_transferred_to_spouse_a
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 3 and 4, spouse B excess transferred to spouse A
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_134_joint_article_132_supplements_assigned_to_spouse_a == 1:
              belgium_pit_article_134_joint_spouse_b_excess_tax_free_amount
          else:
              min(belgium_pit_article_134_joint_spouse_b_excess_tax_free_amount, belgium_pit_article_134_joint_spouse_a_capacity_for_transferred_tax_free_amount)
  - name: belgium_pit_article_134_joint_spouse_a_tax_free_amount_after_paragraph_4_allocation
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 4 items 1 through 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_article_134_joint_spouse_a_initial_tax_free_amount - belgium_pit_article_134_joint_spouse_a_tax_free_amount_transferred_to_spouse_b + belgium_pit_article_134_joint_spouse_b_tax_free_amount_transferred_to_spouse_a
