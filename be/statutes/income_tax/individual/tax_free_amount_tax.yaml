  - name: belgium_pit_article_134_child_tax_credit_cap_per_child
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 134 paragraph 3, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-185
            span: 'Le crédit d''impôt visé à l''alinéa 1er ne peut pas excéder: - 570 euros (montant indexé) par enfant à charge pour lequel l''article 132bis n''est pas appliqué; - la moitié du montant mentionné au premier tiret par enfant pour lequel l''article 132bis est appliqué.'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          570
