format: rulespec/v1
imports:
  - be:statutes/income_tax/individual/rate_scale#belgium_pit_article_130_base_tax
module:
  summary: |-
    CIR 1992 article 134 converts the tax-free amount into a tax reduction and
    sets the refundable child tax-credit cap for income year 2025 / assessment
    year 2026. This module encodes the paragraph 2 tax scale, a mechanical tax
    after the tax-free-amount reduction, the paragraph 3 child-credit cap, a
    bridge from the Article 130 base tax to the refundable child credit, and
    the paragraph 4 joint-assessment tax-free-amount allocation for supplied
    spouse incomes, base amounts, and Article 132 supplements, and the
    paragraph 4 joint refundable-credit cap allocation for supplied uncapped
    spouse credits. It leaves regional reductions, communal additions, and
    treaty-exempt income exclusions to later household modules.
  source_verification:
    corpus_citation_paths:
      - be/statute/fisconetplus/cir92/revenus-2025/page-181
      - be/statute/fisconetplus/cir92/revenus-2025/page-184
      - be/statute/fisconetplus/cir92/revenus-2025/page-185
      - be/statute/fisconetplus/cir92/revenus-2025/page-186
      - be/statute/fisconetplus/cir92/revenus-2025/page-187
    values:
      belgium_pit_article_134_first_tax_free_amount_threshold: 11460
      belgium_pit_article_134_second_tax_free_amount_threshold: 16320
      belgium_pit_article_134_third_tax_free_amount_threshold: 27190
      belgium_pit_article_134_fourth_tax_free_amount_threshold: 49840
      belgium_pit_article_134_first_tax_free_amount_rate: "0.25"
      belgium_pit_article_134_second_tax_free_amount_rate: "0.30"
      belgium_pit_article_134_third_tax_free_amount_rate: "0.40"
      belgium_pit_article_134_fourth_tax_free_amount_rate: "0.45"
      belgium_pit_article_134_top_tax_free_amount_rate: "0.50"
      belgium_pit_article_134_child_tax_credit_cap_per_child: 570
      belgium_pit_article_134_shared_custody_child_tax_credit_multiplier: "0.5"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_pit_article_134_first_tax_free_amount_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 134 paragraph 2, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-185
            span: 'Cet impôt sur la quotité du revenu exemptée d''impôt est fixé à: 25 % pour la tranche de la quotité du revenu exemptée d''impôt de 0,01 euro à 11.460 euros (montant indexé); 30 % pour la tranche de la quotité du revenu exemptée d''impôt de 11.460 euros (montant indexé) à 16.320 euros (montant indexé); 40 % pour la tranche de la quotité du revenu exemptée d''impôt de 16.320 euros (montant indexé) à 27.190 euros (montant indexé); 45 % pour la tranche de la quotité du revenu exemptée d''impôt de 27.190 euros (montant indexé) à 49.840 euros (montant indexé); 50 % pour la tranche de la quotité du revenu exemptée d''impôt supérieure à 49.840 euros (montant indexé).'
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          11460
