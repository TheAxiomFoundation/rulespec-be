format: rulespec/v1
module:
  summary: |-
    CIR 1992 article 130 sets the ordinary Belgian personal income tax rate
    scale for income year 2025 / assessment year 2026. This module encodes the
    indexed federal base-tax brackets before reductions, credits, surcharges,
    regional tax reductions, and communal additions.
  source_verification:
    corpus_citation_path: "be/statute/fisconetplus/cir92/revenus-2025/page-181"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_pit_article_130_first_bracket_upper_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 130, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
        - path: versions[0].formula
          kind: parameter
          source:
            corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-181
            excerpt: "L'impôt de base est fixé à: 25 % pour la tranche de revenus de 0,01 euros à 16.320 euros (montant indexé); 40 % pour la tranche de 16.320 euros (montant indexé) à 28.800 euros (montant indexé); 45 % pour la tranche de 28.800 euros (montant indexé) à 49.840 euros (montant indexé); 50 % pour la tranche supérieure à 49.840 euros (montant indexé)."
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          16320
