      - be/statute/fisconetplus/cir92/revenus-2025/page-688
      - be/statute/loi/1989/01/16/1989021010/article/5-2
      - be/regulation/arrete/2017/12/19/2017032216/article/1er
      - be/regulation/arrete/2017/12/19/2017032216/article/2
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - be/statute/loi/1999/12/20/2000022052/article/2
        - be/regulation/arrete/2000/01/17/2000022082/article/1
        - be/regulation/arrete/2024/03/05/2024002162/article/1er
        - be/statute/loi/1989/01/16/1989021010/article/5-2
        - be/regulation/arrete/2017/12/19/2017032216/article/1er
      rationale: |-
        The imported ONSS work-bonus formula is grounded in the statute and
        royal decree. The SPF Emploi salaires-minimums database is used only for
        the CCT 43 monthly RMMMG amount that those legal sources reference.
        The PIT autonomy factor is grounded in the special financing law and
        the royal decree fixing the definitive factor.
