format: rulespec/v1
imports:
  - be:regulations/social_security/workers/employee_contributions#belgium_employee_social_security_ordinary_worker_contribution
  - be:regulations/social_security/workers/work_bonus#belgium_worker_work_bonus_full_year_equal_monthly_a_amount
  - be:regulations/social_security/workers/work_bonus#belgium_worker_work_bonus_full_year_equal_monthly_b_amount
module:
  summary: |-
    This composed pilot module exposes a dense-engine-friendly Person-level
    path from gross worker remuneration into Belgian PIT for the EUROMOD oracle
    slice. It wires the ordinary Article 38 employee social-security
    contribution, Article 51 employee forfait, Article 6 taxable-income concept,
    Article 130 rate scale, Article 131 base tax-free amount, Article 134
    tax-free-amount reduction, the special-financing-law Article 5/2 autonomy
    factor, Article 289ter/1 work-bonus credit from the encoded ONSS January
    and February-onward 2025 work-bonus A/B amounts, and supplied Article
    465/468 local additions into one
    module. It deliberately keeps existing public rule ids
    in other modules unchanged and excludes dependants, joint assessment, other
    income categories, actual-expense proof, replacement-income reductions,
    regional reductions/credits, professional withholding tables, ONSS work-
    bonus partial-year and part-time mechanics, treaty allocation, and
    partial-year cases.
  source_verification:
    corpus_citation_paths:
      - be/statute/loi/1981/06/29/1981001048/article/38
      - be/statute/loi/1969/06/27/1969062710/article/17
