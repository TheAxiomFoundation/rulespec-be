      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_pilot_article_289ter1_work_bonus_credit_ceiling_source_thousands * belgium_pit_pilot_source_thousands_dot_hundreds_factor * belgium_pit_pilot_source_thousands_dot_tens_factor + belgium_pit_pilot_article_289ter1_work_bonus_credit_ceiling_source_trailing_group * belgium_pit_pilot_source_thousands_dot_tens_factor
  - name: belgium_employee_social_security_contribution_base
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: 1969 workers social-security law and 28 November 1969 implementing royal decree, pilot worker-only contribution base bridge
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_article_23_worker_remuneration
  - name: belgium_employee_social_security_supplied_work_bonus_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Work-bonus supplied override is zero in the worker-only pilot so the employee-contribution module uses the encoded ONSS work-bonus calculation
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0
  - name: belgium_employee_social_security_supplied_other_worker_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Other worker-side social-security reductions are outside the worker-only pilot and supplied as zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0
  - name: belgium_pit_pilot_worker_remuneration_after_employee_social_security
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 23 paragraph 2 professional-income netting after ordinary employee social-security contribution
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_article_23_worker_remuneration - belgium_employee_social_security_ordinary_worker_contribution)
  - name: belgium_pit_pilot_worker_forfait_professional_expenses
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 51 item 1 and cap paragraph, employee forfait for the worker-only oracle slice
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(belgium_pit_pilot_worker_remuneration_after_employee_social_security * belgium_pit_pilot_article_51_employee_forfait_rate, belgium_pit_pilot_article_51_employee_and_business_profit_cap)
  - name: belgium_pit_pilot_worker_net_professional_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 23 paragraph 2, worker-only professional income after employee social-security contribution and Article 51 employee forfait
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_pilot_worker_remuneration_after_employee_social_security - belgium_pit_pilot_worker_forfait_professional_expenses)
  - name: belgium_pit_taxable_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 6, worker-only pilot taxable income from net professional income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_pilot_worker_net_professional_income)
  - name: belgium_pit_pilot_article_130_base_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 130, worker-only pilot taxable income through the ordinary rate scale
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_taxable_income <= belgium_pit_pilot_article_130_first_bracket_upper_threshold:
              belgium_pit_taxable_income * belgium_pit_pilot_article_130_first_bracket_rate
          else:
              if belgium_pit_taxable_income <= belgium_pit_pilot_article_130_second_bracket_upper_threshold:
                  belgium_pit_pilot_article_130_first_bracket_upper_threshold * belgium_pit_pilot_article_130_first_bracket_rate + (belgium_pit_taxable_income - belgium_pit_pilot_article_130_first_bracket_upper_threshold) * belgium_pit_pilot_article_130_second_bracket_rate
              else:
                  if belgium_pit_taxable_income <= belgium_pit_pilot_article_130_third_bracket_upper_threshold:
                      belgium_pit_pilot_article_130_first_bracket_upper_threshold * belgium_pit_pilot_article_130_first_bracket_rate + (belgium_pit_pilot_article_130_second_bracket_upper_threshold - belgium_pit_pilot_article_130_first_bracket_upper_threshold) * belgium_pit_pilot_article_130_second_bracket_rate + (belgium_pit_taxable_income - belgium_pit_pilot_article_130_second_bracket_upper_threshold) * belgium_pit_pilot_article_130_third_bracket_rate
                  else:
                      belgium_pit_pilot_article_130_first_bracket_upper_threshold * belgium_pit_pilot_article_130_first_bracket_rate + (belgium_pit_pilot_article_130_second_bracket_upper_threshold - belgium_pit_pilot_article_130_first_bracket_upper_threshold) * belgium_pit_pilot_article_130_second_bracket_rate + (belgium_pit_pilot_article_130_third_bracket_upper_threshold - belgium_pit_pilot_article_130_second_bracket_upper_threshold) * belgium_pit_pilot_article_130_third_bracket_rate + (belgium_pit_taxable_income - belgium_pit_pilot_article_130_third_bracket_upper_threshold) * belgium_pit_pilot_article_130_top_bracket_rate
  - name: belgium_pit_pilot_tax_free_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 131, base tax-free amount for the single-person worker oracle slice
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_pilot_base_tax_free_amount
  - name: belgium_pit_pilot_article_134_tax_on_tax_free_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 134 paragraph 2, tax on the pilot tax-free amount
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_pilot_tax_free_amount <= belgium_pit_pilot_article_134_first_tax_free_amount_threshold:
              belgium_pit_pilot_tax_free_amount * belgium_pit_pilot_article_134_first_tax_free_amount_rate
          else:
              if belgium_pit_pilot_tax_free_amount <= belgium_pit_pilot_article_134_second_tax_free_amount_threshold:
                  belgium_pit_pilot_article_134_first_tax_free_amount_threshold * belgium_pit_pilot_article_134_first_tax_free_amount_rate + (belgium_pit_pilot_tax_free_amount - belgium_pit_pilot_article_134_first_tax_free_amount_threshold) * belgium_pit_pilot_article_134_second_tax_free_amount_rate
              else:
                  if belgium_pit_pilot_tax_free_amount <= belgium_pit_pilot_article_134_third_tax_free_amount_threshold:
                      belgium_pit_pilot_article_134_first_tax_free_amount_threshold * belgium_pit_pilot_article_134_first_tax_free_amount_rate + (belgium_pit_pilot_article_134_second_tax_free_amount_threshold - belgium_pit_pilot_article_134_first_tax_free_amount_threshold) * belgium_pit_pilot_article_134_second_tax_free_amount_rate + (belgium_pit_pilot_tax_free_amount - belgium_pit_pilot_article_134_second_tax_free_amount_threshold) * belgium_pit_pilot_article_134_third_tax_free_amount_rate
                  else:
                      if belgium_pit_pilot_tax_free_amount <= belgium_pit_pilot_article_134_fourth_tax_free_amount_threshold:
                          belgium_pit_pilot_article_134_first_tax_free_amount_threshold * belgium_pit_pilot_article_134_first_tax_free_amount_rate + (belgium_pit_pilot_article_134_second_tax_free_amount_threshold - belgium_pit_pilot_article_134_first_tax_free_amount_threshold) * belgium_pit_pilot_article_134_second_tax_free_amount_rate + (belgium_pit_pilot_article_134_third_tax_free_amount_threshold - belgium_pit_pilot_article_134_second_tax_free_amount_threshold) * belgium_pit_pilot_article_134_third_tax_free_amount_rate + (belgium_pit_pilot_tax_free_amount - belgium_pit_pilot_article_134_third_tax_free_amount_threshold) * belgium_pit_pilot_article_134_fourth_tax_free_amount_rate
                      else:
                          belgium_pit_pilot_article_134_first_tax_free_amount_threshold * belgium_pit_pilot_article_134_first_tax_free_amount_rate + (belgium_pit_pilot_article_134_second_tax_free_amount_threshold - belgium_pit_pilot_article_134_first_tax_free_amount_threshold) * belgium_pit_pilot_article_134_second_tax_free_amount_rate + (belgium_pit_pilot_article_134_third_tax_free_amount_threshold - belgium_pit_pilot_article_134_second_tax_free_amount_threshold) * belgium_pit_pilot_article_134_third_tax_free_amount_rate + (belgium_pit_pilot_article_134_fourth_tax_free_amount_threshold - belgium_pit_pilot_article_134_third_tax_free_amount_threshold) * belgium_pit_pilot_article_134_fourth_tax_free_amount_rate + (belgium_pit_pilot_tax_free_amount - belgium_pit_pilot_article_134_fourth_tax_free_amount_threshold) * belgium_pit_pilot_article_134_top_tax_free_amount_rate
  - name: belgium_pit_pilot_net_federal_tax_after_tax_free_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 articles 130 and 134, worker-only pilot federal tax after the base tax-free-amount reduction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_pilot_article_130_base_tax - belgium_pit_pilot_article_134_tax_on_tax_free_amount)
  - name: belgium_pit_pilot_article_289ter1_low_wage_work_bonus_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 289ter/1, worker-only pilot low-wage work-bonus credit from encoded ONSS work-bonus A and B amounts
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(max(0, belgium_worker_work_bonus_full_year_equal_monthly_a_amount) * belgium_pit_pilot_article_289ter1_work_bonus_a_rate + max(0, belgium_worker_work_bonus_full_year_equal_monthly_b_amount) * belgium_pit_pilot_article_289ter1_work_bonus_b_rate, belgium_pit_pilot_article_289ter1_work_bonus_credit_ceiling)
  - name: belgium_pit_pilot_reduced_state_tax_after_autonomy_factor
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Special financing law article 5/2, worker-only pilot reduced State tax after the autonomy-factor reduction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_pilot_net_federal_tax_after_tax_free_amount * belgium_pit_pilot_article_5_2_state_tax_share_after_autonomy_factor)
  - name: belgium_pit_pilot_net_federal_tax_after_work_bonus_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: Special financing law article 5/2 and CIR 1992 article 289ter/1, worker-only pilot reduced State tax after work-bonus credit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_pit_pilot_reduced_state_tax_after_autonomy_factor - belgium_pit_pilot_article_289ter1_low_wage_work_bonus_credit)
  - name: belgium_pit_pilot_local_additional_tax_base
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 articles 466 and 466bis, worker-only pilot local-tax base
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if belgium_pit_article_466bis_treaty_exempt_foreign_professional_income_base_applies:
              max(0, belgium_pit_article_466bis_hypothetical_total_tax_if_treaty_exempt_foreign_professional_income_were_belgian - belgium_pit_article_466_tax_share_on_nonprofessional_movable_income)
          else:
              max(0, belgium_pit_pilot_net_federal_tax_after_work_bonus_credit - belgium_pit_article_466_tax_share_on_nonprofessional_movable_income)
  - name: belgium_pit_pilot_agglomeration_additional_tax_rate_after_cap
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CIR 1992 article 468, agglomeration rate cap for the worker-only pilot
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          min(belgium_pit_agglomeration_additional_tax_rate, belgium_pit_pilot_article_468_agglomeration_additional_tax_rate_cap)
  - name: belgium_pit_pilot_local_additional_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 articles 465 to 468, supplied local additions for the worker-only pilot
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_pilot_local_additional_tax_base * belgium_pit_communal_additional_tax_rate + belgium_pit_pilot_local_additional_tax_base * belgium_pit_pilot_agglomeration_additional_tax_rate_after_cap
  - name: belgium_pit_pilot_federal_and_local_tax_before_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 articles 130, 134, and 465 to 468, composed worker-only pilot final PIT before withholding
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_pit_pilot_net_federal_tax_after_work_bonus_credit + belgium_pit_pilot_local_additional_tax
