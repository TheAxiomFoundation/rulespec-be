  source: CIR 1992 article 147 items 1 and 2, pension and other replacement-income
    reduction before phaseouts
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_article_147_net_income_for_replacement_reduction <= 0:\n\
      \    0\nelse:\n    min(1, belgium_pit_article_147_pension_and_other_replacement_income\
      \ / belgium_pit_article_147_net_income_for_replacement_reduction) * (belgium_pit_article_147_basic_replacement_reduction\
      \ + belgium_pit_article_147_additional_replacement_reduction)"
