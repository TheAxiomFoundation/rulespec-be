    formula: "if belgium_pit_article_289ter_is_assisting_spouse:\n    belgium_pit_article_289ter_assisting_spouse_credit\n\
      else:\n    if belgium_pit_article_289ter_is_covered_public_worker_without_contract:\n\
      \        belgium_pit_article_289ter_public_worker_credit\n    else:\n      \
      \  belgium_pit_article_289ter_standard_credit"
- name: belgium_pit_article_289ter_credit_by_activity_income_before_professional_ratio
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 289ter paragraph 2, low activity-income credit by activity-income
    band
  versions:
  - effective_from: '2025-01-01'
    formula: |-
      max(0, min(
          belgium_pit_article_289ter_max_credit_amount,
          belgium_pit_article_289ter_max_credit_amount * max(0, belgium_pit_article_289ter_activity_income - belgium_pit_article_289ter_activity_income_lower_threshold) / (belgium_pit_article_289ter_activity_income_plateau_start - belgium_pit_article_289ter_activity_income_lower_threshold),
          belgium_pit_article_289ter_max_credit_amount * max(0, belgium_pit_article_289ter_activity_income_upper_threshold - belgium_pit_article_289ter_activity_income) / (belgium_pit_article_289ter_activity_income_upper_threshold - belgium_pit_article_289ter_activity_income_plateau_end)
      ))
