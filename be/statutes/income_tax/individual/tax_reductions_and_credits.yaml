  dtype: Rate
  period: Year
  source: CIR 1992 article 289ter paragraph 2, reduction where activity income is
    only part of net professional income
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_article_289ter_net_professional_income <= 0:\n    0\n\
      else:\n    min(1, belgium_pit_article_289ter_activity_income / belgium_pit_article_289ter_net_professional_income)"
