- name: belgium_pit_article_151_unemployment_reduction_factor
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: CIR 1992 article 151, unemployment reduction phaseout factor
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_article_151_older_unemployed_with_seniority_supplement:\n\
      \    1\nelse:\n    if belgium_pit_taxable_income >= belgium_pit_article_151_unemployment_phaseout_end:\n\
      \        0\n    else:\n        if belgium_pit_taxable_income <= belgium_pit_article_151_unemployment_phaseout_start:\n\
      \            1\n        else:\n            (belgium_pit_article_151_unemployment_phaseout_end\
      \ - belgium_pit_taxable_income) / (belgium_pit_article_151_unemployment_phaseout_end\
      \ - belgium_pit_article_151_unemployment_phaseout_start)"
- name: belgium_pit_article_1511_additional_reduction_factor
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: CIR 1992 article 151/1, additional replacement-income reduction phaseout
    factor
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_taxable_income >= belgium_pit_article_1511_additional_phaseout_end:\n\
      \    0\nelse:\n    if belgium_pit_taxable_income <= belgium_pit_article_1511_additional_phaseout_start:\n\
      \        1\n    else:\n        (belgium_pit_article_1511_additional_phaseout_end\
      \ - belgium_pit_taxable_income) / (belgium_pit_article_1511_additional_phaseout_end\
      \ - belgium_pit_article_1511_additional_phaseout_start)"
- name: belgium_pit_article_152_replacement_reduction_factor
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: CIR 1992 article 152, phaseout factor for replacement-income reductions
    not covered by Articles 151 and 151/1
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_taxable_income >= belgium_pit_article_152_replacement_phaseout_end:\n\
      \    1 / 3\nelse:\n    if belgium_pit_taxable_income <= belgium_pit_article_152_replacement_phaseout_start:\n\
      \        1\n    else:\n        1 / 3 + (2 / 3) * ((belgium_pit_article_152_replacement_phaseout_end\
      \ - belgium_pit_taxable_income) / (belgium_pit_article_152_replacement_phaseout_end\
      \ - belgium_pit_article_152_replacement_phaseout_start))"
- name: belgium_pit_selected_replacement_income_reduction_after_phaseouts
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
