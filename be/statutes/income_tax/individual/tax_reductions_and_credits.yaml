    formula: "if belgium_pit_article_147_net_income_for_replacement_reduction <= 0:\n\
      \    0\nelse:\n    min(1, belgium_pit_article_147_unemployment_income / belgium_pit_article_147_net_income_for_replacement_reduction)\
      \ * (belgium_pit_article_147_basic_replacement_reduction + belgium_pit_article_147_additional_replacement_reduction)"
