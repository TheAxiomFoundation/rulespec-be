format: rulespec/v1
module:
  summary: 'This module encodes selected federal personal income tax reductions and

    personal credits from current CIR 1992 consolidated text for income year

    2025 / assessment year 2026. It covers arithmetic rates, caps, and selected

    phaseout interfaces for Article 145 tax reductions, Articles 147 to 152

    replacement-income reductions, and Articles 289bis, 289ter, and 289ter/1

    credits. Eligibility, attestations, product classification, joint-

    assessment allocation, regional reductions, and final imputation ordering

    remain separate surfaces.'
  source_verification:
    corpus_citation_path: "be/statute/fisconetplus/cir92/revenus-2025/page-193"
units:
- name: EUR
  kind: currency
  minor_units: 2
rules:
