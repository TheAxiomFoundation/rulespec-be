  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 289ter paragraph 2, total net income cap on low activity-income
    credit
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_article_289ter_total_net_income <= belgium_pit_article_289ter_activity_income_plateau_end:\n\
      \    belgium_pit_article_289ter_max_credit_amount\nelse:\n    if belgium_pit_article_289ter_total_net_income\
      \ <= belgium_pit_article_289ter_activity_income_upper_threshold:\n        belgium_pit_article_289ter_max_credit_amount\
      \ * ((belgium_pit_article_289ter_activity_income_upper_threshold - belgium_pit_article_289ter_total_net_income)\
      \ / (belgium_pit_article_289ter_activity_income_upper_threshold - belgium_pit_article_289ter_activity_income_plateau_end))\n\
      \    else:\n        0"
- name: belgium_pit_article_289ter_low_activity_income_credit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 289ter, low activity-income credit
  versions:
  - effective_from: '2025-01-01'
    formula: |-
      if belgium_pit_article_289ter_low_activity_credit_conditions_met:
          max(0, min(
              max(0, belgium_pit_article_289ter_credit_by_activity_income_before_professional_ratio) * max(0, belgium_pit_article_289ter_professional_income_ratio),
              max(0, belgium_pit_article_289ter_total_net_income_cap)
          ))
      else:
          0
