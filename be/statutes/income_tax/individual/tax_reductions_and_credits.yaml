- name: belgium_pit_article_14532_development_fund_recapture_floor
  kind: parameter
  dtype: Count
  source: CIR 1992 article 145/32 paragraph 2, development-fund recapture when shares
    are ceded inside 60 months
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-226
          excerpt: "§ 2. Lorsque la condition visée au paragraphe 1er, alinéa 2, 1°, n'a pas été observée durant une des années suivant l'année de versement parce que le souscripteur a cédé les actions dans les 60 mois suivant leur acquisition, l'impôt total afférent aux revenus de cette année est majoré d'un montant correspondant à autant de fois un soixantième de la réduction d'impôt réellement obtenue conformément au paragraphe 1er, qu'il reste de mois entiers jusqu'à l'expiration du délai de 60 mois."
  versions:
  - effective_from: '2025-01-01'
    formula: '60'
- name: belgium_pit_article_14532_development_fund_recapture
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 145/32 paragraph 2, development-fund recapture when shares
    are ceded inside 60 months
  versions:
  - effective_from: '2025-01-01'
    formula: "if belgium_pit_article_14532_development_fund_ceded_before_60_months:\n\
      \    belgium_pit_article_14532_development_fund_reduction_previously_obtained\
      \ * min(belgium_pit_article_14532_development_fund_recapture_floor, max(0, belgium_pit_article_14532_development_fund_remaining_full_months))\
      \ / belgium_pit_article_14532_development_fund_recapture_floor\nelse:\n    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/income_tax/individual/tax_reductions_and_credits#belgium_pit_article_14532_development_fund_recapture_floor
          output: belgium_pit_article_14532_development_fund_recapture_floor
          hash: sha256:local
