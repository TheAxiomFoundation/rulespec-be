format: rulespec/v1
module:
  summary: 'CIR 1992 article 36 paragraph 2 sets the Belgian taxable benefit in kind

    for private use of a company car. This module encodes the annual employee

    personal-income-tax benefit for income year 2026 / assessment year 2027:

    catalogue-value age coefficients, the 6/7 statutory fraction, 2026

    reference CO2 values, the 4 to 18 percent CO2-percentage bounds, missing

    CO2 fallbacks, false plug-in hybrid CO2 substitution, the indexed minimum

    annual benefit, and beneficiary contributions. It excludes employer-side

    corporate-tax disallowance, payroll withholding remittance, day-level

    prorating for partial-year availability, multiple simultaneous vehicles,

    and administrative evidence rules.'
  source_verification:
    corpus_citation_paths:
    - be/statute/fisconetplus/cir92/revenus-2025/page-95
    - be/statute/fisconetplus/cir92/revenus-2025/page-96
    - be/regulation/moniteur/arrete-2025-12-17/2025009788/company-car-reference-co2-2026/block-1
    - be/guidance/spf-finances/company-car-benefit/2026-faq/page-2
    - be/guidance/spf-finances/company-car-benefit/2026-faq/page-3
    - be/guidance/spf-finances/company-car-benefit/2026-faq/page-27
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
      - be/statute/fisconetplus/cir92/revenus-2025/page-95
      - be/statute/fisconetplus/cir92/revenus-2025/page-96
      - be/regulation/moniteur/arrete-2025-12-17/2025009788/company-car-reference-co2-2026/block-1
      rationale: |-
        CIR 1992 article 36 sets the company-car benefit formula, CO2
        percentage bounds, missing-CO2 fallbacks, age coefficients, and
        statutory fraction. The royal decree sets the 2026 reference CO2
        values. SPF Finances FAQ rows are used only as official administrative
        current-year guidance for indexed minimum and false plug-in-hybrid
        application details after those statute/regulation sources are checked.
    values:
      belgium_company_car_petrol_lpg_natural_gas_reference_co2_2026: 70
      belgium_company_car_diesel_reference_co2_2026: 58
      belgium_company_car_base_co2_percentage: '0.055'
      belgium_company_car_co2_percentage_step_per_gram: '0.001'
      belgium_company_car_minimum_co2_percentage: '0.04'
      belgium_company_car_maximum_co2_percentage: '0.18'
      belgium_company_car_missing_petrol_lpg_natural_gas_co2: 205
      belgium_company_car_missing_diesel_co2: 195
      belgium_company_car_minimum_annual_benefit_assessment_year_2027: 1690
units:
- name: EUR
  kind: currency
  minor_units: 2
