- name: belgium_company_car_age_adjusted_catalog_value
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 36 paragraph 2 catalogue-value age coefficient
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_company_car_catalog_value * belgium_company_car_catalog_value_age_coefficient
- name: belgium_company_car_reference_co2
  kind: derived
  entity: Person
  dtype: Count
  period: Year
  source: Royal Decree of 17 December 2025, 2026 reference CO2 table
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_company_car_is_diesel:\n    belgium_company_car_diesel_reference_co2_2026\n\
      else:\n    belgium_company_car_petrol_lpg_natural_gas_reference_co2_2026"
- name: belgium_company_car_reported_or_default_co2
  kind: derived
  entity: Person
  dtype: Count
  period: Year
  source: CIR 1992 article 36 paragraph 2 missing CO2 fallbacks
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_company_car_has_known_co2:\n    belgium_company_car_co2_g_per_km\n\
      else:\n    if belgium_company_car_is_diesel:\n        belgium_company_car_missing_diesel_co2\n\
      \    else:\n        belgium_company_car_missing_petrol_lpg_natural_gas_co2"
- name: belgium_company_car_co2_used_scalar_limit
  kind: parameter
  dtype: Count
  source: CIR 1992 article 36 paragraph 2 false plug-in hybrid and missing CO2 rules
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-95
          span: CIR 1992 article 36 paragraph 2 false plug-in hybrid and missing CO2
            rules
  versions:
  - effective_from: '2026-01-01'
    formula: '2.5'
- name: belgium_company_car_co2_used
  kind: derived
  entity: Person
  dtype: Count
  period: Year
  source: CIR 1992 article 36 paragraph 2 false plug-in hybrid and missing CO2 rules
  versions:
  - effective_from: '2026-01-01'
    formula: "if belgium_company_car_is_false_plugin_hybrid:\n    if belgium_company_car_has_corresponding_combustion_vehicle:\n\
      \        belgium_company_car_corresponding_combustion_co2_g_per_km\n    else:\n\
      \        belgium_company_car_reported_or_default_co2 * belgium_company_car_co2_used_scalar_limit\n\
      else:\n    belgium_company_car_reported_or_default_co2"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be:statutes/income_tax/benefits/company_car#belgium_company_car_co2_used_scalar_limit
          output: belgium_company_car_co2_used_scalar_limit
          hash: sha256:local
- name: belgium_company_car_raw_co2_percentage
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: CIR 1992 article 36 paragraph 2 CO2 percentage before floor and cap
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_company_car_base_co2_percentage + (belgium_company_car_co2_used
      - belgium_company_car_reference_co2) * belgium_company_car_co2_percentage_step_per_gram
- name: belgium_company_car_co2_percentage
  kind: derived
  entity: Person
  dtype: Rate
  period: Year
  source: CIR 1992 article 36 paragraph 2 CO2 percentage floor and cap
  versions:
  - effective_from: '2026-01-01'
    formula: max(belgium_company_car_minimum_co2_percentage, min(belgium_company_car_maximum_co2_percentage,
      belgium_company_car_raw_co2_percentage))
- name: belgium_company_car_gross_annual_benefit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 36 paragraph 2 company-car benefit formula
  versions:
  - effective_from: '2026-01-01'
    formula: belgium_company_car_age_adjusted_catalog_value * belgium_company_car_catalog_value_fraction
      * belgium_company_car_co2_percentage
- name: belgium_company_car_annual_benefit_before_contribution
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 36 paragraph 2 annual minimum benefit
  versions:
  - effective_from: '2026-01-01'
    formula: max(belgium_company_car_minimum_annual_benefit_assessment_year_2027,
      belgium_company_car_gross_annual_benefit)
- name: belgium_company_car_taxable_annual_benefit
  kind: derived
  entity: Person
  dtype: Money
  period: Year
  unit: EUR
  source: CIR 1992 article 36 paragraph 2 beneficiary contribution rule
  versions:
  - effective_from: '2026-01-01'
    formula: max(0, belgium_company_car_annual_benefit_before_contribution - belgium_company_car_beneficiary_contribution)
