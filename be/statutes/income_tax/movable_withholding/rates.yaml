format: rulespec/v1
module:
  summary: |-
    CIR 1992 article 21 exempts the first indexed tranche of qualifying
    regulated savings-deposit interest, article 171 taxes income from capital
    and movable property separately from the globalised income at distinct
    rates, and article 269 sets movable withholding tax rates. This module
    encodes the main 30% rate, the 15% rate for regulated savings-deposit
    income above the exemption, and the current indexed exemption amount for
    income year 2025 / assessment year 2026. It also computes the taxable
    regulated-deposit interest, the general and regulated-deposit movable
    withholding amounts, and the separately-taxed capital-income tax on taxable
    movable income at the general 30% rate. Other article 171 and article 269
    special rates (for example the article 171 1deg reduced rates) remain
    separate surfaces.
  source_verification:
    corpus_citation_path: "be/statute/fisconetplus/cir92/revenus-2025/page-69"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: belgium_regulated_savings_deposit_interest_exemption_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: CIR 1992 article 21, first paragraph item 5, income year 2025, assessment year 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-69
              excerpt: "la première tranche de 1.050 euros (montant indexé) par an des revenus afférents aux dépôts d'épargne"
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1050
  - name: belgium_movable_withholding_general_rate
    kind: parameter
    dtype: Rate
    source: CIR 1992 article 269 section 1 item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-461
              excerpt: "Le taux du précompte mobilier est fixé: 1° à 30 % pour les revenus de capitaux et biens mobiliers"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.30
  - name: belgium_regulated_savings_deposit_withholding_rate
    kind: parameter
    dtype: Rate
    source: CIR 1992 article 269 section 1 item 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: be/statute/fisconetplus/cir92/revenus-2025/page-461
              excerpt: "2° à 15 % pour les revenus de dépôts d'épargne visés à l'article 21, alinéa 1er, 5°"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          0.15
  - name: belgium_regulated_savings_deposit_taxable_interest
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 21 first paragraph item 5 and article 269 section 1 item 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_regulated_savings_deposit_gross_interest - belgium_regulated_savings_deposit_interest_exemption_amount)
  - name: belgium_regulated_savings_deposit_movable_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 269 section 1 item 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_regulated_savings_deposit_taxable_interest * belgium_regulated_savings_deposit_withholding_rate
  - name: belgium_general_movable_income_withholding
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 269 section 1 item 1
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          belgium_general_movable_income_subject_to_withholding * belgium_movable_withholding_general_rate
  - name: belgium_capital_income_separate_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: EUR
    source: CIR 1992 article 171 separate taxation of capital and movable income and article 269 section 1 item 1 general 30% rate, capital-income tax on taxable movable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, belgium_capital_income_taxable_movable_income) * belgium_movable_withholding_general_rate
