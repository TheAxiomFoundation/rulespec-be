format: rulespec/v1
module:
  summary: |-
    German-speaking Community decree of 23 April 2018 articles 8, 15, 17,
    19, 21, 23, 25, 30, and 34 set original statutory amount surfaces for
    family benefits. Article 117.3, as amended by the 22 December 2025
    program decree, freezes family-benefit adaptations for 2025 through 2027,
    and article 117.4 sets a 62.55 EUR annual supplement for 2025. This module
    encodes the 2019 amount surfaces, the 2025-2027 freeze selector against
    supplied index factors, and the 2025 annual supplement override; residence,
    age, education, recipient, transitional protected amounts, exact delegated
    index values, and delegated eligibility tests remain separate surfaces.
  source_verification:
    corpus_citation_paths:
      - be-dg/statute/moniteur/decret-2018-04-23/2018202523/family-benefits
      - be-dg/statute/justel/decret-2018-04-23/2018202523/family-benefits-current
      - be-dg/statute/moniteur/decret-2025-12-22/2026001207/program-decree-2025-ii-family-benefits/block-1
    values:
      german_speaking_community_family_benefits_base_monthly_amount_2019: "157"
      german_speaking_community_family_benefits_annual_supplement_2019: "52"
      german_speaking_community_family_benefits_large_family_monthly_supplement_2019: "135"
      german_speaking_community_family_benefits_social_monthly_supplement_2019: "75"
      german_speaking_community_family_benefits_disability_category_1_monthly_supplement_2019: "85"
      german_speaking_community_family_benefits_disability_category_2_monthly_supplement_2019: "112"
      german_speaking_community_family_benefits_disability_category_3_monthly_supplement_2019: "262"
      german_speaking_community_family_benefits_disability_category_4_monthly_supplement_2019: "432"
      german_speaking_community_family_benefits_disability_category_5_monthly_supplement_2019: "491"
      german_speaking_community_family_benefits_disability_category_6_monthly_supplement_2019: "526"
      german_speaking_community_family_benefits_disability_category_7_monthly_supplement_2019: "561"
      german_speaking_community_family_benefits_full_orphan_monthly_supplement_2019: "239"
