        kind: parameter
        source:
          corpus_citation_path: be-dg/statute/moniteur/decret-2025-12-22/2026001207/program-decree-2025-ii-family-benefits/block-1
          span: German-speaking Community decree of 23 April 2018 on family benefits, articles 15, 16, and 38, and 22 December 2025 program decree article 18; amount 2025 EUR
  versions:
  - effective_from: '2019-01-01'
    formula: '2025'
- name: german_speaking_community_family_benefits_annual_supplement_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Year
  unit: EUR
  source: German-speaking Community decree of 23 April 2018 on family benefits, articles
    15, 16, and 38, and 22 December 2025 program decree article 18
  versions:
  - effective_from: '2019-01-01'
    formula: "if german_speaking_community_family_benefits_has_july_base_entitlement:\n\
      \    if german_speaking_community_family_benefits_benefit_year == german_speaking_community_family_benefits_annual_supplement_amount_scalar_limit:\n\
      \        german_speaking_community_family_benefits_2025_annual_supplement_amount\n\
      \    else:\n        german_speaking_community_family_benefits_annual_supplement_2019\
      \ * german_speaking_community_family_benefits_indexed_amount_factor\nelse:\n\
      \    0"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-dg:statutes/family_benefits/amounts#german_speaking_community_family_benefits_annual_supplement_amount_scalar_limit
          output: german_speaking_community_family_benefits_annual_supplement_amount_scalar_limit
          hash: sha256:local
- name: german_speaking_community_family_benefits_large_family_monthly_supplement_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: German-speaking Community decree of 23 April 2018 on family benefits, articles
    17, 18, and 38
  versions:
  - effective_from: '2019-01-01'
    formula: "if german_speaking_community_family_benefits_child_has_base_entitlement:\n\
      \    if german_speaking_community_family_benefits_same_recipient_entitled_child_count\
      \ >= 3:\n        german_speaking_community_family_benefits_large_family_monthly_supplement_2019\
      \ * german_speaking_community_family_benefits_indexed_amount_factor\n    else:\n\
      \        0\nelse:\n    0"
- name: german_speaking_community_family_benefits_social_monthly_supplement_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: German-speaking Community decree of 23 April 2018 on family benefits, articles
    19, 20, and 38
  versions:
  - effective_from: '2019-01-01'
    formula: "if german_speaking_community_family_benefits_child_has_base_entitlement:\n\
      \    if german_speaking_community_family_benefits_has_increased_health_insurance_reimbursement:\n\
      \        if german_speaking_community_family_benefits_is_full_orphan or german_speaking_community_family_benefits_is_half_orphan:\n\
      \            0\n        else:\n            german_speaking_community_family_benefits_social_monthly_supplement_2019\
      \ * german_speaking_community_family_benefits_indexed_amount_factor\n    else:\n\
      \        0\nelse:\n    0"
