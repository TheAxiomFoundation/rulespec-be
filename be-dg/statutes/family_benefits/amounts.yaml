    source: German-speaking Community program decree of 22 December 2025, article 17
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2027
  - name: german_speaking_community_family_benefits_2025_annual_supplement_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: EUR
    source: German-speaking Community program decree of 22 December 2025, article 18 inserting article 117.4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          62.55
  - name: german_speaking_community_family_benefits_indexation_freeze_applies
    kind: derived
    entity: Child
    dtype: Count
    period: Year
    source: German-speaking Community program decree of 22 December 2025, article 17 amending article 117.3
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if german_speaking_community_family_benefits_benefit_year >= german_speaking_community_family_benefits_indexation_freeze_start_year:
              if german_speaking_community_family_benefits_benefit_year <= german_speaking_community_family_benefits_indexation_freeze_end_year:
                  1
              else:
                  0
          else:
              0
  - name: german_speaking_community_family_benefits_indexed_amount_factor
    kind: derived
    entity: Child
    dtype: Rate
    period: Year
    source: German-speaking Community family-benefits decree article 38 and program decree of 22 December 2025 article 17
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_indexation_freeze_applies == 1:
              german_speaking_community_family_benefits_pre_2025_index_factor
          else:
              german_speaking_community_family_benefits_current_index_factor
  - name: german_speaking_community_family_benefits_base_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 8 and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              german_speaking_community_family_benefits_base_monthly_amount_2019 * german_speaking_community_family_benefits_indexed_amount_factor
          else:
              0
  - name: german_speaking_community_family_benefits_annual_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Year
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 15, 16, and 38, and 22 December 2025 program decree article 18
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_has_july_base_entitlement:
              if german_speaking_community_family_benefits_benefit_year == 2025:
                  german_speaking_community_family_benefits_2025_annual_supplement_amount
              else:
                  german_speaking_community_family_benefits_annual_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
          else:
              0
  - name: german_speaking_community_family_benefits_large_family_monthly_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 17, 18, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              if german_speaking_community_family_benefits_same_recipient_entitled_child_count >= 3:
                  german_speaking_community_family_benefits_large_family_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
              else:
                  0
          else:
              0
  - name: german_speaking_community_family_benefits_social_monthly_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 19, 20, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              if german_speaking_community_family_benefits_has_increased_health_insurance_reimbursement:
                  if german_speaking_community_family_benefits_is_full_orphan or german_speaking_community_family_benefits_is_half_orphan:
                      0
                  else:
                      german_speaking_community_family_benefits_social_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
              else:
                  0
          else:
              0
  - name: german_speaking_community_family_benefits_disability_monthly_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 21, 22, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              if german_speaking_community_family_benefits_disability_category == 1:
                  german_speaking_community_family_benefits_disability_category_1_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
              else:
                  if german_speaking_community_family_benefits_disability_category == 2:
                      german_speaking_community_family_benefits_disability_category_2_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                  else:
                      if german_speaking_community_family_benefits_disability_category == 3:
                          german_speaking_community_family_benefits_disability_category_3_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                      else:
                          if german_speaking_community_family_benefits_disability_category == 4:
                              german_speaking_community_family_benefits_disability_category_4_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                          else:
                              if german_speaking_community_family_benefits_disability_category == 5:
                                  german_speaking_community_family_benefits_disability_category_5_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                              else:
                                  if german_speaking_community_family_benefits_disability_category == 6:
                                      german_speaking_community_family_benefits_disability_category_6_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                                  else:
                                      if german_speaking_community_family_benefits_disability_category == 7:
                                          german_speaking_community_family_benefits_disability_category_7_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
                                      else:
                                          0
          else:
              0
  - name: german_speaking_community_family_benefits_full_orphan_monthly_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 23, 24, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              if german_speaking_community_family_benefits_is_full_orphan:
                  german_speaking_community_family_benefits_full_orphan_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
              else:
                  0
          else:
              0
  - name: german_speaking_community_family_benefits_half_orphan_monthly_supplement_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 25, 26, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_child_has_base_entitlement:
              if german_speaking_community_family_benefits_is_half_orphan:
                  if german_speaking_community_family_benefits_is_full_orphan:
                      0
                  else:
                      german_speaking_community_family_benefits_half_orphan_monthly_supplement_2019 * german_speaking_community_family_benefits_indexed_amount_factor
              else:
                  0
          else:
              0
  - name: german_speaking_community_family_benefits_selected_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 8, 17, 19, 21, 23, 25, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          german_speaking_community_family_benefits_base_monthly_amount + german_speaking_community_family_benefits_large_family_monthly_supplement_amount + german_speaking_community_family_benefits_social_monthly_supplement_amount + german_speaking_community_family_benefits_disability_monthly_supplement_amount + german_speaking_community_family_benefits_full_orphan_monthly_supplement_amount + german_speaking_community_family_benefits_half_orphan_monthly_supplement_amount
  - name: german_speaking_community_family_benefits_birth_premium_amount
    kind: derived
    entity: Child
    dtype: Money
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 30, 31, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_birth_premium_conditions_met:
              german_speaking_community_family_benefits_birth_premium_2019 * german_speaking_community_family_benefits_indexed_amount_factor
          else:
              0
  - name: german_speaking_community_family_benefits_adoption_premium_amount
    kind: derived
    entity: Child
    dtype: Money
    unit: EUR
    source: German-speaking Community decree of 23 April 2018 on family benefits, articles 34, 35, and 38
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if german_speaking_community_family_benefits_adoption_premium_conditions_met:
              german_speaking_community_family_benefits_adoption_premium_2019 * german_speaking_community_family_benefits_indexed_amount_factor
          else:
              0
