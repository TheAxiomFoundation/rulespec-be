- name: german_speaking_community_family_benefits_indexation_freeze_applies
  kind: derived
  entity: Child
  dtype: Count
  period: Year
  source: German-speaking Community program decree of 22 December 2025, article 17
    amending article 117.3
  versions:
  - effective_from: '2025-01-01'
    formula: "if german_speaking_community_family_benefits_benefit_year >= german_speaking_community_family_benefits_indexation_freeze_start_year:\n\
      \    if german_speaking_community_family_benefits_benefit_year <= german_speaking_community_family_benefits_indexation_freeze_end_year:\n\
      \        1\n    else:\n        0\nelse:\n    0"
- name: german_speaking_community_family_benefits_indexed_amount_factor
  kind: derived
  entity: Child
  dtype: Rate
  period: Year
  source: German-speaking Community family-benefits decree article 38 and program
    decree of 22 December 2025 article 17
  versions:
  - effective_from: '2019-01-01'
    formula: "if german_speaking_community_family_benefits_indexation_freeze_applies\
      \ == 1:\n    german_speaking_community_family_benefits_pre_2025_index_factor\n\
      else:\n    german_speaking_community_family_benefits_current_index_factor"
- name: german_speaking_community_family_benefits_base_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: German-speaking Community decree of 23 April 2018 on family benefits, articles
    8 and 38
  versions:
  - effective_from: '2019-01-01'
    formula: "if german_speaking_community_family_benefits_child_has_base_entitlement:\n\
      \    german_speaking_community_family_benefits_base_monthly_amount_2019 * german_speaking_community_family_benefits_indexed_amount_factor\n\
      else:\n    0"
