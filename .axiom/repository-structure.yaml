version: 1
allowed_root_directories:
  - .axiom
  - .github
  - data
  - docs
  - be
  - be-bru
  - be-dg
  - be-vlg
  - be-wal
  - tests
allowed_root_files:
  - .gitignore
  - CLAUDE.md
  - LICENSE
  - LICENSE-CODE
  - NOTICE
  - README.md
  - known-validation-gaps.yaml
  - oracle-coverage-pending.yaml
  - variables.toml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "data/**"
    allow_extensions:
      - ".json"
      - ".jsonl"
      - ".yaml"
      - ".yml"
  - patterns:
      - "docs/**"
    allow_extensions:
      - ".md"
  - patterns:
      - "be/**"
      - "be-bru/**"
      - "be-dg/**"
      - "be-vlg/**"
      - "be-wal/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "tests/**"
    allow_extensions:
      - ".py"
