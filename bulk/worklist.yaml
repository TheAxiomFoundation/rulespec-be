version: 1
defaults:
  backend: openai
  model: gpt-5.5
# rulespec-be bulk-encode worklist (federal `be` scope).
#
# Each `citation` is a corpus citation_path the encoder resolves. Every entry
# below was verified to exist BEFORE listing (never invent country numbers):
# its exact citation_path returns provision text in the toolchain-pinned
# axiom-corpus ref (.axiom/toolchain.toml -> axiom_corpus_ref
# 8e48989c…), which is the source the bulk workflow's `axiom-encode encode`
# reads first (local checkout, Supabase only as fallback). All are drawn from
# the 1978-07-03 employment-contracts law (loi 1978070303) and the coordinated
# 1994-07-14 health-insurance law (loi 1994071451), both already ingested and
# committed under data/corpus/provisions/be/statute/.
#
# CORPUS-PUBLISH LAG (readiness note): these `be/statute/…` provisions are
# committed to axiom-corpus and present in the pinned ref, but are NOT YET in
# the published Supabase `current_provisions` view (0 rows there for all
# be/statute + be/regulation today; only be/guidance is published). The bulk
# encoder resolves them locally from the pinned checkout, so it will not
# invent, but a corpus publish should catch current_provisions up before a
# full-scale drain. Tracked as a corpus (not dispatcher) gap.
#
# Selection: self-contained provisions with clear standalone arithmetic
# (durations, guaranteed-pay percentages, indemnity multiples). Cross-
# reference-heavy provisions are skipped (encoder self-import, encode#1058).
#
# VOLUME STAYS MINIMAL until the path-scoped CI build lands (org runners are
# currently saturated; a parallel worker is fixing that). This is a pilot
# queue, not a full drain.
entries:
# --- Batch A: pilot (cleanest standalone arithmetic; canary is article/52) ---
- citation: be/statute/loi/1978/07/03/1978070303/article/52
  repo: rulespec-be
  batch: A
  status: merged  # canary drained: PR #98 merged to main (span/excerpt gate fixed in #101)
  heading: Guaranteed salary on incapacity for manual workers (loi 1978-07-03 art. 52)
  class: rate
  note: Self-contained salaire garanti — normal pay for 7 days, then 60 p.c. of
    the capped portion for the next 7 days. In-article arithmetic; the sickness-
    insurance ceiling is a parameter input, not a cross-reference.
- citation: be/statute/loi/1978/07/03/1978070303/article/101
  repo: rulespec-be
  batch: A
  status: pending
  heading: Commercial representative eviction indemnity (loi 1978-07-03 art. 101)
  class: rate
  note: Self-contained indemnité d'éviction — three months' remuneration for 1–5
    years of service, increased by one month per further period. Pure salary-
    multiple formula after a one-year service precondition.
- citation: be/statute/loi/1978/07/03/1978070303/article/30ter
  repo: rulespec-be
  batch: A
  status: pending
  heading: Adoption leave duration (loi 1978-07-03 art. 30ter)
  class: mechanics
  note: Self-contained congé d'adoption — an uninterrupted maximum of six weeks,
    taken in whole-week multiples of at least one week. Standalone duration rule.
- citation: be/statute/loi/1978/07/03/1978070303/article/40
  repo: rulespec-be
  batch: A
  status: pending
  heading: Fixed-term contract early-termination indemnity (loi 1978-07-03 art. 40)
  class: rate
  note: Self-contained — indemnity equals remuneration due to term, capped at
    twice the pay for the notice period a comparable open-ended contract would
    require. In-article arithmetic.
# --- Batch B: remaining employment-law + coordinated health-insurance floor ---
- citation: be/statute/loi/1978/07/03/1978070303/article/130
  repo: rulespec-be
  batch: B
  status: pending
  heading: Student employment contract notice periods (loi 1978-07-03 art. 130)
  class: mechanics
  note: Self-contained notice-day schedule — 3 days (employer) / 1 day (student)
    for engagements up to one month, 7 / 3 days beyond one month.
- citation: be/statute/loi/1978/07/03/1978070303/article/37-10
  repo: rulespec-be
  batch: B
  status: pending
  heading: Fixed-term termination on prolonged incapacity (loi 1978-07-03 art. 37/10)
  class: rate
  note: Self-contained — for fixed terms of at least three months, once incapacity
    exceeds six months the employer may terminate against an indemnity equal to
    remuneration due to the convened term.
- citation: be/statute/loi/1994/07/14/1994071451/article/93bis
  repo: rulespec-be
  batch: B
  status: pending
  heading: Minimum daily invalidity indemnity floor (loi 1994-07-14 art. 93bis)
  class: rate
  note: Self-contained floor — the minimum daily invalidity indemnity for
    non-regular workers with dependants is not below the integration-income
    amount (in working days) for two cohabitants; a comparative amount rule.
# --- Batch C: corpus-publish refill. The 2026-07 publish repair put the federal
# `be/statute/*` and `be/regulation/*` scopes into the Supabase current_provisions
# view (statute 2591 + regulation 1487 rows), so every entry below was verified to
# resolve to exactly one live, non-repealed provision there (jurisdiction be) AND
# to a self-contained arithmetic body BEFORE listing — never invented. Amendment
# acts (encode#1079) and cross-reference-heavy provisions (encode#1058) skipped;
# King-delegating shells (amounts fixed by later arrêté) skipped. None collides
# with a citation-mirroring encoded module or an existing worklist entry. 2025
# validation year (EUROMOD-imposed). Employment-law and coordinated-health-law
# statute atoms plus the health-insurance/pension/career-break implementing decrees.
- citation: be/statute/loi/1978/07/03/1978070303/article/37-2
  repo: rulespec-be
  batch: C
  status: pending
  heading: Notice periods on employer termination (loi 1978-07-03 art. 37/2)
  class: mechanics
  note: Self-contained notice-week schedule — one week below three months'
    seniority rising in fixed steps to fifteen weeks at four-to-five years, then
    +3 weeks per year from five years, +2 from twenty, +1 from twenty-one. In-
    article arithmetic; a 2026-onward variant sits in §1er/1.
- citation: be/statute/loi/1978/07/03/1978070303/article/71
  repo: rulespec-be
  batch: C
  status: pending
  heading: Guaranteed salary for short fixed-term employees (loi 1978-07-03 art. 71)
  class: rate
  note: Self-contained — an employee engaged for a fixed term or defined task under
    three months keeps normal pay for seven days and 60 p.c. of the capped portion
    for the next seven; the art. 52 salaire garanti pattern for this cohort,
    applying art. 52 §§1,6,7 in-chapter.
- citation: be/statute/loi/1978/07/03/1978070303/article/112
  repo: rulespec-be
  batch: C
  status: pending
  heading: Guaranteed salary for domestic workers (loi 1978-07-03 art. 112)
  class: rate
  note: Self-contained — a domestic worker (domestique) keeps normal pay for seven
    days and 60 p.c. of the capped portion for the next seven on incapacity; the
    art. 52 guaranteed-salary pattern extended to domestics.
- citation: be/statute/loi/1978/07/03/1978070303/article/104
  repo: rulespec-be
  batch: C
  status: pending
  heading: Non-compete clause pay threshold (loi 1978-07-03 art. 104)
  class: mechanics
  note: Self-contained — the non-competition clause is deemed non-existent where
    annual pay does not exceed the in-article base amount (16 100 EUR, indexed),
    with a higher tier above which it is fully valid. Threshold arithmetic;
    indexation is applied externally.
- citation: be/statute/loi/1978/07/03/1978070303/article/69
  repo: rulespec-be
  batch: C
  status: pending
  heading: Arbitration clause pay threshold (loi 1978-07-03 art. 69)
  class: mechanics
  note: Self-contained — the arbitration clause is valid only for an employee whose
    annual pay exceeds the in-article base amount (32 200 EUR, indexed) and who
    holds daily-management responsibilities. Single in-article threshold.
- citation: be/statute/loi/1978/07/03/1978070303/article/41
  repo: rulespec-be
  batch: C
  status: pending
  heading: Job-search leave during notice (loi 1978-07-03 art. 41)
  class: mechanics
  note: Self-contained — during the last twenty-six weeks of notice the worker may
    be absent up to one day per week (half a day earlier), or a full day per week
    throughout where outplacement applies; part-time pro rata. In-article durations.
- citation: be/statute/loi/1978/07/03/1978070303/article/30quater
  repo: rulespec-be
  batch: C
  status: pending
  heading: Foster-parent leave (loi 1978-07-03 art. 30quater)
  class: mechanics
  note: Self-contained — a designated foster parent may be absent up to five days
    per year (shared between two foster parents), raised to a maximum of ten days
    per calendar year per family from 2008. In-article durations.
- citation: be/statute/loi/1994/07/14/1994071451/article/56quinquies
  repo: rulespec-be
  batch: C
  status: pending
  heading: Reduced hospital forfaits on readmission (loi 1994-07-14 art. 56quinquies)
  class: rate
  note: Self-contained — per-admission forfaitaire interventions drop to 82 p.c. of
    value on readmission to the same hospital within ten days of discharge (67 p.c.
    for clinical-biology and medical-imaging forfaits), rounded up to the euro cent.
    In-article percentages.
- citation: be/statute/loi/1994/07/14/1994071451/article/174
  repo: rulespec-be
  batch: C
  status: pending
  heading: Prescription periods for indemnity and health-benefit claims (loi 1994-07-14 art. 174)
  class: mechanics
  note: Self-contained limitation schedule — actions for payment or recovery of
    indemnity and health-care benefits prescribe by two years from month-end;
    personal-contribution refund actions by five years. In-article durations.
- citation: be/statute/loi/1994/07/14/1994071451/article/93
  repo: rulespec-be
  batch: C
  status: pending
  heading: Invalidity indemnity onset and rate floor (loi 1994-07-14 art. 93)
  class: rate
  note: Self-contained — once incapacity extends past the primary-incapacity period
    an invalidity indemnity is paid per working day; the in-article floor is at
    least 60 p.c. of the art. 87 reference pay with dependants and at least 40 p.c.
    without.
- citation: be/regulation/arrete/1991/01/02/1991013073/article/18
  repo: rulespec-be
  batch: C
  status: pending
  heading: Indexation of career-break interruption allowances (AR 1991-01-02 art. 18)
  class: mechanics
  note: Self-contained — interruption allowances are linked to pivot index 143.59
    and re-indexed by the 1.02^n coefficient each time the smoothed consumer-price
    index crosses a pivot. In-article indexation arithmetic.
- citation: be/regulation/arrete/1967/10/24/1967102410/article/21ter
  repo: rulespec-be
  batch: C
  status: pending
  heading: Survivor transition allowance duration (AR n° 50 1967-10-24 art. 21ter)
  class: mechanics
  note: Self-contained — the transition allowance runs for eighteen months with no
    dependent child, thirty-six months where a child reaches thirteen in the death
    year, and forty-eight months for a younger or disabled dependent child or a
    posthumous child. In-article durations.
- citation: be/regulation/arrete/1967/10/24/1967102410/article/17
  repo: rulespec-be
  batch: C
  status: pending
  heading: Survivor pension one-year marriage condition (AR n° 50 1967-10-24 art. 17)
  class: mechanics
  note: Self-contained — a survivor's pension requires at least one year of marriage
    at death (legal cohabitation counting toward the year), waived where a child was
    born, a child is dependent, or death resulted from an accident. In-article rule.
- citation: be/regulation/arrete/1996/07/03/1996022344/article/214
  repo: rulespec-be
  batch: C
  status: pending
  heading: Minimum daily invalidity indemnity for regular workers (AR 1996-07-03 art. 214)
  class: rate
  note: Self-contained — the minimum daily invalidity indemnity for regular-worker
    titulaires is set at in-article euro amounts by dependency status (with-dependant
    and two isolated tiers under art. 226/226bis), payable from age twenty-one for
    those without dependants; non-regular workers floor to the integration income.
    Amounts at pivot index 103.14.
- citation: be/regulation/arrete/1996/07/03/1996022344/article/237quinquies
  repo: rulespec-be
  batch: C
  status: pending
  heading: Annual catch-up premium for invalids (AR 1996-07-03 art. 237quinquies)
  class: rate
  note: Self-contained — an annual catch-up premium (prime de rattrapage) is paid
    with the May indemnity to invalids recognised incapable for at least one year (a
    higher tier from two years), at in-article euro amounts by dependency status and
    index 103.14.
- citation: be/regulation/arrete/1996/07/03/1996022344/article/250
  repo: rulespec-be
  batch: C
  status: pending
  heading: Continued-insurance contribution schedule (AR 1996-07-03 art. 250)
  class: rate
  note: Self-contained — the continued-insurance contribution is fixed per working
    day and per full month by age band (21-and-over, 18-to-21, 14-to-18) at in-
    article euro amounts linked to index 104.06, with a dispensation where the
    art. 286 annual minimum is met.
- citation: be/regulation/arrete/1996/07/03/1996022344/article/224
  repo: rulespec-be
  batch: C
  status: pending
  heading: Definition of regular worker for invalidity (AR 1996-07-03 art. 224)
  class: definition
  note: Self-contained — a "regular worker" under art. 93 of the coordinated law
    must hold titulaire status for at least six months, total 120 days of work or
    assimilated days (400 hours for seasonal, intermittent, part-time), and reach at
    least two-thirds of the working days of the reference period. In-article thresholds.
