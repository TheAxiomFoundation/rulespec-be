  - name: flanders_gift_tax_immovable_direct_or_partner_tax
    kind: derived
    entity: Gift
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_first_threshold:
              flanders_gift_tax_taxable_amount * flanders_gift_tax_immovable_direct_first_rate
          else:
              if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_second_threshold:
                  flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_direct_first_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_direct_second_rate
              else:
                  if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_third_threshold:
                      flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_direct_first_rate + (flanders_gift_tax_immovable_direct_second_threshold - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_direct_second_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_second_threshold) * flanders_gift_tax_immovable_direct_third_rate
                  else:
                      flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_direct_first_rate + (flanders_gift_tax_immovable_direct_second_threshold - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_direct_second_rate + (flanders_gift_tax_immovable_direct_third_threshold - flanders_gift_tax_immovable_direct_second_threshold) * flanders_gift_tax_immovable_direct_third_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_third_threshold) * flanders_gift_tax_immovable_direct_top_rate
  - name: flanders_gift_tax_immovable_other_tax
    kind: derived
    entity: Gift
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table II
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_first_threshold:
              flanders_gift_tax_taxable_amount * flanders_gift_tax_immovable_other_first_rate
          else:
              if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_second_threshold:
                  flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_other_first_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_other_second_rate
              else:
                  if flanders_gift_tax_taxable_amount <= flanders_gift_tax_immovable_direct_third_threshold:
                      flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_other_first_rate + (flanders_gift_tax_immovable_direct_second_threshold - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_other_second_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_second_threshold) * flanders_gift_tax_immovable_other_third_rate
                  else:
                      flanders_gift_tax_immovable_direct_first_threshold * flanders_gift_tax_immovable_other_first_rate + (flanders_gift_tax_immovable_direct_second_threshold - flanders_gift_tax_immovable_direct_first_threshold) * flanders_gift_tax_immovable_other_second_rate + (flanders_gift_tax_immovable_direct_third_threshold - flanders_gift_tax_immovable_direct_second_threshold) * flanders_gift_tax_immovable_other_third_rate + (flanders_gift_tax_taxable_amount - flanders_gift_tax_immovable_direct_third_threshold) * flanders_gift_tax_immovable_other_top_rate
  - name: flanders_gift_tax_movable_tax
    kind: derived
    entity: Gift
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 2
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          if flanders_gift_tax_relationship_class == flanders_gift_tax_relationship_direct_or_partner:
              flanders_gift_tax_taxable_amount * flanders_gift_tax_movable_direct_or_partner_rate
          else:
              flanders_gift_tax_taxable_amount * flanders_gift_tax_movable_other_rate
  - name: flanders_gift_tax_article_28411_tax
    kind: derived
    entity: Gift
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          if flanders_gift_tax_is_movable_property:
              flanders_gift_tax_movable_tax
          else:
              if flanders_gift_tax_relationship_class == flanders_gift_tax_relationship_direct_or_partner:
                  flanders_gift_tax_immovable_direct_or_partner_tax
              else:
                  flanders_gift_tax_immovable_other_tax
