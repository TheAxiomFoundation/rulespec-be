format: rulespec/v1
module:
  summary: |-
    Vlaamse Codex Fiscaliteit article 2.8.4.1.1 sets Flemish gift-tax
    rates for immovable and movable gifts. This module encodes the main
    direct-line/partner and other-person rates. It leaves notarial filing,
    charitable rates, exemptions, reduced renovation/heritage/nature rates, and
    anti-avoidance rules to later modules.
  source_verification:
    corpus_citation_paths:
      - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.8.4.1.1/version-1461936
    values:
      flanders_gift_tax_immovable_direct_first_threshold: 150000
      flanders_gift_tax_immovable_direct_second_threshold: 250000
      flanders_gift_tax_immovable_direct_third_threshold: 450000
      flanders_gift_tax_immovable_direct_first_rate: "0.03"
      flanders_gift_tax_immovable_direct_second_rate: "0.09"
      flanders_gift_tax_immovable_direct_third_rate: "0.18"
      flanders_gift_tax_immovable_direct_top_rate: "0.27"
      flanders_gift_tax_immovable_other_first_rate: "0.10"
      flanders_gift_tax_immovable_other_second_rate: "0.20"
      flanders_gift_tax_immovable_other_third_rate: "0.30"
      flanders_gift_tax_immovable_other_top_rate: "0.40"
      flanders_gift_tax_movable_direct_or_partner_rate: "0.03"
      flanders_gift_tax_movable_other_rate: "0.07"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: flanders_gift_tax_relationship_direct_or_partner
    kind: parameter
    dtype: Count
    source: Structural selector for Vlaamse Codex Fiscaliteit article 2.8.4.1.1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          0
  - name: flanders_gift_tax_relationship_other
    kind: parameter
    dtype: Count
    source: Structural selector for Vlaamse Codex Fiscaliteit article 2.8.4.1.1 table II
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          1
  - name: flanders_gift_tax_immovable_direct_first_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          150000
  - name: flanders_gift_tax_immovable_direct_second_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          250000
  - name: flanders_gift_tax_immovable_direct_third_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          450000
