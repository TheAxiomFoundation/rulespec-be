    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          0.03
  - name: flanders_gift_tax_immovable_direct_second_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          0.09
  - name: flanders_gift_tax_immovable_direct_third_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
          0.18
  - name: flanders_gift_tax_immovable_direct_top_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.8.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2022-12-30'
        formula: |-
