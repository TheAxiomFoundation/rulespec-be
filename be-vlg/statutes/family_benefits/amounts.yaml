          excerpt: "Het rechtgevende kind geeft vanaf de geboorte en zolang het minder dan vier jaar is op 31 december van het kalenderjaar voor het kalenderjaar waarin de toeslag verschuldigd is, recht op een jaarlijkse universele participatietoeslag van 20 euro."
