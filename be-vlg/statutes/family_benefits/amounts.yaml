module:
  summary: 'Flemish Groeipakket decree articles 4, 9, 11, 13, 15, 16, 17, 18,

    and 19-22 set the original statutory amount surfaces for family-policy

    allowances. This module encodes those amount surfaces and simple selectors;

    delegated eligibility tests, later indexation, and later amendment history

    remain separate surfaces.'
