- name: flanders_family_benefits_disability_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    16
  versions:
  - effective_from: '2019-01-01'
    formula: "if flanders_family_benefits_disability_tier == 1:\n    flanders_family_benefits_disability_tier_1_monthly_amount\n\
      else:\n    if flanders_family_benefits_disability_tier == 2:\n        flanders_family_benefits_disability_tier_2_monthly_amount\n\
      \    else:\n        if flanders_family_benefits_disability_tier == 3:\n    \
      \        flanders_family_benefits_disability_tier_3_monthly_amount\n       \
      \ else:\n            if flanders_family_benefits_disability_tier == flanders_family_benefits_disability_tier_4_code:\n\
      \                flanders_family_benefits_disability_tier_4_monthly_amount\n\
      \            else:\n                if flanders_family_benefits_disability_tier\
      \ == flanders_family_benefits_disability_tier_5_code:\n\
      \                    flanders_family_benefits_disability_tier_5_monthly_amount\n\
      \                else:\n                    if flanders_family_benefits_disability_tier\
      \ == flanders_family_benefits_disability_tier_6_code:\n\
      \                        flanders_family_benefits_disability_tier_6_monthly_amount\n\
      \                    else:\n                        if flanders_family_benefits_disability_tier\
      \ == flanders_family_benefits_disability_tier_7_code:\n\
      \                            flanders_family_benefits_disability_tier_7_monthly_amount\n\
      \                        else:\n                            0"
- name: flanders_family_benefits_foster_care_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    17
  versions:
  - effective_from: '2019-01-01'
    formula: "if flanders_family_benefits_in_qualifying_foster_care:\n    flanders_family_benefits_foster_care_monthly_amount\n\
      else:\n    0"
- name: flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    18
  versions:
  - effective_from: '2019-01-01'
    formula: "if flanders_family_benefits_family_annual_income <= flanders_family_benefits_social_low_income_threshold:\n\
      \    if flanders_family_benefits_qualifying_children_in_family_count <= 2:\n\
      \        flanders_family_benefits_social_low_income_small_family_monthly_amount\n\
      \    else:\n        flanders_family_benefits_social_low_income_large_family_monthly_amount\n\
      else:\n    if flanders_family_benefits_family_annual_income <= flanders_family_benefits_social_middle_income_threshold:\n\
      \        if flanders_family_benefits_qualifying_children_in_family_count > 2:\n\
      \            flanders_family_benefits_social_middle_income_large_family_monthly_amount\n\
      \        else:\n            0\n    else:\n        0"
- name: flanders_family_benefits_social_supplement_monthly_amount_scalar_limit
  kind: parameter
  dtype: Count
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    18
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: be-vlg/statute/decreet/2018/04/27/2018040369/article/18
          excerpt: "Als ten gevolge van een gelijkmatig verdeelde huisvesting, bepaald of bekrachtigd door de bevoegde rechtbank, de huisvesting van het rechtgevende kind gelijk is verdeeld tussen de ouders, wordt het bedrag van de toeslag gehalveerd toegekend in elk rechtgevend gezin."
  versions:
  - effective_from: '2019-01-01'
    formula: '0.5'
- name: flanders_family_benefits_social_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    18
  versions:
  - effective_from: '2019-01-01'
    formula: "if flanders_family_benefits_equal_shared_housing:\n    flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount\
      \ * flanders_family_benefits_social_supplement_monthly_amount_scalar_limit\n\
      else:\n    flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount"
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-vlg:statutes/family_benefits/amounts#flanders_family_benefits_social_supplement_monthly_amount_scalar_limit
          output: flanders_family_benefits_social_supplement_monthly_amount_scalar_limit
          hash: sha256:local
