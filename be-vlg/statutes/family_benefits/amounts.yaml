- name: flanders_family_benefits_orphan_supplement_monthly_amount
  kind: derived
  entity: Child
  dtype: Money
  period: Month
  unit: EUR
  source: Flemish decree of 27 April 2018 regulating family-policy allowances, article
    15
  versions:
  - effective_from: '2019-01-01'
    formula: "if flanders_family_benefits_orphan_status_code == 1:\n    flanders_family_benefits_base_monthly_amount\
      \ * flanders_family_benefits_one_parent_orphan_supplement_rate\nelse:\n    if\
      \ flanders_family_benefits_orphan_status_code == 2:\n        flanders_family_benefits_base_monthly_amount\
      \ * flanders_family_benefits_double_orphan_supplement_rate\n    else:\n    \
      \    0"
