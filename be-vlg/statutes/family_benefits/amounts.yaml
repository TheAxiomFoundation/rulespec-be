  - name: flanders_family_benefits_orphan_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, article 15
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_orphan_status_code == 1:
              flanders_family_benefits_base_monthly_amount * flanders_family_benefits_one_parent_orphan_supplement_rate
          else:
              if flanders_family_benefits_orphan_status_code == 2:
                  flanders_family_benefits_base_monthly_amount * flanders_family_benefits_double_orphan_supplement_rate
              else:
                  0
  - name: flanders_family_benefits_disability_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, article 16
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_disability_tier == 1:
              flanders_family_benefits_disability_tier_1_monthly_amount
          else:
              if flanders_family_benefits_disability_tier == 2:
                  flanders_family_benefits_disability_tier_2_monthly_amount
              else:
                  if flanders_family_benefits_disability_tier == 3:
                      flanders_family_benefits_disability_tier_3_monthly_amount
                  else:
                      if flanders_family_benefits_disability_tier == 4:
                          flanders_family_benefits_disability_tier_4_monthly_amount
                      else:
                          if flanders_family_benefits_disability_tier == 5:
                              flanders_family_benefits_disability_tier_5_monthly_amount
                          else:
                              if flanders_family_benefits_disability_tier == 6:
                                  flanders_family_benefits_disability_tier_6_monthly_amount
                              else:
                                  if flanders_family_benefits_disability_tier == 7:
                                      flanders_family_benefits_disability_tier_7_monthly_amount
                                  else:
                                      0
  - name: flanders_family_benefits_foster_care_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, article 17
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_in_qualifying_foster_care:
              flanders_family_benefits_foster_care_monthly_amount
          else:
              0
  - name: flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, article 18
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_family_annual_income <= flanders_family_benefits_social_low_income_threshold:
              if flanders_family_benefits_qualifying_children_in_family_count <= 2:
                  flanders_family_benefits_social_low_income_small_family_monthly_amount
              else:
                  flanders_family_benefits_social_low_income_large_family_monthly_amount
          else:
              if flanders_family_benefits_family_annual_income <= flanders_family_benefits_social_middle_income_threshold:
                  if flanders_family_benefits_qualifying_children_in_family_count > 2:
                      flanders_family_benefits_social_middle_income_large_family_monthly_amount
                  else:
                      0
              else:
                  0
  - name: flanders_family_benefits_social_supplement_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, article 18
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_equal_shared_housing:
              flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount * 0.5
          else:
              flanders_family_benefits_social_supplement_before_shared_housing_monthly_amount
  - name: flanders_family_benefits_universal_participation_annual_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Year
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, articles 19 to 22
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          if flanders_family_benefits_age_on_december_31_years < 0:
              0
          else:
              if flanders_family_benefits_age_on_december_31_years < 4:
                  flanders_family_benefits_participation_under_4_annual_amount
              else:
                  if flanders_family_benefits_age_on_december_31_years < 11:
                      flanders_family_benefits_participation_4_to_10_annual_amount
                  else:
                      if flanders_family_benefits_age_on_december_31_years < 17:
                          flanders_family_benefits_participation_11_to_16_annual_amount
                      else:
                          if flanders_family_benefits_age_on_december_31_years < 25:
                              flanders_family_benefits_participation_17_to_24_annual_amount
                          else:
                              0
  - name: flanders_family_benefits_selected_monthly_amount
    kind: derived
    entity: Child
    dtype: Money
    period: Month
    unit: EUR
    source: Flemish decree of 27 April 2018 regulating family-policy allowances, articles 13 and 15 to 18
    versions:
      - effective_from: '2019-01-01'
        formula: |-
          flanders_family_benefits_base_monthly_amount + flanders_family_benefits_orphan_supplement_monthly_amount + flanders_family_benefits_disability_supplement_monthly_amount + flanders_family_benefits_foster_care_supplement_monthly_amount + flanders_family_benefits_social_supplement_monthly_amount
