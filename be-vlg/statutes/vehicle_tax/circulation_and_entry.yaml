format: rulespec/v1
module:
  summary: 'Vlaamse Codex Fiscaliteit articles 2.2.4.0.1, 2.2.4.0.4,

    2.2.4.0.5, 2.3.4.1.1, 2.3.4.1.2/1, 2.3.4.1.3, and 2.3.5.0.1

    set core Flemish annual circulation-tax and tax-on-entry-into-service

    amounts for household passenger vehicles. This module encodes the current

    passenger-car fiscal-power annual tax table, post-2020 CO2 and euronorm

    adjustments, the additional LPG circulation tax, the municipal decime, and

    the post-2020 BIV formula with age correction, air component, minimum,

    maximum, electric/hydrogen amount, and natural-gas reduction interface.

    It excludes commercial vehicle routing, heavy-vehicle tables, procedural

    rules, legacy pre-2021 BIV formulas, and detailed exemption administration.'
  source_verification:
    corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.1/version-1536910/block-1"
units:
- name: EUR
  kind: currency
  minor_units: 2
