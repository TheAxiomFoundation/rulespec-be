- name: flanders_circulation_tax_co2_adjustment_rate_scalar_limit
  kind: parameter
  dtype: Count
  source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2/2
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.1/version-1536910/block-1"
          excerpt: "§2/2. Voor de personenauto's, de auto's voor dubbel gebruik en de minibus- sen die voor de eerste keer na 31 december 2020 worden ingeschreven in het repertorium van het Directoraat-generaal Mobiliteit en Verkeersveiligheid wordt de belasting berekend, vermeld in paragraaf 2/1, met dien verstande dat het element, vermeld onder paragraaf 2/1, 1°, als volgt wordt toegepast: in functie van de CO2-uitstoot van het voertuig, gemeten tijdens de homologatie ervan volgens de geldende Europese regelgeving, wordt het tarief: a) vermeerderd met 0,30% voor iedere gram CO2-uitstoot per kilometer boven 149 gram en niet hoger dan 500 gram; b) verminderd met 0,30% voor iedere gram CO2-uitstoot per kilometer onder 149 gram, maar hoger dan 24 gram."
  versions:
  - effective_from: '2026-01-01'
    formula: '500'
