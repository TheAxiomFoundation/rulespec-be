format: rulespec/v1
module:
  summary: 'Vlaamse Codex Fiscaliteit articles 2.2.4.0.1, 2.2.4.0.4,

    2.2.4.0.5, 2.3.4.1.1, 2.3.4.1.2/1, 2.3.4.1.3, and 2.3.5.0.1

    set core Flemish annual circulation-tax and tax-on-entry-into-service

    amounts for household passenger vehicles. This module encodes the current

    passenger-car fiscal-power annual tax table, post-2020 CO2 and euronorm

    adjustments, the additional LPG circulation tax, the municipal decime, and

    the post-2020 BIV formula with age correction, air component, minimum,

    maximum, electric/hydrogen amount, and natural-gas reduction interface.

    It excludes commercial vehicle routing, heavy-vehicle tables, procedural

    rules, legacy pre-2021 BIV formulas, and detailed exemption administration.'
  source_verification:
    corpus_citation_paths:
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.1/version-1536910
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.4/version-1402374
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.5/version-1422880
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.4.1.1/version-1536918
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.4.1.2-1/version-1417224
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.4.1.3/version-1542227
    - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.5.0.1/version-1417227
    values:
      flanders_circulation_tax_cv_0_to_4_amount: 69.72
      flanders_circulation_tax_cv_20_amount: 1783.2
      flanders_circulation_tax_above_20_increment: 97.2
      flanders_circulation_tax_post_2020_co2_neutral_grams: 149
      flanders_circulation_tax_co2_adjustment_per_gram: '0.003'
      flanders_circulation_tax_post_2015_minimum: 40
      flanders_additional_lpg_tax_low_power_amount: 89.16
      flanders_additional_lpg_tax_middle_power_amount: 148.68
      flanders_additional_lpg_tax_high_power_amount: 208.2
      flanders_circulation_tax_municipal_decime_rate: '0.10'
      flanders_biv_electric_or_hydrogen_after_2025_amount: 61.5
      flanders_biv_q_base_2021: 1.07
      flanders_biv_q_annual_increment_after_2021: 0.035
      flanders_biv_minimum: 41.99
      flanders_biv_maximum: 10497.7
      flanders_biv_natural_gas_reduction_amount: 4000
