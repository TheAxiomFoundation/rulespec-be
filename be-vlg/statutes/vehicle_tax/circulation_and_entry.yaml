- name: flanders_circulation_tax_passenger_base_table_amount
  kind: derived
  entity: Vehicle
  dtype: Money
  period: Year
  unit: EUR
  source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2 passenger-car fiscal-power
    table
  versions:
  - effective_from: '2026-01-01'
    formula: "if flanders_circulation_tax_fiscal_power_cv <= flanders_circulation_tax_passenger_base_table_amount_scalar_limit:\n\
      \    flanders_circulation_tax_cv_0_to_4_amount\nelse:\n    if flanders_circulation_tax_fiscal_power_cv\
      \ == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_2:\n\
      \        flanders_circulation_tax_cv_5_amount\n    else:\n        if flanders_circulation_tax_fiscal_power_cv\
      \ == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_3:\n\
      \            flanders_circulation_tax_cv_6_amount\n        else:\n         \
      \   if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_4:\n\
      \                flanders_circulation_tax_cv_7_amount\n            else:\n \
      \               if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_5:\n\
      \                    flanders_circulation_tax_cv_8_amount\n                else:\n\
      \                    if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_6:\n\
      \                        flanders_circulation_tax_cv_9_amount\n            \
      \        else:\n                        if flanders_circulation_tax_fiscal_power_cv\
      \ == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_7:\n\
      \                            flanders_circulation_tax_cv_10_amount\n       \
      \                 else:\n                            if flanders_circulation_tax_fiscal_power_cv\
      \ == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_8:\n\
      \                                flanders_circulation_tax_cv_11_amount\n   \
      \                         else:\n                                if flanders_circulation_tax_fiscal_power_cv\
      \ == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_9:\n\
      \                                    flanders_circulation_tax_cv_12_amount\n\
      \                                else:\n                                   \
      \ if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_10:\n\
      \                                        flanders_circulation_tax_cv_13_amount\n\
      \                                    else:\n                               \
      \         if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_11:\n\
      \                                            flanders_circulation_tax_cv_14_amount\n\
      \                                        else:\n                           \
      \                 if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_12:\n\
      \                                                flanders_circulation_tax_cv_15_amount\n\
      \                                            else:\n                       \
      \                         if flanders_circulation_tax_fiscal_power_cv == flanders_circulation_tax_passenger_base_table_amount_scalar_limit_13:\n\
