      \ - flanders_circulation_tax_post_2020_co2_neutral_grams) * flanders_circulation_tax_co2_adjustment_per_gram\n\
      else:\n    if flanders_circulation_tax_co2_g_per_km > flanders_circulation_tax_co2_adjustment_rate_scalar_limit_2:\n\
      \        (flanders_circulation_tax_co2_g_per_km - flanders_circulation_tax_post_2020_co2_neutral_grams)\
      \ * flanders_circulation_tax_co2_adjustment_per_gram\n    else:\n        0"
