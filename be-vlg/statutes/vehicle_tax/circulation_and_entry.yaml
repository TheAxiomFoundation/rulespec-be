          corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.2.4.0.4/version-1402374/block-1"
          excerpt: "De personenauto's, de auto's voor dubbel gebruik en de minibussen, met inbegrip van de lichte vrachtauto's, vermeld in artikel 1.1.0.0.2, derde lid, 2°, laatste zin, waarvan de motor, zelfs gedeeltelijk of tijdelijk, gedreven wordt met vloeibaar petroleumgas of andere vloeibare koolwaterstofgassen, zijn onderworpen aan een aanvullende verkeersbelasting van 89,16 euro, 148,68 euro of 208,20 euro, naargelang het belastbaar vermogen niet hoger is dan 7 pk, 8 pk bereikt zonder 13 pk te overschrijden of meer bedraagt dan 13 pk."
