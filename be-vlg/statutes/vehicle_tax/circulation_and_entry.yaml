    versions:
      - effective_from: '2026-05-03'
        formula: |-
          if flanders_biv_is_electric_or_hydrogen_after_2025:
              flanders_biv_electric_or_hydrogen_after_2025_amount
          else:
              if flanders_biv_first_put_in_traffic_30_years_ago_or_earlier:
                  flanders_biv_minimum
