    formula: "if flanders_biv_is_diesel:\n    if flanders_biv_euro_norm <= 0:\n  \
      \      flanders_biv_air_component_scalar_limit\n    else:\n        if flanders_biv_euro_norm\
      \ == 1:\n            flanders_biv_air_component_scalar_limit_2\n        else:\n\
      \            if flanders_biv_euro_norm == 2:\n                flanders_biv_air_component_scalar_limit_3\n\
      \            else:\n                if flanders_biv_euro_norm == 3:\n      \
      \              if flanders_biv_has_particle_filter:\n                      \
      \  flanders_biv_air_component_scalar_limit_4\n                    else:\n  \
      \                      flanders_biv_air_component_scalar_limit_5\n         \
      \       else:\n                    if flanders_biv_euro_norm == flanders_biv_air_component_scalar_limit_6:\n\
      \                        if flanders_biv_has_particle_filter:\n            \
      \                flanders_biv_air_component_scalar_limit_7\n               \
      \         else:\n                            flanders_biv_air_component_scalar_limit_4\n\
      \                    else:\n                        if flanders_biv_euro_norm\
      \ == flanders_biv_air_component_scalar_limit_8:\n                          \
      \  flanders_biv_air_component_scalar_limit_7\n                        else:\n\
      \                            flanders_biv_air_component_scalar_limit_9\nelse:\n\
      \    if flanders_biv_euro_norm <= 0:\n        flanders_biv_air_component_scalar_limit_10\n\
      \    else:\n        if flanders_biv_euro_norm == 1:\n            flanders_biv_air_component_scalar_limit_11\n\
      \        else:\n            if flanders_biv_euro_norm == 2:\n              \
      \  flanders_biv_air_component_scalar_limit_12\n            else:\n         \
      \       if flanders_biv_euro_norm == 3:\n                    flanders_biv_air_component_scalar_limit_13\n\
      \                else:\n                    if flanders_biv_euro_norm == flanders_biv_air_component_scalar_limit_6:\n\
      \                        flanders_biv_air_component_scalar_limit_14\n      \
      \              else:\n                        flanders_biv_air_component_scalar_limit_15"
