    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2/2, 0.30 percent per CO2 gram
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          0.003
  - name: flanders_circulation_tax_post_2015_minimum
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2/1 minimum, carried into post-2020 calculation
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          40
  - name: flanders_circulation_tax_passenger_base_table_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2 passenger-car fiscal-power table
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if flanders_circulation_tax_fiscal_power_cv <= 4:
              flanders_circulation_tax_cv_0_to_4_amount
          else:
              if flanders_circulation_tax_fiscal_power_cv == 5:
                  flanders_circulation_tax_cv_5_amount
              else:
                  if flanders_circulation_tax_fiscal_power_cv == 6:
                      flanders_circulation_tax_cv_6_amount
                  else:
                      if flanders_circulation_tax_fiscal_power_cv == 7:
                          flanders_circulation_tax_cv_7_amount
                      else:
                          if flanders_circulation_tax_fiscal_power_cv == 8:
                              flanders_circulation_tax_cv_8_amount
                          else:
                              if flanders_circulation_tax_fiscal_power_cv == 9:
                                  flanders_circulation_tax_cv_9_amount
                              else:
                                  if flanders_circulation_tax_fiscal_power_cv == 10:
                                      flanders_circulation_tax_cv_10_amount
                                  else:
                                      if flanders_circulation_tax_fiscal_power_cv == 11:
                                          flanders_circulation_tax_cv_11_amount
                                      else:
                                          if flanders_circulation_tax_fiscal_power_cv == 12:
                                              flanders_circulation_tax_cv_12_amount
                                          else:
                                              if flanders_circulation_tax_fiscal_power_cv == 13:
                                                  flanders_circulation_tax_cv_13_amount
                                              else:
                                                  if flanders_circulation_tax_fiscal_power_cv == 14:
                                                      flanders_circulation_tax_cv_14_amount
                                                  else:
                                                      if flanders_circulation_tax_fiscal_power_cv == 15:
                                                          flanders_circulation_tax_cv_15_amount
                                                      else:
                                                          if flanders_circulation_tax_fiscal_power_cv == 16:
                                                              flanders_circulation_tax_cv_16_amount
                                                          else:
                                                              if flanders_circulation_tax_fiscal_power_cv == 17:
                                                                  flanders_circulation_tax_cv_17_amount
                                                              else:
                                                                  if flanders_circulation_tax_fiscal_power_cv == 18:
                                                                      flanders_circulation_tax_cv_18_amount
                                                                  else:
                                                                      if flanders_circulation_tax_fiscal_power_cv == 19:
                                                                          flanders_circulation_tax_cv_19_amount
                                                                      else:
                                                                          if flanders_circulation_tax_fiscal_power_cv == 20:
                                                                              flanders_circulation_tax_cv_20_amount
                                                                          else:
                                                                              flanders_circulation_tax_cv_20_amount + (flanders_circulation_tax_fiscal_power_cv - 20) * flanders_circulation_tax_above_20_increment
  - name: flanders_circulation_tax_co2_adjustment_rate
    kind: derived
    entity: Vehicle
    dtype: Rate
    period: Year
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2/2
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if flanders_circulation_tax_co2_g_per_km > flanders_circulation_tax_post_2020_co2_neutral_grams:
              (min(flanders_circulation_tax_co2_g_per_km, 500) - flanders_circulation_tax_post_2020_co2_neutral_grams) * flanders_circulation_tax_co2_adjustment_per_gram
          else:
              if flanders_circulation_tax_co2_g_per_km > 24:
                  (flanders_circulation_tax_co2_g_per_km - flanders_circulation_tax_post_2020_co2_neutral_grams) * flanders_circulation_tax_co2_adjustment_per_gram
              else:
                  0
  - name: flanders_circulation_tax_euronorm_fuel_adjustment_rate
    kind: derived
    entity: Vehicle
    dtype: Rate
    period: Year
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraph 2/1 euronorm/fuel table
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if flanders_circulation_tax_is_diesel:
              if flanders_circulation_tax_euro_norm <= 0:
                  0.50
              else:
                  if flanders_circulation_tax_euro_norm == 1:
                      0.40
                  else:
                      if flanders_circulation_tax_euro_norm == 2:
                          0.35
                      else:
                          if flanders_circulation_tax_euro_norm == 3:
                              if flanders_circulation_tax_has_particle_filter:
                                  0.25
                              else:
                                  0.30
                          else:
                              if flanders_circulation_tax_euro_norm == 4:
                                  if flanders_circulation_tax_has_particle_filter:
                                      0.175
                                  else:
                                      0.25
                              else:
                                  if flanders_circulation_tax_euro_norm == 5:
                                      0.175
                                  else:
                                      0.15
          else:
              if flanders_circulation_tax_euro_norm <= 0:
                  0.30
              else:
                  if flanders_circulation_tax_euro_norm == 1:
                      0.10
                  else:
                      if flanders_circulation_tax_euro_norm == 2:
                          0.05
                      else:
                          if flanders_circulation_tax_euro_norm == 3:
                              0
                          else:
                              if flanders_circulation_tax_euro_norm == 4:
                                  -0.125
                              else:
                                  -0.15
  - name: flanders_circulation_tax_passenger_car_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.1 paragraphs 2, 2/1, and 2/2
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(flanders_circulation_tax_post_2015_minimum, flanders_circulation_tax_passenger_base_table_amount * (1 + flanders_circulation_tax_co2_adjustment_rate + flanders_circulation_tax_euronorm_fuel_adjustment_rate))
  - name: flanders_additional_lpg_tax_low_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.4, not higher than 7 fiscal horsepower
    versions:
      - effective_from: '2020-10-01'
        formula: |-
          89.16
  - name: flanders_additional_lpg_tax_middle_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.4, 8 to 13 fiscal horsepower
    versions:
      - effective_from: '2020-10-01'
        formula: |-
          148.68
  - name: flanders_additional_lpg_tax_high_power_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.4, more than 13 fiscal horsepower
    versions:
      - effective_from: '2020-10-01'
        formula: |-
          208.20
  - name: flanders_circulation_tax_additional_lpg_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.4
    versions:
      - effective_from: '2020-10-01'
        formula: |-
          if flanders_circulation_tax_is_lpg:
              if flanders_circulation_tax_fiscal_power_cv <= 7:
                  flanders_additional_lpg_tax_low_power_amount
              else:
                  if flanders_circulation_tax_fiscal_power_cv <= 13:
                      flanders_additional_lpg_tax_middle_power_amount
                  else:
                      flanders_additional_lpg_tax_high_power_amount
          else:
              0
  - name: flanders_circulation_tax_municipal_decime_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.5 paragraph 2
    versions:
      - effective_from: '2021-04-25'
        formula: |-
          0.10
  - name: flanders_circulation_tax_municipal_decime
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.2.4.0.5 paragraph 2
    versions:
      - effective_from: '2021-04-25'
        formula: |-
          if flanders_circulation_tax_municipal_decime_applies:
              flanders_circulation_tax_passenger_car_amount * flanders_circulation_tax_municipal_decime_rate
          else:
              0
  - name: flanders_circulation_tax_passenger_car_total
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit articles 2.2.4.0.1, 2.2.4.0.4, and 2.2.4.0.5
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          flanders_circulation_tax_passenger_car_amount + flanders_circulation_tax_additional_lpg_amount + flanders_circulation_tax_municipal_decime
  - name: flanders_biv_electric_or_hydrogen_after_2025_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.1 second paragraph
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          61.50
  - name: flanders_biv_fuel_factor
    kind: derived
    entity: Vehicle
    dtype: Rate
    period: Year
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 paragraph 2 item 2
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if flanders_biv_is_lpg:
              0.88
          else:
              if flanders_biv_is_natural_gas_and_petrol_homologated_petrol:
                  0.744
              else:
                  if flanders_biv_is_natural_gas:
                      0.93
                  else:
                      1
  - name: flanders_biv_q_2026
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 paragraph 2 item 3, 1.07 in 2021 plus 0.035 annually from 2022 through 2026
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          1.245
  - name: flanders_biv_air_component
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 paragraph 2 item 4 table
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if flanders_biv_is_diesel:
              if flanders_biv_euro_norm <= 0:
                  2863.15
              else:
                  if flanders_biv_euro_norm == 1:
                      840.00
                  else:
                      if flanders_biv_euro_norm == 2:
                          622.57
                      else:
                          if flanders_biv_euro_norm == 3:
                              if flanders_biv_has_particle_filter:
                                  467.06
                              else:
                                  493.36
                          else:
                              if flanders_biv_euro_norm == 4:
                                  if flanders_biv_has_particle_filter:
                                      459.35
                                  else:
                                      467.06
                              else:
                                  if flanders_biv_euro_norm == 5:
                                      459.35
                                  else:
                                      454.07
          else:
              if flanders_biv_euro_norm <= 0:
                  1138.78
              else:
                  if flanders_biv_euro_norm == 1:
                      509.28
                  else:
                      if flanders_biv_euro_norm == 2:
                          152.29
                      else:
                          if flanders_biv_euro_norm == 3:
                              95.53
                          else:
                              if flanders_biv_euro_norm == 4:
                                  22.93
                              else:
                                  20.61
  - name: flanders_biv_age_correction_factor
    kind: derived
    entity: Vehicle
    dtype: Rate
    period: Year
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 paragraph 2 item 5 table
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if flanders_biv_vehicle_age_months < 12:
              1
          else:
              if flanders_biv_vehicle_age_months < 24:
                  0.90
              else:
                  if flanders_biv_vehicle_age_months < 36:
                      0.80
                  else:
                      if flanders_biv_vehicle_age_months < 48:
                          0.70
                      else:
                          if flanders_biv_vehicle_age_months < 60:
                              0.60
                          else:
                              if flanders_biv_vehicle_age_months < 72:
                                  0.50
                              else:
                                  if flanders_biv_vehicle_age_months < 84:
                                      0.40
                                  else:
                                      if flanders_biv_vehicle_age_months < 96:
                                          0.30
                                      else:
                                          if flanders_biv_vehicle_age_months < 108:
                                              0.20
                                          else:
                                              0.10
  - name: flanders_biv_post_2020_raw_formula_amount
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 formula
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (((flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246) * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246) * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246) * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246) * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246) * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026 / 246)) * 4500 + flanders_biv_air_component) * flanders_biv_age_correction_factor
  - name: flanders_biv_minimum
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.3
    versions:
      - effective_from: '2026-05-03'
        formula: |-
          41.99
  - name: flanders_biv_maximum
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.4.1.3
    versions:
      - effective_from: '2026-05-03'
        formula: |-
          10497.70
  - name: flanders_biv_natural_gas_reduction_amount
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.5.0.1 first paragraph
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          4000
  - name: flanders_biv_natural_gas_reduction
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.3.5.0.1
    versions:
      - effective_from: '2021-01-01'
        formula: |-
          if flanders_biv_natural_gas_reduction_applies:
              min(flanders_biv_natural_gas_reduction_amount, flanders_biv_post_2020_raw_formula_amount)
          else:
              0
  - name: flanders_biv_post_2020_tax_after_minimum_maximum_and_reduction
    kind: derived
    entity: Vehicle
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit articles 2.3.4.1.2/1, 2.3.4.1.3, and 2.3.5.0.1
    versions:
      - effective_from: '2026-05-03'
