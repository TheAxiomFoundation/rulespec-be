- name: flanders_biv_post_2020_raw_formula_amount_scalar_limit
  kind: parameter
  dtype: Count
  source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 formula
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.4.1.2-1/version-1417224/block-1"
          excerpt: "De belasting wordt voor de voertuigen, vermeld in artikel 2.3.4.1.1, die voor de eerste keer worden ingeschreven in het repertorium van het Directoraat-generaal Mobiliteit en Verkeersveiligheid na 31 december 2020, berekend volgens de volgende formule: BIV= ((CO 2 * f * q) /246)6 * 4500 + c) * LC"
  versions:
  - effective_from: '2026-01-01'
    formula: '246'
- name: flanders_biv_post_2020_raw_formula_amount_scalar_limit_2
  kind: parameter
  dtype: Count
  source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 formula
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.3.4.1.2-1/version-1417224/block-1"
          excerpt: "De belasting wordt voor de voertuigen, vermeld in artikel 2.3.4.1.1, die voor de eerste keer worden ingeschreven in het repertorium van het Directoraat-generaal Mobiliteit en Verkeersveiligheid na 31 december 2020, berekend volgens de volgende formule: BIV= ((CO 2 * f * q) /246)6 * 4500 + c) * LC"
  versions:
  - effective_from: '2026-01-01'
    formula: '4500'
- name: flanders_biv_post_2020_raw_formula_amount
  kind: derived
  entity: Vehicle
  dtype: Money
  period: Year
  unit: EUR
  source: Vlaamse Codex Fiscaliteit article 2.3.4.1.2/1 formula
  versions:
  - effective_from: '2026-01-01'
    formula: (((flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026
      / flanders_biv_post_2020_raw_formula_amount_scalar_limit) * (flanders_biv_co2_g_per_km
      * flanders_biv_fuel_factor * flanders_biv_q_2026 / flanders_biv_post_2020_raw_formula_amount_scalar_limit)
      * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026
      / flanders_biv_post_2020_raw_formula_amount_scalar_limit) * (flanders_biv_co2_g_per_km
      * flanders_biv_fuel_factor * flanders_biv_q_2026 / flanders_biv_post_2020_raw_formula_amount_scalar_limit)
      * (flanders_biv_co2_g_per_km * flanders_biv_fuel_factor * flanders_biv_q_2026
      / flanders_biv_post_2020_raw_formula_amount_scalar_limit) * (flanders_biv_co2_g_per_km
      * flanders_biv_fuel_factor * flanders_biv_q_2026 / flanders_biv_post_2020_raw_formula_amount_scalar_limit))
      * flanders_biv_post_2020_raw_formula_amount_scalar_limit_2 + flanders_biv_air_component)
      * flanders_biv_age_correction_factor
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: import
        import:
          target: be-vlg:statutes/vehicle_tax/circulation_and_entry#flanders_biv_post_2020_raw_formula_amount_scalar_limit
