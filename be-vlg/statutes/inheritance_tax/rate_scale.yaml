  - name: flanders_inheritance_tax_direct_or_partner_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_direct_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_direct_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_direct_second_threshold:
                  flanders_inheritance_tax_direct_first_threshold * flanders_inheritance_tax_direct_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_direct_first_threshold) * flanders_inheritance_tax_direct_second_rate
              else:
                  flanders_inheritance_tax_direct_first_threshold * flanders_inheritance_tax_direct_first_rate + (flanders_inheritance_tax_direct_second_threshold - flanders_inheritance_tax_direct_first_threshold) * flanders_inheritance_tax_direct_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_direct_second_threshold) * flanders_inheritance_tax_direct_top_rate
  - name: flanders_inheritance_tax_sibling_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table II sibling column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_sibling_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_second_threshold:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_sibling_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_sibling_second_rate
              else:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_sibling_first_rate + (flanders_inheritance_tax_other_second_threshold - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_sibling_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_second_threshold) * flanders_inheritance_tax_sibling_top_rate
  - name: flanders_inheritance_tax_unrelated_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table II other-person column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_unrelated_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_second_threshold:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_unrelated_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_unrelated_second_rate
              else:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_unrelated_first_rate + (flanders_inheritance_tax_other_second_threshold - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_unrelated_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_second_threshold) * flanders_inheritance_tax_unrelated_top_rate
  - name: flanders_inheritance_tax_article_27411_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_relationship_class == flanders_inheritance_tax_relationship_direct_or_partner:
              flanders_inheritance_tax_direct_or_partner_tax
          else:
              if flanders_inheritance_tax_relationship_class == flanders_inheritance_tax_relationship_sibling:
                  flanders_inheritance_tax_sibling_tax
              else:
                  flanders_inheritance_tax_unrelated_tax
