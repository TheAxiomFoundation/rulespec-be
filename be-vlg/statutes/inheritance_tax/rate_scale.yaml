format: rulespec/v1
module:
  summary: |-
    Vlaamse Codex Fiscaliteit article 2.7.4.1.1 sets the Flemish
    inheritance-tax rate scale. This module encodes the current rate tables for
    direct-line/partner beneficiaries, siblings, and other beneficiaries. It
    does not yet model estate filing, exemptions, movable/immovable base
    separation, partner home exclusions, or grouping of "all other" successors.
  source_verification:
    corpus_citation_paths:
      - be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.7.4.1.1/version-1344092
    values:
      flanders_inheritance_tax_direct_first_threshold: 50000
      flanders_inheritance_tax_direct_second_threshold: 250000
      flanders_inheritance_tax_direct_first_rate: "0.03"
      flanders_inheritance_tax_direct_second_rate: "0.09"
      flanders_inheritance_tax_direct_top_rate: "0.27"
      flanders_inheritance_tax_other_first_threshold: 35000
      flanders_inheritance_tax_other_second_threshold: 75000
      flanders_inheritance_tax_sibling_first_rate: "0.25"
      flanders_inheritance_tax_sibling_second_rate: "0.30"
      flanders_inheritance_tax_sibling_top_rate: "0.55"
      flanders_inheritance_tax_unrelated_first_rate: "0.25"
      flanders_inheritance_tax_unrelated_second_rate: "0.45"
      flanders_inheritance_tax_unrelated_top_rate: "0.55"
units:
  - name: EUR
    kind: currency
    minor_units: 2
rules:
  - name: flanders_inheritance_tax_relationship_direct_or_partner
    kind: parameter
    dtype: Count
    source: Structural selector for Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0
  - name: flanders_inheritance_tax_relationship_sibling
    kind: parameter
    dtype: Count
    source: Structural selector for Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II siblings
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          1
  - name: flanders_inheritance_tax_relationship_other
    kind: parameter
    dtype: Count
    source: Structural selector for Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II others
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          2
  - name: flanders_inheritance_tax_direct_first_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          50000
  - name: flanders_inheritance_tax_direct_second_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          250000
  - name: flanders_inheritance_tax_other_first_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          35000
  - name: flanders_inheritance_tax_other_second_threshold
    kind: parameter
    dtype: Money
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          75000
  - name: flanders_inheritance_tax_direct_first_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.03
  - name: flanders_inheritance_tax_direct_second_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.09
  - name: flanders_inheritance_tax_direct_top_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.27
  - name: flanders_inheritance_tax_sibling_first_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II sibling column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.25
  - name: flanders_inheritance_tax_sibling_second_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II sibling column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.30
  - name: flanders_inheritance_tax_sibling_top_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II sibling column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.55
  - name: flanders_inheritance_tax_unrelated_first_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II other-person column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.25
  - name: flanders_inheritance_tax_unrelated_second_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II other-person column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.45
  - name: flanders_inheritance_tax_unrelated_top_rate
    kind: parameter
    dtype: Rate
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 table II other-person column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          0.55
  - name: flanders_inheritance_tax_direct_or_partner_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table I
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_direct_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_direct_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_direct_second_threshold:
                  flanders_inheritance_tax_direct_first_threshold * flanders_inheritance_tax_direct_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_direct_first_threshold) * flanders_inheritance_tax_direct_second_rate
              else:
                  flanders_inheritance_tax_direct_first_threshold * flanders_inheritance_tax_direct_first_rate + (flanders_inheritance_tax_direct_second_threshold - flanders_inheritance_tax_direct_first_threshold) * flanders_inheritance_tax_direct_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_direct_second_threshold) * flanders_inheritance_tax_direct_top_rate
  - name: flanders_inheritance_tax_sibling_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table II sibling column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_sibling_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_second_threshold:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_sibling_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_sibling_second_rate
              else:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_sibling_first_rate + (flanders_inheritance_tax_other_second_threshold - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_sibling_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_second_threshold) * flanders_inheritance_tax_sibling_top_rate
  - name: flanders_inheritance_tax_unrelated_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1 paragraph 1 table II other-person column
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_first_threshold:
              flanders_inheritance_tax_taxable_acquisition * flanders_inheritance_tax_unrelated_first_rate
          else:
              if flanders_inheritance_tax_taxable_acquisition <= flanders_inheritance_tax_other_second_threshold:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_unrelated_first_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_unrelated_second_rate
              else:
                  flanders_inheritance_tax_other_first_threshold * flanders_inheritance_tax_unrelated_first_rate + (flanders_inheritance_tax_other_second_threshold - flanders_inheritance_tax_other_first_threshold) * flanders_inheritance_tax_unrelated_second_rate + (flanders_inheritance_tax_taxable_acquisition - flanders_inheritance_tax_other_second_threshold) * flanders_inheritance_tax_unrelated_top_rate
  - name: flanders_inheritance_tax_article_27411_tax
    kind: derived
    entity: EstateBeneficiary
    dtype: Money
    period: Year
    unit: EUR
    source: Vlaamse Codex Fiscaliteit article 2.7.4.1.1
    versions:
      - effective_from: '2018-09-01'
        formula: |-
          if flanders_inheritance_tax_relationship_class == flanders_inheritance_tax_relationship_direct_or_partner:
              flanders_inheritance_tax_direct_or_partner_tax
          else:
              if flanders_inheritance_tax_relationship_class == flanders_inheritance_tax_relationship_sibling:
                  flanders_inheritance_tax_sibling_tax
              else:
                  flanders_inheritance_tax_unrelated_tax
