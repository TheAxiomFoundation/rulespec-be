format: rulespec/v1
module:
  summary: |-
    Vlaamse Codex Fiscaliteit article 2.7.4.1.1 sets the Flemish
    inheritance-tax rate scale. This module encodes the current rate tables for
    direct-line/partner beneficiaries, siblings, and other beneficiaries. It
    does not yet model estate filing, exemptions, movable/immovable base
    separation, partner home exclusions, or grouping of "all other" successors.
  source_verification:
    corpus_citation_path: "be-vlg/statute/vlaamse-codex-fiscaliteit/article-2.7.4.1.1/version-1344092/block-1"
units:
  - name: EUR
    kind: currency
    minor_units: 2
