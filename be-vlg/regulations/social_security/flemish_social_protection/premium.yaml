format: rulespec/v1
module:
  summary: |-
    The Flemish Social Protection decree requires people affiliated with a
    care fund to pay an annual premium from the age determined by the Flemish
    Government. The implementing order sets the 2022-2025 base premium at
    EUR 54, or EUR 27 for users entitled to increased health-insurance
    reimbursement, with annual health-index adjustment from 2023. It sets the
    2026 annual premium at EUR 100, or EUR 35 for users entitled to increased
    health-insurance reimbursement on 1 January of the previous calendar year.
    This module encodes the household-facing annual premium for 2025 and 2026.
    It excludes arrears allocation,
    payment collection, administrative fines after repeated non-payment,
    voluntary Brussels affiliation routing, and downstream care-budget
    entitlement sanctions.
  source_verification:
    corpus_citation_path: "be-vlg/statute/codex-vlaanderen/social-protection/decree-2018-05-18/block-22"
units:
  - name: EUR
    kind: currency
    minor_units: 2
