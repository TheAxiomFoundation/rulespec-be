# Money-atom proof-obligation ratchet.
#
# Each count is the number of monetary values (currency parameters,
# currency parameter-table cells, and currency literals in derived
# formulas) that still lack a proof atom citing a provision.
# `axiom-encode proof-validate --require-money-atoms` fails when the
# untracked missing count exceeds `total_allowed`. Burn this down; do
# not raise it. Regenerate with `--emit-ratchet`.
total_allowed: 2
# Current per-file backlog (informational):
#   be-bru/statutes/vehicle_tax/entry_into_service_detailed.yaml: 2
#
# The two remaining values are the flattened MyTax TMC parameter *tables*
# (non-leasing and leasing power/age-band cells). The money-atom gate wants a
# `versions[0].values` table atom, but the repository's own pytest
# (test_policy_parameter_proof_atoms_anchor_formula_values) only accepts
# `versions[N].formula` atoms on policy-bearing parameters, so a table atom
# cannot satisfy both gates. They stay a documented gap until the repo test
# convention grows a table-grounding path. The underlying amounts are grounded
# in be-bru/guidance/brussels-fiscality/mytax/road-tax-tariffs-current-2026-07-01
# blocks 6 (non-leasing) and 7 (leasing).
